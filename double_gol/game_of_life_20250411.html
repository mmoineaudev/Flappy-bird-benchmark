<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Game of Life - Retro Neon 3D</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #0a0a0f;
            font-family: monospace;
            color: #fff;
        }
        
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        #ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #00ffff;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
            backdrop-filter: blur(4px);
        }
        
        .control-group {
            margin: 10px 0;
            padding: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }
        
        label {
            display: inline-block;
            width: 120px;
            font-size: 12px;
            color: #aaa;
        }
        
        input[type="range"] {
            width: 150px;
            vertical-align: middle;
        }
        
        .value-display {
            color: #00ffff;
            font-weight: bold;
        }
        
        button {
            background: rgba(0, 255, 255, 0.2);
            border: 1px solid #00ffff;
            color: #00ffff;
            padding: 8px 16px;
            margin: 4px 4px 4px 0;
            border-radius: 4px;
            cursor: pointer;
            font-family: monospace;
            transition: all 0.2s;
        }
        
        button:hover {
            background: rgba(0, 255, 255, 0.4);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }
        
        button.active {
            background: rgba(0, 255, 255, 0.6);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
        }
        
        #stats-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #ff00ff;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.3);
        }
        
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin: 5px 0;
            font-size: 14px;
        }
        
        .stat-label { color: #aaa; }
        .stat-value { color: #ff00ff; font-weight: bold; }
        
        #controls-panel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 8px;
            border: 2px solid #9d4edd;
            display: flex;
            gap: 10px;
        }
        
        .key-hint {
            font-size: 10px;
            color: #666;
            text-align: center;
        }
        
        #scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0),
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.3) 50%,
                rgba(0,0,0,0.3)
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 10;
        }
        
        #pause-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }
        
        #pause-text {
            font-size: 72px;
            color: #00ffff;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.8);
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="scanlines"></div>
    
    <div id="pause-overlay">
        <div id="pause-text">PAUSED</div>
    </div>
    
    <div id="ui-panel">
        <h3 style="margin-top:0; color:#00ffff; text-shadow:0 0 10px rgba(0,255,255,0.3)">Game Controls</h3>
        
        <div class="control-group">
            <label>Grid Size:</label>
            <input type="range" id="grid-size" min="20" max="100" value="80">
            <span id="grid-size-val" class="value-display">80x40</span>
        </div>
        
        <div class="control-group">
            <label>Birth Neighbors:</label>
            <input type="range" id="birth" min="0" max="8" value="3" step="1">
            <span id="birth-val" class="value-display">3</span>
        </div>
        
        <div class="control-group">
            <label>Survival Range:</label>
            <input type="range" id="survive-min" min="0" max="8" value="2" step="1">
            <span id="survive-min-val" class="value-display">2</span>
            <input type="range" id="survive-max" min="0" max="8" value="3" step="1">
            <span id="survive-max-val" class="value-display">3</span>
        </div>
        
        <div class="control-group">
            <label>Simulation Speed:</label>
            <input type="range" id="speed" min="1" max="60" value="10">
            <span id="speed-val" class="value-display">10 FPS</span>
        </div>
        
        <div style="margin-top: 10px; display: flex; gap: 5px;">
            <button id="btn-pause">Pause</button>
            <button id="btn-randomize">R: Randomize</button>
            <button id="btn-clear">C: Clear</button>
        </div>
    </div>
    
    <div id="stats-panel">
        <h3 style="margin-top:0; color:#ff00ff; text-shadow:0 0 10px rgba(255,0,255,0.3)">Statistics</h3>
        <div class="stat-row">
            <span class="stat-label">Generation:</span>
            <span id="stat-generation" class="stat-value">0</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">Population:</span>
            <span id="stat-population" class="stat-value">0</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">FPS:</span>
            <span id="stat-fps" class="stat-value">0.0</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">Rules:</span>
            <span class="stat-value" style="font-size:12px">B3,S2-3</span>
        </div>
    </div>
    
    <div id="controls-panel">
        <span class="key-hint">SPACE: Pause/Resume | R: Randomize | C: Clear</span>
        <span class="key-hint">DRAG: Draw Cells | SCROLL: Zoom</span>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skyp.co/three@0.160.0/build/three.module.js';

        // Game configuration
        const CONFIG = {
            gridWidth: 80,
            gridHeight: 40,
            cellSize: 1,
            spacing: 0.1,
            birthNeighbors: [3],
            surviveMin: 2,
            surviveMax: 3,
            speed: 10,
            neonColors: [
                new THREE.Color(0x00ffff), // Cyan
                new THREE.Color(0xff00ff), // Magenta
                new THREE.Color(0x9d4edd)  // Purple
            ]
        };

        // Game state
        let grid = [];
        let generation = 0;
        let isPaused = false;
        let lastUpdate = 0;
        let animationId = null;

        // Three.js setup
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0f);

        const camera = new THREE.PerspectiveCamera(
            60,
            window.innerWidth / window.innerHeight,
            0.1,
            1000
        );
        camera.position.set(
            CONFIG.gridWidth / 2,
            CONFIG.gridHeight * 0.75,
            CONFIG.gridHeight * 1.5
        );
        camera.lookAt(CONFIG.gridWidth / 2, CONFIG.gridHeight / 2, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0x00ffff, 2, 100);
        pointLight.position.set(CONFIG.gridWidth / 2, CONFIG.gridHeight / 2, 20);
        scene.add(pointLight);

        // Grid container
        const gridContainer = new THREE.Group();
        scene.add(gridContainer);

        // Cell geometry with instanced mesh for performance
        const cellGeometry = new THREE.BoxGeometry(0.8, 0.8, 0.8);
        const cellMaterial = new THREE.MeshStandardMaterial({
            roughness: 0.3,
            metalness: 0.7,
            emissive: new THREE.Color(0x00ffff),
            emissiveIntensity: 1.0
        });

        let cellMesh;
        let cellCount = CONFIG.gridWidth * CONFIG.gridHeight;

        function initGrid() {
            // Clear existing grid
            while(gridContainer.children.length > 0) {
                const child = gridContainer.children[0];
                if (child.geometry) child.geometry.dispose();
                if (child.material) child.material.dispose();
                gridContainer.remove(child);
            }

            cellCount = CONFIG.gridWidth * CONFIG.gridHeight;

            // Create instanced mesh
            const mesh = new THREE.InstancedMesh(cellGeometry, cellMaterial, cellCount);
            mesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);

            // Initialize matrix array
            const dummy = new THREE.Object3D();
            let idx = 0;

            for (let y = 0; y < CONFIG.gridHeight; y++) {
                for (let x = 0; x < CONFIG.gridWidth; x++) {
                    dummy.position.set(
                        x + CONFIG.spacing,
                        y + CONFIG.spacing,
                        0
                    );
                    dummy.updateMatrix();
                    mesh.setMatrixAt(idx++, dummy.matrix);
                }
            }

            mesh.instanceColor.setUsage(THREE.DynamicDrawUsage);
            mesh.count = 0; // Start with no visible cells
            gridContainer.add(mesh);
            cellMesh = mesh;

            // Initialize game grid
            grid = [];
            for (let y = 0; y < CONFIG.gridHeight; y++) {
                grid[y] = [];
                for (let x = 0; x < CONFIG.gridWidth; x++) {
                    grid[y][x] = Math.random() < 0.2 ? 1 : 0;
                    if (grid[y][x] === 1) {
                        mesh.setColorAt(mesh.count++, getNeonColor(x, y, generation));
                    }
                }
            }

            mesh.instanceMatrix.neoderiveBuffersNeedUpdate = true;
            mesh.instanceColor.neoderiveBuffersNeedUpdate = true;
        }

        function getNeonColor(x, y, gen) {
            const colorIdx = (x + y + Math.floor(gen / 5)) % CONFIG.neonColors.length;
            return CONFIG.neonColors[colorIdx];
        }

        // Game logic
        function getNeighbors(x, y) {
            let count = 0;
            for (let dy = -1; dy <= 1; dy++) {
                for (let dx = -1; dx <= 1; dx++) {
                    if (dx === 0 && dy === 0) continue;

                    const nx = (x + dx + CONFIG.gridWidth) % CONFIG.gridWidth;
                    const ny = (y + dy + CONFIG.gridHeight) % CONFIG.gridHeight;

                    if (grid[ny][nx] === 1) {
                        count++;
                    }
                }
            }
            return count;
        }

        function updateGame() {
            const newGrid = Array.from({ length: CONFIG.gridHeight }, () => 
                Array(CONFIG.gridWidth).fill(0)
            );
            let hasChanges = false;

            for (let y = 0; y < CONFIG.gridHeight; y++) {
                for (let x = 0; x < CONFIG.gridWidth; x++) {
                    const neighbors = getNeighbors(x, y);
                    const current = grid[y][x];

                    if (current === 0) {
                        // Birth rule
                        if (CONFIG.birthNeighbors.includes(neighbors)) {
                            newGrid[y][x] = 1;
                            hasChanges = true;
                        }
                    } else {
                        // Survival rule
                        if (neighbors >= CONFIG.surviveMin && neighbors <= CONFIG.surviveMax) {
                            newGrid[y][x] = 1;
                        }
                    }
                }
            }

            grid = newGrid;
            generation++;
            updateCells();
            
            return hasChanges;
        }

        function updateCells() {
            let count = 0;
            for (let y = 0; y < CONFIG.gridHeight; y++) {
                for (let x = 0; x < CONFIG.gridWidth; x++) {
                    if (grid[y][x] === 1) {
                        cellMesh.setColorAt(
                            count++,
                            getNeonColor(x, y, generation)
                        );
                    }
                }
            }
            cellMesh.count = count;
            cellMesh.instanceColor.neoderiveBuffersNeedUpdate = true;
        }

        function randomizeGrid() {
            for (let y = 0; y < CONFIG.gridHeight; y++) {
                for (let x = 0; x < CONFIG.gridWidth; x++) {
                    grid[y][x] = Math.random() < 0.2 ? 1 : 0;
                }
            }
            updateCells();
        }

        function clearGrid() {
            for (let y = 0; y < CONFIG.gridHeight; y++) {
                for (let x = 0; x < CONFIG.gridWidth; x++) {
                    grid[y][x] = 0;
                }
            }
            updateCells();
        }

        // Input handling
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function handleMouseDown(event) {
            if (isPaused) return;

            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            const intersects = raycaster.intersectObject(cellMesh);

            if (intersects.length > 0) {
                const instanceId = intersects[0].instanceId;
                
                // Convert instance ID to grid coordinates
                const x = instanceId % CONFIG.gridWidth;
                const y = Math.floor(instanceId / CONFIG.gridWidth);
                
                // Toggle cell state
                grid[y][x] = 1 - grid[y][x];
                updateCells();
            }
        }

        function handleMouseMove(event) {
            if (isPaused || !event.buttons.left) return;

            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(cellMesh);

            if (intersects.length > 0) {
                const instanceId = intersects[0].instanceId;
                const x = instanceId % CONFIG.gridWidth;
                const y = Math.floor(instanceId / CONFIG.gridWidth);

                grid[y][x] = 1;
                updateCells();
            }
        }

        function handleWheel(event) {
            const zoomSpeed = 0.01;
            camera.fov -= event.deltaY * zoomSpeed;
            camera.fov = Math.max(20, Math.min(120, camera.fov));
            camera.updateProjectionMatrix();
        }

        window.addEventListener('mousedown', handleMouseDown);
        window.addEventListener('mousemove', handleMouseMove);
        window.addEventListener('wheel', handleWheel);

        // UI Controls
        document.getElementById('btn-pause').addEventListener('click', () => {
            isPaused = !isPaused;
            document.getElementById('pause-overlay').style.display = isPaused ? 'flex' : 'none';
            document.getElementById('btn-pause').textContent = isPaused ? 'Resume' : 'Pause';
            document.getElementById('btn-pause').classList.toggle('active', isPaused);
        });

        document.getElementById('btn-randomize').addEventListener('click', randomizeGrid);
        document.getElementById('btn-clear').addEventListener('click', clearGrid);

        // Slider controls
        function setupSlider(id, configKey, displayId, callback) {
            const slider = document.getElementById(id);
            const display = document.getElementById(displayId);
            
            slider.addEventListener('input', () => {
                CONFIG[configKey] = parseInt(slider.value);
                display.textContent = configKey === 'speed' ? `${slider.value} FPS` : 
                                     configKey === 'gridWidth' || configKey === 'gridHeight' 
                                     ? `${CONFIG.gridWidth}x${CONFIG.gridHeight}` : slider.value;
                
                if (callback) callback();
            });
        }

        setupSlider('grid-size', 'gridWidth', 'grid-size-val', () => {
            CONFIG.gridHeight = Math.max(20, Math.floor(CONFIG.gridWidth * 0.5));
            initGrid();
        });

        setupSlider('birth', 'birthNeighbors', 'birth-val');
        setupSlider('survive-min', 'surviveMin', 'survive-min-val');
        setupSlider('survive-max', 'surviveMax', 'survive-max-val');
        setupSlider('speed', 'speed', 'speed-val');

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            switch(e.key.toLowerCase()) {
                case 'space':
                    document.getElementById('btn-pause').click();
                    break;
                case 'r':
                    randomizeGrid();
                    break;
                case 'c':
                    clearGrid();
                    break;
                case '+':
                    CONFIG.speed = Math.min(60, CONFIG.speed + 5);
                    document.getElementById('speed').value = CONFIG.speed;
                    document.getElementById('speed-val').textContent = `${CONFIG.speed} FPS`;
                    break;
                case '-':
                    CONFIG.speed = Math.max(1, CONFIG.speed - 5);
                    document.getElementById('speed').value = CONFIG.speed;
                    document.getElementById('speed-val').textContent = `${CONFIG.speed} FPS`;
                    break;
            }
        });

        // Stats updates
        function updateStats() {
            const population = grid.flat().reduce((a, b) => a + b, 0);
            document.getElementById('stat-generation').textContent = generation;
            document.getElementById('stat-population').textContent = population;
        }

        // Animation loop
        let frameCount = 0;
        let lastFpsTime = 0;

        function animate(time) {
            animationId = requestAnimationFrame(animate);

            // Calculate FPS
            frameCount++;
            if (time - lastFpsTime >= 1000) {
                document.getElementById('stat-fps').textContent = frameCount.toFixed(1);
                frameCount = 0;
                lastFpsTime = time;
            }

            if (!isPaused) {
                // Game update logic
                if (time - lastUpdate >= 1000 / CONFIG.speed) {
                    updateGame();
                    updateStats();
                    lastUpdate = time;
                }

                // Rotate light for dynamic effect
                const timeFactor = time * 0.001;
                pointLight.position.x = CONFIG.gridWidth / 2 + Math.sin(timeFactor) * 5;
                pointLight.position.z = 20 + Math.cos(timeFactor) * 5;
            }

            renderer.render(scene, camera);
        }

        // Initialize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        initGrid();
        updateStats();
        animate(0);

        // Add basic grid visualization
        const gridHelper = new THREE.GridHelper(
            Math.max(CONFIG.gridWidth, CONFIG.gridHeight),
            Math.max(CONFIG.gridWidth, CONFIG.gridHeight)
        );
        gridHelper.position.set(CONFIG.gridWidth/2, CONFIG.gridHeight/2, -0.1);
        gridHelper.material.opacity = 0.2;
        gridHelper.material.transparent = true;
        scene.add(gridHelper);

        // Add axis helpers
        const axesHelper = new THREE.AxesHelper(5);
        axesHelper.position.set(5, 5, 5);
        scene.add(axesHelper);
    </script>
</body>
</html>
