<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Game of Life - Retro Neon Wave (3D)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Import Map for Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #0a0a0f;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            color: #cfcfcf;
        }
        
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        /* Scanline overlay */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0),
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.2) 50%,
                rgba(0,0,0,0.2)
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 10;
        }
        
        /* CRT effect overlay */
        .crt-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0) 50%, rgba(0,0,0,0.6) 100%);
            pointer-events: none;
            z-index: 20;
        }
        
        /* UI panel */
        .ui-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(10, 10, 20, 0.8);
            border: 2px solid #3d3d4e;
            border-radius: 8px;
            padding: 15px;
            z-index: 30;
            backdrop-filter: blur(4px);
        }
        
        .ui-title {
            color: #00ffff;
            font-weight: bold;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(0,255,255,0.5);
        }
        
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            font-size: 14px;
        }
        
        .control-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 12px 0;
            font-size: 13px;
        }
        
        input[type="range"] {
            width: 120px;
            cursor: pointer;
        }
        
        button {
            background: #2d2d3e;
            border: 1px solid #4d4d5e;
            color: #cfcfcf;
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-family: monospace;
            font-size: 13px;
        }
        
        button:hover {
            background: #3d3d4e;
            border-color: #6d6d7e;
        }
        
        button.active {
            background: #00ffff;
            color: #0a0a0f;
        }
        
        .controls-hint {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(10, 10, 20, 0.8);
            padding: 10px 15px;
            border-radius: 6px;
            z-index: 30;
            font-size: 12px;
            line-height: 1.5;
            backdrop-filter: blur(4px);
        }
        
        .controls-hint span {
            color: #ff00ff;
        }
        
        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        input[type="checkbox"] {
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- Scanline and CRT overlays -->
    <div class="scanlines"></div>
    <div class="crt-overlay"></div>
    
    <!-- 3D Canvas container -->
    <div id="canvas-container"></div>
    
    <!-- UI Panel -->
    <div class="ui-panel">
        <div class="ui-title">GAME OF LIFE (3D)</div>
        
        <div class="stat-row">
            <span>Frame:</span>
            <span id="frame-count">0</span>
        </div>
        
        <div class="stat-row">
            <span>Population:</span>
            <span id="population">0</span>
        </div>
        
        <div class="stat-row">
            <span>Grid Size:</span>
            <span id="grid-size">80x40</span>
        </div>
        
        <div class="control-row">
            <span>Birth Rule:</span>
            <input type="range" id="birth-rule" min="1" max="5" value="3">
            <span id="birth-value">3</span>
        </div>
        
        <div class="control-row">
            <span>Survival Min:</span>
            <input type="range" id="survival-min" min="0" max="4" value="2">
            <span id="survival-min-value">2</span>
        </div>
        
        <div class="control-row">
            <span>Survival Max:</span>
            <input type="range" id="survival-max" min="1" max="5" value="3">
            <span id="survival-max-value">3</span>
        </div>
        
        <div class="control-row">
            <span>Speed:</span>
            <input type="range" id="speed" min="1" max="60" value="10">
            <span id="speed-value">10 FPS</span>
        </div>
        
        <div class="stat-row">
            <button id="pause-btn">Pause</button>
            <button id="random-btn">Randomize</button>
        </div>
        
        <div class="control-row">
            <div class="checkbox-container">
                <input type="checkbox" id="glow-check" checked>
                <span>Glow Effects</span>
            </div>
        </div>
        
        <div class="control-row">
            <div class="checkbox-container">
                <input type="checkbox" id="scanline-check" checked>
                <span>Scanlines</span>
            </div>
        </div>
    </div>
    
    <!-- Controls hint -->
    <div class="controls-hint">
        <div><span>[Space]</span> Pause/Resume</div>
        <div><span>[R]</span> Randomize | <span>[C]</span> Clear</div>
        <div><span>[Drag]</span> Draw Cells | <span>[Scroll]</span> Zoom</div>
    </div>
    
    <script type="module">
        import * as THREE from 'three';
        
        // Game parameters
        const GRID_WIDTH = 80;
        const GRID_HEIGHT = 40;
        const CELL_SIZE = 1.5;
        const GRID_SPACING = 1;
        
        // Rule parameters
        let ruleBirth = 3;
        let ruleSurvivalMin = 2;
        let ruleSurvivalMax = 3;
        let fpsTarget = 10;
        let frameTime = 1.0 / fpsTarget;
        
        // Game state
        let grid = [];
        let paused = false;
        let frameCount = 0;
        let lastUpdate = Date.now();
        let currentColor = new THREE.Color(0x00ffff); // Cyan
        let glowEnabled = true;
        let scanlinesEnabled = true;
        
        // Three.js scene setup
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        // Camera with perspective
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(GRID_WIDTH / 2, GRID_HEIGHT * 1.5, GRID_WIDTH * 1.8);
        camera.lookAt(GRID_WIDTH / 2, GRID_HEIGHT / 2, 0);
        
        // Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);
        
        // Grid base (flat surface)
        const gridBaseGeometry = new THREE.PlaneGeometry(GRID_WIDTH * CELL_SIZE, GRID_HEIGHT * CELL_SIZE);
        const gridBaseMaterial = new THREE.MeshBasicMaterial({ 
            color: 0x0a0a0f,
            side: THREE.DoubleSide
        });
        const gridBase = new THREE.Mesh(gridBaseGeometry, gridBaseMaterial);
        gridBase.position.set(
            (GRID_WIDTH * CELL_SIZE) / 2 - CELL_SIZE / 2,
            -(GRID_HEIGHT * CELL_SIZE) / 2 + CELL_SIZE / 2,
            0
        );
        scene.add(gridBase);
        
        // Grid lines
        const gridLines = new THREE.Group();
        scene.add(gridLines);
        
        // Cells container
        const cellsGroup = new THREE.Group();
        scene.add(cellsGroup);
        
        // Cell geometry and material
        const cellGeometry = new THREE.BoxGeometry(CELL_SIZE * 0.8, CELL_SIZE * 0.8, CELL_SIZE * 0.8);
        
        // Neon materials (cyan, magenta, purple)
        const neonColors = [
            new THREE.MeshBasicMaterial({ color: 0x00ffff }), // Cyan
            new THREE.MeshBasicMaterial({ color: 0xff00ff }), // Magenta
            new THREE.MeshBasicMaterial({ color: 0x9d4edd })  // Purple
        ];
        
        // Current cell material
        let currentMaterial = neonColors[0];
        
        // Lights for glow effect
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambientLight);
        
        const pointLight = new THREE.PointLight(0x00ffff, 1, 50);
        pointLight.position.set(GRID_WIDTH / 2, GRID_HEIGHT / 2, 20);
        scene.add(pointLight);
        
        // Mouse interaction
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let isDragging = false;
        let lastMousePos = { x: 0, y: 0 };
        
        // Initialize grid
        function initGrid() {
            // Clear existing cells
            while (cellsGroup.children.length > 0) {
                cellsGroup.remove(cellsGroup.children[0]);
            }
            
            // Create new grid
            grid = [];
            for (let y = 0; y < GRID_HEIGHT; y++) {
                const row = [];
                for (let x = 0; x < GRID_WIDTH; x++) {
                    // Random initial state
                    const isAlive = Math.random() < 0.3;
                    row.push(isAlive ? 1 : 0);
                    
                    if (isAlive) {
                        addCell(x, y);
                    }
                }
                grid.push(row);
            }
        }
        
        // Add cell mesh
        function addCell(x, y) {
            const cell = new THREE.Mesh(cellGeometry, currentMaterial);
            
            // Position in 3D space
            cell.position.set(
                x * CELL_SIZE - (GRID_WIDTH * CELL_SIZE) / 2 + CELL_SIZE / 2,
                y * CELL_SIZE - (GRID_HEIGHT * CELL_SIZE) / 2 + CELL_SIZE / 2,
                0
            );
            
            // Add glow effect with emissive material
            if (glowEnabled) {
                cell.material.emissive = new THREE.Color(currentMaterial.color);
                cell.material.emissiveIntensity = 0.8;
            }
            
            cellsGroup.add(cell);
        }
        
        // Remove cell mesh
        function removeCell(x, y, index) {
            if (cellsGroup.children[index]) {
                cellsGroup.remove(cellsGroup.children[index]);
            }
        }
        
        // Update grid lines
        function updateGridLines() {
            // Clear existing lines
            while (gridLines.children.length > 0) {
                gridLines.remove(gridLines.children[0]);
            }
            
            // Create vertical lines
            for (let x = 0; x <= GRID_WIDTH; x++) {
                const geometry = new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(
                        x * CELL_SIZE - (GRID_WIDTH * CELL_SIZE) / 2,
                        -(GRID_HEIGHT * CELL_SIZE) / 2,
                        -0.1
                    ),
                    new THREE.Vector3(
                        x * CELL_SIZE - (GRID_WIDTH * CELL_SIZE) / 2,
                        (GRID_HEIGHT * CELL_SIZE) / 2,
                        -0.1
                    )
                ]);
                
                const material = new THREE.LineBasicMaterial({
                    color: 0x2d2d3e,
                    transparent: true,
                    opacity: 0.5
                });
                
                const line = new THREE.Line(geometry, material);
                gridLines.add(line);
            }
            
            // Create horizontal lines
            for (let y = 0; y <= GRID_HEIGHT; y++) {
                const geometry = new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(
                        -(GRID_WIDTH * CELL_SIZE) / 2,
                        y * CELL_SIZE - (GRID_HEIGHT * CELL_SIZE) / 2,
                        -0.1
                    ),
                    new THREE.Vector3(
                        (GRID_WIDTH * CELL_SIZE) / 2,
                        y * CELL_SIZE - (GRID_HEIGHT * CELL_SIZE) / 2,
                        -0.1
                    )
                ]);
                
                const material = new THREE.LineBasicMaterial({
                    color: 0x2d2d3e,
                    transparent: true,
                    opacity: 0.5
                });
                
                const line = new THREE.Line(geometry, material);
                gridLines.add(line);
            }
        }
        
        // Count neighbors
        function getNeighborCount(x, y) {
            let count = 0;
            
            for (let i = -1; i <= 1; i++) {
                for (let j = -1; j <= 1; j++) {
                    if (i === 0 && j === 0) continue;
                    
                    const nx = (x + i + GRID_WIDTH) % GRID_WIDTH;
                    const ny = (y + j + GRID_HEIGHT) % GRID_HEIGHT;
                    
                    count += grid[ny][nx];
                }
            }
            
            return count;
        }
        
        // Update game state
        function updateGame() {
            if (paused) return;
            
            const now = Date.now();
            if (now - lastUpdate < frameTime * 1000) return;
            
            lastUpdate = now;
            
            // Create new grid state
            const newGrid = [];
            for (let y = 0; y < GRID_HEIGHT; y++) {
                const row = [];
                for (let x = 0; x < GRID_WIDTH; x++) {
                    const neighbors = getNeighborCount(x, y);
                    
                    if (grid[y][x] === 1) {
                        // Cell is alive
                        if (neighbors >= ruleSurvivalMin && neighbors <= ruleSurvivalMax) {
                            row.push(1);
                        } else {
                            row.push(0);
                        }
                    } else {
                        // Cell is dead
                        if (neighbors === ruleBirth) {
                            row.push(1);
                        } else {
                            row.push(0);
                        }
                    }
                }
                newGrid.push(row);
            }
            
            // Update grid and visual representation
            updateGridVisuals(newGrid);
            
            grid = newGrid;
            frameCount++;
            
            // Update UI
            document.getElementById('frame-count').textContent = frameCount;
            document.getElementById('population').textContent = getPopulation();
        }
        
        // Update visual representation of grid
        function updateGridVisuals(newGrid) {
            // Count changes to optimize updates
            let population = 0;
            
            for (let y = 0; y < GRID_HEIGHT; y++) {
                for (let x = 0; x < GRID_WIDTH; x++) {
                    if (newGrid[y][x] === 1 && grid[y][x] === 0) {
                        // Cell becomes alive
                        addCell(x, y);
                    } else if (newGrid[y][x] === 0 && grid[y][x] === 1) {
                        // Cell dies - remove it
                        // Find and remove the cell at this position
                        for (let i = cellsGroup.children.length - 1; i >= 0; i--) {
                            const cell = cellsGroup.children[i];
                            if (Math.abs(cell.position.x - (x * CELL_SIZE - (GRID_WIDTH * CELL_SIZE) / 2 + CELL_SIZE / 2)) < 0.01 &&
                                Math.abs(cell.position.y - (y * CELL_SIZE - (GRID_HEIGHT * CELL_SIZE) / 2 + CELL_SIZE / 2)) < 0.01) {
                                cellsGroup.remove(cell);
                                break;
                            }
                        }
                    }
                    
                    if (newGrid[y][x] === 1) population++;
                }
            }
            
            // Update population count
            document.getElementById('population').textContent = population;
            
            // Cycle color periodically
            cycleColor();
        }
        
        // Cycle colors
        function cycleColor() {
            const currentIndex = neonColors.indexOf(currentMaterial);
            currentMaterial = neonColors[(currentIndex + 1) % neonColors.length];
            
            // Update all cells with new material
            for (const cell of cellsGroup.children) {
                cell.material = currentMaterial;
                
                if (glowEnabled) {
                    cell.material.emissive = new THREE.Color(currentMaterial.color);
                    cell.material.emissiveIntensity = 0.8;
                }
            }
        }
        
        // Get population count
        function getPopulation() {
            let count = 0;
            for (const row of grid) {
                for (const cell of row) {
                    if (cell === 1) count++;
                }
            }
            return count;
        }
        
        // Randomize grid
        function randomize() {
            const newGrid = [];
            
            for (let y = 0; y < GRID_HEIGHT; y++) {
                const row = [];
                for (let x = 0; x < GRID_WIDTH; x++) {
                    const isAlive = Math.random() < 0.3;
                    row.push(isAlive ? 1 : 0);
                }
                newGrid.push(row);
            }
            
            // Reset grid
            while (cellsGroup.children.length > 0) {
                cellsGroup.remove(cellsGroup.children[0]);
            }
            
            grid = newGrid;
            updateGridVisuals(grid);
        }
        
        // Clear grid
        function clearGrid() {
            while (cellsGroup.children.length > 0) {
                cellsGroup.remove(cellsGroup.children[0]);
            }
            
            grid = [];
            for (let y = 0; y < GRID_HEIGHT; y++) {
                const row = [];
                for (let x = 0; x < GRID_WIDTH; x++) {
                    row.push(0);
                }
                grid.push(row);
            }
            
            document.getElementById('population').textContent = '0';
        }
        
        // Toggle cell at position
        function toggleCell(x, y) {
            if (x < 0 || x >= GRID_WIDTH || y < 0 || y >= GRID_HEIGHT) return;
            
            // Convert screen coordinates to grid coordinates
            const worldX = x * CELL_SIZE - (GRID_WIDTH * CELL_SIZE) / 2 + CELL_SIZE / 2;
            const worldY = y * CELL_SIZE - (GRID_HEIGHT * CELL_SIZE) / 2 + CELL_SIZE / 2;
            
            // Find cell at this position
            let found = false;
            for (const cell of cellsGroup.children) {
                if (Math.abs(cell.position.x - worldX) < 0.01 && 
                    Math.abs(cell.position.y - worldY) < 0.01) {
                    cellsGroup.remove(cell);
                    found = true;
                    break;
                }
            }
            
            if (!found) {
                addCell(x, y);
            }
        }
        
        // Mouse event handlers
        function onMouseMove(event) {
            if (isDragging) {
                const rect = renderer.domElement.getBoundingClientRect();
                const x = event.clientX - rect.left;
                const y = rect.bottom - event.clientY;
                
                mouse.x = (x / rect.width) * 2 - 1;
                mouse.y = 1 - (y / rect.height) * 2;
                
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObject(cellsGroup);
                
                if (intersects.length > 0) {
                    // Convert world position to grid coordinates
                    const worldX = intersects[0].point.x;
                    const worldY = intersects[0].point.y;
                    
                    const gridX = Math.round((worldX + (GRID_WIDTH * CELL_SIZE) / 2 - CELL_SIZE / 2) / CELL_SIZE);
                    const gridY = Math.round((worldY + (GRID_HEIGHT * CELL_SIZE) / 2 - CELL_SIZE / 2) / CELL_SIZE);
                    
                    toggleCell(gridX, gridY);
                }
            }
        }
        
        function onMouseDown(event) {
            if (event.button === 0) { // Left click
                isDragging = true;
                
                const rect = renderer.domElement.getBoundingClientRect();
                const x = event.clientX - rect.left;
                const y = rect.bottom - event.clientY;
                
                mouse.x = (x / rect.width) * 2 - 1;
                mouse.y = 1 - (y / rect.height) * 2;
                
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObject(cellsGroup);
                
                if (intersects.length > 0) {
                    const worldX = intersects[0].point.x;
                    const worldY = intersects[0].point.y;
                    
                    const gridX = Math.round((worldX + (GRID_WIDTH * CELL_SIZE) / 2 - CELL_SIZE / 2) / CELL_SIZE);
                    const gridY = Math.round((worldY + (GRID_HEIGHT * CELL_SIZE) / 2 - CELL_SIZE / 2) / CELL_SIZE);
                    
                    toggleCell(gridX, gridY);
                }
            }
        }
        
        function onMouseUp() {
            isDragging = false;
        }
        
        // Zoom control
        function onWheel(event) {
            const zoomSpeed = 0.1;
            
            if (event.deltaY < 0) {
                camera.position.z -= zoomSpeed * 2;
            } else {
                camera.position.z += zoomSpeed * 2;
            }
            
            camera.position.z = Math.max(5, Math.min(camera.position.z, 100));
        }
        
        // Initialize
        initGrid();
        updateGridLines();
        
        // Event listeners
        window.addEventListener('keydown', (e) => {
            if (e.key === ' ') {
                paused = !paused;
                document.getElementById('pause-btn').textContent = paused ? 'Resume' : 'Pause';
                document.getElementById('pause-btn').classList.toggle('active');
            } else if (e.key === 'r' || e.key === 'R') {
                randomize();
            } else if (e.key === 'c' || e.key === 'C') {
                clearGrid();
            }
        });
        
        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('mousedown', onMouseDown);
        window.addEventListener('mouseup', onMouseUp);
        window.addEventListener('wheel', onWheel);
        
        // Resize handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // UI Controls
        document.getElementById('pause-btn').addEventListener('click', () => {
            paused = !paused;
            document.getElementById('pause-btn').textContent = paused ? 'Resume' : 'Pause';
            document.getElementById('pause-btn').classList.toggle('active');
        });
        
        document.getElementById('random-btn').addEventListener('click', () => {
            randomize();
        });
        
        document.getElementById('birth-rule').addEventListener('input', (e) => {
            ruleBirth = parseInt(e.target.value);
            document.getElementById('birth-value').textContent = ruleBirth;
        });
        
        document.getElementById('survival-min').addEventListener('input', (e) => {
            ruleSurvivalMin = parseInt(e.target.value);
            document.getElementById('survival-min-value').textContent = ruleSurvivalMin;
        });
        
        document.getElementById('survival-max').addEventListener('input', (e) => {
            ruleSurvivalMax = parseInt(e.target.value);
            document.getElementById('survival-max-value').textContent = ruleSurvivalMax;
        });
        
        document.getElementById('speed').addEventListener('input', (e) => {
            fpsTarget = parseInt(e.target.value);
            frameTime = 1.0 / fpsTarget;
            document.getElementById('speed-value').textContent = fpsTarget + ' FPS';
        });
        
        document.getElementById('glow-check').addEventListener('change', (e) => {
            glowEnabled = e.target.checked;
            
            for (const cell of cellsGroup.children) {
                if (glowEnabled) {
                    cell.material.emissive = new THREE.Color(currentMaterial.color);
                    cell.material.emissiveIntensity = 0.8;
                } else {
                    cell.material.emissive = new THREE.Color(0x000000);
                    cell.material.emissiveIntensity = 0;
                }
            }
        });
        
        document.getElementById('scanline-check').addEventListener('change', (e) => {
            scanlinesEnabled = e.target.checked;
            document.querySelector('.scanlines').style.display = scanlinesEnabled ? 'block' : 'none';
        });
        
        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            
            updateGame();
            
            renderer.render(scene, camera);
        }
        
        animate();
    </script>
</body>
</html>
