<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RogueBreaker - Brick Breaker Roguelike</title>
<style>
/* ===== RESET & BASE ===== */
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #0a0a1a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #fff; user-select: none; }
canvas { display: block; }

/* ===== HUD ===== */
#hud {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: none; padding: 10px 20px;
  background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%);
  font-size: 16px; pointer-events: none;
}
#hud.active { display: flex; justify-content: space-between; align-items: center; }
.hud-section { display: flex; gap: 24px; align-items: center; }
.hud-item { display: flex; align-items: center; gap: 6px; }
.hud-label { color: #888; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
.hud-value { font-weight: bold; font-size: 20px; color: #fff; }
.hud-score .hud-value { color: #ffd700; }
.hud-lives .hud-value { color: #ff4444; }
.hud-level .hud-value { color: #44aaff; }
.hud-combo .hud-value { color: #ff8800; font-size: 24px; }
#modifier-icons { display: flex; gap: 4px; align-items: center; }
.modifier-icon {
  width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: bold; border: 2px solid rgba(255,255,255,0.3);
  background: rgba(255,255,255,0.1); position: relative;
}
.modifier-icon .stack-count {
  position: absolute; bottom: -4px; right: -4px; background: #ff8800; color: #fff;
  border-radius: 50%; width: 16px; height: 16px; font-size: 9px; display: flex; align-items: center; justify-content: center;
}

/* ===== OVERLAYS ===== */
.overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 200;
  display: none; flex-direction: column; align-items: center; justify-content: center;
  background: rgba(10, 10, 26, 0.95);
}
.overlay.active { display: flex; }

/* ===== MAIN MENU ===== */
#main-menu h1 { font-size: 64px; margin-bottom: 8px; color: #ff6600; text-shadow: 0 0 30px rgba(255,102,0,0.5); }
#main-menu .subtitle { color: #888; font-size: 18px; margin-bottom: 40px; letter-spacing: 2px; }
.menu-btn {
  display: block; width: 300px; padding: 16px 32px; margin: 8px auto;
  background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.15);
  color: #fff; font-size: 18px; cursor: pointer; border-radius: 8px;
  transition: all 0.2s; text-align: center;
}
.menu-btn:hover { background: rgba(255,102,0,0.2); border-color: #ff6600; transform: scale(1.05); }
.menu-btn:active { transform: scale(0.98); }
.difficulty-select { display: flex; gap: 12px; margin: 20px auto; }
.diff-btn {
  padding: 10px 24px; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.15);
  color: #fff; cursor: pointer; border-radius: 6px; font-size: 14px; transition: all 0.2s;
}
.diff-btn:hover, .diff-btn.selected { border-color: #ff6600; background: rgba(255,102,0,0.2); }

/* ===== MODIFIER SELECTION ===== */
#modifier-screen h2 { font-size: 36px; margin-bottom: 8px; color: #ffd700; }
#modifier-screen .subtitle { color: #888; margin-bottom: 30px; }
.modifier-cards { display: flex; gap: 20px; margin-bottom: 30px; }
.modifier-card {
  width: 200px; padding: 24px; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.15);
  border-radius: 12px; cursor: pointer; transition: all 0.2s; text-align: center; position: relative;
}
.modifier-card:hover { border-color: #ff6600; background: rgba(255,102,0,0.1); transform: translateY(-4px); }
.modifier-card.selected { border-color: #ffd700; background: rgba(255,215,0,0.15); box-shadow: 0 0 20px rgba(255,215,0,0.3); }
.modifier-card .key-hint { position: absolute; top: 8px; right: 8px; background: rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 4px; font-size: 12px; }
.modifier-card .icon { font-size: 40px; margin-bottom: 12px; }
.modifier-card .name { font-weight: bold; font-size: 16px; margin-bottom: 8px; }
.modifier-card .desc { font-size: 13px; color: #aaa; line-height: 1.4; }
.conflict-warn { color: #ff4444; font-size: 12px; margin-top: 6px; display: none; }
.modifier-card.has-conflict .conflict-warn { display: block; }

/* ===== GAME OVER / VICTORY ===== */
#game-over h1 { font-size: 56px; color: #ff4444; margin-bottom: 20px; }
#victory h1 { font-size: 56px; color: #ffd700; margin-bottom: 20px; text-shadow: 0 0 30px rgba(255,215,0,0.5); }
.stats-panel { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 24px 40px; margin-bottom: 30px; min-width: 350px; }
.stat-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
.stat-row:last-child { border-bottom: none; }
.stat-label { color: #888; }
.stat-value { font-weight: bold; }

/* ===== MAP EDITOR ===== */
#editor-screen { justify-content: flex-start; padding-top: 20px; }
.editor-header { display: flex; gap: 16px; align-items: center; margin-bottom: 16px; }
.editor-header input {
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: #fff;
  padding: 8px 16px; border-radius: 6px; font-size: 14px; width: 250px;
}
.editor-header select {
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: #fff;
  padding: 8px 16px; border-radius: 6px; font-size: 14px;
}
#editor-grid {
  display: grid; gap: 1px; background: rgba(255,255,255,0.05); padding: 10px;
  border-radius: 8px; margin-bottom: 16px;
}
.editor-cell {
  width: 40px; height: 40px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
  cursor: pointer; transition: all 0.1s; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #555;
}
.editor-cell:hover { background: rgba(255,255,255,0.1); }
.editor-cell[data-type="normal"] { background: #666; border-color: #777; }
.editor-cell[data-type="hard"] { background: #334; border-color: #556; }
.editor-cell[data-type="fragile"] { background: #876; border-color: #a98; }
.editor-cell[data-type="explosive"] { background: #a33; border-color: #c44; }
.editor-cell[data-type="shooter"] { background: #a63; border-color: #c84; }
.editor-cell[data-type="portal"] { background: #36a; border-color: #48c; }
.editor-cell[data-type="bonus"] { background: #6a3; border-color: #8c5; }
.editor-cell[data-type="spawner"] { background: #a3a; border-color: #c4c; }
#tool-palette { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; justify-content: center; }
.tool-btn {
  padding: 8px 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15);
  color: #fff; cursor: pointer; border-radius: 6px; font-size: 13px; transition: all 0.2s;
}
.tool-btn:hover { border-color: #ff6600; }
.tool-btn.active { border-color: #ffd700; background: rgba(255,215,0,0.15); }
.editor-actions { display: flex; gap: 12px; margin-bottom: 16px; }
.validation-msg { font-size: 13px; padding: 8px 16px; border-radius: 6px; margin-bottom: 12px; }
.validation-msg.error { background: rgba(255,0,0,0.1); border: 1px solid rgba(255,0,0,0.3); color: #ff4444; }
.validation-msg.success { background: rgba(0,255,0,0.1); border: 1px solid rgba(0,255,0,0.3); color: #44ff44; }

/* ===== LOAD MAP DIALOG ===== */
#load-map-list { max-height: 300px; overflow-y: auto; width: 400px; margin-bottom: 16px; }
.map-item {
  display: flex; justify-content: space-between; align-items: center; padding: 12px 16px;
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
  margin-bottom: 8px; cursor: pointer; transition: all 0.2s;
}
.map-item:hover { background: rgba(255,102,0,0.1); border-color: #ff6600; }
.map-info .map-name { font-weight: bold; }
.map-info .map-meta { font-size: 12px; color: #888; }

/* ===== NOTIFICATION ===== */
#notification {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 300;
  padding: 12px 24px; border-radius: 8px; font-size: 14px; opacity: 0; transition: opacity 0.3s;
  pointer-events: none; background: rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.2);
}
#notification.show { opacity: 1; }
#notification.error { border-color: #ff4444; color: #ff6666; }
#notification.success { border-color: #44ff44; color: #66ff66; }

/* ===== PAUSE OVERLAY ===== */
#pause-overlay h2 { font-size: 36px; margin-bottom: 20px; color: #fff; }

</style>
</head>
<body>

<!-- HUD -->
<div id="hud">
  <div class="hud-section">
    <div class="hud-item hud-score"><span class="hud-label">Score</span><span class="hud-value" id="hud-score-val">0</span></div>
    <div class="hud-item hud-lives"><span class="hud-label">Lives</span><span class="hud-value" id="hud-lives-val">3</span></div>
  </div>
  <div class="hud-section">
    <div class="hud-item hud-level"><span class="hud-label">Level</span><span class="hud-value" id="hud-level-val">1</span></div>
    <div class="hud-item hud-combo"><span class="hud-label">Combo</span><span class="hud-value" id="hud-combo-val">x1</span></div>
  </div>
  <div class="hud-section">
    <div id="modifier-icons"></div>
  </div>
</div>

<!-- MAIN MENU -->
<div id="main-menu" class="overlay active">
  <h1>ROGUEBREAKER</h1>
  <div class="subtitle">BRICK BREAKER ROGUELKE</div>
  <div class="difficulty-select">
    <button class="diff-btn" data-diff="easy">Easy (5 lives)</button>
    <button class="diff-btn selected" data-diff="normal">Normal (3 lives)</button>
    <button class="diff-btn" data-diff="hard">Hard (1 life)</button>
  </div>
  <button class="menu-btn" id="btn-play">▶ PLAY</button>
  <button class="menu-btn" id="btn-quickplay">⚡ QUICK PLAY</button>
  <button class="menu-btn" id="btn-editor">✎ MAP EDITOR</button>
  <button class="menu-btn" id="btn-load">◈ LOAD MAP</button>
</div>

<!-- MODIFIER SELECTION -->
<div id="modifier-screen" class="overlay">
  <h2>CHOOSE YOUR UPGRADE</h2>
  <div class="subtitle">Select one modifier to continue</div>
  <div class="modifier-cards" id="modifier-cards"></div>
  <button class="menu-btn" id="btn-confirm-modifier" style="display:none;">CONFIRM (1-3)</button>
</div>

<!-- GAME OVER -->
<div id="game-over" class="overlay">
  <h1>GAME OVER</h1>
  <div class="stats-panel" id="go-stats"></div>
  <button class="menu-btn" id="btn-retry">↻ RETRY RUN</button>
  <button class="menu-btn" id="btn-go-menu">◈ MAIN MENU</button>
</div>

<!-- VICTORY -->
<div id="victory" class="overlay">
  <h1>VICTORY!</h1>
  <div class="subtitle">YOU CLEARED ALL LEVELS</div>
  <div class="stats-panel" id="vic-stats"></div>
  <button class="menu-btn" id="btn-vic-menu">◈ MAIN MENU</button>
</div>

<!-- MAP EDITOR -->
<div id="editor-screen" class="overlay">
  <div class="editor-header">
    <input type="text" id="map-name-input" placeholder="Map Name" value="My Custom Map">
    <select id="map-diff-select">
      <option value="easy">Easy</option>
      <option value="normal" selected>Normal</option>
      <option value="hard">Hard</option>
    </select>
  </div>
  <div id="tool-palette">
    <button class="tool-btn active" data-tool="brush">Brush</button>
    <button class="tool-btn" data-tool="fill">Fill</button>
    <button class="tool-btn" data-tool="eraser">Eraser</button>
    <button class="tool-btn" data-tool="pattern">Pattern</button>
  </div>
  <div id="pattern-options" style="display:none; gap:8px; margin-bottom:12px; flex-wrap:wrap; justify-content:center;">
    <button class="tool-btn" data-pattern="pyramid">Pyramid</button>
    <button class="tool-btn" data-pattern="checkerboard">Checkerboard</button>
    <button class="tool-btn" data-pattern="spiral">Spiral</button>
    <button class="tool-btn" data-pattern="random">Random</button>
  </div>
  <div id="tile-palette" style="display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; justify-content:center;">
    <button class="tool-btn tile-opt active" data-tile="normal">Normal</button>
    <button class="tool-btn tile-opt" data-tile="hard">Hard(3HP)</button>
    <button class="tool-btn tile-opt" data-tile="fragile">Fragile</button>
    <button class="tool-btn tile-opt" data-tile="explosive">Explosive</button>
    <button class="tool-btn tile-opt" data-tile="shooter">Shooter</button>
    <button class="tool-btn tile-opt" data-tile="portal">Portal</button>
    <button class="tool-btn tile-opt" data-tile="bonus">Bonus</button>
    <button class="tool-btn tile-opt" data-tile="spawner">Spawner</button>
  </div>
  <div id="editor-grid"></div>
  <div id="validation-msg"></div>
  <div class="editor-actions">
    <button class="menu-btn" id="btn-save-map" style="width:auto;">💾 SAVE MAP</button>
    <button class="menu-btn" id="btn-play-editor" style="width:auto;">▶ PLAY MAP</button>
    <button class="menu-btn" id="btn-back-menu" style="width:auto;">◈ BACK TO MENU</button>
  </div>
</div>

<!-- PAUSE -->
<div id="pause-overlay" class="overlay">
  <h2>PAUSED</h2>
  <button class="menu-btn" id="btn-resume">▶ RESUME</button>
  <button class="menu-btn" id="btn-pause-menu">◈ MAIN MENU</button>
</div>

<!-- NOTIFICATION -->
<div id="notification"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {
'use strict';

// ============================================================
// PHASE 0: CONFIGURATION & CONSTANTS
// ============================================================
const CONFIG = {
  // Arena dimensions (in Three.js units)
  arenaWidth: 16,
  arenaHeight: 24,
  arenaDepth: 1,
  wallThickness: 0.5,

  // Grid defaults for editor
  gridCols: 12,
  gridRows: 8,

  // Paddle
  paddleWidth: 3,
  paddleHeight: 0.4,
  paddleDepth: 0.8,
  paddleSpeed: 12,
  paddleY: -10.5,

  // Ball
  ballRadius: 0.35,
  ballSpeedBase: 8,
  ballSpeedMax: 16,
  launchDelay: 1.5,

  // Bricks
  brickWidth: 1.2,
  brickHeight: 0.5,
  brickDepth: 0.5,
  brickPadding: 0.1,

  // Brick HP & points by type
  brickTypes: {
    normal:   { hp: 1, points: 10, color: 0x6688aa },
    hard:     { hp: 3, points: 30, color: 0x445566 },
    fragile:  { hp: 1, points: 20, color: 0xaa8866, damageMult: 0.5 },
    explosive:{ hp: 1, points: 15, color: 0xcc3333, aoe: true },
    shooter:  { hp: 2, points: 25, color: 0xaa6633, shoots: true },
    portal:   { hp: 1, points: 50, color: 0x3366cc, portal: true },
    bonus:    { hp: 1, points: 40, color: 0x33aa55, dropsBonus: true },
  },

  // Difficulty defaults
  difficultyLives: { easy: 5, normal: 3, hard: 1 },

  // Modifier definitions
  modifiers: [
    { id:'dual_paddle', name:'Dual Paddle', icon:'⚔️', desc:'Creates a second paddle (W/S controls)', stackable:false, maxStack:1 },
    { id:'broad_sweep', name:'Broad Sweep', icon:'↔️', desc:'+40% paddle width per stack', stackable:true, maxStack:5 },
    { id:'upward_fire', name:'Upward Fire', icon:'↑️', desc:'Auto-fire projectiles upward; Space for manual fire', stackable:false, maxStack:1 },
    { id:'ball_pull', name:'Ball Pull', icon:'🧲', desc:'Trajectory curves toward paddle (magnet effect)', stackable:true, maxStack:3 },
    { id:'elasticity', name:'Elasticity', icon:'⚡', desc:'+15% ball velocity per stack', stackable:true, maxStack:4 },
    { id:'barrier_wall', name:'Barrier Wall', icon:'🛡️', desc:'Temporary shield wall with charge count', stackable:false, maxStack:1 },
    { id:'clone_strike', name:'Clone Strike', icon:'🔵', desc:'Spawns clone balls on special brick destroy (multiball)', stackable:true, maxStack:3 },
    { id:'slow_toggle', name:'Time Shift', icon:'⏱️', desc:'Toggle time scale 0.5x-1.5x with T key', stackable:false, maxStack:1 },
    { id:'chromatic_dmg', name:'Chromatic Damage', icon:'🎨', desc:'+200% damage when ball color matches brick', stackable:true, maxStack:3 },
    { id:'assist_guide', name:'Assist Guide', icon:'🎯', desc:'Subtle paddle drift toward ball trajectory', stackable:true, maxStack:3 },
  ],

  // Modifier conflict matrix
  conflicts: [
    { a:'dual_paddle', b:'broad_sweep', type:'overwrite' },
    { a:'multiball',   b:'split',       type:'reject' },
  ],

  // Total levels per run (victory condition)
  totalLevels: 10,

  // Combo settings
  comboWindowMs: 800,
  comboBaseMult: 1,

  // Spawner limits
  maxSpawnersPerMap: 5,

  // Max saved maps
  maxSavedMaps: 20,
};

// ============================================================
// PHASE 1: THREE.JS SCENE SETUP
// ============================================================
let scene, camera, renderer;
const clock = { startTime: performance.now(), delta: 0, elapsed: 0 };

function initThreeJS() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a1a);
  scene.fog = new THREE.FogExp2(0x0a0a1a, 0.015);

  camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 2, 18);
  camera.lookAt(0, -2, 0);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = false;
  document.body.insertBefore(renderer.domElement, document.body.firstChild);

  // Ambient light
  const ambient = new THREE.AmbientLight(0x404060, 0.8);
  scene.add(ambient);

  // Directional light
  const dir = new THREE.DirectionalLight(0xffffff, 0.6);
  dir.position.set(5, 10, 10);
  scene.add(dir);

  // Point lights for arena
  const pl1 = new THREE.PointLight(0xff6600, 0.4, 30);
  pl1.position.set(-8, 8, 5);
  scene.add(pl1);
  const pl2 = new THREE.PointLight(0x3366ff, 0.4, 30);
  pl2.position.set(8, 8, 5);
  scene.add(pl2);

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
}

function clearScene() {
  // Remove everything except lights and background
  const toRemove = [];
  scene.traverse(child => { if (child.userData && child.userData.gameObject) toRemove.push(child); });
  toRemove.forEach(obj => scene.remove(obj));
}

// ============================================================
// PHASE 2: GAME STATE MACHINE
// ============================================================
const GameState = {
  MENU: 'MENU', PLAYING: 'PLAYING', PAUSED: 'PAUSED',
  LEVEL_COMPLETE: 'LEVEL_COMPLETE', MODIFIER_SELECT: 'MODIFIER_SELECT',
  GAME_OVER: 'GAME_OVER', VICTORY: 'VICTORY', EDITOR: 'EDITOR'
};

const StateTransitions = {
  MENU: ['PLAYING', 'EDITOR'],
  PLAYING: ['PAUSED', 'LEVEL_COMPLETE', 'GAME_OVER'],
  PAUSED: ['PLAYING', 'MENU'],
  LEVEL_COMPLETE: ['MODIFIER_SELECT'],
  MODIFIER_SELECT: ['PLAYING'],
  GAME_OVER: ['MENU', 'PLAYING'],
  VICTORY: ['MENU'],
  EDITOR: ['PLAYING', 'MENU'],
};

let currentState = GameState.MENU;
const gameStateData = {
  score: 0,
  lives: 3,
  level: 1,
  difficulty: 'normal',
  activeModifiers: [],
  comboCount: 0,
  comboTimer: 0,
  highestCombo: 1,
  runHistory: [],
  modifierOrder: [],
  startTime: 0,
};

function transitionTo(newState) {
  // Validate transition
  const allowed = StateTransitions[currentState];
  if (allowed && !allowed.includes(newState)) {
    console.warn(`Invalid state transition: ${currentState} -> ${newState}`);
    return;
  }

  // Exit current state
  exitCurrentState();

  currentState = newState;

  // Entry actions
  switch (newState) {
    case GameState.MENU: showOverlay('main-menu'); break;
    case GameState.PLAYING: hideAllOverlays(); showHUD(); startLevel(); break;
    case GameState.PAUSED: showOverlay('pause-overlay'); break;
    case GameState.LEVEL_COMPLETE: showOverlay('modifier-screen'); showModifierSelection(); break;
    case GameState.MODIFIER_SELECT: break; // Already handled by LEVEL_COMPLETE
    case GameState.GAME_OVER: showGameOverStats(); showOverlay('game-over'); break;
    case GameState.VICTORY: showVictoryStats(); showOverlay('victory'); break;
    case GameState.EDITOR: hideAllOverlays(); hideHUD(); initEditor(); showOverlay('editor-screen'); break;
  }

  console.log(`State transition: ${currentState}`);
}

function exitCurrentState() {
  switch (currentState) {
    case GameState.PLAYING: cleanupLevel(); break;
    case GameState.PAUSED: break;
    case GameState.EDITOR: break;
  }
}

function showOverlay(id) { document.getElementById(id).classList.add('active'); }
function hideAllOverlays() { document.querySelectorAll('.overlay').forEach(el => el.classList.remove('active')); }
function showHUD() { document.getElementById('hud').classList.add('active'); }
function hideHUD() { document.getElementById('hud').classList.remove('active'); }

// ============================================================
// PHASE 3: GAME OBJECTS (Paddle, Ball, Bricks)
// ============================================================

// --- BALL SYSTEM ---
let ballMesh, ballVelocity = new THREE.Vector3();
let balls = []; // Support multiball
let ballWasLaunched = false; // Track if ball has been spawned (prevents false life-loss on level start)

function createBall(position, velocity) {
  const geo = new THREE.SphereGeometry(CONFIG.ballRadius, 16, 16);
  const mat = new THREE.MeshPhongMaterial({ color: 0xffffff, emissive: 0x333333, shininess: 100 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.copy(position);
  mesh.userData.gameObject = 'ball';
  scene.add(mesh);

  const ball = { mesh, velocity: velocity.clone(), radius: CONFIG.ballRadius, alive: true };
  balls.push(ball);
  return ball;
}

function updateBalls(dt) {
  const magnetStrength = getModifierValue('ball_pull') || 0;
  const assistGuide = getModifierValue('assist_guide') || 0;
  const timeScale = getTimeScale();

  for (let i = balls.length - 1; i >= 0; i--) {
    const ball = balls[i];
    if (!ball.alive) continue;

    // Magnet effect: curve toward paddle
    if (magnetStrength > 0 && mainPaddle) {
      const toPaddle = new THREE.Vector3().subVectors(mainPaddle.mesh.position, ball.mesh.position);
      toPaddle.z = 0;
      const dist = toPaddle.length();
      if (dist < 5) {
        const force = magnetStrength * 2 / (dist + 1);
        ball.velocity.x += (toPaddle.x / dist) * force * dt * timeScale;
      }
    }

    // Assist guide: subtle drift toward ball trajectory
    if (assistGuide > 0 && mainPaddle) {
      mainPaddle.mesh.position.x -= ball.velocity.x * assistGuide * 0.3 * dt;
    }

    // Apply velocity
    ball.mesh.position.addScaledVector(ball.velocity, dt * timeScale);

    // Wall collisions (left/right/top)
    const hw = CONFIG.arenaWidth / 2 - CONFIG.wallThickness;
    if (ball.mesh.position.x < -hw + ball.radius) {
      ball.mesh.position.x = -hw + ball.radius;
      ball.velocity.x = Math.abs(ball.velocity.x);
    }
    if (ball.mesh.position.x > hw - ball.radius) {
      ball.mesh.position.x = hw - ball.radius;
      ball.velocity.x = -Math.abs(ball.velocity.x);
    }
    if (ball.mesh.position.y > CONFIG.arenaHeight / 2 - CONFIG.wallThickness) {
      ball.mesh.position.y = CONFIG.arenaHeight / 2 - CONFIG.wallThickness;
      ball.velocity.y = -Math.abs(ball.velocity.y);
    }

    // Ball below arena floor -> lose life
    if (ball.mesh.position.y < -CONFIG.arenaHeight / 2 - 1) {
      ball.alive = false;
      scene.remove(ball.mesh);
      balls.splice(i, 1);
    }
  }

  // If no balls left and we have lives, respawn (only after ball was actually launched)
  if (balls.length === 0 && gameStateData.lives > 0 && currentState === GameState.PLAYING && ballWasLaunched) {
    gameStateData.lives--;
    updateHUD();
    setTimeout(() => {
      if (currentState === GameState.PLAYING) spawnBall();
    }, 500);
  }

  // Check game over
  if (balls.length === 0 && gameStateData.lives <= 0 && currentState === GameState.PLAYING) {
    transitionTo(GameState.GAME_OVER);
  }
}

function spawnBall() {
  const speed = CONFIG.ballSpeedBase + getModifierValue('elasticity') * CONFIG.ballSpeedBase * 0.15;
  const angle = (Math.random() - 0.5) * Math.PI * 0.6; // Random angle within ±60° upward
  const dir = new THREE.Vector3(Math.sin(angle), Math.cos(angle), 0).normalize();
  createBall(
    new THREE.Vector3(mainPaddle.mesh.position.x, CONFIG.paddleY + 1, 0),
    dir.multiplyScalar(speed)
  );
  ballWasLaunched = true;
}

// --- PADDLE SYSTEM ---
let mainPaddle = null;
let secondPaddle = null; // For dual paddle modifier

function createPaddle(x, color) {
  const width = CONFIG.paddleWidth * (1 + getModifierValue('broad_sweep') * 0.4);
  const geo = new THREE.BoxGeometry(width, CONFIG.paddleHeight, CONFIG.paddleDepth);
  const mat = new THREE.MeshPhongMaterial({ color: color || 0xff6600, emissive: 0x331100 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, CONFIG.paddleY, 0);
  mesh.userData.gameObject = 'paddle';
  scene.add(mesh);
  return { mesh };
}

function updatePaddle(dt) {
  if (!mainPaddle) return;
  const speed = CONFIG.paddleSpeed * dt;
  let moveDir = 0;

  // Arrow keys / A,D
  if (keysPressed['ArrowLeft'] || keysPressed['KeyA']) moveDir -= 1;
  if (keysPressed['ArrowRight'] || keysPressed['KeyD']) moveDir += 1;

  mainPaddle.mesh.position.x += moveDir * speed;

  // Clamp to arena bounds
  const hw = CONFIG.arenaWidth / 2 - CONFIG.paddleWidth / 2 - 0.5;
  mainPaddle.mesh.position.x = Math.max(-hw, Math.min(hw, mainPaddle.mesh.position.x));

  // Second paddle (dual paddle modifier)
  if (secondPaddle && keysPressed['KeyW']) {
    secondPaddle.mesh.position.x -= speed;
  }
  if (secondPaddle && keysPressed['KeyS']) {
    secondPaddle.mesh.position.x += speed;
  }
  if (secondPaddle) {
    const hw2 = CONFIG.arenaWidth / 2 - CONFIG.paddleWidth / 2 - 0.5;
    secondPaddle.mesh.position.x = Math.max(-hw2, Math.min(hw2, secondPaddle.mesh.position.x));
  }
}

// --- BRICK SYSTEM ---
let bricks = []; // Array of { mesh, hp, maxHp, type, data }
const brickMeshes = []; // For collision checks

function createBrick(x, y, type) {
  const bt = CONFIG.brickTypes[type] || CONFIG.brickTypes.normal;
  const geo = new THREE.BoxGeometry(CONFIG.brickWidth, CONFIG.brickHeight, CONFIG.brickDepth);
  const mat = new THREE.MeshPhongMaterial({ color: bt.color, emissive: new THREE.Color(bt.color).multiplyScalar(0.2) });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, y, 0);
  mesh.userData.gameObject = 'brick';
  mesh.userData.brickType = type;
  scene.add(mesh);

  const brick = { mesh, hp: bt.hp, maxHp: bt.hp, type, data: { ...bt } };
  bricks.push(brick);
  return brick;
}

function damageBrick(brick, damage) {
  // Chromatic bonus: +200% when ball color matches brick
  const chromaticBonus = getModifierValue('chromatic_dmg') || 0;
  if (chromaticBonus > 0 && balls.length > 0) {
    const ballColor = new THREE.Color(balls[0].mesh.material.color);
    const brickColor = new THREE.Color(brick.data.color);
    if (ballColor.r > 0.7 || ballColor.g > 0.7 || ballColor.b > 0.7) {
      damage *= (1 + chromaticBonus * 2);
    }
  }

  // Fragile brick takes less damage
  if (brick.type === 'fragile') damage *= brick.data.damageMult;

  brick.hp -= Math.max(1, Math.floor(damage));

  // Visual crack feedback based on HP ratio
  const hpRatio = brick.hp / brick.maxHp;
  const emissiveIntensity = 1 - hpRatio;
  brick.mesh.material.emissive.setHex(brick.data.color);
  brick.mesh.material.emissiveIntensity = emissiveIntensity * 0.5;

  if (brick.hp <= 0) {
    destroyBrick(brick);
  }
}

function destroyBrick(brick) {
  // Award points with combo
  const comboMult = Math.max(1, gameStateData.comboCount);
  const points = brick.data.points * comboMult;
  gameStateData.score += points;
  updateHUD();

  // Combo tracking
  gameStateData.comboCount++;
  gameStateData.comboTimer = CONFIG.comboWindowMs;
  if (gameStateData.comboCount > gameStateData.highestCombo) {
    gameStateData.highestCombo = gameStateData.comboCount;
  }

  // Explosive AOE
  if (brick.data.aoe) {
    triggerExplosiveAOE(brick);
  }

  // Clone Strike multiball
  const cloneStack = getModifierValue('clone_strike') || 0;
  if (cloneStack > 0 && brick.type !== 'normal' && balls.length > 0) {
    for (let c = 0; c < cloneStack; c++) {
      const speed = CONFIG.ballSpeedBase + getModifierValue('elasticity') * CONFIG.ballSpeedBase * 0.15;
      const angle = Math.random() * Math.PI * 2;
      const vel = new THREE.Vector3(Math.cos(angle), Math.sin(angle), 0).normalize().multiplyScalar(speed);
      createBall(brick.mesh.position.clone(), vel);
    }
  }

  // Shooter brick fires on destroy
  if (brick.data.shoots) {
    fireProjectile(brick.mesh.position.clone(), -1);
  }

  scene.remove(brick.mesh);
  const idx = bricks.indexOf(brick);
  if (idx !== -1) bricks.splice(idx, 1);

  // Check level complete
  checkLevelComplete();
}

function triggerExplosiveAOE(originBrick) {
  const aoeRadius = 2.5;
  let recursionDepth = 0;

  function chainDestroy(brick, depth) {
    if (depth >= 3) return; // Recursion limit
    const dist = originBrick.mesh.position.distanceTo(brick.mesh.position);
    if (dist < aoeRadius && brick !== originBrick && brick.type === 'explosive') {
      damageBrick(brick, 10);
      chainDestroy(brick, depth + 1);
    }
  }

  bricks.forEach(b => chainDestroy(b, 0));
}

// --- PROJECTILE SYSTEM ---
let projectiles = [];

function fireProjectile(position, directionY) {
  const geo = new THREE.SphereGeometry(0.2, 8, 8);
  const mat = new THREE.MeshPhongMaterial({ color: 0xffaa00, emissive: 0x553300 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.copy(position);
  mesh.userData.gameObject = 'projectile';
  scene.add(mesh);

  const speed = 10;
  projectiles.push({
    mesh, velocity: new THREE.Vector3((Math.random() - 0.5) * 2, directionY * speed, 0),
    radius: 0.2, enemy: false, alive: true
  });
}

function updateProjectiles(dt) {
  const timeScale = getTimeScale();
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    if (!p.alive) continue;

    p.mesh.position.addScaledVector(p.velocity, dt * timeScale);

    // Remove if out of bounds
    if (p.mesh.position.y > CONFIG.arenaHeight/2 || p.mesh.position.y < -CONFIG.arenaHeight/2 ||
        Math.abs(p.mesh.position.x) > CONFIG.arenaWidth/2 + 2) {
      p.alive = false;
      scene.remove(p.mesh);
      projectiles.splice(i, 1);
      continue;
    }

    // Projectile vs brick collision
    for (let j = bricks.length - 1; j >= 0; j--) {
      const b = bricks[j];
      if (checkAABB(p.mesh.position, p.radius, b.mesh)) {
        damageBrick(b, 1);
        p.alive = false;
        scene.remove(p.mesh);
        projectiles.splice(i, 1);
        break;
      }
    }

    // Enemy projectile vs paddle
    if (p.enemy) {
      const target = secondPaddle ? (Math.random() > 0.5 ? mainPaddle : secondPaddle) : mainPaddle;
      if (target && checkAABB(p.mesh.position, p.radius, target.mesh)) {
        gameStateData.lives--;
        updateHUD();
        p.alive = false;
        scene.remove(p.mesh);
        projectiles.splice(i, 1);
        continue;
      }
    }
  }

  // Auto-fire for upward fire modifier
  if (getModifierValue('upward_fire') > 0 && mainPaddle) {
    if (!projectileFireTimer) projectileFireTimer = 0;
    projectileFireTimer += dt;
    const fireInterval = 1.5 / getModifierValue('upward_fire');
    if (projectileFireTimer >= fireInterval) {
      projectileFireTimer = 0;
      fireProjectile(
        new THREE.Vector3(mainPaddle.mesh.position.x, CONFIG.paddleY + 0.5, 0), -1
      );
    }
  }
}

let projectileFireTimer = 0;

// ============================================================
// PHASE 4: COLLISION DETECTION (AABB)
// ============================================================
function checkAABB(posA, radA, meshB) {
  const boxB = new THREE.Box3().setFromObject(meshB);
  // Expand box by radius for sphere
  boxB.expandByScalar(radA);

  // Check if point (sphere center) is inside expanded box
  return posA.x >= boxB.min.x && posA.x <= boxB.max.x &&
         posA.y >= boxB.min.y && posA.y <= boxB.max.y;
}

function checkBallPaddleCollision(ball, paddle) {
  if (!ball || !ball.radius || !paddle || !paddle.mesh) return false;
  const pb = new THREE.Box3().setFromObject(paddle.mesh);
  pb.expandByScalar(ball.radius);

  if (ball.mesh.position.x > pb.min.x && ball.mesh.position.x < pb.max.x &&
      ball.mesh.position.y - ball.radius < pb.max.y && ball.mesh.position.y + ball.radius > pb.min.y) {
    // Calculate strike offset: -1 (left edge) to +1 (right edge)
    const hitPos = (ball.mesh.position.x - paddle.mesh.position.x) / (CONFIG.paddleWidth * 0.5);
    const clampedHit = Math.max(-1, Math.min(1, hitPos));

    // Reflect velocity with angle based on hit position
    const speed = ball.velocity.length();
    const angle = clampedHit * Math.PI / 3; // Max ±60° deflection
    ball.velocity.x = Math.sin(angle) * speed;
    ball.velocity.y = Math.abs(Math.cos(angle) * speed);

    // Push ball out of paddle to prevent sticking
    ball.mesh.position.y = pb.max.y + ball.radius + 0.01;

    return true;
  }
  return false;
}

function checkBallBrickCollision(ball) {
  const ballBox = new THREE.Box3().setFromCenterAndSize(
    ball.mesh.position,
    new THREE.Vector3(ball.radius * 2, ball.radius * 2, ball.radius * 2)
  );

  for (let i = bricks.length - 1; i >= 0; i--) {
    const brick = bricks[i];
    const brickBox = new THREE.Box3().setFromObject(brick.mesh);

    if (ballBox.intersectsBox(brickBox)) {
      damageBrick(brick, 1);

      // Determine collision side for reflection
      const ballCenter = ball.mesh.position;
      const brickCenter = brick.mesh.position;
      const dx = ballCenter.x - brickCenter.x;
      const dy = ballCenter.y - brickCenter.y;

      // Reflect based on which face was hit
      if (Math.abs(dx / CONFIG.brickWidth) > Math.abs(dy / CONFIG.brickHeight)) {
        ball.velocity.x = -ball.velocity.x;
      } else {
        ball.velocity.y = -ball.velocity.y;
      }

      // Portal brick teleportation
      if (brick.type === 'portal') {
        handlePortalTeleport(brick, ball);
      }

      return true;
    }
  }
  return false;
}

function handlePortalTeleport(sourceBrick, ball) {
  // Find paired portal
  const pair = bricks.find(b => b.type === 'portal' && b !== sourceBrick);
  if (pair) {
    ball.mesh.position.copy(pair.mesh.position);
    // Reverse direction
    ball.velocity.x *= -1;
    ball.velocity.y *= -1;
  }
}

function checkPaddleBallCollisions() {
  if (balls.length === 0) return false;
  let hit = false;
  if (checkBallPaddleCollision(balls[0], mainPaddle)) hit = true;
  if (secondPaddle && balls.length > 0) {
    if (checkBallPaddleCollision(balls[0], secondPaddle)) hit = true;
  }
  return hit;
}

// ============================================================
// PHASE 5: LEVEL SYSTEM
// ============================================================
let levelData = null;
let useCustomGrid = false;
let customGridData = null;

function startLevel() {
  clearScene();
  bricks = [];
  balls = [];
  projectiles = [];
  projectileFireTimer = 0;
  secondPaddle = null;
  ballWasLaunched = false; // Reset launch flag for new level

  // Create paddle
  mainPaddle = createPaddle(0, 0xff6600);

  // Use custom grid if coming from editor
  if (useCustomGrid) {
    buildCustomLevel();
    useCustomGrid = false;
  } else {
    // Generate procedural level
    generateLevel(gameStateData.level);
  }

  // Launch ball after delay
  setTimeout(() => {
    if (currentState === GameState.PLAYING) spawnBall();
  }, CONFIG.launchDelay * 1000);

  updateHUD();
}

function generateLevel(levelNum) {
  const rows = Math.min(4 + Math.floor(levelNum / 2), 8);
  const cols = Math.min(CONFIG.gridCols, 10 + Math.floor(levelNum / 3));
  const startY = CONFIG.arenaHeight / 2 - 2;

  for (let row = 0; row < rows; row++) {
    for (let col = 0; col < cols; col++) {
      const x = (col - (cols - 1) / 2) * (CONFIG.brickWidth + CONFIG.brickPadding);
      const y = startY - row * (CONFIG.brickHeight + CONFIG.brickPadding);

      // Determine brick type based on level and position
      let type = 'normal';
      const r = Math.random();

      if (levelNum >= 2 && r < 0.15) type = 'hard';
      else if (levelNum >= 3 && r < 0.22) type = 'fragile';
      else if (levelNum >= 4 && r < 0.28) type = 'explosive';
      else if (levelNum >= 5 && r < 0.33) type = 'shooter';
      else if (levelNum >= 3 && r < 0.37) type = 'portal';
      else if (r < 0.42) type = 'bonus';

      // Portal pairing: ensure even number of portals
      createBrick(x, y, type);
    }
  }

  // Add spawners for higher levels
  const numSpawners = Math.min(Math.floor(levelNum / 3), CONFIG.maxSpawnersPerMap);
  for (let s = 0; s < numSpawners; s++) {
    const sx = (Math.random() - 0.5) * (CONFIG.arenaWidth - 4);
    createBrick(sx, CONFIG.arenaHeight / 2 - 1, 'spawner');
  }
}

function checkLevelComplete() {
  // Check if all destructible bricks are destroyed
  const remaining = bricks.filter(b => b.type !== 'portal' && b.type !== 'spawner');
  if (remaining.length === 0) {
    if (gameStateData.level >= CONFIG.totalLevels || gameStateData.level === 99) {
      transitionTo(GameState.VICTORY);
    } else {
      gameStateData.level++;
      transitionTo(GameState.LEVEL_COMPLETE);
    }
  }
}

function cleanupLevel() {
  // Remove all game objects
  const toRemove = [];
  scene.traverse(child => { if (child.userData && child.userData.gameObject) toRemove.push(child); });
  toRemove.forEach(obj => scene.remove(obj));
  bricks = [];
  balls = [];
  projectiles = [];
  ballWasLaunched = false;
}

// PHASE 6: MODIFIER SYSTEM
// ============================================================
function getModifierValue(id) {
  const mod = gameStateData.activeModifiers.find(m => m.id === id);
  return mod ? mod.stack : 0;
}

function getTimeScale() {
  if (getModifierValue('slow_toggle') > 0) {
    return timeScaleToggle ? 0.5 : 1.5;
  }
  return 1.0;
}

let timeScaleToggle = false;

function showModifierSelection() {
  // Pick 3 random modifiers
  const pool = [...CONFIG.modifiers].sort(() => Math.random() - 0.5).slice(0, 3);
  const container = document.getElementById('modifier-cards');
  container.innerHTML = '';

  pool.forEach((mod, i) => {
    const card = document.createElement('div');
    card.className = 'modifier-card';
    card.dataset.modifierId = mod.id;
    card.innerHTML = `
      <span class="key-hint">${i + 1}</span>
      <div class="icon">${mod.icon}</div>
      <div class="name">${mod.name}</div>
      <div class="desc">${mod.desc}</div>
      <div class="conflict-warn">⚠ Conflict with existing modifier</div>
    `;
    card.addEventListener('click', () => selectModifier(mod.id));
    container.appendChild(card);
  });

  // Show key hints for selection
  document.getElementById('btn-confirm-modifier').style.display = 'none';
}

function selectModifier(modId) {
  const mod = CONFIG.modifiers.find(m => m.id === modId);
  if (!mod) return;

  // Check conflicts with existing modifiers
  let hasConflict = false;
  for (const conflict of CONFIG.conflicts) {
    const aMatch = (conflict.a === modId || conflict.b === modId);
    const otherId = conflict.a === modId ? conflict.b : conflict.a;
    if (gameStateData.activeModifiers.some(m => m.id === otherId)) {
      hasConflict = true;
      break;
    }
  }

  // Apply modifier
  const existing = gameStateData.activeModifiers.find(m => m.id === modId);
  if (existing) {
    if (mod.stackable && existing.stack < mod.maxStack) {
      existing.stack++;
    }
  } else {
    gameStateData.activeModifiers.push({ id: modId, stack: 1 });
    gameStateData.modifierOrder.push(mod.name);
  }

  // Handle dual paddle creation
  if (modId === 'dual_paddle' && !secondPaddle) {
    secondPaddle = createPaddle(3, 0x4488ff);
  }

  // Barrier wall visual
  if (modId === 'barrier_wall') {
    createBarrierWall();
  }

  updateHUD();
  transitionTo(GameState.PLAYING);
}

function createBarrierWall() {
  const geo = new THREE.BoxGeometry(CONFIG.arenaWidth, 0.3, 0.3);
  const mat = new THREE.MeshPhongMaterial({ color: 0x44aaff, transparent: true, opacity: 0.5 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(0, -CONFIG.arenaHeight / 2 + 1.5, 0);
  mesh.userData.gameObject = 'barrier';
  scene.add(mesh);
}

// PHASE 8: MAP EDITOR
// ============================================================
let editorGrid = [];
let editorTool = 'brush';
let editorTileType = 'normal';
let editingMapData = null;

function initEditor() {
  const cols = CONFIG.gridCols;
  const rows = CONFIG.gridRows;

  // Initialize empty grid
  if (!editingMapData) {
    editorGrid = [];
    for (let r = 0; r < rows; r++) {
      editorGrid[r] = [];
      for (let c = 0; c < cols; c++) {
        editorGrid[r][c] = 'empty';
      }
    }
  }

  // Render grid
  const gridEl = document.getElementById('editor-grid');
  gridEl.style.gridTemplateColumns = `repeat(${cols}, 40px)`;
  gridEl.innerHTML = '';

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const cell = document.createElement('div');
      cell.className = 'editor-cell';
      cell.dataset.row = r;
      cell.dataset.col = c;
      const type = editorGrid[r][c];
      if (type !== 'empty') {
        cell.dataset.type = type;
        cell.textContent = type[0].toUpperCase();
      }
      cell.addEventListener('click', () => editorCellClick(r, c));
      cell.addEventListener('mouseenter', (e) => {
        if (e.buttons === 1 && editorTool === 'brush') editorCellClick(r, c);
      });
      gridEl.appendChild(cell);
    }
  }

  // Reset inputs
  document.getElementById('map-name-input').value = editingMapData ? editingMapData.name : 'My Custom Map';
}

function editorCellClick(row, col) {
  if (editorTool === 'brush') {
    editorGrid[row][col] = editorTileType;
  } else if (editorTool === 'eraser') {
    editorGrid[row][col] = 'empty';
  } else if (editorTool === 'fill') {
    floodFill(row, col, editorGrid[row][col], editorTileType);
  } else if (editorTool === 'pattern') {
    applyPattern();
  }
  refreshEditorGrid();
}

function floodFill(row, col, targetType, newType) {
  if (row < 0 || row >= CONFIG.gridRows || col < 0 || col >= CONFIG.gridCols) return;
  if (editorGrid[row][col] !== targetType) return;
  editorGrid[row][col] = newType;
  floodFill(row - 1, col, targetType, newType);
  floodFill(row + 1, col, targetType, newType);
  floodFill(row, col - 1, targetType, newType);
  floodFill(row, col + 1, targetType, newType);
}

function applyPattern() {
  const pattern = document.querySelector('#pattern-options .tool-btn.active')?.dataset.pattern || 'pyramid';
  const cols = CONFIG.gridCols;
  const rows = CONFIG.gridRows;

  // Clear grid first
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      editorGrid[r][c] = 'empty';
    }
  }

  switch (pattern) {
    case 'pyramid':
      for (let level = 0; level < rows; level++) {
        const width = cols - level * 2;
        if (width <= 0) break;
        const startCol = level;
        for (let c = 0; c < width && startCol + c < cols; c++) {
          editorGrid[level][startCol + c] = 'normal';
        }
      }
      break;
    case 'checkerboard':
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if ((r + c) % 2 === 0) editorGrid[r][c] = 'normal';
        }
      }
      break;
    case 'spiral':
      let top = 0, bottom = rows - 1, left = 0, right = cols - 1;
      let typeIdx = 0;
      const types = ['normal', 'hard', 'fragile', 'explosive'];
      while (top <= bottom && left <= right) {
        for (let c = left; c <= right; c++) editorGrid[top][c] = types[typeIdx % types.length];
        top++;
        for (let r = top; r <= bottom; r++) editorGrid[r][right] = types[(typeIdx + 1) % types.length];
        right--;
        if (top <= bottom) { for (let c = right; c >= left; c--) editorGrid[bottom][c] = types[(typeIdx + 2) % types.length]; bottom--; }
        if (left <= right) { for (let r = bottom; r >= top; r--) editorGrid[r][left] = types[(typeIdx + 3) % types.length]; left++; }
        typeIdx++;
      }
      break;
    case 'random':
      const randTypes = ['normal', 'hard', 'fragile', 'explosive', 'shooter'];
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (Math.random() > 0.3) {
            editorGrid[r][c] = randTypes[Math.floor(Math.random() * randTypes.length)];
          }
        }
      }
      break;
  }
}

function refreshEditorGrid() {
  const cells = document.querySelectorAll('.editor-cell');
  cells.forEach(cell => {
    const r = parseInt(cell.dataset.row);
    const c = parseInt(cell.dataset.col);
    const type = editorGrid[r][c];
    cell.dataset.type = type === 'empty' ? '' : type;
    cell.textContent = type === 'empty' ? '' : type[0].toUpperCase();
  });
}

function validateEditorMap() {
  const errors = [];

  // Check spawner count
  let spawnerCount = 0;
  for (let r = 0; r < CONFIG.gridRows; r++) {
    for (let c = 0; c < CONFIG.gridCols; c++) {
      if (editorGrid[r][c] === 'spawner') spawnerCount++;
    }
  }
  if (spawnerCount > CONFIG.maxSpawnersPerMap) {
    errors.push(`Too many spawners: ${spawnerCount} (max ${CONFIG.maxSpawnersPerMap})`);
  }

  // Check portal pairing
  let portalCount = 0;
  for (let r = 0; r < CONFIG.gridRows; r++) {
    for (let c = 0; c < CONFIG.gridCols; c++) {
      if (editorGrid[r][c] === 'portal') portalCount++;
    }
  }
  if (portalCount % 2 !== 0) {
    errors.push(`Unpaired portals: ${portalCount} must be even`);
  }

  // Check grid bounds (already guaranteed by editor constraints)

  return errors;
}

function serializeEditorMap() {
  const tiles = [];
  for (let r = 0; r < CONFIG.gridRows; r++) {
    for (let c = 0; c < CONFIG.gridCols; c++) {
      if (editorGrid[r][c] !== 'empty') {
        tiles.push({ row: r, col: c, type: editorGrid[r][c] });
      }
    }
  }

  // Find spawner positions for spawners array
  const spawners = [];
  for (let r = 0; r < CONFIG.gridRows; r++) {
    for (let c = 0; c < CONFIG.gridCols; c++) {
      if (editorGrid[r][c] === 'spawner') {
        spawners.push({ row: r, col: c });
      }
    }
  }

  return {
    id: editingMapData ? editingMapData.id : `map_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`,
    name: document.getElementById('map-name-input').value || 'Unnamed Map',
    gridWidth: CONFIG.gridCols,
    gridHeight: CONFIG.gridRows,
    tiles,
    spawners,
    layoutSeed: Math.floor(Math.random() * 999999),
    difficulty: document.getElementById('map-diff-select').value,
  };
}

// ============================================================
// DEFAULT MAP
// ============================================================
function createDefaultMap() {
  const tiles = [];
  const rows = [
    { row: 0, types: ['hard','normal','normal','hard','normal','normal','hard','normal','normal','hard','normal','normal'] },
    { row: 1, types: ['normal','explosive','normal','normal','shooter','normal','normal','shooter','normal','normal','explosive','normal'] },
    { row: 2, types: ['normal','normal','fragile','normal','normal','normal','normal','normal','fragile','normal','normal','normal'] },
    { row: 3, types: ['bonus','normal','normal','normal','portal','normal','normal','portal','normal','normal','normal','bonus'] },
    { row: 4, types: ['normal','shooter','normal','normal','normal','normal','normal','normal','normal','normal','shooter','normal'] },
    { row: 5, types: ['explosive','normal','normal','fragile','normal','normal','normal','normal','fragile','normal','normal','explosive'] },
  ];
  for (const r of rows) {
    for (let c = 0; c < r.types.length; c++) {
      tiles.push({ row: r.row, col: c, type: r.types[c] });
    }
  }
  tiles.push({ row: 7, col: 5, type: 'spawner' });
  tiles.push({ row: 7, col: 6, type: 'spawner' });

  return {
    id: 'default_map',
    name: 'RogueBreaker Classic',
    gridWidth: 12,
    gridHeight: 8,
    tiles: tiles,
    difficulty: 'normal',
    createdAt: Date.now(),
    version: 1,
  };
}

function ensureDefaultMapExists() {
  const maps = loadSavedMaps();
  const hasDefault = maps.some(m => m.id === 'default_map');
  if (!hasDefault) {
    const defMap = createDefaultMap();
    maps.unshift(defMap);
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(maps));
    } catch (e) {
      // localStorage unavailable, skip
    }
  }
}

// ============================================================
// PHASE 9: SAVE/LOAD SYSTEM (localStorage)
// ============================================================
const STORAGE_KEY = 'roguebreaker_maps';

function loadSavedMaps() {
  try {
    const data = localStorage.getItem(STORAGE_KEY);
    return data ? JSON.parse(data) : [];
  } catch (e) {
    console.warn('localStorage unavailable:', e);
    return [];
  }
}

function saveMapToStorage(mapData) {
  let maps = loadSavedMaps();

  // Check for duplicate ID (update existing)
  const idx = maps.findIndex(m => m.id === mapData.id);
  if (idx !== -1) {
    maps[idx] = mapData;
  } else {
    // Check quota
    if (maps.length >= CONFIG.maxSavedMaps) {
      maps.shift(); // Remove oldest
    }
    maps.push(mapData);
  }

  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(maps));
    showNotification('Map saved successfully!', 'success');
    return true;
  } catch (e) {
    if (e.name === 'QuotaExceededError') {
      showNotification('Storage full! Oldest map deleted.', 'error');
      maps.shift();
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(maps)); return true; }
      catch(e2) { showNotification('localStorage unavailable!', 'error'); return false; }
    }
    showNotification('Save failed: ' + e.message, 'error');
    return false;
  }
}

function loadMapFromStorage(mapId) {
  const maps = loadSavedMaps();
  const mapData = maps.find(m => m.id === mapId);
  if (!mapData) { showNotification('Map not found!', 'error'); return false; }

  // Validate schema
  if (!mapData.tiles || !Array.isArray(mapData.tiles)) {
    showNotification('Invalid map data: missing tiles', 'error');
    return false;
  }

  // Convert to editor grid
  editingMapData = mapData;
  editorGrid = [];
  for (let r = 0; r < CONFIG.gridRows; r++) {
    editorGrid[r] = new Array(CONFIG.gridCols).fill('empty');
  }
  for (const tile of mapData.tiles) {
    if (tile.row >= 0 && tile.row < CONFIG.gridRows && tile.col >= 0 && tile.col < CONFIG.gridCols) {
      editorGrid[tile.row][tile.col] = tile.type;
    }
  }

  transitionTo(GameState.EDITOR);
  return true;
}

// ============================================================
// PHASE 10: INPUT HANDLING
// ============================================================
const keysPressed = {};

document.addEventListener('keydown', (e) => {
  keysPressed[e.code] = true;

  // Modifier selection with number keys
  if (currentState === GameState.MODIFIER_SELECT || currentState === GameState.LEVEL_COMPLETE) {
    if (e.code === 'Digit1' || e.code === 'Digit2' || e.code === 'Digit3') {
      const cards = document.querySelectorAll('#modifier-cards .modifier-card');
      const idx = parseInt(e.code.replace('Digit', '')) - 1;
      if (cards[idx]) cards[idx].click();
    }
  }

  // Space to fire manual projectile
  if (e.code === 'Space' && getModifierValue('upward_fire') > 0 && mainPaddle && currentState === GameState.PLAYING) {
    fireProjectile(new THREE.Vector3(mainPaddle.mesh.position.x, CONFIG.paddleY + 0.5, 0), -1);
  }

  // T key for time shift toggle
  if (e.code === 'KeyT' && getModifierValue('slow_toggle') > 0) {
    timeScaleToggle = !timeScaleToggle;
  }

  // Escape to pause
  if (e.code === 'Escape') {
    if (currentState === GameState.PLAYING) transitionTo(GameState.PAUSED);
    else if (currentState === GameState.PAUSED) transitionTo(GameState.PLAYING);
  }
});

document.addEventListener('keyup', (e) => {
  keysPressed[e.code] = false;
});

// ============================================================
// PHASE 11: GAME LOOP
// ============================================================
let lastTime = performance.now();

function gameLoop() {
  requestAnimationFrame(gameLoop);

  const now = performance.now();
  const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap delta to prevent physics explosions
  lastTime = now;

  if (currentState === GameState.PLAYING) {
    const timeScale = getTimeScale();
    const effectiveDt = dt * timeScale;

    updatePaddle(effectiveDt);
    updateBalls(effectiveDt);
    checkPaddleBallCollisions();
    balls.forEach(b => b.alive && checkBallBrickCollision(b));
    updateProjectiles(effectiveDt);

    // Combo timer decay
    if (gameStateData.comboTimer > 0) {
      gameStateData.comboTimer -= dt * 1000;
      if (gameStateData.comboTimer <= 0) {
        gameStateData.comboCount = 0;
        updateHUD();
      }
    }

    // Shooter bricks auto-fire
    bricks.forEach(b => {
      if (b.type === 'shooter' && b.data.shoots) {
        if (!b.fireTimer) b.fireTimer = 0;
        b.fireTimer += dt;
        if (b.fireTimer >= 3) { // Fire every 3 seconds
          b.fireTimer = 0;
          fireProjectile(b.mesh.position.clone(), -1);
        }
      }
    });
  }

  renderer.render(scene, camera);
}

// ============================================================
// PHASE 12: NOTIFICATIONS & UTILITIES
// ============================================================
function showNotification(msg, type) {
  const el = document.getElementById('notification');
  el.textContent = msg;
  el.className = 'show ' + (type || '');
  setTimeout(() => el.classList.remove('show'), 3000);
}

// ============================================================
// PHASE 13: EVENT LISTENERS (UI)
// ============================================================
function setupUI() {
  // Difficulty buttons
  document.querySelectorAll('.diff-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      gameStateData.difficulty = btn.dataset.diff;
      gameStateData.lives = CONFIG.difficultyLives[gameStateData.difficulty];
    });
  });

  // Main menu buttons
  document.getElementById('btn-play').addEventListener('click', () => {
    gameStateData.score = 0;
    gameStateData.lives = CONFIG.difficultyLives[gameStateData.difficulty];
    gameStateData.level = 1;
    gameStateData.activeModifiers = [];
    gameStateData.comboCount = 0;
    gameStateData.highestCombo = 1;
    gameStateData.modifierOrder = [];
    gameStateData.runHistory = [];
    gameStateData.startTime = performance.now();
    editingMapData = null;
    transitionTo(GameState.PLAYING);
  });

  document.getElementById('btn-editor').addEventListener('click', () => {
    editingMapData = null;
    transitionTo(GameState.EDITOR);
  });

  document.getElementById('btn-load').addEventListener('click', showLoadMapDialog);

  document.getElementById('btn-quickplay').addEventListener('click', () => {
    // Load default map into editor grid, then start playing
    const maps = loadSavedMaps();
    const defMap = maps.find(m => m.id === 'default_map');
    if (defMap) {
      editingMapData = defMap;
      editorGrid = [];
      for (let r = 0; r < CONFIG.gridRows; r++) {
        editorGrid[r] = new Array(CONFIG.gridCols).fill('empty');
      }
      for (const tile of defMap.tiles) {
        if (tile.row >= 0 && tile.row < CONFIG.gridRows && tile.col >= 0 && tile.col < CONFIG.gridCols) {
          editorGrid[tile.row][tile.col] = tile.type;
        }
      }
      // Reset game state
      gameStateData.score = 0;
      gameStateData.lives = CONFIG.difficultyLives[gameStateData.difficulty];
      gameStateData.level = 1;
      gameStateData.activeModifiers = [];
      gameStateData.comboCount = 0;
      gameStateData.highestCombo = 1;
      gameStateData.modifierOrder = [];
      gameStateData.startTime = performance.now();
      useCustomGrid = true;
      transitionTo(GameState.PLAYING);
    } else {
      // Fallback: just play procedural
      document.getElementById('btn-play').click();
    }
  });

  // Editor tool buttons
  document.querySelectorAll('#tool-palette .tool-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#tool-palette .tool-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      editorTool = btn.dataset.tool;
      document.getElementById('pattern-options').style.display = btn.dataset.tool === 'pattern' ? 'flex' : 'none';
    });
  });

  // Tile type buttons
  document.querySelectorAll('#tile-palette .tile-opt').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#tile-palette .tile-opt').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      editorTileType = btn.dataset.tile;
    });
  });

  // Pattern buttons
  document.querySelectorAll('#pattern-options .tool-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#pattern-options .tool-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  // Editor actions
  document.getElementById('btn-save-map').addEventListener('click', () => {
    const errors = validateEditorMap();
    const msgEl = document.getElementById('validation-msg');
    if (errors.length > 0) {
      msgEl.innerHTML = errors.map(e => `<div class="validation-msg error">${e}</div>`).join('');
      return;
    }
    const mapData = serializeEditorMap();
    saveMapToStorage(mapData);
    msgEl.innerHTML = '<div class="validation-msg success">Map validated and saved!</div>';
  });

  document.getElementById('btn-play-editor').addEventListener('click', () => {
    const errors = validateEditorMap();
    if (errors.length > 0) {
      showNotification('Fix validation errors before playing!', 'error');
      return;
    }
    // Reset game state for a custom map run
    gameStateData.score = 0;
    gameStateData.lives = CONFIG.difficultyLives[gameStateData.difficulty];
    gameStateData.level = 1;
    gameStateData.activeModifiers = [];
    gameStateData.comboCount = 0;
    gameStateData.highestCombo = 1;
    gameStateData.modifierOrder = [];
    gameStateData.startTime = performance.now();
    // Set custom grid flag BEFORE transition so startLevel() picks it up
    useCustomGrid = true;
    transitionTo(GameState.PLAYING);
  });

  document.getElementById('btn-back-menu').addEventListener('click', () => {
    transitionTo(GameState.MENU);
  });

  // Pause buttons
  document.getElementById('btn-resume').addEventListener('click', () => transitionTo(GameState.PLAYING));
  document.getElementById('btn-pause-menu').addEventListener('click', () => transitionTo(GameState.MENU));

  // Game Over / Victory buttons
  document.getElementById('btn-retry').addEventListener('click', () => {
    gameStateData.score = 0;
    gameStateData.lives = CONFIG.difficultyLives[gameStateData.difficulty];
    gameStateData.level = 1;
    gameStateData.activeModifiers = [];
    gameStateData.comboCount = 0;
    gameStateData.highestCombo = 1;
    gameStateData.modifierOrder = [];
    gameStateData.startTime = performance.now();
    transitionTo(GameState.PLAYING);
  });

  document.getElementById('btn-go-menu').addEventListener('click', () => transitionTo(GameState.MENU));
  document.getElementById('btn-vic-menu').addEventListener('click', () => transitionTo(GameState.MENU));
}

function buildCustomLevel() {
  // Place bricks from editor grid
  for (let r = 0; r < CONFIG.gridRows; r++) {
    for (let c = 0; c < CONFIG.gridCols; c++) {
      const type = editorGrid[r][c];
      if (type === 'empty') continue;
      const x = (c - (CONFIG.gridCols - 1) / 2) * (CONFIG.brickWidth + CONFIG.brickPadding);
      const y = CONFIG.arenaHeight / 2 - 1.5 - r * (CONFIG.brickHeight + CONFIG.brickPadding);
      createBrick(x, y, type);
    }
  }
  gameStateData.level = 99; // Custom level marker
}

function startCustomLevel() {
  // Legacy function: kept for backward compatibility
  buildCustomLevel();
}

function showLoadMapDialog() {
  const maps = loadSavedMaps();
  if (maps.length === 0) {
    showNotification('No saved maps found!', 'error');
    return;
  }

  // Create a temporary load dialog overlay
  const existing = document.getElementById('load-map-dialog');
  if (existing) existing.remove();

  const dialog = document.createElement('div');
  dialog.id = 'load-map-dialog';
  dialog.className = 'overlay active';
  dialog.innerHTML = `
    <h2 style="font-size:36px;margin-bottom:20px;color:#44aaff;">LOAD MAP</h2>
    <div id="load-map-list"></div>
    <button class="menu-btn" onclick="__ROGUE__.closeLoadDialog()">CANCEL</button>
  `;
  document.body.appendChild(dialog);

  const listEl = dialog.querySelector('#load-map-list');
  maps.forEach(map => {
    const item = document.createElement('div');
    item.className = 'map-item';
    const tileCount = map.tiles ? map.tiles.length : 0;
    item.innerHTML = `
      <div class="map-info">
        <div class="map-name">${map.name}</div>
        <div class="map-meta">${map.gridWidth}x${map.gridHeight} · ${tileCount} tiles · ${map.difficulty || 'normal'}</div>
      </div>
    `;
    item.addEventListener('click', () => {
      loadMapFromStorage(map.id);
      dialog.remove();
    });
    listEl.appendChild(item);
  });

  // Store reference for close function
  window.__ROGUE__ = window.__ROGUE__ || {};
  window.__ROGUE__.closeLoadDialog = () => dialog.remove();
}

// ============================================================
// INITIALIZATION
// ============================================================
function init() {
  initThreeJS();
  setupUI();
  ensureDefaultMapExists();
  updateHUD();
  gameLoop();
  console.log('RogueBreaker initialized!');
}

// Start when DOM is ready
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}

})(); // End IIFE
</script>
