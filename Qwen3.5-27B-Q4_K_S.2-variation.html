<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird - Neon Dreams</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0c0c1e 0%, #1a1a3e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #gameContainer {
            position: relative;
        }
        #gameCanvas {
            border: 4px solid #9b59b6;
            border-radius: 8px;
            box-shadow: 0 0 40px rgba(155, 89, 182, 0.6), 0 0 80px rgba(155, 89, 182, 0.3);
        }
        #score {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 36px;
            font-weight: bold;
            text-shadow: 0 0 10px #00ff88, 0 0 20px #00ff88;
            z-index: 10;
        }
        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 24px;
            text-align: center;
            text-shadow: 0 0 10px #9b59b6, 0 0 20px #9b59b6;
            z-index: 10;
        }
        #message.hidden {
            display: none;
        }
        #highScore {
            position: absolute;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffd700;
            font-size: 16px;
            text-shadow: 0 0 10px #ffd700;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="score">0</div>
        <div id="highScore">Best: 0</div>
        <div id="message">Press SPACE or Click to Start</div>
        <canvas id="gameCanvas" width="800" height="450"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const messageEl = document.getElementById('message');
        const highScoreEl = document.getElementById('highScore');

        // Game constants
        const GRAVITY = 0.4;
        const JUMP_STRENGTH = -7.5;
        const PIPE_SPEED = 2.5;
        const PIPE_SPAWN_RATE = 100;
        const PIPE_GAP = 160;

        // Game state
        let bird = {
            x: 100,
            y: canvas.height / 2,
            width: 25,
            height: 25,
            velocity: 0,
            rotation: 0,
            color: '#00d9ff'
        };
        let pipes = [];
        let particles = [];
        let score = 0;
        let highScore = localStorage.getItem('flappyHighScore') || 0;
        let frameCount = 0;
        let gameRunning = false;
        let gameOver = false;
        let powerUpActive = false;
        let powerUpTimer = 0;
        let backgroundOffset = 0;

        highScoreEl.textContent = 'Best: ' + highScore;

        // Particle system
        function createParticle(x, y, type) {
            const colors = ['#ff00ff', '#00ff88', '#ffd700', '#00d9ff'];
            return {
                x: x,
                y: y,
                vx: (Math.random() - 0.5) * 4,
                vy: (Math.random() - 0.5) * 4,
                life: 1,
                decay: 0.02 + Math.random() * 0.02,
                color: colors[Math.floor(Math.random() * colors.length)],
                type: type
            };
        }

        function updateParticles() {
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= p.decay;
            });
            particles = particles.filter(p => p.life > 0);
        }

        function drawParticles() {
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.type === 'star' ? 4 : 2, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;
        }

        // Bird drawing with neon glow
        function drawBird() {
            ctx.save();
            ctx.translate(bird.x + bird.width/2, bird.y + bird.height/2);
            ctx.rotate(bird.rotation);

            // Glow effect
            ctx.shadowBlur = 20;
            ctx.shadowColor = bird.color;

            // Body
            ctx.fillStyle = bird.color;
            ctx.beginPath();
            ctx.arc(0, 0, bird.width/2, 0, Math.PI * 2);
            ctx.fill();

            // Eye
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(6, -6, 6, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(8, -6, 3, 0, Math.PI * 2);
            ctx.fill();

            // Beak
            ctx.fillStyle = powerUpActive ? '#ffd700' : '#ff6b6b';
            ctx.beginPath();
            ctx.moveTo(10, 2);
            ctx.lineTo(18, 5);
            ctx.lineTo(10, 8);
            ctx.fill();

            // Wing animation
            ctx.fillStyle = powerUpActive ? '#ffd700' : '#00b8d4';
            const wingY = Math.sin(frameCount * 0.3) * 3;
            ctx.beginPath();
            ctx.ellipse(-3, 3 + wingY, 8, 5, -0.3, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        // Pipe drawing with neon style
        function drawPipe(pipe) {
            const gradient = ctx.createLinearGradient(pipe.x, 0, pipe.x + pipe.width, 0);
            
            if (powerUpActive) {
                gradient.addColorStop(0, '#ffd700');
                gradient.addColorStop(0.5, '#ffaa00');
                gradient.addColorStop(1, '#ff8800');
            } else {
                gradient.addColorStop(0, '#00ff88');
                gradient.addColorStop(0.5, '#00cc6a');
                gradient.addColorStop(1, '#00aa55');
            }

            ctx.fillStyle = gradient;
            ctx.shadowBlur = 15;
            ctx.shadowColor = powerUpActive ? '#ffd700' : '#00ff88';

            // Top pipe
            ctx.fillRect(pipe.x, 0, pipe.width, pipe.topHeight);
            ctx.fillRect(pipe.x - 3, pipe.topHeight - 15, pipe.width + 6, 15);

            // Bottom pipe
            ctx.fillRect(pipe.x, pipe.bottomY, pipe.width, canvas.height - pipe.bottomY);
            ctx.fillRect(pipe.x - 3, pipe.bottomY, pipe.width + 6, 15);

            ctx.shadowBlur = 0;
        }

        // Neon background with stars
        function drawBackground() {
            // Dark gradient background
            const skyGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            skyGradient.addColorStop(0, '#1a0a2e');
            skyGradient.addColorStop(0.5, '#2d1b4e');
            skyGradient.addColorStop(1, '#1a0a2e');
            ctx.fillStyle = skyGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Stars
            ctx.fillStyle = '#fff';
            for (let i = 0; i < 50; i++) {
                const x = ((i * 137 + backgroundOffset * 0.2) % canvas.width);
                const y = (i * 211) % canvas.height;
                const twinkle = Math.sin(frameCount * 0.05 + i * 0.5) * 0.5 + 0.5;
                ctx.globalAlpha = 0.5 + twinkle * 0.5;
                ctx.beginPath();
                ctx.arc(x, y, Math.random() * 1.5 + 0.5, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;

            // Grid lines (retro style)
            ctx.strokeStyle = 'rgba(155, 89, 182, 0.3)';
            ctx.lineWidth = 1;
            const gridSize = 40;
            const gridOffset = (frameCount * PIPE_SPEED * 0.3) % gridSize;
            
            for (let x = -gridOffset; x < canvas.width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }

            // Ground with neon effect
            ctx.fillStyle = '#2d1b4e';
            ctx.fillRect(0, canvas.height - 20, canvas.width, 20);
            
            ctx.strokeStyle = '#9b59b6';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#9b59b6';
            ctx.beginPath();
            ctx.moveTo(0, canvas.height - 20);
            ctx.lineTo(canvas.width, canvas.height - 20);
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        // Update game
        function update() {
            if (!gameRunning) return;

            // Power-up timer
            if (powerUpActive) {
                powerUpTimer--;
                if (powerUpTimer <= 0) {
                    powerUpActive = false;
                    bird.color = '#00d9ff';
                }
            }

            // Bird physics
            bird.velocity += GRAVITY;
            bird.y += bird.velocity;

            // Bird rotation based on velocity
            const targetRotation = Math.min(Math.PI / 4, Math.max(-Math.PI / 4, bird.velocity * 0.05));
            bird.rotation += (targetRotation - bird.rotation) * 0.1;

            // Spawn pipes with occasional power-ups
            if (frameCount % PIPE_SPAWN_RATE === 0) {
                const topHeight = Math.random() * (canvas.height - PIPE_GAP - 100) + 50;
                
                // 15% chance of power-up pipe
                const isPowerUp = Math.random() < 0.15;
                
                pipes.push({
                    x: canvas.width,
                    width: 55,
                    topHeight: topHeight,
                    bottomY: topHeight + PIPE_GAP,
                    passed: false,
                    isPowerUp: isPowerUp
                });
            }

            // Update pipes
            pipes.forEach(pipe => {
                pipe.x -= PIPE_SPEED;
            });
            pipes = pipes.filter(pipe => pipe.x + pipe.width > 0);

            // Collision detection
            pipes.forEach(pipe => {
                // Check horizontal overlap
                if (bird.x + bird.width > pipe.x && bird.x < pipe.x + pipe.width) {
                    // Check vertical collision (hit top or bottom pipe)
                    if (bird.y < pipe.topHeight || bird.y + bird.height > pipe.bottomY) {
                        endGame();
                    }
                }

                // Power-up collection
                if (pipe.isPowerUp && !pipe.passed && bird.x > pipe.x + pipe.width/2 && bird.x < pipe.x + pipe.width) {
                    powerUpActive = true;
                    powerUpTimer = 300; // 5 seconds at 60fps
                    pipe.isPowerUp = false;
                    
                    // Create celebration particles
                    for (let i = 0; i < 20; i++) {
                        particles.push(createParticle(bird.x + bird.width/2, bird.y + bird.height/2, 'star'));
                    }
                }

                // Score
                if (!pipe.passed && bird.x > pipe.x + pipe.width) {
                    pipe.passed = true;
                    score++;
                    scoreEl.textContent = score;
                    
                    // Create particles on score
                    for (let i = 0; i < 5; i++) {
                        particles.push(createParticle(pipe.x, canvas.height/2, 'normal'));
                    }
                }
            });

            // Floor/Ceiling collision
            if (bird.y + bird.height > canvas.height - 20 || bird.y < 0) {
                endGame();
            }

            // Update particles
            updateParticles();
            
            // Background parallax
            backgroundOffset++;
            frameCount++;
        }

        // Draw game
        function draw() {
            drawBackground();
            drawParticles();
            pipes.forEach(drawPipe);
            drawBird();
            
            // Power-up indicator
            if (powerUpActive) {
                ctx.fillStyle = '#ffd700';
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#ffd700';
                ctx.font = 'bold 14px Arial';
                ctx.fillText('POWER UP! ' + Math.ceil(powerUpTimer/60), 10, canvas.height - 30);
                ctx.shadowBlur = 0;
            }
        }

        // Game loop
        function gameLoop() {
            update();
            draw();
            if (gameRunning) {
                requestAnimationFrame(gameLoop);
            }
        }

        // Start game
        function startGame() {
            bird = {
                x: 100,
                y: canvas.height / 2,
                width: 25,
                height: 25,
                velocity: 0,
                rotation: 0,
                color: '#00d9ff'
            };
            pipes = [];
            particles = [];
            score = 0;
            frameCount = 0;
            powerUpActive = false;
            powerUpTimer = 0;
            gameRunning = true;
            gameOver = false;
            scoreEl.textContent = '0';
            messageEl.classList.add('hidden');
            gameLoop();
        }

        // End game
        function endGame() {
            gameRunning = false;
            gameOver = true;
            
            // Update high score
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('flappyHighScore', highScore);
                highScoreEl.textContent = 'Best: ' + highScore;
            }
            
            messageEl.innerHTML = 'Game Over!<br><span style="font-size:32px">Score: ' + score + '</span><br><br>Press SPACE to restart';
            messageEl.classList.remove('hidden');
        }

        // Jump
        function jump() {
            if (!gameRunning && !gameOver) {
                startGame();
            } else if (gameOver) {
                startGame();
            } else {
                bird.velocity = JUMP_STRENGTH;
                
                // Create particles on jump
                for (let i = 0; i < 3; i++) {
                    particles.push(createParticle(bird.x + bird.width/2, bird.y + bird.height, 'normal'));
                }
            }
        }

        // Event listeners
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                jump();
            }
        });

        canvas.addEventListener('click', jump);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            jump();
        });

        // Initial draw
        drawBackground();
        drawBird();
    </script>
</body>
</html>
