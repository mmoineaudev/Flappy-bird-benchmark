<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Enhanced Flappy Bird</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(to bottom, #87CEEB, #98D8E8);
            font-family: 'Arial', sans-serif;
        }
        
        #gameCanvas {
            border: 3px solid #4A90E2;
            border-radius: 10px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }
        
        #score {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 28px;
            color: #2E86AB;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0,0,0,0.7);
            padding: 20px 40px;
            border-radius: 15px;
            text-align: center;
            display: none;
        }
        
        #gameOver h2 {
            color: #FF6B6B;
            margin-bottom: 15px;
        }
        
        #restartButton {
            padding: 10px 25px;
            font-size: 18px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 0 auto;
        }
        
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            text-align: left;
            color: #555;
            font-size: 16px;
        }
        
        .score-particle {
            position: absolute;
            font-size: 24px;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 2px 2px 3px rgba(0,0,0,0.5);
            pointer-events: none;
        }
    </style>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Set canvas to 16:9 ratio
        function resizeCanvas() {
            const container = document.body;
            const aspectRatio = 16/9;
            const width = Math.min(800, window.innerWidth - 40);
            const height = width / aspectRatio;
            
            canvas.width = width;
            canvas.height = height;
        }
        
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        // Game objects
        const bird = {
            x: 100,
            y: canvas.height / 2,
            width: 40,
            height: 30,
            velocity: 0,
            gravity: 0.5,
            jumpStrength: -10,
            birdColors: ['#FF6B6B', '#4ECDC4', '#45B7D8', '#96CEB4']
        };
        
        // Multiple birds for visual appeal
        const birds = [
            { x: 100, y: canvas.height / 2, width: 40, height: 30, color: '#FF6B6B', birdIndex: 0 },
            { x: 100, y: canvas.height / 2, width: 40, height: 30, color: '#4ECDC4', birdIndex: 1 },
            { x: 100, y: canvas.height / 2, width: 40, height: 30, color: '#45B7D8', birdIndex: 2 }
        ];
        
        // Obstacles
        let obstacles = [];
        let score = 0;
        let gameStarted = false;
        let gameOver = false;
        let pipes = [];
        let pipesCreated = 0;
        let pipeGap = 150;
        let pipeSpeed = 4;
        let birdIndex = 0;
        
        // Clouds for background
        let clouds = [];
        
        // Create initial clouds
        for (let i = 0; i < 3; i++) {
            clouds.push({
                x: i * 300 + 50,
                y: 50 + i * 20,
                width: 60,
                height: 30
            });
        }
        
        // Sound effects
        const sounds = {
            jump: new Audio('jump.mp3'),
            score: new Audio('score.mp3'),
            gameOver: new Audio('gameOver.mp3')
        };
        
        // Create sound effects
        function createSounds() {
            // Simple sounds using Web Audio API for demonstration
            const context = new (window.AudioContext || window.webkitAudioContext)();
            
            // Jump sound (high pitch)
            function playSound(frequency, duration) {
                const oscillator = context.createOscillator();
                const gainNode = context.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(context.destination);
                
                oscillator.frequency.value = frequency;
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(frequency, 0);
                oscillator.frequency.exponentialRampToValueAtTime(frequency * 1.5, duration / 2);
                oscillator.frequency.exponentialRampToValueAtTime(frequency / 2, duration);
                
                gainNode.gain.value = 0.2;
                gainNode.gain.exponentialRampToValueAtTime(0.01, duration);
                
                oscillator.start(0);
                oscillator.stop(duration);
            }
            
            // Jump sound
            function playJump() {
                playSound(800, 0.1);
                playSound(600, 0.1);
                playSound(400, 0.1);
            }
            
            // Score sound (high pitch)
            function playScore() {
                playSound(1000, 0.05);
                playSound(1200, 0.05);
                playSound(1400, 2000, 0.05);
            }
            
            // Game over sound (low pitch)
            function playGameOver() {
                playSound(200, 0.5);
                setTimeout(() => playSound(150, 0.3), 150);
                setTimeout(() => playSound(100, 0.2), 400);
            }
            
            // Simple beep sounds for demo
            const sounds = {
                jump: playJump,
                score: playJump,
                gameOver: () => {
                    for (let i = 0; i < 3; i++) {
                        setTimeout(() => playSound(200 + i * 100, 0.2), i * 100);
                    }
                }
            };
            
            return sounds;
        }
        
        // Create sounds
        const soundEffects = createSounds();
        
        // Create score particle
        function createScoreParticle(x, y) {
            const particle = document.createElement('div');
            particle.className = 'score-particle';
            particle.textContent = '+10';
            particle.style.left = x + 'px';
            particle.style.top = y + 'px';
            document.body.appendChild(particle);
            
            setTimeout(() => {
                particle.style.opacity = '0';
                setTimeout(() => {
                    document.body.removeChild(particle);
                }, 300);
            }, 100);
        }
        
        // Draw bird with gradient
        function drawBird(x, y, color, size = 1) {
            ctx.save();
            ctx.globalAlpha = size;
            ctx.fillStyle = color;
            ctx.fillRect(x, y, 30 * size, 30 * size);
            
            // Add gradient effect
            const gradient = ctx.createLinearGradient(x, y, x + 30 * size, y + 30 * size);
            gradient.addColorStop(0, color);
            gradient.addColorStop(1, adjustBrightness(color, -20));
            
            ctx.fillStyle = gradient;
            ctx.fillRect(x, y, 30 * size, 30 * size);
            
            ctx.restore();
        }
        
        // Add slight glow effect to birds
        function drawBirdWithGlow(x, y) {
            ctx.save();
            ctx.globalAlpha = 0.3;
            ctx.fillStyle = '#FFD700';
            ctx.shadowBlur = 10;
            ctx.fillRect(x, y, 40, 30);
            ctx.restore();
            
            drawBird(x, y);
        }
        
        // Create random pipe with color
        function createObstacle(x, height, isTop) {
            const width = 60;
            const height = height;
            const pipeColor = '#8B4513';
            const gapSize = 120;
            
            // Draw pipe
            ctx.save();
            ctx.globalAlpha = 0.8;
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(x, 0, width, height);
            ctx.fillRect(x, height + gapSize, width, canvas.height - height - gapSize);
            ctx.restore();
            
            // Add slight shine
            ctx.save();
            ctx.globalAlpha = 0.2;
            ctx.fillStyle = '#FFD700';
            ctx.fillRect(x + 10, 0, 30, height);
            ctx.fillRect(x + 10, canvas.height - height - 10, 30, 30);
            ctx.restore();
        }
        
        // Draw clouds
        function drawClouds() {
            clouds.forEach(cloud => {
                ctx.save();
                ctx.globalAlpha = 0.7;
                ctx.fillStyle = '#FFFFFF';
                ctx.beginPath();
                ctx.arc(cloud.x, cloud.y, 30, 0, Math.PI * 2);
                ctx.arc(cloud.x + 20, cloud.y, 25, 0, Math.PI * 2);
                ctx.arc(cloud.x + 40, cloud.y, 30, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });
        }
        
        // Game loop
        function gameLoop() {
            // Clear canvas with gradient background
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#87CEEB');
            gradient.addColorStop(0.5, '#98D8E8');
            gradient.addColorStop(1, '#D4F1F4');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Update clouds
            clouds.forEach(cloud => {
                cloud.x -= 1;
                if (cloud.x < -100) {
                    cloud.x = canvas.width + 100;
                }
            });
            
            // Draw clouds
            drawClouds();
            
            // Update bird positions
            birds.forEach(bird => {
                bird.y += bird.velocity;
                bird.velocity += bird.gravity;
                
                // Update position based on bird index
                if (birdIndex === 2) {
                    // Make third bird move with slight variation
                    bird.x += 1;
                    if (bird.x > 200) birdIndex = 0;
                }
                
                // Draw bird with glow
                drawBirdWithGlow(bird.x, bird.y);
            });
            
            // Create new pipes when needed
            if (gameStarted && gameStarted % 90 === 0) {
                const minHeight = 50;
                const maxHeight = canvas.height - 50 - pipeGap;
                const height = Math.random() * (maxHeight - minHeight) + minHeight;
                
                // Create top pipe
                createObstacle(canvas.width, 0, minHeight, true);
                // Add top pipe to array
                obstacles.push({
                    x: canvas.width,
                    width: 60,
                    height: height,
                    isTop: true
                });
                
                // Create bottom pipe
                const bottomHeight = height + pipeGap;
                createObstacle(canvas.width, height + pipeGap, bottomHeight);
                obstacles.push({
                    x: canvas.width,
                    y: height,
                    height: bottomHeight,
                    isBottom: true
                });
            }
            
            // Update and draw obstacles
            obstacles.forEach(obstacle => {
                // Move obstacle
                obstacle.x -= pipeSpeed;
                
                // Check collision
                if (gameStarted && 
                    birdIndex < 2 && 
                    bird.x < obstacle.x + 60 && 
                    bird.x + 30 > obstacle.x && 
                    (bird.y < obstacle.height || bird.y + 30 > obstacle.height)) {
                    gameOver = true;
                    soundEffects.gameOver();
                }
                
                // Check if passed pipe
                if (birdIndex < 2 && !gameOver && 
                    bird.x > obstacle.x && bird.x < obstacle.x + 60) {
                    if (bird.y < obstacle.height || bird.y + 30 > obstacle.height + 120) {
                        score++;
                        soundEffects.score();
                        createScoreParticle(bird.x, bird.y);
                    }
                }
            });
            
            // Remove off-screen obstacles
            obstacles = obstacles.filter(o => o.x + 60 > 0);
            
            // Check if bird hits ground or top
            if (birdIndex < 2 && bird.y <= 0 || bird.y >= canvas.height - 30) {
                gameOver = true;
                soundEffects.gameOver();
            }
            
            // Update game state
            gameStarted = true;
            gameOver = gameOver;
            
            // Draw score
            ctx.fillStyle = '#000';
            ctx.font = '24px Arial';
            ctx.fillText(`Score: ${score}`, 20, 30);
            
            // Draw game over screen
            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = '#FF6B6B';
                ctx.font = '36px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('Game Over', canvas.width/2, canvas.height/2);
                ctx.font = '24px Arial';
                ctx.fillText(`Final Score: ${score}`, canvas.width/2, canvas.height/2 + 40);
                
                // Restart button
                const restartButton = document.createElement('button');
                restartButton.textContent = 'Play Again';
                restartButton.style.position = 'absolute';
                restartButton.style.top = '60px';
                restartButton.style.left = '50%';
                restartButton.style.transform = 'translateX(-50%)';
                restartButton.style.padding = '15px 30px';
                restartButton.style.fontSize = '20px';
                restartButton.style.backgroundColor = '#4CAF50';
                restartButton.style.border = 'none';
                restartButton.style.borderRadius = '8px';
                restartButton.style.cursor = 'pointer';
                restartButton.style.boxShadow = '0 4px 8px rgba(0,0,0,0.2)';
                
                document.body.appendChild(restartButton);
                
                restartButton.addEventListener('click', () => {
                    gameStarted = false;
                    gameOver = false;
                    score = 0;
                    gameLoop();
                    document.body.removeChild(restartButton);
                    document.getElementById('gameOver').style.display = 'none';
                });
                
                // Show game over message
                const gameOverOverlay = document.getElementById('gameOver');
                gameOverOverlay.style.display = 'block';
            }
            
            // Continue game
            requestAnimationFrame(gameLoop);
        }
        
        // Start the game
        window.onload = () => {
            // Initialize sound effects
            sounds = {
                jump: () => { playJump(); },
                score: () => { playJump(); },
                gameOver: () => { 
                    for (let i = 0; i < 3; i++) {
                        setTimeout(() => playJump(), i * 200);
                    }
                }
            };
            
            // Handle keyboard input
            document.addEventListener('keydown', function(event) {
                if (event.code === 'Space') {
                    if (!gameStarted) {
                        gameStarted = true;
                    } else if (gameOver) {
                        gameStarted = true;
                        gameOver = false;
                        score = 0;
                        gameLoop();
                        document.getElementById('gameOver').style.display = 'none';
                    }
                }
            });
            
            gameLoop();
        };
    </script>
</body>
</html>
