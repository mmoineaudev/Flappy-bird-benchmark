<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Rush: Cosmic Adventure</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background: #0a0a1a;
            font-family: 'Orbitron', 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
            border: 8px solid linear-gradient(45deg, #ff6b6b, #feca57, #48dbfb);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(72, 219, 251, 0.5), inset 0 0 80px rgba(0,0,0,0.5);
        }
        canvas { display: block; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 0 0 10px #48dbfb, 0 0 20px #48dbfb;
            z-index: 10;
        }
        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 32px;
            font-weight: bold;
            text-align: center;
            text-shadow: 0 0 15px #ff6b6b, 0 0 30px #feca57;
            z-index: 20;
        }
        .powerup-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #feca57;
            font-size: 22px;
            font-weight: bold;
            text-shadow: 0 0 10px #feca57;
            z-index: 10;
        }
        #customization {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 16px;
            text-align: center;
            z-index: 30;
        }
        .color-btn {
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            border: none;
            padding: 8px 15px;
            margin: 0 5px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="720" height="1080"></canvas>
        <div id="ui">Score: <span id="score">0</span> | Best: <span id="bestScore">0</span></div>
        <div class="powerup-indicator" id="powerupIndicator"></div>
        <div id="message">PRESS SPACE OR TAP<br><span style="font-size: 24px; color: #feca57;">TO BEGIN COSMIC JOURNEY</span></div>
        <div id="customization">
            <button class="color-btn" onclick="changeColor(0)">🔴 Red</button>
            <button class="color-btn" onclick="changeColor(1)">🔵 Blue</button>
            <button class="color-btn" onclick="changeColor(2)">🟢 Green</button>
            <button class="color-btn" onclick="changeColor(3)">🟡 Yellow</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const bestScoreEl = document.getElementById('bestScore');
        const messageEl = document.getElementById('message');
        const powerupIndicator = document.getElementById('powerupIndicator');

        let gameState = 'start';
        let score = 0;
        let bestScore = localStorage.getItem('skyRushBest') || 0;
        let frames = 0;
        let gameSpeed = 4;
        let currentColor = 0;
        const colorThemes = [
            { primary: '#ff6b6b', secondary: '#ee5a5a', glow: '#ff9999' },
            { primary: '#48dbfb', secondary: '#36b4d1', glow: '#80e9ff' },
            { primary: '#1dd1a1', secondary: '#10ac84', glow: '#55efc4' },
            { primary: '#feca57', secondary: '#f39c12', glow: #ffeaa7 }
        ];

        bestScoreEl.textContent = bestScore;

        // Player ship with advanced effects
        const ship = {
            x: 100,
            y: 540,
            width: 60,
            height: 50,
            velocity: 0,
            gravity: 0.4,
            jump: -8.5,
            rotation: 0,
            trail: [],
            engineParticles: [],
            shield: false,
            magnet: false,
            doublePoints: false
        };

        // Space obstacles with variety
        const obstacles = [];
        const obstacleWidth = 80;
        const obstacleGap = 220;
        const obstacleSpawnRate = 140;

        // Power-ups with special effects
        const powerups = [];
        const powerupSpawnRate = 300;

        // Background stars
        const stars = [];
        for (let i = 0; i = 200; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2 + 0.5,
                speed: Math.random() * 2 + 0.5,
                brightness: Math.random()
            });
        }

        // Floating particles in background
        const floatingParticles = [];
        for (let i = 0; i < 50; i++) {
            floatingParticles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 3 + 1,
                speed: Math.random() * 1 + 0.5,
                opacity: Math.random() * 0.5 + 0.3
            });
        }

        function resetGame() {
            ship.y = 540;
            ship.velocity = 0;
            ship.trail = [];
            ship.engineParticles = [];
            ship.shield = false;
            ship.magnet = false;
            ship.doublePoints = false;
            obstacles.length = 0;
            powerups.length = 0;
            score = 0;
            frames = 0;
            gameSpeed = 4;
            scoreEl.textContent = '0';
            powerupIndicator.textContent = '';
        }

        function spawnObstacle() {
            const minHeight = 100;
            const maxHeight = canvas.height - obstacleGap - minHeight - 100;
            const topHeight = Math.random() * (maxHeight - minHeight) + minHeight;
            
            obstacles.push({
                x: canvas.width,
                topHeight: topHeight,
                bottomY: topHeight + obstacleGap,
                width: obstacleWidth,
                passed: false,
                type: Math.random() > 0.5 ? 'normal' : 'wavy',
                waveOffset: Math.random() * Math.PI * 2
            });
        }

        function spawnPowerup() {
            const types = ['shield', 'magnet', 'doublePoints', 'speedBoost', 'slowMo', 'extraLife'];
            const type = types[Math.floor(Math.random() * types.length)];
            
            powerups.push({
                x: canvas.width,
                y: Math.random() * (canvas.height - 300) + 150,
                width: 50,
                height: 50,
                type: type,
                rotation: 0,
                pulse: 0
            });
        }

        function createExplosion(x, y, color, count = 20) {
            for (let i = 0; i < count; i++) {
                ship.engineParticles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 40 + Math.random() * 20,
                    color: color,
                    size: Math.random() * 5 + 2
                });
            }
        }

        function updateEngineParticles() {
            for (let i = ship.engineParticles.length - 1; i >= 0; i--) {
                let p = ship.engineParticles[i];
                p.x += p.vx - gameSpeed * 0.5;
                p.y += p.vy;
                p.life--;
                p.size *= 0.92;
                
                if (p.life <= 0) {
                    ship.engineParticles.splice(i, 1);
                }
            }
        }

        function drawEngineParticles() {
            ship.engineParticles.forEach(p => {
                ctx.globalAlpha = p.life / 60;
                const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
                gradient.addColorStop(0, p.color);
                gradient.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
        }

        function drawBackground() {
            // Deep space gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#0a0a2a');
            gradient.addColorStop(0.5, '#1a1a4a');
            gradient.addColorStop(1, '#2d1b4e');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Animated stars
            stars.forEach(star => {
                star.x -= star.speed * (gameSpeed / 4);
                if (star.x < 0) star.x = canvas.width;
                
                star.brightness = 0.5 + Math.sin(frames * 0.05 + star.x) * 0.5;
                ctx.fillStyle = `rgba(255, 255, 255, ${star.brightness})`;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            });

            // Nebula effects
            const nebulaGradient = ctx.createRadialGradient(
                canvas.width * 0.7, canvas.height * 0.3, 0,
                canvas.width * 0.7, canvas.height * 0.3, 300
            );
            nebulaGradient.addColorStop(0, 'rgba(138, 43, 226, 0.15)');
            nebulaGradient.addColorStop(1, 'transparent');
            ctx.fillStyle = nebulaGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Floating particles
            floatingParticles.forEach(p => {
                p.x -= p.speed * (gameSpeed / 3);
                if (p.x < 0) p.x = canvas.width;
                
                ctx.globalAlpha = p.opacity + Math.sin(frames * 0.03 + p.y) * 0.2;
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;

            // Distant planet
            const planetGradient = ctx.createRadialGradient(
                canvas.width - 150, 150, 0,
                canvas.width - 150, 150, 80
            );
            planetGradient.addColorStop(0, '#8b5cf6');
            planetGradient.addColorStop(0.5, '#6b21a8');
            planetGradient.addColorStop(1, 'transparent');
            ctx.fillStyle = planetGradient;
            ctx.beginPath();
            ctx.arc(canvas.width - 150, 150, 80, 0, Math.PI * 2);
            ctx.fill();

            // Ground with futuristic pattern
            const groundOffset = (frames * gameSpeed) % 40;
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, canvas.height - 60, canvas.width, 60);
            
            // Grid pattern on ground
            ctx.strokeStyle = '#48dbfb';
            ctx.lineWidth = 2;
            ctx.beginPath();
            for (let i = -40; i < canvas.width; i += 40) {
                const x = i - groundOffset;
                ctx.moveTo(x, canvas.height - 60);
                ctx.lineTo(x - 100, canvas.height);
            }
            ctx.stroke();

            // Neon line
            ctx.strokeStyle = '#ff6b6b';
            ctx.lineWidth = 3;
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ff6b6b';
            ctx.beginPath();
            ctx.moveTo(0, canvas.height - 60);
            ctx.lineTo(canvas.width, canvas.height - 60);
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        function drawShip() {
            // Trail effect
            ship.trail.push({x: ship.x, y: ship.y, rotation: ship.rotation});
            if (ship.trail.length > 15) ship.trail.shift();
            
            ship.trail.forEach((pos, i) => {
                const alpha = i / ship.trail.length * 0.4;
                ctx.globalAlpha = alpha;
                ctx.fillStyle = colorThemes[currentColor].glow;
                ctx.beginPath();
                ctx.arc(pos.x + ship.width/2, pos.y + ship.height/2, ship.width/3, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;

            // Calculate rotation
            ship.rotation = Math.min(Math.max(ship.velocity * 4, -25), 75);

            ctx.save();
            ctx.translate(ship.x + ship.width/2, ship.y + ship.height/2);
            ctx.rotate(ship.rotation * Math.PI / 180);

            const theme = colorThemes[currentColor];

            // Shield effect
            if (ship.shield) {
                ctx.strokeStyle = '#48dbfb';
                ctx.lineWidth = 3;
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#48dbfb';
                ctx.beginPath();
                ctx.ellipse(0, 0, ship.width/1.2, ship.height/1.2, 0, 0, Math.PI * 2);
                ctx.stroke();
                ctx.shadowBlur = 0;
            }

            // Main body with gradient
            const bodyGradient = ctx.createLinearGradient(-ship.width/2, -ship.height/2, ship.width/2, ship.height/2);
            bodyGradient.addColorStop(0, theme.secondary);
            bodyGradient.addColorStop(1, theme.primary);
            ctx.fillStyle = bodyGradient;

            // Ship shape (futuristic triangle)
            ctx.beginPath();
            ctx.moveTo(ship.width/2, 0);
            ctx.lineTo(-ship.width/2, -ship.height/2 + 5);
            ctx.lineTo(-ship.width/3, 0);
            ctx.lineTo(-ship.width/2, ship.height/2 - 5);
            ctx.closePath();
            ctx.fill();

            // Cockpit
            const cockpitGradient = ctx.createRadialGradient(-10, 0, 0, -10, 0, 20);
            cockpitGradient.addColorStop(0, '#fff');
            cockpitGradient.addColorStop(0.5, theme.glow);
            cockpitGradient.addColorStop(1, theme.primary);
            ctx.fillStyle = cockpitGradient;
            ctx.beginPath();
            ctx.ellipse(-10, 0, 15, 10, 0, 0, Math.PI * 2);
            ctx.fill();

            // Engine glow
            const engineGradient = ctx.createRadialGradient(-ship.width/2 - 5, 0, 0, -ship.width/2 - 5, 0, 25);
            engineGradient.addColorStop(0, '#fff');
            engineGradient.addColorStop(0.3, theme.glow);
            engineGradient.addColorStop(1, 'transparent');
            ctx.fillStyle = engineGradient;
            ctx.beginPath();
            ctx.arc(-ship.width/2 - 5, 0, 25, 0, Math.PI * 2);
            ctx.fill();

            // Wing details
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(-ship.width/3, 0);
            ctx.lineTo(-ship.width/2, -ship.height/2 + 5);
            ctx.moveTo(-ship.width/3, 0);
            ctx.lineTo(-ship.width/2, ship.height/2 - 5);
            ctx.stroke();

            ctx.restore();

            // Draw engine particles at back
            for (let i = 0; i < 3; i++) {
                const offset = (Math.random() - 0.5) * 20;
                createExplosion(ship.x - 10, ship.y + ship.height/2 + offset - 10, theme.glow, 1);
            }
        }

        function drawObstacles() {
            obstacles.forEach(obs => {
                const waveY = obs.type === 'wavy' ? Math.sin((frames + obs.waveOffset) * 0.05) * 20 : 0;
                
                // Top obstacle
                const topGradient = ctx.createLinearGradient(obs.x, 0, obs.x + obs.width, 0);
                topGradient.addColorStop(0, '#6c5ce7');
                topGradient.addColorStop(0.5, '#a29bfe');
                topGradient.addColorStop(1, '#6c5ce7');
                
                ctx.fillStyle = topGradient;
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#6c5ce7';
                
                ctx.beginPath();
                ctx.moveTo(obs.x, 0);
                ctx.lineTo(obs.x + obs.width, 0);
                ctx.lineTo(obs.x + obs.width, obs.topHeight - 40 + waveY);
                ctx.lineTo(obs.x, obs.topHeight - 40 + waveY);
                ctx.closePath();
                ctx.fill();

                // Top cap
                ctx.fillStyle = '#a29bfe';
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.moveTo(obs.x - 5, obs.topHeight - 40 + waveY);
                ctx.lineTo(obs.x + obs.width + 5, obs.topHeight - 40 + waveY);
                ctx.lineTo(obs.x + obs.width + 5, obs.topHeight - 10 + waveY);
                ctx.lineTo(obs.x - 5, obs.topHeight - 10 + waveY);
                ctx.closePath();
                ctx.fill();

                // Bottom obstacle
                ctx.fillStyle = topGradient;
                ctx.beginPath();
                ctx.moveTo(obs.x, obs.bottomY + 40 - waveY);
                ctx.lineTo(obs.x + obs.width, obs.bottomY + 40 - waveY);
                ctx.lineTo(obs.x + obs.width, canvas.height);
                ctx.lineTo(obs.x, canvas.height);
                ctx.closePath();
                ctx.fill();

                // Bottom cap
                ctx.fillStyle = '#a29bfe';
                ctx.beginPath();
                ctx.moveTo(obs.x - 5, obs.bottomY + 40 - waveY);
                ctx.lineTo(obs.x + obs.width + 5, obs.bottomY + 40 - waveY);
                ctx.lineTo(obs.x + obs.width + 5, obs.bottomY + 10 - waveY);
                ctx.lineTo(obs.x - 5, obs.bottomY + 10 - waveY);
                ctx.closePath();
                ctx.fill();

                ctx.shadowBlur = 0;

                // Decorative lights
                ctx.fillStyle = '#ff6b6b';
                for (let i = 0; i < 3; i++) {
                    const y = 80 + i * 70;
                    if (y < obs.topHeight - 40 || y > obs.bottomY + 40) {
                        ctx.shadowBlur = 5;
                        ctx.shadowColor = '#ff6b6b';
                        ctx.beginPath();
                        ctx.arc(obs.x + obs.width/2, y, 4, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.shadowBlur = 0;
                    }
                }
            });
        }

        function drawPowerups() {
            powerups.forEach(p => {
                p.rotation += 0.03;
                p.pulse = Math.sin(frames * 0.08) * 5 + 15;

                const colors = {
                    'shield': '#48dbfb',
                    'magnet': '#ff6b6b',
                    'doublePoints': '#feca57',
                    'speedBoost': '#1dd1a1',
                    'slowMo': '#5f27cd',
                    'extraLife': '#ee5a24'
                };

                const icons = {
                    'shield': '🛡️',
                    'magnet': '🧲',
                    'doublePoints': '2x',
                    'speedBoost': '⚡',
                    'slowMo': '🐌',
                    'extraLife': '❤️'
                };

                // Glow effect
                ctx.shadowBlur = p.pulse;
                ctx.shadowColor = colors[p.type];

                // Outer ring
                ctx.strokeStyle = colors[p.type];
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(p.x + p.width/2, p.y + p.height/2, p.width/2 + 8, 0, Math.PI * 2);
                ctx.stroke();

                // Inner gradient
                const ringGradient = ctx.createRadialGradient(
                    p.x + p.width/2, p.y + p.height/2, 5,
                    p.x + p.width/2, p.y + p.height/2, p.width/2
                );
                ringGradient.addColorStop(0, '#fff');
                ringGradient.addColorStop(0.3, colors[p.type]);
                ringGradient.addColorStop(1, adjustBrightness(colors[p.type], -40));
                
                ctx.fillStyle = ringGradient;
                ctx.beginPath();
                ctx.arc(p.x + p.width/2, p.y + p.height/2, p.width/2, 0, Math.PI * 2);
                ctx.fill();

                ctx.shadowBlur = 0;

                // Icon
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 26px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(icons[p.type], p.x + p.width/2, p.y + p.height/2);

                // Magnet effect
                if (ship.magnet) {
                    const dx = ship.x - p.x;
                    const dy = ship.y - p.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < 250) {
                        p.x += dx * 0.04;
                        p.y += dy * 0.04;
                    }
                }

                // Update position
                p.x -= gameSpeed;
            });
        }

        function adjustBrightness(color, amount) {
            return color;
        }

        function activatePowerup(type) {
            const colors = {
                'shield': '#48dbfb',
                'magnet': '#ff6b6b',
                'doublePoints': '#feca57',
                'speedBoost': '#1dd1a1',
                'slowMo': '#5f27cd',
                'extraLife': '#ee5a24'
            };

            createExplosion(ship.x, ship.y, colors[type], 25);

            switch(type) {
                case 'shield':
                    ship.shield = true;
                    powerupIndicator.textContent = '🛡️ SHIELD!';
                    setTimeout(() => { ship.shield = false; powerupIndicator.textContent = ''; }, 7000);
                    break;
                case 'magnet':
                    ship.magnet = true;
                    powerupIndicator.textContent = '🧲 MAGNET!';
                    setTimeout(() => { ship.magnet = false; powerupIndicator.textContent = ''; }, 6000);
                    break;
                case 'doublePoints':
                    ship.doublePoints = true;
                    score += 25;
                    powerupIndicator.textContent = '2x POINTS!';
                    setTimeout(() => { ship.doublePoints = false; powerupIndicator.textContent = ''; }, 5000);
                    break;
                case 'speedBoost':
                    gameSpeed = 6;
                    powerupIndicator.textContent = '⚡ SUPER SPEED!';
                    setTimeout(() => { gameSpeed = 4; powerupIndicator.textContent = ''; }, 4000);
                    break;
                case 'slowMo':
                    gameSpeed = 2;
                    powerupIndicator.textContent = '🐌 SLOW MO!';
                    setTimeout(() => { gameSpeed = 4; powerupIndicator.textContent = ''; }, 5000);
                    break;
                case 'extraLife':
                    ship.shield = true;
                    powerupIndicator.textContent = '❤️ EXTRA LIFE!';
                    setTimeout(() => { ship.shield = false; powerupIndicator.textContent = ''; }, 8000);
                    break;
            }
        }

        function update() {
            if (gameState !== 'playing') return;

            frames++;

            // Ship physics
            ship.velocity += ship.gravity;
            ship.y += ship.velocity;

            // Spawn obstacles
            if (frames % obstacleSpawnRate === 0) {
                spawnObstacle();
            }

            // Spawn powerups
            if (frames % powerupSpawnRate === 0 && Math.random() < 0.85) {
                spawnPowerup();
            }

            // Update obstacles
            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].x -= gameSpeed;

                if (obstacles[i].x + obstacles[i].width < 0) {
                    obstacles.splice(i, 1);
                }

                // Score
                if (!obstacles[i].passed && obstacles[i].x + obstacles[i].width < ship.x) {
                    obstacles[i].passed = true;
                    const points = ship.doublePoints ? 20 : 10;
                    score += points;
                    scoreEl.textContent = score;
                    createExplosion(obstacles[i].x, ship.y, '#feca57', 10);
                }

                // Collision
                if (ship.x + 15 < obstacles[i].x + obstacles[i].width &&
                    ship.x + ship.width - 15 > obstacles[i].x &&
                    (ship.y + 15 < obstacles[i].topHeight || ship.y + ship.height - 15 > obstacles[i].bottomY)) {
                    
                    if (ship.shield) {
                        obstacles.splice(i, 1);
                        ship.shield = false;
                        powerupIndicator.textContent = '';
                        createExplosion(obstacles[i].x, ship.y, '#48dbfb', 30);
                    } else {
                        gameOver();
                    }
                }
            }

            // Update powerups
            for (let i = powerups.length - 1; i >= 0; i--) {
                const p = powerups[i];
                
                if (ship.x + ship.width > p.x &&
                    ship.x < p.x + p.width &&
                    ship.y + ship.height > p.y &&
                    ship.y < p.y + p.height) {
                    
                    activatePowerup(p.type);
                    powerups.splice(i, 1);
                } else if (p.x + p.width < 0) {
                    powerups.splice(i, 1);
                }
            }

            // Bounds checking
            if (ship.y + ship.height > canvas.height - 60) {
                gameOver();
            }
            if (ship.y < 0) {
                ship.y = 0;
                ship.velocity = 0;
            }

            updateEngineParticles();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            drawBackground();
            drawObstacles();
            drawPowerups();
            drawShip();
            drawEngineParticles();

            if (gameState === 'start') {
                messageEl.innerHTML = '<span style="color: #48dbfb; font-size: 48px;">SKY RUSH</span><br><span style="color: #feca57; font-size: 28px;">COSMIC ADVENTURE</span><br><br><span style="font-size: 24px;">PRESS SPACE OR TAP TO BEGIN</span>';
                messageEl.style.display = 'block';
            } else if (gameState === 'gameover') {
                if (score > bestScore) {
                    bestScore = score;
                    localStorage.setItem('skyRushBest', bestScore);
                    bestScoreEl.textContent = bestScore;
                    messageEl.innerHTML = `🌟 NEW COSMIC RECORD! 🌟<br><span style="font-size: 36px; color: #feca57;">${score}</span> POINTS<br><br>PRESS SPACE TO TRY AGAIN`;
                } else {
                    messageEl.innerHTML = `MISSION FAILED<br><span style="font-size: 36px; color: #ff6b6b;">${score}</span> POINTS<br>Best: ${bestScore}<br><br>PRESS SPACE TO RETRY`;
                }
                messageEl.style.display = 'block';
            } else {
                messageEl.style.display = 'none';
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            gameState = 'playing';
            resetGame();
        }

        function gameOver() {
            createExplosion(ship.x + ship.width/2, ship.y + ship.height/2, colorThemes[currentColor].primary, 40);
            gameState = 'gameover';
        }

        function handleInput() {
            if (gameState === 'start' || gameState === 'gameover') {
                startGame();
            } else {
                ship.velocity = ship.jump;
                createExplosion(ship.x + ship.width/2, ship.y + ship.height, colorThemes[currentColor].glow, 8);
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
                e.preventDefault();
                handleInput();
            }
        });

        canvas.addEventListener('click', handleInput);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleInput();
        });

        // Color customization
        window.changeColor = function(index) {
            currentColor = index;
        };

        gameLoop();
    </script>
</body>
</html>
