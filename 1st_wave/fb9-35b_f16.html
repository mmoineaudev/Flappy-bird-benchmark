<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
        }
        #gameCanvas {
            border: 4px solid #333;
            border-radius: 10px;
            background: linear-gradient(to bottom, #87CEEB 0%, #98FB98 100%);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        #instructions {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #333;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.8);
            font-size: 24px;
            font-weight: bold;
        }
        #scoreDisplay {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 48px;
            font-weight: bold;
            color: #333;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.8);
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <div id="scoreDisplay">0</div>
        <div id="instructions">
            <div>FLAPPY BIRD</div>
            <div style="font-size: 16px; margin-top: 10px;">Press SPACE or CLICK to start</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const instructions = document.getElementById('instructions');

        // Game state
        let gameState = 'waiting'; // waiting, playing, gameover
        let score = 0;
        let highScore = 0;

        // Bird properties
        const bird = {
            x: 80,
            y: 300,
            width: 34,
            height: 24,
            velocity: 0,
            gravity: 0.5,
            jumpStrength: -8,
            rotation: 0
        };

        // Pipes array
        let pipes = [];
        const pipeWidth = 60;
        const pipeGap = 150;
        const pipeSpawnInterval = 100;
        let pipeTimer = 0;

        // Ground
        const groundHeight = 50;
        let groundOffset = 0;

        // Colors
        const colors = {
            bird: '#FFD700',
            birdBorder: '#FF8C00',
            birdEye: '#FFFFFF',
            birdBeak: '#FF6347',
            pipeGreen: '#228B22',
            pipeLightGreen: '#32CD32',
            pipeDarkGreen: '#006400',
            pipeBorder: '#654321',
            cloud: '#FFFFFF'
        };

        // Cloud positions (static background)
        const clouds = [
            { x: 50, y: 80, size: 0.8 },
            { x: 200, y: 120, size: 0.6 },
            { x: 320, y: 60, size: 0.7 },
            { x: 100, y: 200, size: 0.5 },
            { x: 280, y: 250, size: 0.6 }
        ];

        // Reset bird position
        function resetBird() {
            bird.y = 300;
            bird.velocity = 0;
            bird.rotation = 0;
        }

        // Reset game
        function resetGame() {
            resetBird();
            pipes = [];
            score = 0;
            pipeTimer = 0;
            scoreDisplay.textContent = '0';
            instructions.style.display = 'block';
            instructions.innerHTML = '<div>FLAPPY BIRD</div><div style="font-size: 16px; margin-top: 10px;">Press SPACE or CLICK to start</div>';
        }

        // Draw bird
        function drawBird() {
            ctx.save();
            ctx.translate(bird.x + bird.width/2, bird.y + bird.height/2);
            
            // Calculate rotation based on velocity
            bird.rotation = Math.min(Math.max(bird.velocity * 0.1, -0.5), 1);
            ctx.rotate(bird.rotation);
            
            // Body
            ctx.fillStyle = colors.bird;
            ctx.fillRect(-bird.width/2, -bird.height/2, bird.width, bird.height);
            ctx.strokeStyle = colors.birdBorder;
            ctx.lineWidth = 2;
            ctx.strokeRect(-bird.width/2, -bird.height/2, bird.width, bird.height);
            
            // Eye
            ctx.fillStyle = colors.birdEye;
            ctx.beginPath();
            ctx.arc(bird.width/4, -bird.height/4, 6, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            
            // Pupil
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(bird.width/4 + 2, -bird.height/4, 2, 0, Math.PI * 2);
            ctx.fill();
            
            // Beak
            ctx.fillStyle = colors.birdBeak;
            ctx.beginPath();
            ctx.moveTo(bird.width/2 - 2, 0);
            ctx.lineTo(bird.width/2 + 10, 3);
            ctx.lineTo(bird.width/2 - 2, 6);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            
            ctx.restore();
        }

        // Draw pipes
        function drawPipes() {
            pipes.forEach(pipe => {
                // Top pipe
                ctx.fillStyle = colors.pipeGreen;
                ctx.fillRect(pipe.x, 0, pipeWidth, pipe.topHeight);
                ctx.strokeStyle = colors.pipeBorder;
                ctx.lineWidth = 2;
                ctx.strokeRect(pipe.x, 0, pipeWidth, pipe.topHeight);
                
                // Top pipe cap
                ctx.fillStyle = colors.pipeLightGreen;
                ctx.fillRect(pipe.x - 4, pipe.topHeight - 25, pipeWidth + 8, 25);
                ctx.strokeRect(pipe.x - 4, pipe.topHeight - 25, pipeWidth + 8, 25);
                
                // Bottom pipe
                ctx.fillStyle = colors.pipeGreen;
                ctx.fillRect(pipe.x, canvas.height - groundHeight - pipe.bottomHeight, pipeWidth, pipe.bottomHeight);
                ctx.strokeRect(pipe.x, canvas.height - groundHeight - pipe.bottomHeight, pipeWidth, pipe.bottomHeight);
                
                // Bottom pipe cap
                ctx.fillStyle = colors.pipeLightGreen;
                ctx.fillRect(pipe.x - 4, canvas.height - groundHeight - pipe.bottomHeight, pipeWidth + 8, 25);
                ctx.strokeRect(pipe.x - 4, canvas.height - groundHeight - pipe.bottomHeight, pipeWidth + 8, 25);
            });
        }

        // Draw ground
        function drawGround() {
            // Ground background
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(0, canvas.height - groundHeight, canvas.width, groundHeight);
            
            // Grass top
            ctx.fillStyle = '#228B22';
            ctx.fillRect(0, canvas.height - groundHeight, canvas.width, 15);
            
            // Moving pattern on ground
            ctx.fillStyle = '#A0522D';
            const patternWidth = 20;
            const numPatterns = Math.ceil(canvas.width / patternWidth) + 1;
            for (let i = -1; i < numPatterns; i++) {
                const x = (i * patternWidth + groundOffset) % canvas.width;
                ctx.beginPath();
                ctx.moveTo(x, canvas.height - groundHeight + 15);
                ctx.lineTo(x + 10, canvas.height - 10);
                ctx.lineTo(x + 5, canvas.height - 10);
                ctx.lineTo(x - 5, canvas.height - groundHeight + 15);
                ctx.closePath();
                ctx.fill();
            }
        }

        // Draw clouds
        function drawClouds() {
            ctx.fillStyle = colors.cloud;
            clouds.forEach(cloud => {
                const x = cloud.x;
                const y = cloud.y;
                const size = cloud.size;
                
                ctx.beginPath();
                ctx.arc(x, y, 20 * size, 0, Math.PI * 2);
                ctx.arc(x + 15 * size, y - 10 * size, 25 * size, 0, Math.PI * 2);
                ctx.arc(x + 35 * size, y, 20 * size, 0, Math.PI * 2);
                ctx.arc(x + 15 * size, y + 5 * size, 15 * size, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        // Spawn new pipe
        function spawnPipe() {
            const minHeight = 80;
            const maxHeight = canvas.height - groundHeight - pipeGap - minHeight;
            const topHeight = Math.random() * (maxHeight - minHeight) + minHeight;
            
            pipes.push({
                x: canvas.width,
                topHeight: topHeight,
                bottomHeight: canvas.height - groundHeight - pipeGap - topHeight,
                passed: false
            });
        }

        // Update game state
        function update() {
            if (gameState !== 'playing') return;
            
            // Update bird
            bird.velocity += bird.gravity;
            bird.y += bird.velocity;
            
            // Update ground
            groundOffset = (groundOffset + 2) % 20;
            
            // Spawn pipes
            pipeTimer++;
            if (pipeTimer >= pipeSpawnInterval) {
                spawnPipe();
                pipeTimer = 0;
            }
            
            // Update pipes
            pipes.forEach(pipe => {
                pipe.x -= 2;
            });
            
            // Remove off-screen pipes
            pipes = pipes.filter(pipe => pipe.x + pipeWidth > 0);
            
            // Check for score
            pipes.forEach(pipe => {
                if (!pipe.passed && pipe.x + pipeWidth < bird.x) {
                    pipe.passed = true;
                    score++;
                    scoreDisplay.textContent = score;
                }
            });
            
            // Check collisions
            checkCollisions();
            
            // Check bounds
            if (bird.y + bird.height > canvas.height - groundHeight) {
                gameOver();
            }
        }

        // Check collisions with pipes
        function checkCollisions() {
            pipes.forEach(pipe => {
                // Check if bird is within pipe horizontal area
                if (bird.x + bird.width > pipe.x && bird.x < pipe.x + pipeWidth) {
                    // Check top pipe collision
                    if (bird.y < pipe.topHeight) {
                        gameOver();
                    }
                    // Check bottom pipe collision
                    if (bird.y + bird.height > canvas.height - groundHeight - pipe.bottomHeight) {
                        gameOver();
                    }
                }
            });
        }

        // Game over
        function gameOver() {
            gameState = 'gameover';
            if (score > highScore) {
                highScore = score;
            }
            instructions.style.display = 'block';
            instructions.innerHTML = `
                <div style="font-size: 32px; color: #FF4500;">GAME OVER</div>
                <div style="font-size: 24px; margin-top: 10px;">Score: ${score}</div>
                <div style="font-size: 20px; margin-top: 5px;">High Score: ${highScore}</div>
                <div style="font-size: 16px; margin-top: 15px;">Press SPACE or CLICK to restart</div>
            `;
        }

        // Jump
        function jump() {
            if (gameState === 'waiting') {
                gameState = 'playing';
                instructions.style.display = 'none';
                bird.velocity = bird.jumpStrength;
            } else if (gameState === 'playing') {
                bird.velocity = bird.jumpStrength;
            } else if (gameState === 'gameover') {
                resetGame();
                gameState = 'playing';
                instructions.style.display = 'none';
                bird.velocity = bird.jumpStrength;
            }
        }

        // Draw everything
        function draw() {
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw background elements
            drawClouds();
            drawPipes();
            drawGround();
            drawBird();
            
            // Game over overlay
            if (gameState === 'gameover') {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
        }

        // Game loop
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Input handling
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                jump();
            }
        });

        canvas.addEventListener('click', jump);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            jump();
        });

        // Start the game
        resetGame();
        gameLoop();
    </script>
</body>
</html>
