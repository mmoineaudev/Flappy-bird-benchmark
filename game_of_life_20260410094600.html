<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game of Life - Three.js</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a15 0%, #1a0a2e 100%);
            overflow: hidden;
            font-family: 'Courier New', monospace;
            color: #00ffff;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        canvas {
            display: block;
        }

        #ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(10, 10, 15, 0.9);
            border: 2px solid #ff00ff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.3);
            min-width: 250px;
        }

        #ui-panel h1 {
            font-size: 24px;
            color: #00ffff;
            margin-bottom: 15px;
            text-shadow: 0 0 10px #00ffff;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            font-size: 14px;
        }

        .stat-label {
            color: #ff00ff;
        }

        .stat-value {
            color: #9d4edd;
        }

        .control-row {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #303050;
        }

        .slider-container {
            margin: 10px 0;
        }

        .slider-container label {
            display: block;
            margin-bottom: 5px;
            color: #00ffff;
            font-size: 12px;
        }

        input[type="range"] {
            width: 100%;
            -webkit-appearance: none;
            background: #303050;
            height: 6px;
            border-radius: 3px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #ff00ff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px #ff00ff;
        }

        .button-row {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            flex: 1;
            padding: 10px;
            background: rgba(157, 78, 221, 0.3);
            border: 2px solid #9d4edd;
            color: #00ffff;
            font-family: inherit;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        button:hover {
            background: rgba(157, 78, 221, 0.6);
            box-shadow: 0 0 15px #9d4edd;
        }

        .controls-hint {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(10, 10, 15, 0.9);
            border: 1px solid #303050;
            padding: 15px;
            border-radius: 8px;
            font-size: 11px;
            color: #9d4edd;
        }

        .controls-hint div {
            margin: 5px 0;
        }

        .controls-hint span {
            color: #ff00ff;
            font-weight: bold;
        }

        #toggle-effects {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .effect-toggle {
            flex: 1;
            padding: 8px;
            background: rgba(0, 255, 255, 0.2);
            border: 1px solid #00ffff;
            color: #00ffff;
            font-size: 11px;
            cursor: pointer;
            text-align: center;
        }

        .effect-toggle.active {
            background: rgba(0, 255, 255, 0.5);
            box-shadow: 0 0 10px #00ffff;
        }

        /* Scanline overlay */
        #scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.1),
                rgba(0, 0, 0, 0.1) 1px,
                transparent 1px,
                transparent 2px
            );
            z-index: 100;
        }

        /* Loading indicator */
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00ffff;
            font-size: 24px;
            text-shadow: 0 0 10px #00ffff;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div id="canvas-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="ui-panel">
        <h1>GAME OF LIFE</h1>
        
        <div class="stat-row">
            <span class="stat-label">Frame:</span>
            <span class="stat-value" id="frame-count">0</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">Population:</span>
            <span class="stat-value" id="population">0</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">Born Rule:</span>
            <span class="stat-value" id="born-rule">3</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">Survive:</span>
            <span class="stat-value" id="survive-rule">[2, 3]</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">FPS:</span>
            <span class="stat-value" id="fps">30</span>
        </div>

        <div class="control-row">
            <label>Grid Size</label>
            <div class="slider-container">
                <input type="range" id="grid-size" min="20" max="100" value="50">
            </div>
            
            <label>Simulation Speed</label>
            <div class="slider-container">
                <input type="range" id="speed" min="1" max="60" value="30">
            </div>

            <label>Born Rule</label>
            <div class="slider-container">
                <input type="range" id="born-rule-slider" min="0" max="8" value="3">
            </div>

            <label>Survive Rules</label>
            <div class="slider-container">
                <input type="range" id="survive-min" min="0" max="8" value="2">
                <input type="range" id="survive-max" min="0" max="8" value="3" style="margin-top: 5px;">
            </div>
        </div>

        <div class="control-row">
            <label>Visual Effects</label>
            <div id="toggle-effects">
                <button class="effect-toggle active" id="toggle-glow">Glow</button>
                <button class="effect-toggle active" id="toggle-scanlines">Scanlines</button>
            </div>
        </div>

        <div class="button-row">
            <button id="btn-pause">Pause</button>
            <button id="btn-random">Random</button>
            <button id="btn-clear">Clear</button>
        </div>
    </div>

    <div class="controls-hint">
        <div><span>Space</span> - Pause/Resume</div>
        <div><span>R</span> - Randomize</div>
        <div><span>C</span> - Clear</div>
        <div><span>Click/Drag</span> - Draw Cells</div>
        <div><span>Scroll</span> - Zoom</div>
    </div>

    <div id="scanlines"></div>
    <div id="loading">Loading Three.js...</div>

    <!-- Three.js from CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // Game state
        const state = {
            gridSize: 50,
            bornRule: 3,
            surviveMin: 2,
            surviveMax: 3,
            speed: 30,
            paused: false,
            glowEnabled: true,
            scanlinesEnabled: true,
            frameCount: 0,
            population: 0
        };

        // Grid data
        let grid = [];
        let nextGrid = [];

        // Three.js setup
        const canvas = document.getElementById('gameCanvas');
        const renderer = new THREE.WebGLRenderer({ 
            canvas, 
            antialias: true,
            alpha: true 
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(
            60,
            window.innerWidth / window.innerHeight,
            0.1,
            1000
        );
        camera.position.set(0, 0, grid * 10);
        camera.lookAt(0, 0, 0);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0x00ffff, 2, 100);
        pointLight.position.set(0, 0, 20);
        scene.add(pointLight);

        // Materials
        let cellMaterial = null;
        const materials = {};

        // Cell geometry (shared)
        const cellGeometry = new THREE.BoxGeometry(0.9, 0.9, 0.9);

        // Get neon color based on position and time
        function getNeonColor(x, y, z, time) {
            const offset = Math.floor((time + x * 3 + y * 2) % 3);
            
            if (offset === 0) return 0x00ffff;
            if (offset === 1) return 0xff00ff;
            return 0x9d4edd;
        }

        // Initialize grid
        function initGrid() {
            const size = state.gridSize;
            grid = new Array(size).fill(null).map(() => new Array(size).fill(0));
            
            // Clear only the instanced mesh (keep camera, renderer, lights)
            scene.children.forEach(child => {
                if (child.type === 'InstancedMesh') {
                    scene.remove(child);
                }
            });

            // Create instanced mesh for cells
            const totalCells = size * size;
            cellMaterial = new THREE.MeshStandardMaterial({
                color: 0x00ffff,
                emissive: 0x00ffff,
                emissiveIntensity: 0.5,
                roughness: 0.2,
                metalness: 0.8
            });

            const instancedMesh = new THREE.InstancedMesh(cellGeometry, cellMaterial, totalCells);
            instancedMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
            scene.add(instancedMesh);

            // Reset camera position
            camera.position.setLength(state.gridSize * 10);

            // Randomize
            randomizeGrid();
        }

        function randomizeGrid() {
            for (let x = 0; x < state.gridSize; x++) {
                for (let y = 0; y < state.gridSize; y++) {
                    grid[x][y] = Math.random() < 0.2 ? 1 : 0;
                }
            }
        }

        function clearGrid() {
            for (let x = 0; x < state.gridSize; x++) {
                for (let y = 0; y < state.gridSize; y++) {
                    grid[x][y] = 0;
                }
            }
        }

        function countNeighbors(x, y) {
            let count = 0;
            for (let dx = -1; dx <= 1; dx++) {
                for (let dy = -1; dy <= 1; dy++) {
                    if (dx === 0 && dy === 0) continue;
                    const nx = (x + dx + state.gridSize) % state.gridSize;
                    const ny = (y + dy + state.gridSize) % state.gridSize;
                    count += grid[nx][ny];
                }
            }
            return count;
        }

        function updateGrid() {
            nextGrid = grid.map(row => [...row]);
            state.population = 0;

            for (let x = 0; x < state.gridSize; x++) {
                for (let y = 0; y < state.gridSize; y++) {
                    const neighbors = countNeighbors(x, y);
                    const alive = grid[x][y];

                    if (alive && (neighbors < state.surviveMin || neighbors > state.surviveMax)) {
                        nextGrid[x][y] = 0;
                    } else if (!alive && neighbors === state.bornRule) {
                        nextGrid[x][y] = 1;
                    }

                    if (nextGrid[x][y]) state.population++;
                }
            }

            grid = nextGrid;
        }

        function updateCellMeshes(time) {
            const size = state.gridSize;
            const dummy = new THREE.Object3D();
            let index = 0;

            for (let x = 0; x < size; x++) {
                for (let y = 0; y < size; y++) {
                    const alive = grid[x][y];
                    
                    if (alive) {
                        dummy.position.set(
                            x - size / 2,
                            y - size / 2,
                            0
                        );
                        dummy.updateMatrix();
                        cellMaterial.setColorAt(index, new THREE.Color(getNeonColor(x, y, 0, time)));
                        cellMaterial.emissive = new THREE.Color(getNeonColor(x, y, 0, time));
                        
                        if (state.glowEnabled) {
                            cellMaterial.emissiveIntensity = 0.5 + Math.sin(time * 2 + x * 0.1) * 0.3;
                        }
                    } else {
                        dummy.position.set(x - size / 2, y - size / 2, 0);
                        dummy.scale.set(0, 0, 0);
                        dummy.updateMatrix();
                    }

                    cellMaterial.setMatrixAt(index, dummy.matrix);
                    index++;
                }
            }

            cellMaterial.instanceMatrix.needsUpdate = true;
            cellMaterial.color.needsUpdate = true;
        }

        // Camera controls
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        let cameraDistance = state.gridSize * 10;

        canvas.addEventListener('mousedown', (e) => {
            if (e.button === 0) {
                isDragging = true;
                previousMousePosition = { x: e.clientX, y: e.clientY };
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDragging) return;

            const deltaX = e.clientX - previousMousePosition.x;
            const deltaY = e.clientY - previousMousePosition.y;

            // Rotate camera
            const spherical = new THREE.Spherical();
            spherical.setFromVector3(camera.position);
            spherical.theta -= deltaX * 0.005;
            spherical.phi -= deltaY * 0.005;
            spherical.phi = Math.max(0.1, Math.min(Math.PI - 0.1, spherical.phi));
            
            camera.position.setFromSpherical(spherical);
            camera.lookAt(0, 0, 0);

            previousMousePosition = { x: e.clientX, y: e.clientY };
        });

        canvas.addEventListener('mouseup', () => isDragging = false);
        canvas.addEventListener('mouseleave', () => isDragging = false);

        canvas.addEventListener('wheel', (e) => {
            cameraDistance += e.deltaY * 0.01;
            cameraDistance = Math.max(state.gridSize, Math.min(200, cameraDistance));
            
            const spherical = new THREE.Spherical();
            spherical.setFromVector3(camera.position);
            camera.position.setLength(cameraDistance);
        });

        // Click to toggle cell
        canvas.addEventListener('click', (e) => {
            if (isDragging) return;

            const rect = canvas.getBoundingClientRect();
            const mouseX = ((e.clientX - rect.left) / rect.width) * state.gridSize - state.gridSize / 2;
            const mouseY = ((e.clientY - rect.top) / rect.height) * state.gridSize - state.gridSize / 2;

            if (mouseX >= 0 && mouseX < state.gridSize && mouseY >= 0 && mouseY < state.gridSize) {
                grid[Math.floor(mouseX)][Math.floor(mouseY)] = 
                    grid[Math.floor(mouseX)][Math.floor(mouseY)] ? 0 : 1;
            }
        });

        // UI updates
        function updateUI() {
            document.getElementById('frame-count').textContent = state.frameCount;
            document.getElementById('population').textContent = state.population;
            document.getElementById('born-rule').textContent = state.bornRule;
            document.getElementById('survive-rule').textContent = 
                `[${state.surviveMin}, ${state.surviveMax}]`;
            document.getElementById('fps').textContent = state.speed;
        }

        // Event listeners
        document.getElementById('btn-pause').addEventListener('click', () => {
            state.paused = !state.paused;
            document.getElementById('btn-pause').textContent = state.paused ? 'Resume' : 'Pause';
        });

        document.getElementById('btn-random').addEventListener('click', randomizeGrid);
        document.getElementById('btn-clear').addEventListener('click', clearGrid);

        document.getElementById('grid-size').addEventListener('input', (e) => {
            state.gridSize = parseInt(e.target.value);
            initGrid();
        });

        document.getElementById('speed').addEventListener('input', (e) => {
            state.speed = parseInt(e.target.value);
        });

        document.getElementById('born-rule-slider').addEventListener('input', (e) => {
            state.bornRule = parseInt(e.target.value);
        });

        document.getElementById('survive-min').addEventListener('input', (e) => {
            state.surviveMin = parseInt(e.target.value);
        });

        document.getElementById('survive-max').addEventListener('input', (e) => {
            state.surviveMax = parseInt(e.target.value);
        });

        document.getElementById('toggle-glow').addEventListener('click', (e) => {
            state.glowEnabled = !state.glowEnabled;
            e.target.classList.toggle('active');
        });

        document.getElementById('toggle-scanlines').addEventListener('click', (e) => {
            state.scanlinesEnabled = !state.scanlinesEnabled;
            e.target.classList.toggle('active');
            document.getElementById('scanlines').style.display = 
                state.scanlinesEnabled ? 'block' : 'none';
        });

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                state.paused = !state.paused;
                document.getElementById('btn-pause').textContent = state.paused ? 'Resume' : 'Pause';
            } else if (e.code === 'KeyR') {
                randomizeGrid();
            } else if (e.code === 'KeyC') {
                clearGrid();
            }
        });

        // Window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation loop
        let lastFrameTime = 0;
        function animate(time) {
            requestAnimationFrame(animate);

            const delta = time - lastFrameTime;
            const fpsInterval = 1000 / state.speed;

            if (delta > fpsInterval || state.paused) {
                lastFrameTime = time - (delta % fpsInterval);

                if (!state.paused) {
                    updateGrid();
                    state.frameCount++;
                    
                    // Update camera distance based on grid size
                    if (cameraDistance !== state.gridSize * 10) {
                        cameraDistance = state.gridSize * 10;
                        camera.position.setLength(cameraDistance);
                    }
                }

                updateCellMeshes(time / 1000);
                updateUI();
            }

            renderer.render(scene, camera);
        }

        // Initialize and start
        document.getElementById('loading').style.display = 'none';
        initGrid();
        animate(0);
    </script>
</body>
</html>
