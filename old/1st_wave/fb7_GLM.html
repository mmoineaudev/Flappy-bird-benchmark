<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #333;
            font-family: Arial, sans-serif;
        }
        canvas {
            border: 4px solid #4a4a4a;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="400" height="600"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game state
        let gameRunning = false;
        let score = 0;
        let highScore = localStorage.getItem('flappyHighScore') || 0;

        // Bird properties
        const bird = {
            x: 80,
            y: 300,
            width: 34,
            height: 26,
            velocity: 0,
            gravity: 0.5,
            jump: 9,
            radius: 15
        };

        // Pipe properties
        const pipes = [];
        const pipeWidth = 70;
        const pipeGap = 160;
        const pipeSpeed = 3;
        let pipeSpawnTimer = 0;
        const pipeSpawnInterval = 100;

        // Ground
        const groundHeight = 80;
        let groundOffset = 0;

        // Colors
        const colors = {
            sky: '#70c5ce',
            ground: '#ded895',
            grass: '#73bf2e',
            bird: '#e67e22',
            pipe: '#2ecc71',
            pipeBorder: '#27ae60',
            text: '#fff',
            white: '#fff'
        };

        function drawBird() {
            ctx.fillStyle = colors.bird;
            ctx.beginPath();
            ctx.ellipse(bird.x, bird.y, bird.radius, bird.radius * 0.8, 0, 0, Math.PI * 2);
            ctx.fill();

            // Wing
            ctx.fillStyle = '#f39c12';
            ctx.beginPath();
            const wingY = bird.y + 5 + Math.sin(Date.now() / 50) * 3;
            ctx.ellipse(bird.x - 5, wingY, 10, 6, -0.3, 0, Math.PI * 2);
            ctx.fill();

            // Eye
            ctx.fillStyle = colors.white;
            ctx.beginPath();
            ctx.arc(bird.x + 5, bird.y - 3, 6, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(bird.x + 7, bird.y - 3, 3, 0, Math.PI * 2);
            ctx.fill();

            // Beak
            ctx.fillStyle = '#e74c3c';
            ctx.beginPath();
            ctx.moveTo(bird.x + 12, bird.y + 3);
            ctx.lineTo(bird.x + 22, bird.y + 5);
            ctx.lineTo(bird.x + 12, bird.y + 7);
            ctx.fill();
        }

        function drawPipe(pipe) {
            // Top pipe
            ctx.fillStyle = colors.pipe;
            ctx.fillRect(pipe.x, 0, pipeWidth, pipe.topHeight);

            // Top pipe cap
            ctx.fillStyle = colors.pipeBorder;
            ctx.fillRect(pipe.x - 5, pipe.topHeight - 25, pipeWidth + 10, 25);

            // Bottom pipe
            ctx.fillStyle = colors.pipe;
            const bottomY = pipe.topHeight + pipeGap;
            ctx.fillRect(pipe.x, bottomY, pipeWidth, canvas.height - bottomY - groundHeight);

            // Bottom pipe cap
            ctx.fillStyle = colors.pipeBorder;
            ctx.fillRect(pipe.x - 5, bottomY, pipeWidth + 10, 25);

            // Pipe borders
            ctx.strokeStyle = colors.pipeBorder;
            ctx.lineWidth = 3;
            ctx.strokeRect(pipe.x, 0, pipeWidth, pipe.topHeight);
            ctx.strokeRect(pipe.x, bottomY, pipeWidth, canvas.height - bottomY - groundHeight);
        }

        function drawGround() {
            ctx.fillStyle = colors.ground;
            ctx.fillRect(0, canvas.height - groundHeight, canvas.width, groundHeight);

            // Grass
            ctx.fillStyle = colors.grass;
            ctx.fillRect(0, canvas.height - groundHeight, canvas.width, 15);

            // Ground pattern
            ctx.strokeStyle = '#cbb968';
            ctx.lineWidth = 2;
            for (let i = 0; i < canvas.width / 20 + 1; i++) {
                const x = (i * 20 - groundOffset) % (canvas.width + 20) - 20;
                ctx.beginPath();
                ctx.moveTo(x, canvas.height - groundHeight + 15);
                ctx.lineTo(x + 10, canvas.height - groundHeight + 30);
                ctx.stroke();
            }
        }

        function drawBackground() {
            // Sky gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height - groundHeight);
            gradient.addColorStop(0, '#87CEEB');
            gradient.addColorStop(1, colors.sky);
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height - groundHeight);

            // Clouds
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            const cloudOffset = (Date.now() / 50) % (canvas.width + 200);
            drawCloud(100 - cloudOffset % (canvas.width + 200), 80, 0.8);
            drawCloud(300 + cloudOffset % (canvas.width + 200), 120, 0.6);
            drawCloud(500 - cloudOffset % (canvas.width + 200), 60, 0.7);
        }

        function drawCloud(x, y, scale) {
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(scale, scale);
            ctx.beginPath();
            ctx.arc(0, 0, 30, 0, Math.PI * 2);
            ctx.arc(40, -10, 35, 0, Math.PI * 2);
            ctx.arc(80, 0, 30, 0, Math.PI * 2);
            ctx.arc(20, 20, 25, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        function drawScore() {
            ctx.fillStyle = colors.text;
            ctx.font = 'bold 48px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(score, canvas.width / 2, 80);

            ctx.font = '24px Arial';
            ctx.fillStyle = '#333';
            ctx.fillText('High Score: ' + highScore, canvas.width / 2, 110);
        }

        function drawStartScreen() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = colors.white;
            ctx.font = 'bold 48px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('FLAPPY BIRD', canvas.width / 2, canvas.height / 2 - 40);

            ctx.font = '24px Arial';
            ctx.fillText('Click or press Space to start', canvas.width / 2, canvas.height / 2 + 20);
            ctx.fillText('Press R to restart', canvas.width / 2, canvas.height / 2 + 50);
        }

        function drawGameOver() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = colors.white;
            ctx.font = 'bold 48px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 50);

            ctx.font = '32px Arial';
            ctx.fillText('Score: ' + score, canvas.width / 2, canvas.height / 2);
            ctx.fillText('High Score: ' + highScore, canvas.width / 2, canvas.height / 2 + 40);

            ctx.font = '20px Arial';
            ctx.fillText('Click to play again', canvas.width / 2, canvas.height / 2 + 90);
        }

        function updateBird() {
            bird.velocity += bird.gravity;
            bird.y += bird.velocity;

            // Keep bird on screen
            if (bird.y < 0) {
                bird.y = 0;
                bird.velocity = 0;
            }

            // Check ground collision
            if (bird.y + bird.height / 2 > canvas.height - groundHeight) {
                gameOver();
            }
        }

        function spawnPipe() {
            const minHeight = 50;
            const maxHeight = canvas.height - groundHeight - pipeGap - 50;
            const topHeight = Math.floor(Math.random() * (maxHeight - minHeight + 1) + minHeight);
            pipes.push({
                x: canvas.width,
                topHeight: topHeight,
                passed: false
            });
        }

        function updatePipes() {
            for (let i = pipes.length - 1; i >= 0; i--) {
                pipes[i].x -= pipeSpeed;

                // Score when passing pipe
                if (!pipes[i].passed && pipes[i].x + pipeWidth < bird.x) {
                    pipes[i].passed = true;
                    score++;
                }

                // Remove pipes that have gone off-screen
                if (pipes[i].x + pipeWidth < 0) {
                    pipes.splice(i, 1);
                }
            }
        }

        function checkCollision() {
            for (let pipe of pipes) {
                // Bird hitbox (slightly smaller for fairness)
                const birdLeft = bird.x - bird.radius + 4;
                const birdRight = bird.x + bird.radius - 4;
                const birdTop = bird.y - bird.radius + 4;
                const birdBottom = bird.y + bird.radius - 4;

                // Check top pipe
                if (birdRight > pipe.x && birdLeft < pipe.x + pipeWidth) {
                    if (birdTop < pipe.topHeight) {
                        return true;
                    }
                }

                // Check bottom pipe
                if (birdRight > pipe.x && birdLeft < pipe.x + pipeWidth) {
                    if (birdBottom > pipe.topHeight + pipeGap) {
                        return true;
                    }
                }
            }
            return false;
        }

        function jump() {
            if (gameRunning) {
                bird.velocity = -bird.jump;
            }
        }

        function startGame() {
            gameRunning = true;
            score = 0;
            pipes.length = 0;
            bird.y = 300;
            bird.velocity = 0;
            pipeSpawnTimer = 0;
        }

        function gameOver() {
            gameRunning = false;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('flappyHighScore', highScore);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBackground();
            drawGround();
            pipes.forEach(pipe => drawPipe(pipe));
            drawBird();
            if (gameRunning) {
                drawScore();
            } else if (score > 0) {
                drawGameOver();
            } else {
                drawStartScreen();
            }
        }

        function update() {
            if (gameRunning) {
                updateBird();
                updatePipes();
                pipeSpawnTimer++;

                if (pipeSpawnTimer >= pipeSpawnInterval) {
                    spawnPipe();
                    pipeSpawnTimer = 0;
                }

                if (checkCollision()) {
                    gameOver();
                }
            }

            // Update ground offset for animation
            groundOffset = (groundOffset + pipeSpeed) % 20;
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Event listeners
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'ArrowUp') {
                e.preventDefault();
                if (!gameRunning && score > 0) {
                    startGame();
                } else {
                    jump();
                }
            }
            if (e.code === 'KeyR') {
                startGame();
            }
        });

        canvas.addEventListener('click', () => {
            if (!gameRunning && score > 0) {
                startGame();
            } else {
                jump();
            }
        });

        // Start game loop
        gameLoop();
    </script>
</body>
</html>
