<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #gameContainer {
            position: relative;
            border: 4px solid #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        #score {
            position: absolute;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 48px;
            font-weight: bold;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }
        #startScreen, #gameOverScreen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #fff;
        }
        #startScreen h1, #gameOverScreen h1 {
            font-size: 36px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }
        #startScreen p, #gameOverScreen p {
            font-size: 18px;
            margin-bottom: 20px;
            opacity: 0.9;
        }
        .btn {
            pointer-events: auto;
            padding: 12px 30px;
            font-size: 20px;
            background: linear-gradient(180deg, #4CAF50 0%, #45a049 100%);
            color: #fff;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(76, 175, 80, 0.4);
        }
        #gameOverScreen .finalScore {
            font-size: 24px;
            margin-bottom: 10px;
            color: #FFD700;
        }
        #highScore {
            font-size: 18px;
            color: #FF6B6B;
            margin-bottom: 20px;
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <div id="ui">
            <div id="score" class="hidden">0</div>
            <div id="startScreen">
                <h1>Flappy Bird</h1>
                <p>Press Space, Click, or Tap to flap</p>
                <button class="btn" id="startBtn">Play</button>
            </div>
            <div id="gameOverScreen" class="hidden">
                <h1>Game Over!</h1>
                <p class="finalScore">Score: <span id="finalScoreValue">0</span></p>
                <p id="highScore">Best: <span id="bestScoreValue">0</span></p>
                <button class="btn" id="restartBtn">Play Again</button>
            </div>
        </div>
    </div>

    <script>
        // Game constants
        const GRAVITY = 0.5;
        const FLAP_STRENGTH = -8;
        const PIPE_SPEED = 3;
        const PIPE_SPAWN_INTERVAL = 1500;
        const PIPE_GAP = 140;
        const PIPE_WIDTH = 60;
        const BIRD_SIZE = 30;
        const GROUND_HEIGHT = 50;

        // Canvas setup
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // UI elements
        const scoreDisplay = document.getElementById('score');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const finalScoreValue = document.getElementById('finalScoreValue');
        const bestScoreValue = document.getElementById('bestScoreValue');

        // Game state
        let bird = { x: 150, y: 300, velocity: 0 };
        let pipes = [];
        let score = 0;
        let highScore = localStorage.getItem('flappyHighScore') || 0;
        let isPlaying = false;
        let isGameOver = false;
        let lastPipeSpawn = 0;
        let animationFrameId;

        // Audio context for sound effects
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        // Sound effects
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            switch(type) {
                case 'flap':
                    osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                    osc.start(audioCtx.currentTime);
                    osc.stop(audioCtx.currentTime + 0.1);
                    break;
                case 'score':
                    osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                    osc.start(audioCtx.currentTime);
                    osc.stop(audioCtx.currentTime + 0.1);
                    break;
                case 'hit':
                    osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.2);
                    gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                    osc.start(audioCtx.currentTime);
                    osc.stop(audioCtx.currentTime + 0.2);
                    break;
            }
        }

        // Initialize game
        function initGame() {
            bird = { x: 150, y: 300, velocity: 0 };
            pipes = [];
            score = 0;
            isGameOver = false;
            lastPipeSpawn = Date.now();
            scoreDisplay.textContent = '0';
            scoreDisplay.classList.remove('hidden');
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
        }

        // Spawn a new pipe pair
        function spawnPipe() {
            const minHeight = 50;
            const maxHeight = canvas.height - GROUND_HEIGHT - PIPE_GAP - minHeight;
            const topHeight = Math.random() * (maxHeight - minHeight) + minHeight;
            
            pipes.push({
                x: canvas.width,
                topHeight: topHeight,
                bottomY: topHeight + PIPE_GAP,
                passed: false
            });
        }

        // Update game state
        function update() {
            // Apply gravity to bird
            bird.velocity += GRAVITY;
            bird.y += bird.velocity;

            // Check if bird hits ground or ceiling
            if (bird.y + BIRD_SIZE >= canvas.height - GROUND_HEIGHT || bird.y <= 0) {
                gameOver();
                return;
            }

            // Spawn pipes
            if (Date.now() - lastPipeSpawn > PIPE_SPAWN_INTERVAL) {
                spawnPipe();
                lastPipeSpawn = Date.now();
            }

            // Update pipes
            for (let i = pipes.length - 1; i >= 0; i--) {
                const pipe = pipes[i];
                pipe.x -= PIPE_SPEED;

                // Remove off-screen pipes
                if (pipe.x + PIPE_WIDTH < 0) {
                    pipes.splice(i, 1);
                    continue;
                }

                // Check collision with pipes
                const birdLeft = bird.x;
                const birdRight = bird.x + BIRD_SIZE;
                const birdTop = bird.y;
                const birdBottom = bird.y + BIRD_SIZE;

                // Top pipe collision
                if (birdRight > pipe.x && birdLeft < pipe.x + PIPE_WIDTH) {
                    if (birdTop < pipe.topHeight || birdBottom > pipe.bottomY) {
                        gameOver();
                        return;
                    }
                }

                // Score when passing pipe
                if (!pipe.passed && birdLeft > pipe.x + PIPE_WIDTH) {
                    pipe.passed = true;
                    score++;
                    scoreDisplay.textContent = score.toString();
                    playSound('score');
                }
            }
        }

        // Draw game
        function draw() {
            // Clear canvas
            ctx.fillStyle = '#87CEEB';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw bird (simple rectangle with eye)
            ctx.fillStyle = '#FFD700';
            ctx.fillRect(bird.x, bird.y, BIRD_SIZE, BIRD_SIZE);
            
            // Bird eye
            ctx.fillStyle = '#000';
            ctx.fillRect(bird.x + BIRD_SIZE - 8, bird.y + 4, 4, 4);
            
            // Bird beak
            ctx.fillStyle = '#FF6347';
            ctx.fillRect(bird.x + BIRD_SIZE - 4, bird.y + 10, 6, 6);

            // Draw pipes
            ctx.fillStyle = '#4CAF50';
            for (const pipe of pipes) {
                // Top pipe
                ctx.fillRect(pipe.x, 0, PIPE_WIDTH, pipe.topHeight);
                
                // Bottom pipe
                ctx.fillRect(pipe.x, pipe.bottomY, PIPE_WIDTH, canvas.height - GROUND_HEIGHT - pipe.bottomY);
                
                // Pipe caps
                ctx.fillStyle = '#45a049';
                ctx.fillRect(pipe.x - 5, pipe.topHeight - 20, PIPE_WIDTH + 10, 20);
                ctx.fillRect(pipe.x - 5, pipe.bottomY, PIPE_WIDTH + 10, 20);
                ctx.fillStyle = '#4CAF50';
            }

            // Draw ground
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(0, canvas.height - GROUND_HEIGHT, canvas.width, GROUND_HEIGHT);
            
            // Grass on top of ground
            ctx.fillStyle = '#228B22';
            ctx.fillRect(0, canvas.height - GROUND_HEIGHT, canvas.width, 10);
        }

        // Game loop
        function gameLoop() {
            if (!isPlaying || isGameOver) return;
            
            update();
            if (!isGameOver) {
                draw();
                animationFrameId = requestAnimationFrame(gameLoop);
            }
        }

        // Start game
        function startGame() {
            initGame();
            isPlaying = true;
            playSound('flap');
            bird.velocity = FLAP_STRENGTH;
            gameLoop();
        }

        // Game over
        function gameOver() {
            isGameOver = true;
            isPlaying = false;
            playSound('hit');
            
            // Update high score
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('flappyHighScore', highScore);
            }
            
            finalScoreValue.textContent = score;
            bestScoreValue.textContent = highScore;
            
            gameOverScreen.classList.remove('hidden');
            scoreDisplay.classList.add('hidden');
        }

        // Flap action
        function flap() {
            if (!isPlaying) return;
            bird.velocity = FLAP_STRENGTH;
            playSound('flap');
        }

        // Event listeners
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);
        
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (!isPlaying && !isGameOver) {
                    startGame();
                } else if (isPlaying) {
                    flap();
                } else if (isGameOver) {
                    startGame();
                }
            }
        });
        
        canvas.addEventListener('click', () => {
            if (!isPlaying && !isGameOver) {
                startGame();
            } else if (isPlaying) {
                flap();
            }
        });
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (!isPlaying && !isGameOver) {
                startGame();
            } else if (isPlaying) {
                flap();
            }
        });

        // Initial draw
        draw();
        
        // Show initial high score if exists
        if (highScore > 0) {
            bestScoreValue.textContent = highScore;
        }
    </script>
</body>
</html>
