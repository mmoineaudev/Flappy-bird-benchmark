<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #333;
            font-family: Arial, sans-serif;
        }
        canvas {
            border: 4px solid #333;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game state
        let gameRunning = false;
        let score = 0;
        let highScore = localStorage.getItem('flappyHighScore') || 0;

        // Bird
        const bird = {
            x: 80,
            y: 300,
            width: 34,
            height: 26,
            velocity: 0,
            gravity: 0.5,
            jump: -9,
            rotation: 0
        };

        // Pipes
        let pipes = [];
        const pipeWidth = 70;
        const pipeGap = 170;
        let pipeSpawnTimer = 0;
        const pipeSpawnInterval = 100;

        // Ground
        const groundHeight = 80;

        // Input
        function handleInput(e) {
            if (e.type === 'keydown' && e.code !== 'Space') return;
            if (e.type === 'touchstart') e.preventDefault();

            if (!gameRunning) {
                startGame();
            } else {
                bird.velocity = bird.jump;
            }
        }

        document.addEventListener('keydown', handleInput);
        canvas.addEventListener('click', handleInput);
        canvas.addEventListener('touchstart', handleInput);

        function startGame() {
            gameRunning = true;
            score = 0;
            bird.y = 300;
            bird.velocity = 0;
            pipes = [];
            pipeSpawnTimer = 0;
            gameLoop();
        }

        function spawnPipe() {
            const minHeight = 50;
            const maxHeight = canvas.height - groundHeight - pipeGap - minHeight;
            const topHeight = Math.random() * (maxHeight - minHeight) + minHeight;

            pipes.push({
                x: canvas.width,
                topHeight: topHeight,
                bottomY: topHeight + pipeGap,
                passed: false
            });
        }

        function update() {
            // Bird physics
            bird.velocity += bird.gravity;
            bird.y += bird.velocity;

            // Bird rotation based on velocity
            bird.rotation = Math.min(Math.max(bird.velocity * 3, -30), 90);

            // Pipe spawning
            pipeSpawnTimer++;
            if (pipeSpawnTimer >= pipeSpawnInterval) {
                spawnPipe();
                pipeSpawnTimer = 0;
            }

            // Update pipes
            pipes.forEach(pipe => {
                pipe.x -= 3;

                // Score
                if (!pipe.passed && pipe.x + pipeWidth < bird.x) {
                    score++;
                    pipe.passed = true;
                }
            });

            // Remove off-screen pipes
            pipes = pipes.filter(pipe => pipe.x + pipeWidth > -50);

            // Ground collision
            if (bird.y + bird.height > canvas.height - groundHeight) {
                gameOver();
            }

            // Ceiling
            if (bird.y < 0) {
                bird.y = 0;
                bird.velocity = 0;
            }
        }

        function checkCollision() {
            for (let pipe of pipes) {
                // Bird hitbox (slightly smaller for fairness)
                const birdLeft = bird.x + 5;
                const birdRight = bird.x + bird.width - 5;
                const birdTop = bird.y + 5;
                const birdBottom = bird.y + bird.height - 5;

                // Pipe hitboxes
                const pipeLeft = pipe.x;
                const pipeRight = pipe.x + pipeWidth;
                const topPipeBottom = pipe.topHeight + 10;
                const bottomPipeTop = pipe.bottomY - 10;

                if (birdRight > pipeLeft && birdLeft < pipeRight) {
                    if (birdTop < topPipeBottom || birdBottom > bottomPipeTop) {
                        return true;
                    }
                }
            }
            return false;
        }

        function gameOver() {
            gameRunning = false;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('flappyHighScore', highScore);
            }

            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#fff';
            ctx.font = 'bold 48px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('Game Over', canvas.width / 2, canvas.height / 2 - 40);

            ctx.font = '24px Arial';
            ctx.fillText('Score: ' + score, canvas.width / 2, canvas.height / 2 + 10);
            ctx.fillText('Best: ' + highScore, canvas.width / 2, canvas.height / 2 + 50);

            ctx.fillStyle = '#4CAF50';
            ctx.font = '20px Arial';
            ctx.fillText('Click or press Space to restart', canvas.width / 2, canvas.height / 2 + 90);

            ctx.restore();
        }

        function draw() {
            // Clear
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Sky gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#87CEEB');
            gradient.addColorStop(1, '#E0F6FF');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw pipes
            pipes.forEach(pipe => {
                // Pipe gradient
                const pipeGradient = ctx.createLinearGradient(pipe.x, 0, pipe.x + pipeWidth, 0);
                pipeGradient.addColorStop(0, '#2ECC71');
                pipeGradient.addColorStop(0.5, '#27AE60');
                pipeGradient.addColorStop(1, '#1E8449');

                // Top pipe
                ctx.fillStyle = pipeGradient;
                ctx.fillRect(pipe.x, 0, pipeWidth, pipe.topHeight);

                // Bottom pipe
                ctx.fillStyle = pipeGradient;
                ctx.fillRect(pipe.x, pipe.bottomY, pipeWidth, canvas.height - pipe.bottomY - groundHeight);

                // Pipe caps
                ctx.fillStyle = '#27AE60';
                ctx.fillRect(pipe.x - 5, pipe.topHeight - 30, pipeWidth + 10, 30);
                ctx.fillRect(pipe.x - 5, pipe.bottomY, pipeWidth + 10, 30);
            });

            // Draw ground
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(0, canvas.height - groundHeight, canvas.width, groundHeight);
            ctx.fillStyle = '#228B22';
            ctx.fillRect(0, canvas.height - groundHeight, canvas.width, 20);

            // Draw bird
            ctx.save();
            ctx.translate(bird.x + bird.width / 2, bird.y + bird.height / 2);
            ctx.rotate(bird.rotation * Math.PI / 180);

            // Body
            ctx.fillStyle = '#F4D03F';
            ctx.beginPath();
            ctx.ellipse(0, 0, bird.width / 2, bird.height / 2, 0, 0, Math.PI * 2);
            ctx.fill();

            // Wing
            ctx.fillStyle = '#E67E22';
            ctx.beginPath();
            ctx.ellipse(-5, 3, 10, 8, -0.3, 0, Math.PI * 2);
            ctx.fill();

            // Eye
            ctx.fillStyle = '#FFF';
            ctx.beginPath();
            ctx.arc(8, -5, 6, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(10, -5, 3, 0, Math.PI * 2);
            ctx.fill();

            // Beak
            ctx.fillStyle = '#E74C3C';
            ctx.beginPath();
            ctx.moveTo(12, 0);
            ctx.lineTo(22, 3);
            ctx.lineTo(12, 6);
            ctx.closePath();
            ctx.fill();

            ctx.restore();

            // Score
            ctx.fillStyle = '#FFF';
            ctx.font = 'bold 48px Arial';
            ctx.textAlign = 'center';
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 4;
            ctx.strokeText(score, canvas.width / 2, 60);
            ctx.fillText(score, canvas.width / 2, 60);

            // High score
            ctx.font = '20px Arial';
            ctx.fillText('High: ' + highScore, 60, 30);

            // Start message
            if (!gameRunning) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = '#FFF';
                ctx.font = 'bold 36px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('Click or press Space', canvas.width / 2, canvas.height / 2 - 20);
                ctx.fillText('to start', canvas.width / 2, canvas.height / 2 + 20);
            }
        }

        function gameLoop() {
            if (!gameRunning) return;

            update();
            draw();

            if (gameRunning && checkCollision()) {
                gameOver();
                return;
            }

            requestAnimationFrame(gameLoop);
        }

        // Initial draw
        draw();
    </script>
</body>
</html>
