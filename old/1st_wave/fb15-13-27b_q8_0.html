<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flappy Bird</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    
    .game-container {
      position: relative;
      border: 3px solid #fff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }
    
    canvas {
      display: block;
      background: linear-gradient(180deg, #5c94fc 0%, #87ceeb 100%);
    }
    
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      font-size: 24px;
    }
    
    .overlay.hidden {
      display: none;
    }
    
    .overlay h1 {
      font-size: 48px;
      margin-bottom: 20px;
      color: #ffd93d;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
    }
    
    .overlay p {
      font-size: 18px;
      margin-bottom: 10px;
      color: #fff;
    }
    
    .score-display {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 32px;
      font-weight: bold;
      color: #fff;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
      z-index: 10;
    }
    
    .final-score {
      font-size: 36px;
      color: #ffd93d;
      margin-bottom: 10px;
    }
    
    .best-score {
      font-size: 20px;
      color: #aaa;
    }
    
    .instructions {
      margin-top: 20px;
      font-size: 14px;
      color: #ccc;
      text-align: center;
      line-height: 1.6;
    }
    
    .restart-btn {
      margin-top: 20px;
      padding: 12px 30px;
      font-size: 20px;
      background: #4CAF50;
      color: #fff;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      transition: transform 0.2s, background 0.2s;
    }
    
    .restart-btn:hover {
      background: #45a049;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="game-container">
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <div class="score-display">0</div>
    
    <div class="overlay" id="startScreen">
      <h1>Flappy Bird</h1>
      <p>Press Space, Click, or Tap to Start</p>
      <div class="instructions">
        Press Space/Click/Tap to flap<br>
        Avoid the pipes<br>
        Score points by passing through
      </div>
    </div>
    
    <div class="overlay hidden" id="gameOverScreen">
      <h1>Game Over!</h1>
      <p class="final-score">Score: 0</p>
      <p class="best-score">Best: 0</p>
      <button class="restart-btn">Play Again</button>
    </div>
  </div>

  <script>
    // Game constants
    const GRAVITY = 0.5;
    const FLAP_STRENGTH = -8;
    const PIPE_SPEED = 3;
    const PIPE_SPAWN_RATE = 100;
    const PIPE_GAP = 120;
    const PIPE_WIDTH = 60;
    const BIRD_SIZE = 30;
    const GROUND_HEIGHT = 50;
    
    // Game state
    let canvas, ctx;
    let bird = { y: 300, velocity: 0 };
    let pipes = [];
    let score = 0;
    let bestScore = 0;
    let frameCount = 0;
    let gameState = 'start'; // 'start', 'playing', 'gameover'
    
    // Initialize game
    function init() {
      canvas = document.getElementById('gameCanvas');
      ctx = canvas.getContext('2d');
      
      // Load best score from localStorage
      const savedBest = localStorage.getItem('flappyBirdBest');
      if (savedBest) bestScore = parseInt(savedBest, 10);
      
      // Event listeners
      document.addEventListener('keydown', (e) => {
        if (e.code === 'Space') handleInput();
      });
      
      canvas.addEventListener('click', handleInput);
      canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        handleInput();
      });
      
      document.querySelector('.restart-btn').addEventListener('click', restartGame);
      
      // Start game loop
      requestAnimationFrame(gameLoop);
    }
    
    function handleInput() {
      if (gameState === 'start') {
        startGame();
      } else if (gameState === 'playing') {
        bird.velocity = FLAP_STRENGTH;
      } else if (gameState === 'gameover') {
        restartGame();
      }
    }
    
    function startGame() {
      gameState = 'playing';
      document.getElementById('startScreen').classList.add('hidden');
      resetGame();
    }
    
    function restartGame() {
      gameState = 'playing';
      document.getElementById('gameOverScreen').classList.add('hidden');
      resetGame();
    }
    
    function resetGame() {
      bird = { y: canvas.height / 2, velocity: 0 };
      pipes = [];
      score = 0;
      frameCount = 0;
      updateScoreDisplay();
    }
    
    function gameOver() {
      gameState = 'gameover';
      
      // Update best score
      if (score > bestScore) {
        bestScore = score;
        localStorage.setItem('flappyBirdBest', bestScore);
      }
      
      // Show game over screen
      document.getElementById('gameOverScreen').classList.remove('hidden');
      document.querySelector('.final-score').textContent = `Score: ${score}`;
      document.querySelector('.best-score').textContent = `Best: ${bestScore}`;
    }
    
    function spawnPipe() {
      const minPipeHeight = 50;
      const maxPipeHeight = canvas.height - GROUND_HEIGHT - PIPE_GAP - minPipeHeight;
      const topHeight = Math.random() * (maxPipeHeight - minPipeHeight) + minPipeHeight;
      
      pipes.push({
        x: canvas.width,
        topHeight: topHeight,
        passed: false
      });
    }
    
    function update() {
      if (gameState !== 'playing') return;
      
      // Apply gravity to bird
      bird.velocity += GRAVITY;
      bird.y += bird.velocity;
      
      // Spawn pipes
      frameCount++;
      if (frameCount % PIPE_SPAWN_RATE === 0) {
        spawnPipe();
      }
      
      // Update pipes
      for (let i = pipes.length - 1; i >= 0; i--) {
        let pipe = pipes[i];
        pipe.x -= PIPE_SPEED;
        
        // Check if bird passed pipe
        if (!pipe.passed && pipe.x + PIPE_WIDTH < bird.x) {
          pipe.passed = true;
          score++;
          updateScoreDisplay();
        }
        
        // Remove off-screen pipes
        if (pipe.x + PIPE_WIDTH < 0) {
          pipes.splice(i, 1);
        }
      }
      
      // Check collisions
      checkCollisions();
    }
    
    function checkCollisions() {
      // Ceiling collision
      if (bird.y <= 0) {
        gameOver();
        return;
      }
      
      // Ground collision
      if (bird.y + BIRD_SIZE >= canvas.height - GROUND_HEIGHT) {
        gameOver();
        return;
      }
      
      // Pipe collisions
      for (let pipe of pipes) {
        const birdX = canvas.width / 2;
        
        // Check if bird is within pipe's horizontal range
        if (birdX + BIRD_SIZE / 2 > pipe.x && birdX - BIRD_SIZE / 2 < pipe.x + PIPE_WIDTH) {
          // Check if bird hits top or bottom pipe
          if (bird.y < pipe.topHeight || bird.y + BIRD_SIZE > pipe.topHeight + PIPE_GAP) {
            gameOver();
            return;
          }
        }
      }
    }
    
    function updateScoreDisplay() {
      document.querySelector('.score-display').textContent = score;
    }
    
    function draw() {
      // Clear canvas
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // Draw background gradient
      const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
      gradient.addColorStop(0, '#5c94fc');
      gradient.addColorStop(1, '#87ceeb');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // Draw clouds
      drawClouds();
      
      // Draw pipes
      ctx.fillStyle = '#4a9f36';
      ctx.strokeStyle = '#2d5a1f';
      ctx.lineWidth = 2;
      
      for (let pipe of pipes) {
        // Top pipe
        ctx.fillRect(pipe.x, 0, PIPE_WIDTH, pipe.topHeight);
        ctx.strokeRect(pipe.x, 0, PIPE_WIDTH, pipe.topHeight);
        
        // Bottom pipe
        const bottomY = pipe.topHeight + PIPE_GAP;
        const bottomHeight = canvas.height - GROUND_HEIGHT - bottomY;
        ctx.fillRect(pipe.x, bottomY, PIPE_WIDTH, bottomHeight);
        ctx.strokeRect(pipe.x, bottomY, PIPE_WIDTH, bottomHeight);
      }
      
      // Draw ground
      ctx.fillStyle = '#8b4513';
      ctx.fillRect(0, canvas.height - GROUND_HEIGHT, canvas.width, GROUND_HEIGHT);
      
      // Draw grass on top of ground
      ctx.fillStyle = '#228b22';
      ctx.fillRect(0, canvas.height - GROUND_HEIGHT, canvas.width, 10);
      
      // Draw bird
      const birdX = canvas.width / 2;
      drawBird(birdX, bird.y);
    }
    
    function drawClouds() {
      ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
      
      // Draw some simple clouds
      const clouds = [
        { x: 50, y: 80, size: 20 },
        { x: 150, y: 120, size: 25 },
        { x: 280, y: 60, size: 18 },
        { x: 350, y: 100, size: 22 }
      ];
      
      for (let cloud of clouds) {
        ctx.beginPath();
        ctx.arc(cloud.x, cloud.y, cloud.size, 0, Math.PI * 2);
        ctx.arc(cloud.x + cloud.size * 0.8, cloud.y + cloud.size * 0.3, cloud.size * 0.7, 0, Math.PI * 2);
        ctx.arc(cloud.x - cloud.size * 0.8, cloud.y + cloud.size * 0.3, cloud.size * 0.7, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    
    function drawBird(x, y) {
      // Bird body
      ctx.fillStyle = '#ffd93d';
      ctx.beginPath();
      ctx.arc(x, y, BIRD_SIZE / 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#e6b800';
      ctx.lineWidth = 2;
      ctx.stroke();
      
      // Eye
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(x + 8, y - 8, 8, 0, Math.PI * 2);
      ctx.fill();
      
      // Pupil
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(x + 10, y - 8, 3, 0, Math.PI * 2);
      ctx.fill();
      
      // Wing
      ctx.fillStyle = '#ffed66';
      ctx.beginPath();
      ctx.ellipse(x - 8, y + 2, 8, 5, Math.PI / 4, 0, Math.PI * 2);
      ctx.fill();
      
      // Beak
      ctx.fillStyle = '#ff6b6b';
      ctx.beginPath();
      ctx.moveTo(x + 12, y + 2);
      ctx.lineTo(x + 22, y + 5);
      ctx.lineTo(x + 12, y + 8);
      ctx.closePath();
      ctx.fill();
    }
    
    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }
    
    // Start the game
    init();
  </script>
</body>
</html>
