<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Invaders</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #000;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #gameCanvas {
            border: 4px solid #0f0;
            background: #000;
            box-shadow: 0 0 30px rgba(0,255,0,0.3);
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            color: #0f0;
            font-size: 18px;
            text-shadow: 0 0 10px #0f0;
            pointer-events: none;
        }
        #startScreen, #gameOverScreen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #0f0;
            text-shadow: 0 0 10px #0f0;
        }
        #gameOverScreen {
            display: none;
        }
        h1 {
            font-size: 48px;
            margin-bottom: 20px;
            letter-spacing: 5px;
        }
        p {
            font-size: 16px;
            margin-bottom: 10px;
            color: #fff;
        }
        .btn {
            background: transparent;
            border: 2px solid #0f0;
            border-radius: 5px;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            color: #0f0;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.2s;
            font-family: 'Courier New', monospace;
        }
        .btn:hover {
            background: #0f0;
            color: #000;
            box-shadow: 0 0 20px #0f0;
        }
        .controls {
            margin-top: 20px;
            font-size: 14px;
            color: #888;
        }
        #lives {
            display: flex;
            gap: 5px;
        }
        .life {
            color: #0f0;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="600" height="700"></canvas>
        <div id="ui">
            <div>
                <div>SCORE: <span id="score">0</span></div>
                <div>HIGH SCORE: <span id="highScore">0</span></div>
            </div>
            <div id="lives"></div>
        </div>
        <div id="startScreen">
            <h1>SPACE<br>INVADERS</h1>
            <p>DEFEND EARTH FROM THE ALIEN INVASION</p>
            <button class="btn" onclick="startGame()">START GAME</button>
            <div class="controls">
                <p>← → to move</p>
                <p>SPACE to shoot</p>
            </div>
        </div>
        <div id="gameOverScreen">
            <h1>GAME OVER</h1>
            <p id="finalScore">SCORE: 0</p>
            <button class="btn" onclick="resetGame()">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const livesEl = document.getElementById('lives');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreEl = document.getElementById('finalScore');

        // Game constants
        const PLAYER_WIDTH = 40;
        const PLAYER_HEIGHT = 20;
        const BULLET_WIDTH = 4;
        const BULLET_HEIGHT = 12;
        const ALIEN_WIDTH = 30;
        const ALIEN_HEIGHT = 25;
        const ALIEN_ROWS = 5;
        const ALIEN_COLS = 10;
        const ALIEN_PADDING = 15;
        const ALIEN_OFFSET_TOP = 60;
        const ALIEN_OFFSET_LEFT = 50;
        const BULLET_SPEED = 7;
        const PLAYER_SPEED = 6;
        const ALIEN_SPEED_INITIAL = 1;
        const ALIEN_DROP = 20;

        // Game state
        let player, bullets, aliens, alienDirection, alienSpeed, alienBullets, gameOver, score, highScore, gameRunning, alienMoveTimer, alienShootTimer, keys;

        // Load high score
        highScore = parseInt(localStorage.getItem('spaceInvadersHighScore')) || 0;
        highScoreEl.textContent = highScore;

        class Player {
            constructor() {
                this.x = canvas.width / 2 - PLAYER_WIDTH / 2;
                this.y = canvas.height - 50;
                this.width = PLAYER_WIDTH;
                this.height = PLAYER_HEIGHT;
                this.color = '#0f0';
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;

                // Main body
                ctx.fillRect(this.x, this.y, this.width, this.height);

                // Turret
                ctx.fillRect(this.x + this.width / 2 - 6, this.y - 10, 12, 10);

                // Details
                ctx.fillStyle = '#000';
                ctx.fillRect(this.x + 8, this.y + 4, 6, 6);
                ctx.fillRect(this.x + this.width - 14, this.y + 4, 6, 6);

                ctx.shadowBlur = 0;
            }

            update() {
                if (keys['ArrowLeft'] && this.x > 0) {
                    this.x -= PLAYER_SPEED;
                }
                if (keys['ArrowRight'] && this.x + this.width < canvas.width) {
                    this.x += PLAYER_SPEED;
                }
            }

            reset() {
                this.x = canvas.width / 2 - PLAYER_WIDTH / 2;
            }
        }

        class Bullet {
            constructor(x, y, isAlien = false) {
                this.x = x;
                this.y = y;
                this.width = BULLET_WIDTH;
                this.height = BULLET_HEIGHT;
                this.isAlien = isAlien;
                this.active = true;
            }

            draw() {
                ctx.fillStyle = this.isAlien ? '#ff0' : '#0f0';
                ctx.shadowBlur = 5;
                ctx.shadowColor = ctx.fillStyle;
                ctx.fillRect(this.x, this.y, this.width, this.height);
                ctx.shadowBlur = 0;
            }

            update() {
                this.y += this.isAlien ? BULLET_SPEED * 0.6 : -BULLET_SPEED;
                this.active = this.y > -this.height && this.y < canvas.height;
            }
        }

        class Alien {
            constructor(x, y, row) {
                this.x = x;
                this.y = y;
                this.width = ALIEN_WIDTH;
                this.height = ALIEN_HEIGHT;
                this.row = row;
                this.active = true;
                this.animationFrame = 0;
            }

            draw() {
                if (!this.active) return;

                const colors = ['#ff0', '#f80', '#f00', '#0ff', '#0ff'];
                ctx.fillStyle = colors[this.row];

                // Alien body (pixel art style)
                const px = this.x;
                const py = this.y;

                ctx.shadowBlur = 5;
                ctx.shadowColor = ctx.fillStyle;

                // Head
                ctx.fillRect(px + 4, py, 22, 8);
                // Eyes
                ctx.fillStyle = '#000';
                ctx.fillRect(px + 8, py + 3, 3, 3);
                ctx.fillRect(px + 19, py + 3, 3, 3);
                // Body
                ctx.fillStyle = colors[this.row];
                ctx.fillRect(px + 2, py + 8, 26, 8);
                // Arms
                ctx.fillRect(px, py + 8, 4, 6);
                ctx.fillRect(px + 26, py + 8, 4, 6);
                // Legs
                ctx.fillRect(px + 4, py + 16, 8, 4);
                ctx.fillRect(px + 18, py + 16, 8, 4);

                ctx.shadowBlur = 0;
            }

            reset(x, y) {
                this.x = x;
                this.y = y;
                this.active = true;
            }
        }

        function init() {
            player = new Player();
            bullets = [];
            alienBullets = [];
            aliens = [];
            alienDirection = 1;
            alienSpeed = ALIEN_SPEED_INITIAL;
            gameOver = false;
            score = 0;
            keys = {};

            // Create aliens
            for (let row = 0; row < ALIEN_ROWS; row++) {
                for (let col = 0; col < ALIEN_COLS; col++) {
                    const x = ALIEN_OFFSET_LEFT + col * (ALIEN_WIDTH + ALIEN_PADDING);
                    const y = ALIEN_OFFSET_TOP + row * (ALIEN_HEIGHT + ALIEN_PADDING);
                    aliens.push(new Alien(x, y, row));
                }
            }

            updateLives();
        }

        function startGame() {
            init();
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            gameRunning = true;
            gameLoop();
        }

        function resetGame() {
            startGame();
        }

        function updateLives() {
            livesEl.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                const life = document.createElement('span');
                life.className = 'life';
                life.textContent = '★';
                livesEl.appendChild(life);
            }
        }

        function shoot() {
            if (gameRunning && !gameOver) {
                bullets.push(new Bullet(player.x + player.width / 2 - BULLET_WIDTH / 2, player.y));
            }
        }

        function alienShoot() {
            const activeAliens = aliens.filter(a => a.active);
            if (activeAliens.length > 0) {
                const shooter = activeAliens[Math.floor(Math.random() * activeAliens.length)];
                alienBullets.push(new Bullet(shooter.x + shooter.width / 2, shooter.y + shooter.height, true));
            }
        }

        function checkCollisions() {
            // Bullet collision with aliens
            for (let i = bullets.length - 1; i >= 0; i--) {
                const bullet = bullets[i];
                if (!bullet.active) continue;

                for (let j = aliens.length - 1; j >= 0; j--) {
                    const alien = aliens[j];
                    if (!alien.active) continue;

                    if (bullet.x < alien.x + alien.width &&
                        bullet.x + bullet.width > alien.x &&
                        bullet.y < alien.y + alien.height &&
                        bullet.y + bullet.height > alien.y) {
                        alien.active = false;
                        bullet.active = false;
                        score += (ALIEN_ROWS - alien.row) * 10;
                        scoreEl.textContent = score;

                        // Increase speed based on remaining aliens
                        const remaining = aliens.filter(a => a.active).length;
                        alienSpeed = ALIEN_SPEED_INITIAL + (50 - remaining) * 0.05;

                        // Check if all aliens defeated
                        if (remaining === 0) {
                            levelComplete();
                        }
                        break;
                    }
                }
                if (bullet.active === false) bullets.splice(i, 1);
            }

            // Alien bullet collision with player
            for (let i = alienBullets.length - 1; i >= 0; i--) {
                const bullet = alienBullets[i];
                if (!bullet.active) continue;

                if (bullet.x < player.x + player.width &&
                    bullet.x + bullet.width > player.x &&
                    bullet.y < player.y + player.height &&
                    bullet.y + bullet.height > player.y) {
                    bullet.active = false;
                    playerHit();
                }
                if (bullet.active === false) alienBullets.splice(i, 1);
            }

            // Alien collision with player or bottom
            for (const alien of aliens) {
                if (!alien.active) continue;
                if (alien.y + alien.height >= player.y || alien.y + alien.height >= canvas.height) {
                    gameOver = true;
                }
            }
        }

        function playerHit() {
            alienBullets = [];
            gameOver = true;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('spaceInvadersHighScore', highScore);
                highScoreEl.textContent = highScore;
            }
            finalScoreEl.textContent = `SCORE: ${score}`;
            gameOverScreen.style.display = 'block';
        }

        function levelComplete() {
            alienSpeed = Math.max(ALIEN_SPEED_INITIAL, alienSpeed * 0.9);
            alienBullets = [];
            bullets = [];
            for (let i = 0; i < aliens.length; i++) {
                const col = i % ALIEN_COLS;
                const row = Math.floor(i / ALIEN_COLS);
                const x = ALIEN_OFFSET_LEFT + col * (ALIEN_WIDTH + ALIEN_PADDING);
                const y = ALIEN_OFFSET_TOP + row * (ALIEN_HEIGHT + ALIEN_PADDING);
                aliens[i].reset(x, y);
            }
            alienSpeed += 0.3;
            alienMoveTimer = 0;
            alienShootTimer = 0;
        }

        function drawStars() {
            ctx.fillStyle = '#fff';
            for (let i = 0; i < 50; i++) {
                const x = (i * 137) % canvas.width;
                const y = (i * 241) % canvas.height;
                const size = (i % 3) + 1;
                ctx.fillRect(x, y, size, size);
            }
        }

        function gameLoop() {
            if (!gameRunning) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawStars();

            if (gameOver) return;

            // Update player
            player.update();
            player.draw();

            // Move aliens
            alienMoveTimer++;
            const moveInterval = Math.max(5, Math.floor(30 - alienSpeed * 10));
            if (alienMoveTimer >= moveInterval) {
                alienMoveTimer = 0;
                let hitEdge = false;
                for (const alien of aliens) {
                    if (!alien.active) continue;
                    if ((alienDirection === 1 && alien.x + alien.width >= canvas.width - 10) ||
                        (alienDirection === -1 && alien.x <= 10)) {
                        hitEdge = true;
                        break;
                    }
                }
                if (hitEdge) {
                    alienDirection *= -1;
                    for (const alien of aliens) {
                        if (alien.active) alien.y += ALIEN_DROP;
                    }
                } else {
                    for (const alien of aliens) {
                        if (alien.active) alien.x += alienSpeed * alienDirection;
                    }
                }
            }

            // Alien shooting
            alienShootTimer++;
            const shootInterval = Math.max(30, Math.floor(100 - alienSpeed * 20));
            if (alienShootTimer >= shootInterval) {
                alienShootTimer = 0;
                if (Math.random() < 0.3) alienShoot();
            }

            // Update and draw aliens
            let activeAlienCount = 0;
            for (const alien of aliens) {
                alien.draw();
                if (alien.active) activeAlienCount++;
            }

            // Update and draw bullets
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].update();
                bullets[i].draw();
            }
            for (let i = alienBullets.length - 1; i >= 0; i--) {
                alienBullets[i].update();
                alienBullets[i].draw();
            }

            checkCollisions();
            requestAnimationFrame(gameLoop);
        }

        // Controls
        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'Space') {
                e.preventDefault();
                shoot();
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });

        // Touch controls
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const x = touch.clientX - rect.left;
            if (x < canvas.width / 2) {
                keys['ArrowLeft'] = true;
            } else {
                keys['ArrowRight'] = true;
            }
            shoot();
        });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            keys['ArrowLeft'] = false;
            keys['ArrowRight'] = false;
        });

        // Initialize
        init();
        drawStars();
        player.draw();
    </script>
</body>
</html>
