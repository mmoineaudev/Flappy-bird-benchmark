<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Courier New', monospace;
        }
        #gameContainer {
            position: relative;
            border: 4px solid #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(100, 200, 255, 0.3);
        }
        canvas {
            display: block;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 100%);
        }
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
        }
        #ui.hidden {
            display: none;
        }
        .screen-title {
            font-size: 32px;
            color: #FFD700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }
        .screen-subtitle {
            font-size: 16px;
            color: #fff;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        #scoreDisplay {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 10;
        }
        .score-val {
            color: #FFD700;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <div id="scoreDisplay">SCORE: <span id="scoreVal" class="score-val">0</span></div>
        <div id="ui">
            <div id="startScreen">
                <div class="screen-title">FLAPPY BIRD</div>
                <div class="screen-subtitle">Press SPACE or Click to Start</div>
            </div>
            <div id="gameOverScreen" style="display: none;">
                <div class="screen-title">GAME OVER</div>
                <div style="font-size: 18px; color: #fff; margin: 10px 0;">Score: <span id="finalScore" class="score-val">0</span></div>
                <div style="font-size: 18px; color: #fff; margin: 5px 0;">Best: <span id="bestScore" class="score-val">0</span></div>
                <div class="screen-subtitle" style="margin-top: 20px;">Press SPACE or Click to Restart</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const ui = document.getElementById('ui');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const scoreVal = document.getElementById('scoreVal');
        const finalScore = document.getElementById('finalScore');
        const bestScore = document.getElementById('bestScore');

        // Game constants
        const GRAVITY = 0.5;
        const FLAP_STRENGTH = -8;
        const PIPE_SPEED = 3;
        const PIPE_SPAWN_RATE = 90;
        const PIPE_GAP = 120;
        const PIPE_WIDTH = 60;
        const BIRD_SIZE = 30;

        // Game state
        let gameState = 'start'; // start, playing, gameOver
        let score = 0;
        let bestScore = localStorage.getItem('flappyBirdBest') || 0;
        let frameCount = 0;

        // Bird object
        let bird = {
            x: 150,
            y: 300,
            velocity: 0,
            rotation: 0
        };

        // Pipes array
        let pipes = [];

        // Background clouds
        let clouds = [];
        for (let i = 0; i < 5; i++) {
            clouds.push({
                x: Math.random() * canvas.width,
                y: Math.random() * (canvas.height / 2),
                speed: 0.5 + Math.random() * 0.5,
                size: 30 + Math.random() * 40
            });
        }

        // Initialize clouds
        function initClouds() {
            clouds = [];
            for (let i = 0; i < 5; i++) {
                clouds.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * (canvas.height / 2),
                    speed: 0.5 + Math.random() * 0.5,
                    size: 30 + Math.random() * 40
                });
            }
        }

        // Spawn a new pipe
        function spawnPipe() {
            const minHeight = 50;
            const maxHeight = canvas.height - PIPE_GAP - minHeight;
            const topHeight = Math.random() * (maxHeight - minHeight) + minHeight;
            
            pipes.push({
                x: canvas.width,
                topHeight: topHeight,
                bottomY: topHeight + PIPE_GAP,
                passed: false
            });
        }

        // Reset game
        function resetGame() {
            bird = { x: 150, y: 300, velocity: 0, rotation: 0 };
            pipes = [];
            score = 0;
            frameCount = 0;
            scoreVal.textContent = '0';
            initClouds();
            spawnPipe();
        }

        // Update game state
        function update() {
            if (gameState !== 'playing') return;

            // Bird physics
            bird.velocity += GRAVITY;
            bird.y += bird.velocity;
            
            // Rotation based on velocity
            bird.rotation = Math.min(bird.velocity * 3, 90) * (Math.PI / 180);

            // Frame counter
            frameCount++;

            // Spawn pipes
            if (frameCount % PIPE_SPAWN_RATE === 0) {
                spawnPipe();
            }

            // Move and remove pipes
            for (let i = pipes.length - 1; i >= 0; i--) {
                pipes[i].x -= PIPE_SPEED;

                // Score when passing pipe
                if (!pipes[i].passed && pipes[i].x + PIPE_WIDTH < bird.x) {
                    score++;
                    scoreVal.textContent = score;
                    pipes[i].passed = true;
                }

                // Remove off-screen pipes
                if (pipes[i].x + PIPE_WIDTH < 0) {
                    pipes.splice(i, 1);
                }

                // Collision detection
                if (
                    bird.x + BIRD_SIZE / 2 > pipes[i].x &&
                    bird.x - BIRD_SIZE / 2 < pipes[i].x + PIPE_WIDTH &&
                    (bird.y - BIRD_SIZE / 2 < pipes[i].topHeight ||
                     bird.y + BIRD_SIZE / 2 > pipes[i].bottomY)
                ) {
                    gameOver();
                }
            }

            // Ground/Ceiling collision
            if (bird.y + BIRD_SIZE / 2 >= canvas.height - 50 || 
                bird.y - BIRD_SIZE / 2 <= 0) {
                gameOver();
            }

            // Move clouds
            clouds.forEach(cloud => {
                cloud.x -= cloud.speed;
                if (cloud.x + cloud.size < -50) {
                    cloud.x = canvas.width + 50;
                }
            });
        }

        // Game over
        function gameOver() {
            gameState = 'gameOver';
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('flappyBirdBest', bestScore);
            }
            finalScore.textContent = score;
            bestScoreElem.textContent = bestScore;
            
            ui.classList.remove('hidden');
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'block';
        }

        // Flap action
        function flap() {
            if (gameState === 'start') {
                gameState = 'playing';
                ui.classList.add('hidden');
                resetGame();
            } else if (gameState === 'playing') {
                bird.velocity = FLAP_STRENGTH;
            } else if (gameState === 'gameOver') {
                gameState = 'start';
                ui.classList.remove('hidden');
                startScreen.style.display = 'block';
                gameOverScreen.style.display = 'none';
                resetGame();
            }
        }

        // Draw game
        function draw() {
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw sky gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#87CEEB');
            gradient.addColorStop(1, '#E0F6FF');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw clouds
            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            clouds.forEach(cloud => {
                ctx.beginPath();
                ctx.arc(cloud.x, cloud.y, cloud.size / 2, 0, Math.PI * 2);
                ctx.arc(cloud.x + cloud.size / 2, cloud.y - cloud.size / 4, cloud.size / 3, 0, Math.PI * 2);
                ctx.arc(cloud.x - cloud.size / 2, cloud.y - cloud.size / 4, cloud.size / 3, 0, Math.PI * 2);
                ctx.fill();
            });

            // Draw pipes
            ctx.fillStyle = '#2E7D32';
            ctx.strokeStyle = '#1B5E20';
            ctx.lineWidth = 3;
            
            pipes.forEach(pipe => {
                // Top pipe
                ctx.fillRect(pipe.x, 0, PIPE_WIDTH, pipe.topHeight);
                ctx.strokeRect(pipe.x, 0, PIPE_WIDTH, pipe.topHeight);
                
                // Pipe cap
                ctx.fillRect(pipe.x - 5, pipe.topHeight - 20, PIPE_WIDTH + 10, 20);
                ctx.strokeRect(pipe.x - 5, pipe.topHeight - 20, PIPE_WIDTH + 10, 20);

                // Bottom pipe
                ctx.fillRect(pipe.x, pipe.bottomY, PIPE_WIDTH, canvas.height - pipe.bottomY - 50);
                ctx.strokeRect(pipe.x, pipe.bottomY, PIPE_WIDTH, canvas.height - pipe.bottomY - 50);
                
                // Pipe cap
                ctx.fillRect(pipe.x - 5, pipe.bottomY, PIPE_WIDTH + 10, 20);
                ctx.strokeRect(pipe.x - 5, pipe.bottomY, PIPE_WIDTH + 10, 20);
            });

            // Draw ground
            ctx.fillStyle = '#8D6E63';
            ctx.fillRect(0, canvas.height - 50, canvas.width, 50);
            ctx.fillStyle = '#6D4C41';
            ctx.fillRect(0, canvas.height - 30, canvas.width, 20);

            // Draw bird
            ctx.save();
            ctx.translate(bird.x, bird.y);
            ctx.rotate(bird.rotation);
            
            // Bird body
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.arc(0, 0, BIRD_SIZE / 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#FFA000';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Eye
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(BIRD_SIZE / 4, -BIRD_SIZE / 4, 6, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(BIRD_SIZE / 4 + 2, -BIRD_SIZE / 4, 3, 0, Math.PI * 2);
            ctx.fill();

            // Beak
            ctx.fillStyle = '#FF6B6B';
            ctx.beginPath();
            ctx.moveTo(BIRD_SIZE / 2, 0);
            ctx.lineTo(BIRD_SIZE / 2 + 10, 5);
            ctx.lineTo(BIRD_SIZE / 2, 10);
            ctx.closePath();
            ctx.fill();

            // Wing
            ctx.fillStyle = '#FFA000';
            ctx.beginPath();
            ctx.ellipse(-5, 5, 8, 5, 0.5, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();

            // Best score element reference
            const bestScoreElem = document.getElementById('bestScore');
            bestScoreElem.textContent = bestScore;
        }

        // Game loop
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Input handlers
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                flap();
            }
        });

        canvas.addEventListener('click', flap);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            flap();
        });

        // Start game
        resetGame();
        gameLoop();
    </script>
</body>
</html>
