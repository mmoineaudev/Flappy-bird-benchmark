<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Courier New', monospace;
        }
        #gameContainer {
            position: relative;
        }
        canvas {
            border: 3px solid #4a9eff;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(74, 158, 255, 0.3);
        }
        #instructions {
            position: absolute;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            color: #4a9eff;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <div id="instructions">Press SPACE or CLICK to flap</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game constants
        const GRAVITY = 0.5;
        const FLAP_STRENGTH = -8;
        const PIPE_SPEED = 3;
        const PIPE_SPAWN_INTERVAL = 1500;
        const PIPE_GAP = 150;
        const PIPE_WIDTH = 60;

        // Game state
        let bird;
        let pipes = [];
        let score = 0;
        let highScore = 0;
        let gameRunning = false;
        let gameOver = false;
        let lastPipeSpawn = 0;

        // Bird object
        class Bird {
            constructor() {
                this.x = 80;
                this.y = canvas.height / 2;
                this.velocity = 0;
                this.radius = 15;
                this.rotation = 0;
            }

            flap() {
                this.velocity = FLAP_STRENGTH;
            }

            update() {
                this.velocity += GRAVITY;
                this.y += this.velocity;
                this.rotation = Math.min(Math.max(this.velocity * 3, -30), 90);
                
                // Floor collision
                if (this.y + this.radius > canvas.height - 20) {
                    this.y = canvas.height - 20 - this.radius;
                    return true;
                }
                
                // Ceiling collision
                if (this.y - this.radius < 0) {
                    this.y = this.radius;
                    this.velocity = 0;
                }
                
                return false;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation * Math.PI / 180);
                
                // Body
                const gradient = ctx.createRadialGradient(-5, -5, 2, 0, 0, this.radius);
                gradient.addColorStop(0, '#ffeb3b');
                gradient.addColorStop(1, '#fbc02d');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fill();
                
                // Eye
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(7, -5, 6, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = 'black';
                ctx.beginPath();
                ctx.arc(9, -5, 3, 0, Math.PI * 2);
                ctx.fill();
                
                // Beak
                ctx.fillStyle = '#ff5722';
                ctx.beginPath();
                ctx.moveTo(10, 2);
                ctx.lineTo(20, 5);
                ctx.lineTo(10, 8);
                ctx.fill();
                
                // Wing
                ctx.fillStyle = '#f9a825';
                ctx.beginPath();
                ctx.ellipse(-3, 5, 8, 5, -0.3, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }
        }

        // Pipe object
        class Pipe {
            constructor() {
                this.x = canvas.width;
                this.passed = false;
                const minHeight = 80;
                const maxTop = canvas.height - 20 - PIPE_GAP - minHeight;
                this.topHeight = Math.random() * (maxTop - minHeight) + minHeight;
                this.bottomY = this.topHeight + PIPE_GAP;
            }

            update() {
                this.x -= PIPE_SPEED;
            }

            draw() {
                // Top pipe
                const gradient = ctx.createLinearGradient(this.x, 0, this.x + PIPE_WIDTH, 0);
                gradient.addColorStop(0, '#4caf50');
                gradient.addColorStop(0.5, '#81c784');
                gradient.addColorStop(1, '#2e7d32');
                
                ctx.fillStyle = gradient;
                ctx.fillRect(this.x, 0, PIPE_WIDTH, this.topHeight);
                
                // Pipe cap (top)
                ctx.fillStyle = '#388e3c';
                ctx.fillRect(this.x - 3, this.topHeight - 20, PIPE_WIDTH + 6, 20);
                
                // Bottom pipe
                ctx.fillRect(this.x, this.bottomY, PIPE_WIDTH, canvas.height - this.bottomY - 20);
                
                // Pipe cap (bottom)
                ctx.fillStyle = '#388e3c';
                ctx.fillRect(this.x - 3, this.bottomY, PIPE_WIDTH + 6, 20);
                
                // Highlights
                ctx.fillStyle = 'rgba(255,255,255,0.2)';
                ctx.fillRect(this.x + 5, 0, 8, this.topHeight - 20);
                ctx.fillRect(this.x + 5, this.bottomY + 20, 8, canvas.height - this.bottomY - 40);
            }

            collidesWith(bird) {
                const left = this.x;
                const right = this.x + PIPE_WIDTH;
                const topBottom = this.topHeight;
                const bottomTop = this.bottomY;
                
                const birdLeft = bird.x - bird.radius;
                const birdRight = bird.x + bird.radius;
                const birdTop = bird.y - bird.radius;
                const birdBottom = bird.y + bird.radius;
                
                return (birdRight > left && birdLeft < right) &&
                       (birdTop < topBottom || birdBottom > bottomTop);
            }
        }

        // Ground
        function drawGround() {
            const gradient = ctx.createLinearGradient(0, canvas.height - 20, 0, canvas.height);
            gradient.addColorStop(0, '#8d6e63');
            gradient.addColorStop(1, '#5d4037');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, canvas.height - 20, canvas.width, 20);
            
            // Grass
            ctx.fillStyle = '#7cb342';
            ctx.fillRect(0, canvas.height - 25, canvas.width, 8);
            
            // Moving effect
            const offset = (Date.now() / 5) % 20;
            ctx.fillStyle = '#689f38';
            for (let i = -20; i < canvas.width; i += 20) {
                ctx.beginPath();
                ctx.moveTo(i - offset, canvas.height - 25);
                ctx.lineTo(i + 10 - offset, canvas.height);
                ctx.lineTo(i + 5 - offset, canvas.height);
                ctx.lineTo(i - 15 - offset, canvas.height - 25);
                ctx.fill();
            }
        }

        // Background
        function drawBackground() {
            // Sky gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#4fc3f7');
            gradient.addColorStop(1, '#b3e5fc');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Clouds
            ctx.fillStyle = 'rgba(255,255,255,0.8)';
            const cloudOffset = (Date.now() / 100) % 400;
            
            drawCloud(50 - cloudOffset, 80);
            drawCloud(250 - cloudOffset, 120);
            drawCloud(400 - cloudOffset, 60);
            drawCloud(600 - cloudOffset, 100);
        }

        function drawCloud(x, y) {
            if (x < -100) x += 800;
            ctx.beginPath();
            ctx.arc(x, y, 25, 0, Math.PI * 2);
            ctx.arc(x + 20, y - 10, 30, 0, Math.PI * 2);
            ctx.arc(x + 50, y, 25, 0, Math.PI * 2);
            ctx.arc(x + 30, y + 10, 20, 0, Math.PI * 2);
            ctx.fill();
        }

        // Score display
        function drawScore() {
            ctx.fillStyle = 'white';
            ctx.strokeStyle = 'black';
            ctx.lineWidth = 3;
            ctx.font = 'bold 48px "Courier New", monospace';
            ctx.textAlign = 'center';
            ctx.strokeText(score, canvas.width / 2, 60);
            ctx.fillText(score, canvas.width / 2, 60);
            
            if (gameOver) {
                ctx.font = 'bold 28px "Courier New", monospace';
                ctx.strokeText('Game Over', canvas.width / 2, 200);
                ctx.fillText('Game Over', canvas.width / 2, 200);
                
                ctx.font = '20px "Courier New", monospace';
                ctx.strokeText('Score: ' + score, canvas.width / 2, 250);
                ctx.fillText('Score: ' + score, canvas.width / 2, 250);
                
                ctx.strokeText('Best: ' + highScore, canvas.width / 2, 290);
                ctx.fillText('Best: ' + highScore, canvas.width / 2, 290);
                
                ctx.font = '16px "Courier New", monospace';
                ctx.fillStyle = '#4a9eff';
                ctx.fillText('Press SPACE to restart', canvas.width / 2, 360);
            }
        }

        // Reset game
        function resetGame() {
            bird = new Bird();
            pipes = [];
            score = 0;
            gameOver = false;
            gameRunning = true;
            lastPipeSpawn = Date.now();
        }

        // Main game loop
        function gameLoop() {
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw background
            drawBackground();
            
            if (!gameRunning && !gameOver) {
                // Start screen
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = 'white';
                ctx.strokeStyle = 'black';
                ctx.lineWidth = 3;
                ctx.font = 'bold 36px "Courier New", monospace';
                ctx.textAlign = 'center';
                ctx.strokeText('Flappy Bird', canvas.width / 2, 200);
                ctx.fillText('Flappy Bird', canvas.width / 2, 200);
                
                ctx.font = '20px "Courier New", monospace';
                ctx.strokeText('Press SPACE to start', canvas.width / 2, 260);
                ctx.fillText('Press SPACE to start', canvas.width / 2, 260);
                
                ctx.font = '16px "Courier New", monospace';
                ctx.fillText('Avoid the green pipes!', canvas.width / 2, 300);
                
                drawGround();
                requestAnimationFrame(gameLoop);
                return;
            }
            
            // Spawn pipes
            if (Date.now() - lastPipeSpawn > PIPE_SPAWN_INTERVAL) {
                pipes.push(new Pipe());
                lastPipeSpawn = Date.now();
            }
            
            // Update and draw pipes
            for (let i = pipes.length - 1; i >= 0; i--) {
                pipes[i].update();
                pipes[i].draw();
                
                // Score
                if (!pipes[i].passed && pipes[i].x + PIPE_WIDTH < bird.x) {
                    score++;
                    pipes[i].passed = true;
                }
                
                // Remove off-screen pipes
                if (pipes[i].x + PIPE_WIDTH < 0) {
                    pipes.splice(i, 1);
                }
                
                // Collision
                if (pipes[i].collidesWith(bird)) {
                    gameOver = true;
                    gameRunning = false;
                    if (score > highScore) {
                        highScore = score;
                    }
                }
            }
            
            // Update and draw bird
            if (gameRunning && !gameOver) {
                const hitFloor = bird.update();
                if (hitFloor) {
                    gameOver = true;
                    gameRunning = false;
                    if (score > highScore) {
                        highScore = score;
                    }
                }
            }
            bird.draw();
            
            // Draw ground
            drawGround();
            
            // Draw score
            drawScore();
            
            requestAnimationFrame(gameLoop);
        }

        // Input handling
        function handleInput(e) {
            if (e.type === 'keydown' && e.code !== 'Space') return;
            if (e.type === 'keydown') e.preventDefault();
            
            if (!gameRunning && !gameOver) {
                resetGame();
            } else if (gameOver) {
                resetGame();
            } else if (gameRunning) {
                bird.flap();
            }
        }

        // Event listeners
        document.addEventListener('keydown', handleInput);
        canvas.addEventListener('click', handleInput);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleInput(e);
        });

        // Start the game
        resetGame();
        gameRunning = false;
        gameLoop();
    </script>
</body>
</html>
