<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird ZZZZ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #2c3e50;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #gameContainer {
            position: relative;
        }
        canvas {
            background: #70c5ce;
            border: 4px solid #1a1a1a;
            border-radius: 4px;
        }
        #scoreDisplay {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 36px;
            font-weight: bold;
            color: #1a1a1a;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: none;
        }
        #gameOver h2 {
            color: #c0392b;
            margin-bottom: 15px;
            font-size: 28px;
        }
        #gameOver p {
            color: #2c3e50;
            font-size: 18px;
            margin: 10px 0;
        }
        #restartBtn {
            margin-top: 20px;
            padding: 15px 40px;
            background: #27ae60;
            color: white;
            border: none;
            font-size: 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        #restartBtn:hover {
            background: #218c53;
        }
        #startMessage {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }
        #startMessage h1 {
            color: #2c3e50;
            font-size: 32px;
            margin-bottom: 10px;
        }
        #startMessage p {
            color: #7f8c8d;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <div id="scoreDisplay">0</div>
        <div id="startMessage">
            <h1>🐦 Flappy Bird</h1>
            <p>Press SPACE or click to start</p>
            <p>Don't hit the pipes!</p>
        </div>
        <div id="gameOver">
            <h2>Game Over!</h2>
            <p>Score: <span id="finalScore">0</span></p>
            <p>Best: <span id="bestScore">0</span></p>
            <button id="restartBtn">Play Again</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const gameOver = document.getElementById('gameOver');
        const startMessage = document.getElementById('startMessage');
        const finalScore = document.getElementById('finalScore');
        const bestScore = document.getElementById('bestScore');
        const restartBtn = document.getElementById('restartBtn');

        let bird = {
            x: 50,
            y: 300,
            width: 34,
            height: 24,
            velocity: 0,
            gravity: 0.6,
            jumpStrength: -10
        };

        let pipes = [];
        let score = 0;
        let gameRunning = false;
        let pipeGap = 140;
        let pipeSpeed = 3;

        function resetGame() {
            bird.y = 300;
            bird.velocity = 0;
            pipes = [];
            score = 0;
            scoreDisplay.textContent = score;
            scoreDisplay.style.display = 'block';
        }

        function createPipe() {
            const minPipeHeight = 50;
            const maxPipeHeight = canvas.height - pipeGap - minPipeHeight;
            const pipeHeight = Math.random() * (maxPipeHeight - minPipeHeight + 1) + minPipeHeight;
            
            pipes.push({
                x: canvas.width,
                topHeight: pipeHeight,
                bottomY: pipeHeight + pipeGap,
                width: 60
            });
        }

        function update() {
            if (!gameRunning) return;

            bird.velocity += bird.gravity;
            bird.y += bird.velocity;

            pipes.forEach(pipe => {
                pipe.x -= pipeSpeed;
            });

            pipes = pipes.filter(pipe => pipe.x + pipe.width > 0);

            if (pipes.length === 0 || pipes[0].x < canvas.width - 200) {
                createPipe();
            }

            for (let pipe of pipes) {
                if (bird.x + bird.width > pipe.x && 
                    bird.x < pipe.x + pipe.width &&
                    (bird.y < pipe.topHeight || bird.y + bird.height > pipe.bottomY)) {
                    endGame();
                    return;
                }
            }

            if (bird.y + bird.height > canvas.height || bird.y < 0) {
                endGame();
                return;
            }

            const scorePipe = pipes.find(p => 
                p.x + pipe.width > bird.x && p.x + pipe.width - pipeSpeed <= bird.x
            );
            if (scorePipe) {
                score++;
                scoreDisplay.textContent = score;
            }
        }

        function draw() {
            ctx.fillStyle = '#70c5ce';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#27ae60';
            pipes.forEach(pipe => {
                ctx.fillRect(pipe.x, 0, pipe.width, pipe.topHeight);
                ctx.fillRect(pipe.x, pipe.bottomY, pipe.width, canvas.height - pipe.bottomY);
                ctx.fillStyle = '#1e8e4e';
                ctx.fillRect(pipe.x + 5, 0, 5, pipe.topHeight);
                ctx.fillRect(pipe.x + 5, pipe.bottomY, 5, canvas.height - pipe.bottomY);
                ctx.fillStyle = '#27ae60';
            });

            ctx.fillStyle = '#f1c40f';
            ctx.beginPath();
            ctx.ellipse(bird.x + bird.width/2, bird.y + bird.height/2, bird.width/2, bird.height/2, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#e67e22';
            ctx.beginPath();
            ctx.arc(bird.x + bird.width/2 + 5, bird.y + bird.height/2 - 2, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(bird.x + bird.width/2 + 7, bird.y + bird.height/2 - 3, 2, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#000000';
            ctx.fillRect(bird.x + bird.width/2 + 8, bird.y + bird.height/2, bird.width/2, 3);
        }

        function gameLoop() {
            update();
            draw();
            if (gameRunning) {
                requestAnimationFrame(gameLoop);
            }
        }

        function jump() {
            if (!gameRunning && !gameOver.style.display || gameOver.style.display !== 'none') return;
            if (!gameRunning) {
                gameRunning = true;
                startMessage.style.display = 'none';
                resetGame();
                gameLoop();
                return;
            }
            bird.velocity = bird.jumpStrength;
        }

        function endGame() {
            gameRunning = false;
            const best = Math.max(score, parseInt(localStorage.getItem('flappyBirdBest') || '0'));
            localStorage.setItem('flappyBirdBest', best);
            finalScore.textContent = score;
            bestScore.textContent = best;
            scoreDisplay.style.display = 'none';
            gameOver.style.display = 'block';
        }

        restartBtn.addEventListener('click', () => {
            gameOver.style.display = 'none';
            resetGame();
            gameRunning = true;
            gameLoop();
        });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (gameRunning) jump();
                else if (startMessage.style.display !== 'none') jump();
            }
        });

        canvas.addEventListener('click', jump);
        canvas.addEventListener('touchstart', jump);

        resetGame();
        draw();
    </script>
</body>
</html>
