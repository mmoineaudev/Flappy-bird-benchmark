<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #70c5fc;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        #game-container {
            position: relative;
            width: 400px;
            height: 600px;
        }
        #game {
            width: 100%;
            height: 100%;
            background: #70c5fc;
            border: 4px solid #333;
            border-radius: 8px;
            overflow: hidden;
        }
        #score {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            color: #333;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #333;
            color: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            display: none;
        }
        #game-over h2 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        #game-over p {
            font-size: 16px;
            margin-bottom: 20px;
        }
        #restart-btn {
            background: #70c5fc;
            color: #333;
            border: none;
            padding: 12px 24px;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        #restart-btn:hover {
            background: #5ba9e8;
        }
        #start-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(51, 51, 51, 0.9);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            font-size: 18px;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game"></canvas>
        <div id="score">Score: 0</div>
        <div id="start-message">
            Press Space or Click to Start<br>
            <small>Press Space/Click to Jump</small>
        </div>
        <div id="game-over">
            <h2>Game Over!</h2>
            <p>Score: <span id="final-score">0</span></p>
            <button id="restart-btn">Play Again</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        canvas.width = 400;
        canvas.height = 600;

        // Game state
        let gameRunning = false;
        let gamePaused = false;
        let score = 0;
        let pipes = [];
        let pipeSpawnTimer = 0;

        // Bird
        let bird = {
            x: 50,
            y: 300,
            width: 30,
            height: 30,
            velocity: 0,
            gravity: 0.5,
            jumpStrength: -9
        };

        // Pipe configuration
        const pipeWidth = 60;
        const pipeGap = 150;
        const pipeSpeed = 3;
        const pipeSpawnRate = 60;

        function initGame() {
            bird.y = 300;
            bird.velocity = 0;
            pipes = [];
            score = 0;
            pipeSpawnTimer = 0;
            document.getElementById('score').textContent = 'Score: 0';
            document.getElementById('game-over').style.display = 'none';
            document.getElementById('start-message').style.display = 'none';
        }

        function drawBird() {
            ctx.fillStyle = '#ff6600';
            ctx.fillRect(bird.x, bird.y, bird.width, bird.height);
            // Beak
            ctx.fillStyle = '#ffcc00';
            ctx.fillRect(bird.x + 20, bird.y + 8, 8, 10);
            // Eye
            ctx.fillStyle: '#fff';
            ctx.fillRect(bird.x + 22, bird.y + 2, 6, 6);
            // Eye pupil
            ctx.fillStyle: '#333';
            ctx.fillRect(bird.x + 24, bird.y + 4, 3, 3);
        }

        function drawPipes() {
            ctx.fillStyle = '#228b22';
            pipes.forEach(pipe => {
                // Top pipe
                ctx.fillRect(pipe.x, 0, pipeWidth, pipe.topHeight);
                ctx.fillStyle: '#1a6b1a';
                ctx.fillRect(pipe.x, pipe.topHeight - 10, pipeWidth, 10);
                // Bottom pipe
                ctx.fillStyle: '#228b22';
                ctx.fillRect(pipe.x, pipe.bottomHeight, pipeWidth, canvas.height - pipe.bottomHeight);
                ctx.fillStyle: '#1a6b1a';
                ctx.fillRect(pipe.x, pipe.bottomHeight, pipeWidth, 10);
            });
        }

        function drawBackground() {
            // Sky
            ctx.fillStyle: '#70c5fc';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            // Clouds
            ctx.fillStyle: 'rgba(255, 255, 255, 0.7)';
            ctx.beginPath();
            ctx.arc(50, 50, 20, 0, Math.PI * 2);
            ctx.arc(70, 50, 25, 0, Math.PI * 2);
            ctx.arc(90, 50, 20, 0, Math.PI * 2);
            ctx.fill();
        }

        function update() {
            if (!gameRunning) return;

            // Update bird
            bird.velocity += bird.gravity;
            bird.y += bird.velocity;

            // Spawn pipes
            pipeSpawnTimer++;
            if (pipeSpawnTimer >= pipeSpawnRate) {
                pipeSpawnTimer = 0;
                const gapPosition = Math.random() * (canvas.height - pipeGap - 100) + 50;
                pipes.push({
                    x: canvas.width,
                    topHeight: gapPosition,
                    bottomHeight: gapPosition + pipeGap
                });
            }

            // Move pipes
            pipes.forEach((pipe, index) => {
                pipe.x -= pipeSpeed;
                // Check if pipe passed
                if (pipe.x + pipeWidth < 0) {
                    pipes.splice(index, 1);
                    score++;
                    document.getElementById('score').textContent = 'Score: ' + score;
                }
            });

            // Collision detection
            pipes.forEach(pipe => {
                if (
                    bird.x + bird.width > pipe.x &&
                    bird.x < pipe.x + pipeWidth &&
                    (bird.y < pipe.topHeight || bird.y + bird.height > pipe.bottomHeight)
                ) {
                    gameOver();
                }
            });

            // Floor collision
            if (bird.y + bird.height > canvas.height) {
                gameOver();
            }
        }

        function draw() {
            drawBackground();
            drawBird();
            drawPipes();
        }

        function gameLoop() {
            if (gameRunning) {
                update();
                draw();
            }
            if (gameRunning) {
                requestAnimationFrame(gameLoop);
            }
        }

        function jump() {
            if (gameRunning) {
                bird.velocity = bird.jumpStrength;
            }
        }

        function gameOver() {
            gameRunning = false;
            document.getElementById('final-score').textContent = score;
            document.getElementById('game-over').style.display = 'block';
        }

        function startGame() {
            initGame();
            gameRunning = true;
            gameLoop();
        }

        // Event listeners
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                if (!gameRunning && document.getElementById('game-over').style.display === 'none') {
                    startGame();
                } else if (gameRunning) {
                    jump();
                }
            }
        });

        canvas.addEventListener('click', () => {
            if (!gameRunning && document.getElementById('game-over').style.display === 'none') {
                startGame();
            } else if (gameRunning) {
                jump();
            }
        });

        document.getElementById('restart-btn').addEventListener('click', () => {
            startGame();
        });

        // Initial draw
        draw();
    </script>
</body>
</html>
