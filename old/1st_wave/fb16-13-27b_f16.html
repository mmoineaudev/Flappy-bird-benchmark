<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #game-container {
            position: relative;
            border: 4px solid #4a4e69;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        canvas {
            display: block;
            background: linear-gradient(to bottom, #6b93d9 0%, #b8c7ec 100%);
        }
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #start-screen, #game-over-screen {
            background: rgba(0,0,0,0.7);
            padding: 30px 50px;
            border-radius: 16px;
            text-align: center;
            color: white;
            pointer-events: auto;
        }
        .hidden {
            display: none !important;
        }
        h1 {
            font-size: 48px;
            margin-bottom: 10px;
            color: #ffd93d;
            text-shadow: 3px 3px 0 #c77d0c;
        }
        h2 {
            font-size: 32px;
            margin-bottom: 15px;
            color: #fff;
        }
        .score-display {
            font-size: 24px;
            margin: 10px 0;
        }
        .score-value {
            font-size: 36px;
            font-weight: bold;
            color: #ffd93d;
        }
        button {
            background: #4ecdc4;
            color: #1a1a2e;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            transition: transform 0.1s, background 0.2s;
        }
        button:hover {
            background: #45b7aa;
            transform: scale(1.05);
        }
        button:active {
            transform: scale(0.95);
        }
        #score {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 48px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            pointer-events: none;
        }
        #controls-hint {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas" width="400" height="600"></canvas>
        <div id="score" class="hidden">0</div>
        
        <div id="ui-overlay">
            <div id="start-screen">
                <h1>Flappy Bird</h1>
                <p style="margin-bottom: 20px; color: #ccc;">Press SPACE or Click to flap!</p>
                <button id="start-btn">Play</button>
            </div>
            
            <div id="game-over-screen" class="hidden">
                <h2>Game Over!</h2>
                <div class="score-display">Score: <span id="final-score" class="score-value">0</span></div>
                <div class="score-display">Best: <span id="best-score" class="score-value">0</span></div>
                <button id="restart-btn">Play Again</button>
            </div>
            
            <div id="controls-hint" class="hidden">SPACE or Click to flap</div>
        </div>
    </div>

    <script>
        // Game constants
        const CANVAS_WIDTH = 400;
        const CANVAS_HEIGHT = 600;
        const GRAVITY = 0.5;
        const FLAP_STRENGTH = -8;
        const PIPE_SPEED = 3;
        const PIPE_SPAWN_INTERVAL = 100;
        const PIPE_GAP = 150;
        const PIPE_MIN_Y = 100;
        const PIPE_MAX_Y = 450;
        const BIRD_X = 80;
        const GROUND_HEIGHT = 50;

        // Game state
        let canvas, ctx;
        let bird = { y: 300, velocity: 0, width: 34, height: 24 };
        let pipes = [];
        let score = 0;
        let bestScore = 0;
        let frameCount = 0;
        let gameState = 'start'; // start, playing, gameover
        let animationId;

        // Initialize game
        function init() {
            canvas = document.getElementById('game-canvas');
            ctx = canvas.getContext('2d');
            
            // Load best score from localStorage
            const saved = localStorage.getItem('flappyBestScore');
            bestScore = saved ? parseInt(saved) : 0;
            
            // Event listeners
            document.getElementById('start-btn').addEventListener('click', startGame);
            document.getElementById('restart-btn').addEventListener('click', startGame);
            document.addEventListener('keydown', handleInput);
            canvas.addEventListener('click', handleInput);
            canvas.addEventListener('touchstart', handleTouch);
            
            render();
        }

        function handleInput(e) {
            if (e.type === 'keydown' && e.code !== 'Space') return;
            if (e.type === 'touchstart') e.preventDefault();
            
            if (gameState === 'start' || gameState === 'gameover') {
                startGame();
            } else if (gameState === 'playing') {
                flap();
            }
        }

        function handleTouch(e) {
            if (gameState === 'start' || gameState === 'gameover') {
                startGame();
            } else if (gameState === 'playing') {
                flap();
            }
        }

        function startGame() {
            gameState = 'playing';
            bird.y = CANVAS_HEIGHT / 2;
            bird.velocity = FLAP_STRENGTH;
            pipes = [];
            score = 0;
            frameCount = 0;
            
            document.getElementById('score').classList.remove('hidden');
            document.getElementById('score').textContent = '0';
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-over-screen').classList.add('hidden');
            document.getElementById('controls-hint').classList.remove('hidden');
            
            if (animationId) cancelAnimationFrame(animationId);
            gameLoop();
        }

        function flap() {
            bird.velocity = FLAP_STRENGTH;
        }

        function update() {
            // Bird physics
            bird.velocity += GRAVITY;
            bird.y += bird.velocity;

            // Pipe spawning
            frameCount++;
            if (frameCount % PIPE_SPAWN_INTERVAL === 0) {
                const gapY = Math.random() * (PIPE_MAX_Y - PIPE_MIN_Y) + PIPE_MIN_Y;
                pipes.push({
                    x: CANVAS_WIDTH,
                    gapY: gapY,
                    passed: false
                });
            }

            // Update pipes
            pipes.forEach(pipe => {
                pipe.x -= PIPE_SPEED;
                
                // Score update
                if (!pipe.passed && pipe.x + 40 < BIRD_X) {
                    pipe.passed = true;
                    score++;
                    document.getElementById('score').textContent = score;
                }
            });

            // Remove off-screen pipes
            pipes = pipes.filter(pipe => pipe.x + 40 > 0);

            // Collision detection
            checkCollision();
        }

        function checkCollision() {
            // Ground/ceiling collision
            if (bird.y + bird.height >= CANVAS_HEIGHT - GROUND_HEIGHT || bird.y < 0) {
                gameOver();
                return;
            }

            // Pipe collision
            for (const pipe of pipes) {
                const pipeLeft = pipe.x;
                const pipeRight = pipe.x + 40;
                const pipeTopBottom = pipe.gapY;
                const pipeBottomTop = pipe.gapY + PIPE_GAP;

                const birdLeft = BIRD_X;
                const birdRight = BIRD_X + bird.width;
                const birdTop = bird.y;
                const birdBottom = bird.y + bird.height;

                // Check if bird overlaps with pipe horizontally
                if (birdRight > pipeLeft && birdLeft < pipeRight) {
                    // Check if bird hits top or bottom pipe
                    if (birdTop < pipeTopBottom || birdBottom > pipeBottomTop) {
                        gameOver();
                        return;
                    }
                }
            }
        }

        function gameOver() {
            gameState = 'gameover';
            
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('flappyBestScore', bestScore);
            }
            
            document.getElementById('final-score').textContent = score;
            document.getElementById('best-score').textContent = bestScore;
            document.getElementById('score').classList.add('hidden');
            document.getElementById('controls-hint').classList.add('hidden');
            document.getElementById('game-over-screen').classList.remove('hidden');
        }

        function render() {
            // Sky background
            ctx.fillStyle = '#6b93d9';
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT - GROUND_HEIGHT);
            
            // Ground
            ctx.fillStyle = '#8b4513';
            ctx.fillRect(0, CANVAS_HEIGHT - GROUND_HEIGHT, CANVAS_WIDTH, GROUND_HEIGHT);
            ctx.fillStyle = '#228b22';
            ctx.fillRect(0, CANVAS_HEIGHT - GROUND_HEIGHT, CANVAS_WIDTH, 10);

            // Pipes
            ctx.fillStyle = '#4ecdc4';
            ctx.strokeStyle = '#2c5f66';
            ctx.lineWidth = 2;
            
            for (const pipe of pipes) {
                // Top pipe
                const topPipeHeight = pipe.gapY - 20;
                ctx.fillRect(pipe.x, 0, 40, pipe.gapY - 20);
                ctx.strokeRect(pipe.x, 0, 40, pipe.gapY - 20);
                
                // Bottom pipe
                const bottomPipeHeight = CANVAS_HEIGHT - GROUND_HEIGHT - pipe.gapY - PIPE_GAP;
                ctx.fillRect(pipe.x, pipe.gapY + PIPE_GAP, 40, bottomPipeHeight);
                ctx.strokeRect(pipe.x, pipe.gapY + PIPE_GAP, 40, bottomPipeHeight);
            }

            // Bird
            ctx.fillStyle = '#ffd93d';
            ctx.beginPath();
            ctx.ellipse(BIRD_X + bird.width/2, bird.y + bird.height/2, bird.width/2, bird.height/2, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Bird beak
            ctx.fillStyle = '#c77d0c';
            ctx.beginPath();
            ctx.moveTo(BIRD_X + bird.width - 5, bird.y + bird.height/2 - 5);
            ctx.lineTo(BIRD_X + bird.width + 10, bird.y + bird.height/2);
            ctx.lineTo(BIRD_X + bird.width - 5, bird.y + bird.height/2 + 5);
            ctx.fill();
            
            // Bird eye
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(BIRD_X + bird.width - 12, bird.y + 8, 6, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(BIRD_X + bird.width - 10, bird.y + 8, 2, 0, Math.PI * 2);
            ctx.fill();
        }

        function gameLoop() {
            if (gameState !== 'playing') return;
            
            update();
            render();
            
            if (gameState === 'playing') {
                animationId = requestAnimationFrame(gameLoop);
            }
        }

        // Start
        init();
    </script>
</body>
</html>
