<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Flap - Space Adventure</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #000;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 80px rgba(100, 100, 255, 0.4), 0 0 150px rgba(150, 0, 255, 0.2);
        }
        #game-canvas {
            display: block;
        }
        #score-display {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 64px;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 30px #ff69b4, 0 0 60px #ff69b4;
            z-index: 10;
        }
        #floating-scores {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 12;
        }
        .floating-score {
            position: absolute;
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 10px #ffd700;
            animation: floatUp 1s ease-out forwards;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-50px) scale(1.5); }
        }
        #multiplier-display {
            position: absolute;
            top: 90px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            color: #00ffff;
            text-shadow: 0 0 20px #00ffff;
        }
        #powerup-display {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 18px;
            color: white;
            text-shadow: 0 0 10px currentColor;
        }
        #skin-display {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 16px;
            color: rgba(255,255,255,0.8);
        }
        #start-screen, #game-over-screen, #skin-select-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(10, 10, 30, 0.95);
            z-index: 20;
        }
        #game-over-screen, #skin-select-screen {
            display: none;
        }
        h1 {
            font-size: 60px;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #ff69b4, #00ffff, #ff69b4);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 3s ease infinite;
        }
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .stats {
            font-size: 26px;
            margin: 12px 0;
            color: #fff;
        }
        .stats span {
            color: #ff69b4;
            text-shadow: 0 0 15px #ff69b4;
        }
        button {
            padding: 18px 60px;
            font-size: 30px;
            background: linear-gradient(135deg, #ff69b4 0%, #00ffff 100%);
            border: none;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 30px rgba(255, 105, 180, 0.5);
            margin: 15px;
        }
        button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 50px rgba(255, 105, 180, 0.8);
        }
        .skin-grid {
            display: flex;
            gap: 20px;
            margin: 20px 0;
        }
        .skin-option {
            width: 80px;
            height: 80px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(255,255,255,0.05);
        }
        .skin-option:hover, .skin-option.selected {
            border-color: #00ffff;
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }
        .skin-option.locked {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .skin-icon {
            font-size: 32px;
        }
        .skin-name {
            font-size: 10px;
            margin-top: 5px;
        }
        .controls-hint {
            font-size: 14px;
            color: #888;
            margin-top: 20px;
        }
        .boss-warning {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 48px;
            color: #ff0000;
            text-shadow: 0 0 30px #ff0000;
            animation: bossPulse 0.5s ease infinite;
            display: none;
        }
        @keyframes bossPulse {
            0%, 100% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.1); }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas" width="800" height="450"></canvas>
        <div id="score-display">0</div>
        <div id="floating-scores"></div>
        <div id="multiplier-display">x1.0</div>
        <div id="powerup-display"></div>
        <div id="skin-display">🚀 Classic</div>
        <div id="boss-warning">⚠️ BOSS PIPE!</div>
        <div id="start-screen">
            <h1>🌟 COSMIC FLAP 🌟</h1>
            <p class="stats">Best: <span id="menu-best">0</span></p>
            <button id="start-btn">LAUNCH</button>
            <button id="skins-btn">🎨 SKINS</button>
            <p class="controls-hint">SPACE / Click to Fly | Hold for Turbo Fall | Collect 🌙 for power-ups</p>
        </div>
        <div id="skin-select-screen">
            <h1>CHOOSE YOUR SHIP</h1>
            <div class="skin-grid" id="skin-grid"></div>
            <button id="back-btn">BACK</button>
        </div>
        <div id="game-over-screen">
            <h1>MISSION ENDED</h1>
            <p class="stats">Score: <span id="final-score">0</span></p>
            <p class="stats">Best: <span id="best-score">0</span></p>
            <p class="stats">Multiplier: <span id="max-mult">x1.0</span></p>
            <button id="restart-btn">RETRY</button>
            <button id="menu-btn">MENU</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score-display');
        const floatingScores = document.getElementById('floating-scores');
        const multiplierDisplay = document.getElementById('multiplier-display');
        const powerupDisplay = document.getElementById('powerup-display');
        const skinDisplay = document.getElementById('skin-display');
        const bossWarning = document.getElementById('boss-warning');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const skinSelectScreen = document.getElementById('skin-select-screen');
        const skinGrid = document.getElementById('skin-grid');
        const finalScoreSpan = document.getElementById('final-score');
        const bestScoreSpan = document.getElementById('best-score');
        const maxMultSpan = document.getElementById('max-mult');
        const menuBestSpan = document.getElementById('menu-best');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');
        const menuBtn = document.getElementById('menu-btn');
        const skinsBtn = document.getElementById('skins-btn');
        const backBtn = document.getElementById('back-btn');

        let gameRunning = false;
        let score = 0;
        let bestScore = parseInt(localStorage.getItem('cosmicFlapBest') || '0');
        let multiplier = 1;
        let maxMultiplier = 1;
        let animationId;
        let particles = [];
        let stars = [];
        let screenShake = 0;
        let dayTime = 0;
        
        menuBestSpan.textContent = bestScore;

        // Skins system
        const skins = [
            { id: 'classic', icon: '🚀', name: 'Classic', color: '#00ffff', unlockScore: 0 },
            { id: 'golden', icon: '👑', name: 'Golden', color: '#ffd700', unlockScore: 50 },
            { id: 'crystal', icon: '💎', name: 'Crystal', color: '#ff69b4', unlockScore: 100 },
            { id: 'plasma', icon: '⚡', name: 'Plasma', color: '#00ff00', unlockScore: 200 },
            { id: 'void', icon: '🌑', name: 'Void', color: '#9370db', unlockScore: 300 }
        ];
        
        let selectedSkin = localStorage.getItem('cosmicFlapSkin') || 'classic';
        updateSkinDisplay();

        function updateSkinDisplay() {
            const skin = skins.find(s => s.id === selectedSkin);
            skinDisplay.textContent = `${skin.icon} ${skin.name}`;
        }

        function renderSkinSelect() {
            skinGrid.innerHTML = '';
            skins.forEach(skin => {
                const unlocked = bestScore >= skin.unlockScore;
                const div = document.createElement('div');
                div.className = `skin-option ${selectedSkin === skin.id ? 'selected' : ''} ${unlocked ? '' : 'locked'}`;
                div.innerHTML = `<div class="skin-icon">${skin.icon}</div><div class="skin-name">${skin.name}</div>`;
                if (unlocked) {
                    div.onclick = () => {
                        selectedSkin = skin.id;
                        localStorage.setItem('cosmicFlapSkin', selectedSkin);
                        renderSkinSelect();
                        updateSkinDisplay();
                    };
                }
                skinGrid.appendChild(div);
            });
        }

        // Bird properties
        const bird = {
            x: 100,
            y: canvas.height / 2,
            width: 40,
            height: 32,
            velocity: 0,
            gravity: 0.6,
            jumpStrength: -10,
            rotation: 0,
            turbo: false
        };

        // Pipe properties
        const pipes = [];
        const pipeWidth = 75;
        const pipeGap = 145;
        let pipeSpeed = 3.2;
        let lastPipeSpawn = 0;
        const pipeSpawnInterval = 1500;
        let bossPipeActive = false;
        let bossPipeTimer = 0;

        // Power-up system
        const POWERUP_TYPES = { NONE: 0, SHIELD: 1, SLOW: 2, MULTIPLIER: 3 };
        let currentPowerup = POWERUP_TYPES.NONE;
        let powerupEndTime = 0;

        // Initialize starfield
        function initStars() {
            stars = [];
            for (let i = 0; i < 100; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 0.5,
                    twinkle: Math.random() * Math.PI * 2
                });
            }
        }

        function drawStars() {
            stars.forEach(star => {
                const brightness = 0.5 + Math.sin(star.twinkle + dayTime) * 0.5;
                ctx.fillStyle = `rgba(255, 255, 255, ${brightness})`;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
                star.twinkle += 0.05;
            });
        }

        function drawBackground() {
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            const cycle = Math.sin(dayTime) * 0.5 + 0.5;
            
            if (cycle > 0.7) {
                gradient.addColorStop(0, '#ff6b6b');
                gradient.addColorStop(0.5, '#feca57');
                gradient.addColorStop(1, '#48dbfb');
            } else if (cycle > 0.3) {
                gradient.addColorStop(0, '#5f27cd');
                gradient.addColorStop(0.5, '#341f97');
                gradient.addColorStop(1, '#10ac84');
            } else {
                gradient.addColorStop(0, '#0f0f23');
                gradient.addColorStop(0.5, '#1a1a3e');
                gradient.addColorStop(1, '#2d2d5a');
            }
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // Particles
        function createParticles(x, y, color, count = 10, type = 'normal') {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * (type === 'explosion' ? 15 : 8),
                    vy: (Math.random() - 0.5) * (type === 'explosion' ? 15 : 8),
                    life: 1,
                    decay: 0.015 + Math.random() * 0.02,
                    color,
                    size: type === 'sparkle' ? 2 + Math.random() * 3 : 4 + Math.random() * 5,
                    type
                });
            }
        }

        function drawParticles() {
            particles.forEach((p, index) => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                
                if (p.type === 'sparkle') {
                    ctx.beginPath();
                    const angle = Date.now() / 200;
                    for (let i = 0; i < 4; i++) {
                        const a = angle + (i * Math.PI / 2);
                        const sx = p.x + Math.cos(a) * p.size;
                        const sy = p.y + Math.sin(a) * p.size;
                        ctx.fillRect(sx - 1, sy - 1, 2, 2);
                    }
                } else {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                p.x += p.vx;
                p.y += p.vy;
                p.life -= p.decay;
                
                if (p.life <= 0) particles.splice(index, 1);
            });
            ctx.globalAlpha = 1;
        }

        // Draw bird with selected skin
        function drawBird() {
            const skin = skins.find(s => s.id === selectedSkin);
            
            ctx.save();
            ctx.translate(bird.x + bird.width / 2, bird.y + bird.height / 2);
            bird.rotation = Math.min(Math.max(bird.velocity * 3.5, -30), 80);
            ctx.rotate(bird.rotation * Math.PI / 180);
            
            // Shield effect
            if (currentPowerup === POWERUP_TYPES.SHIELD) {
                ctx.strokeStyle = `rgba(255, 255, 100, ${0.6 + Math.sin(Date.now()/80) * 0.3})`;
                ctx.lineWidth = 4;
                ctx.shadowBlur = 25;
                ctx.shadowColor = '#ffff66';
                ctx.beginPath();
                ctx.arc(0, 0, bird.width, 0, Math.PI * 2);
                ctx.stroke();
                ctx.shadowBlur = 0;
            }
            
            // Glow effect
            ctx.shadowBlur = 20;
            ctx.shadowColor = skin.color;
            
            // Ship body based on skin
            ctx.fillStyle = skin.color;
            ctx.beginPath();
            ctx.moveTo(15, 0);
            ctx.lineTo(-15, 12);
            ctx.lineTo(-10, 0);
            ctx.lineTo(-15, -12);
            ctx.closePath();
            ctx.fill();
            
            // Cockpit
            ctx.fillStyle = '#fff';
            ctx.shadowBlur = 5;
            ctx.beginPath();
            ctx.ellipse(0, 0, 8, 5, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Engine flame
            ctx.fillStyle = bird.turbo ? '#ff6600' : '#00ffff';
            ctx.shadowColor = ctx.fillStyle;
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.moveTo(-10, 0);
            ctx.lineTo(-20 - Math.random() * 10, 0);
            ctx.lineTo(-10, 5);
            ctx.lineTo(-10, -5);
            ctx.closePath();
            ctx.fill();
            
            ctx.restore();
        }

        // Draw pipes
        function drawPipes() {
            pipes.forEach(pipe => {
                const isBoss = pipe.isBoss;
                
                ctx.save();
                
                if (isBoss) {
                    // Boss pipe - animated hazard stripes
                    const stripeOffset = (Date.now() / 50) % 20;
                    for (let y = -20; y < pipe.topHeight; y += 20) {
                        ctx.fillStyle = y % 40 < 10 ? '#ff0000' : '#000';
                        ctx.fillRect(pipe.x, y, pipeWidth, 20);
                    }
                    for (let y = -20; y < pipe.bottomHeight; y += 20) {
                        ctx.fillStyle = (y + 10) % 40 < 10 ? '#ff0000' : '#000';
                        ctx.fillRect(pipe.x, canvas.height - pipe.bottomHeight - y, pipeWidth, 20);
                    }
                    
                    // Boss glow
                    ctx.shadowBlur = 30;
                    ctx.shadowColor = '#ff0000';
                    ctx.strokeStyle = '#ff0000';
                    ctx.lineWidth = 5;
                    ctx.strokeRect(pipe.x, 0, pipeWidth, pipe.topHeight);
                    ctx.strokeRect(pipe.x, canvas.height - pipe.bottomHeight, pipeWidth, pipe.bottomHeight);
                } else {
                    // Normal pipe with gradient
                    const gradient = ctx.createLinearGradient(pipe.x, 0, pipe.x + pipeWidth, 0);
                    gradient.addColorStop(0, '#00ffff');
                    gradient.addColorStop(0.5, '#0088ff');
                    gradient.addColorStop(1, '#00ffff');
                    
                    ctx.fillStyle = gradient;
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = '#00ffff';
                    ctx.fillRect(pipe.x, 0, pipeWidth, pipe.topHeight);
                    ctx.fillRect(pipe.x, canvas.height - pipe.bottomHeight, pipeWidth, pipe.bottomHeight);
                    
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(pipe.x, 0, pipeWidth, pipe.topHeight);
                    ctx.strokeRect(pipe.x, canvas.height - pipe.bottomHeight, pipeWidth, pipe.bottomHeight);
                }
                
                ctx.restore();
            });
        }

        function drawGround() {
            const groundHeight = 40;
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(0, canvas.height - groundHeight, canvas.width, groundHeight);
            
            ctx.strokeStyle = '#00ffff';
            ctx.lineWidth = 2;
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#00ffff';
            
            for (let i = 0; i < canvas.width + 50; i += 40) {
                const x = i - (Date.now() / 100) % 40;
                ctx.beginPath();
                ctx.moveTo(x, canvas.height - groundHeight);
                ctx.lineTo(x + 20, canvas.height);
                ctx.stroke();
            }
            ctx.shadowBlur = 0;
        }

        function updateBird() {
            const gravity = bird.turbo ? bird.gravity * 2.5 : bird.gravity;
            bird.velocity += gravity;
            bird.y += bird.velocity;
            
            // Turbo particles
            if (bird.turbo) {
                createParticles(bird.x, bird.y + bird.height, '#00ffff', 1, 'sparkle');
            }
            
            if (bird.y + bird.height >= canvas.height - 40) {
                if (currentPowerup === POWERUP_TYPES.SHIELD) {
                    bird.y = canvas.height - 40 - bird.height;
                    bird.velocity = 0;
                    createParticles(bird.x + bird.width/2, bird.y + bird.height, '#ffff66', 25);
                } else {
                    gameOver();
                }
            }
            
            if (bird.y < 0) {
                bird.y = 0;
                bird.velocity = 0;
            }
        }

        function updatePipes(timestamp) {
            // Boss pipe warning
            if (!bossPipeActive && Math.floor(score) > 0 && Math.floor(score) % 10 === 0 && score < Math.floor(score)) {
                bossWarning.style.display = 'block';
                bossPipeTimer = timestamp;
            }
            
            if (timestamp - lastPipeSpawn > pipeSpawnInterval) {
                const isBoss = !bossPipeActive && Math.floor(score) > 0 && Math.floor(score) % 10 === 0;
                bossPipeActive = isBoss;
                
                const minHeight = isBoss ? 80 : 70;
                const maxHeight = canvas.height - pipeGap - minHeight - 40;
                const topHeight = Math.random() * (maxHeight - minHeight) + minHeight;
                
                pipes.push({
                    x: canvas.width,
                    topHeight,
                    bottomHeight: canvas.height - topHeight - pipeGap - 40,
                    passed: false,
                    isBoss,
                    powerup: !isBoss && Math.random() < 0.15 ? {
                        type: Math.random() < 0.4 ? POWERUP_TYPES.SHIELD :
                             Math.random() < 0.5 ? POWERUP_TYPES.SLOW : POWERUP_TYPES.MULTIPLIER,
                        collected: false
                    } : null
                });
                
                lastPipeSpawn = timestamp;
                bossWarning.style.display = 'none';
            }
            
            pipes.forEach(pipe => {
                const speed = pipe.isBoss ? pipeSpeed * 0.6 : pipeSpeed;
                pipe.x -= speed;
            });
            
            for (let i = pipes.length - 1; i >= 0; i--) {
                if (pipes[i].x + pipeWidth < -100) {
                    pipes.splice(i, 1);
                    if (pipes[i].isBoss) bossPipeActive = false;
                }
            }
        }

        function showFloatingScore(x, y, text) {
            const el = document.createElement('div');
            el.className = 'floating-score';
            el.textContent = text;
            const rect = canvas.getBoundingClientRect();
            el.style.left = (rect.left + x) + 'px';
            el.style.top = (rect.top + y) + 'px';
            floatingScores.appendChild(el);
            setTimeout(() => el.remove(), 1000);
        }

        function checkCollisions() {
            pipes.forEach(pipe => {
                const bx = bird.x + 8, by = bird.y + 8;
                const bw = bird.width - 16, bh = bird.height - 16;
                
                if (bx + bw > pipe.x && bx < pipe.x + pipeWidth) {
                    if (by < pipe.topHeight || by + bh > canvas.height - pipe.bottomHeight - 40) {
                        if (currentPowerup === POWERUP_TYPES.SHIELD) {
                            currentPowerup = POWERUP_TYPES.NONE;
                            createParticles(bird.x + bird.width/2, bird.y + bird.height/2, '#ffff66', 35);
                            return;
                        }
                        screenShake = 15;
                        createParticles(bird.x + bird.width/2, bird.y + bird.height/2, '#ff0000', 50, 'explosion');
                        gameOver();
                    }
                }
                
                if (!pipe.passed && bx > pipe.x + pipeWidth) {
                    pipe.passed = true;
                    
                    const points = pipe.isBoss ? 5 : 1;
                    const totalPoints = Math.floor(points * multiplier);
                    score += points;
                    
                    scoreDisplay.textContent = Math.floor(score);
                    multiplierDisplay.textContent = `x${multiplier.toFixed(1)}`;
                    
                    showFloatingScore(pipe.x + pipeWidth/2, canvas.height/2, 
                        pipe.isBoss ? `+${totalPoints}! 🔥` : `+${totalPoints}`);
                    
                    if (pipe.isBoss) {
                        createParticles(pipe.x + pipeWidth/2, canvas.height/2, '#ff0000', 40);
                        createParticles(pipe.x + pipeWidth/2, canvas.height/2, '#ffd700', 20, 'sparkle');
                    } else {
                        createParticles(pipe.x + pipeWidth/2, canvas.height/2, '#00ffff', 12);
                    }
                    
                    if (multiplier > maxMultiplier) maxMultiplier = multiplier;
                }
                
                // Powerup collection
                if (pipe.powerup && !pipe.powerup.collected) {
                    const px = pipe.x + 20, py = canvas.height - pipe.bottomHeight - pipeGap - 35;
                    if (bx < px + 30 && bx + bw > px && by < py + 30 && by + bh > py) {
                        pipe.powerup.collected = true;
                        activatePowerup(pipe.powerup.type);
                        const colors = { [POWERUP_TYPES.SHIELD]: '#ffff66', [POWERUP_TYPES.SLOW]: '#00ff00', [POWERUP_TYPES.MULTIPLIER]: '#ff69b4' };
                        createParticles(px + 15, py + 15, colors[pipe.powerup.type], 30, 'sparkle');
                    }
                }
            });
        }

        function activatePowerup(type) {
            currentPowerup = type;
            powerupEndTime = Date.now() + 8000;
            
            const names = { [POWERUP_TYPES.SHIELD]: '🛡️', [POWERUP_TYPES.SLOW]: '🐌', [POWERUP_TYPES.MULTIPLIER]: '💎' };
            
            if (type === POWERUP_TYPES.SLOW) {
                pipeSpeed = 1.5;
            } else if (type === POWERUP_TYPES.MULTIPLIER) {
                multiplier = 2.0;
            }
            
            powerupDisplay.textContent = `${names[type]} ${type === POWERUP_TYPES.MULTIPLIER ? '2x' : 'ACTIVE'}!`;
            powerupDisplay.style.color = type === POWERUP_TYPES.SHIELD ? '#ffff66' : type === POWERUP_TYPES.SLOW ? '#00ff00' : '#ff69b4';
        }

        function updatePowerups() {
            if (currentPowerup !== POWERUP_TYPES.NONE) {
                if (Date.now() > powerupEndTime) {
                    currentPowerup = POWERUP_TYPES.NONE;
                    powerupDisplay.textContent = '';
                    if (currentPowerup === POWERUP_TYPES.SLOW) pipeSpeed = 3.2;
                    if (currentPowerup === POWERUP_TYPES.MULTIPLIER) multiplier = 1;
                } else {
                    const timeLeft = ((powerupEndTime - Date.now()) / 1000).toFixed(0);
                    const names = { [POWERUP_TYPES.SHIELD]: '🛡️', [POWERUP_TYPES.SLOW]: '🐌', [POWERUP_TYPES.MULTIPLIER]: '💎' };
                    powerupDisplay.textContent = `${names[currentPowerup]} ${timeLeft}s`;
                }
            }
        }

        function updateDifficulty() {
            pipeSpeed = 3.2 + Math.min(score * 0.02, 2);
            if (currentPowerup === POWERUP_TYPES.SLOW) pipeSpeed *= 0.5;
        }

        function gameLoop(timestamp) {
            if (!gameRunning) return;
            
            dayTime += 0.002;
            
            // Screen shake
            let shakeX = 0, shakeY = 0;
            if (screenShake > 0) {
                shakeX = (Math.random() - 0.5) * screenShake;
                shakeY = (Math.random() - 0.5) * screenShake;
                screenShake *= 0.9;
                if (screenShake < 0.5) screenShake = 0;
            }
            
            ctx.save();
            ctx.translate(shakeX, shakeY);
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            drawBackground();
            drawStars();
            drawPipes();
            updatePipes(timestamp);
            drawBird();
            updateBird();
            drawParticles();
            drawGround();
            
            checkCollisions();
            updatePowerups();
            updateDifficulty();
            
            ctx.restore();
            
            multiplierDisplay.textContent = `x${multiplier.toFixed(1)}`;
            
            animationId = requestAnimationFrame(gameLoop);
        }

        function startGame() {
            gameRunning = true;
            score = 0;
            multiplier = 1;
            maxMultiplier = 1;
            pipeSpeed = 3.2;
            screenShake = 0;
            scoreDisplay.textContent = '0';
            multiplierDisplay.textContent = 'x1.0';
            powerupDisplay.textContent = '';
            floatingScores.innerHTML = '';
            pipes.length = 0;
            particles.length = 0;
            bossPipeActive = false;
            bird.y = canvas.height / 2;
            bird.velocity = 0;
            bird.turbo = false;
            currentPowerup = POWERUP_TYPES.NONE;
            lastPipeSpawn = performance.now();
            
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            skinSelectScreen.style.display = 'none';
            
            gameLoop(performance.now());
        }

        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(animationId);
            
            if (score > bestScore) {
                bestScore = Math.floor(score);
                localStorage.setItem('cosmicFlapBest', bestScore);
                menuBestSpan.textContent = bestScore;
            }
            
            finalScoreSpan.textContent = Math.floor(score);
            bestScoreSpan.textContent = bestScore;
            maxMultSpan.textContent = `x${maxMultiplier.toFixed(1)}`;
            gameOverScreen.style.display = 'flex';
        }

        function jump() {
            if (gameRunning) {
                bird.velocity = bird.jumpStrength;
                createParticles(bird.x + bird.width/2, bird.y + bird.height, '#00ffff', 6);
            }
        }

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);
        menuBtn.addEventListener('click', () => {
            gameOverScreen.style.display = 'none';
            startScreen.style.display = 'flex';
        });
        skinsBtn.addEventListener('click', () => {
            startScreen.style.display = 'none';
            renderSkinSelect();
            skinSelectScreen.style.display = 'flex';
        });
        backBtn.addEventListener('click', () => {
            skinSelectScreen.style.display = 'none';
            startScreen.style.display = 'flex';
        });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (!gameRunning && startScreen.style.display !== 'none') {
                    startGame();
                } else if (!gameRunning && gameOverScreen.style.display !== 'none') {
                    startGame();
                } else if (gameRunning) {
                    bird.turbo = false;
                    jump();
                }
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.code === 'Space' && gameRunning) {
                bird.turbo = true;
            }
        });

        canvas.addEventListener('mousedown', () => {
            if (gameRunning) {
                bird.turbo = false;
                jump();
            }
        });

        canvas.addEventListener('mouseup', () => {
            if (gameRunning) bird.turbo = true;
        });

        // Initial render
        initStars();
        drawBackground();
        drawStars();
        drawBird();
        drawGround();
    </script>
</body>
</html>
