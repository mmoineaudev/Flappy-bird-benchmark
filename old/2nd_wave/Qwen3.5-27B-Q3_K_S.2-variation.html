<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Flap - Cyberpunk Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(ellipse at center, #0a0a1a 0%, #000 100%);
            font-family: 'Courier New', monospace;
        }
        #game-container {
            position: relative;
            width: 960px;
            height: 540px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(0,255,255,0.3), 0 0 100px rgba(255,0,255,0.2);
            border: 3px solid #00ffff;
        }
        canvas {
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        #score-display {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 56px;
            font-weight: bold;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff, 0 0 40px #00ffff;
            letter-spacing: 4px;
        }
        #combo-display {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            color: #ff00ff;
            text-shadow: 0 0 10px #ff00ff;
            display: none;
        }
        #powerup-display {
            position: active;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 20px;
            color: #ffff00;
            text-shadow: 0 0 10px #ffff00;
            display: none;
        }
        #start-screen, #game-over-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: auto;
        }
        #game-over-screen {
            display: none;
        }
        h1 {
            font-size: 52px;
            background: linear-gradient(90deg, #00ffff, #ff00ff, #00ffff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: neon-pulse 2s ease-in-out infinite;
            margin-bottom: 20px;
        }
        @keyframes neon-pulse {
            0%, 100% { filter: drop-shadow(0 0 10px #00ffff); }
            50% { filter: drop-shadow(0 0 30px #ff00ff); }
        }
        .btn {
            background: transparent;
            border: 2px solid #00ffff;
            padding: 18px 50px;
            font-size: 26px;
            font-weight: bold;
            color: #00ffff;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: all 0.3s;
            box-shadow: 0 0 10px #00ffff inset, 0 0 20px #00ffff;
        }
        .btn:hover {
            background: #00ffff;
            color: #000;
            box-shadow: 0 0 30px #00ffff, 0 0 60px #00ffff;
            transform: scale(1.05);
        }
        .stat-box {
            font-size: 24px;
            color: #ff00ff;
            margin: 15px 0;
            text-shadow: 0 0 10px #ff00ff;
        }
        .instructions {
            margin-top: 25px;
            color: #00ffff;
            font-size: 14px;
            opacity: 0.8;
            line-height: 1.8;
        }
        .powerup-legend {
            margin-top: 20px;
            color: #ffff00;
            font-size: 12px;
            opacity: 0.7;
        }
        #shake {
            animation: none;
        }
        @keyframes shake {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(10px, 10px); }
            20% { transform: translate(-10px, -10px); }
            30% { transform: translate(10px, -10px); }
            40% { transform: translate(-10px, 10px); }
            50% { transform: translate(0, 0); }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas" width="960" height="540"></canvas>
        <div id="ui-layer" id="shake">
            <div id="score-display">0</div>
            <div id="combo-display">COMBO x<span id="combo-multiplier">1</span></div>
            <div id="powerup-display"><span id="powerup-icon">⚡</span> <span id="powerup-name">SLOW MO</span></div>
            <div id="start-screen">
                <h1>NEON FLAP</h1>
                <button class="btn" id="start-btn">INITIATE</button>
                <p class="instructions">
                    SPACE / CLICK to flap<br>
                    Avoid pipes. Collect power-ups.<br>
                    Build combos for score multipliers.
                </p>
                <div class="powerup-legend">
                    ⚡ Slow Motion | 🛡️ Shield | ✨ Score Boost
                </div>
            </div>
            <div id="game-over-screen">
                <h1>SYSTEM FAILURE</h1>
                <div class="stat-box">SCORE: <span id="final-score">0</span></div>
                <div class="stat-box">BEST: <span id="high-score">0</span></div>
                <div class="stat-box" style="color:#ffff00">COMBOS: <span id="total-combos">0</span></div>
                <button class="btn" id="restart-btn">REBOOT</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score-display');
        const comboEl = document.getElementById('combo-display');
        const powerupEl = document.getElementById('powerup-display');
        const comboMultEl = document.getElementById('combo-multiplier');
        const powerupIconEl = document.getElementById('powerup-icon');
        const powerupNameEl = document.getElementById('powerup-name');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');
        const finalScoreEl = document.getElementById('final-score');
        const highScoreEl = document.getElementById('high-score');
        const totalCombosEl = document.getElementById('total-combos');
        const shakeEl = document.getElementById('ui-layer');

        let gameRunning = false;
        let score = 0;
        let combo = 0;
        let maxCombo = 0;
        let comboMultiplier = 1;
        let highScore = localStorage.getItem('neonFlapHighScore') || 0;
        let frameCount = 0;
        let particles = [];
        let powerups = [];
        let activePowerup = null;
        let powerupTimer = 0;
        let difficultyMultiplier = 1;
        let screenShake = 0;

        const bird = {
            x: 150,
            y: 270,
            width: 36,
            height: 26,
            velocity: 0,
            gravity: 0.4,
            flapStrength: -7.5,
            rotation: 0,
            shielded: false
        };

        let pipes = [];
        const pipeWidth = 55;
        const pipeGap = 160;
        const pipeSpacing = 280;

        const groundHeight = 70;

        function init() {
            bird.y = 270;
            bird.velocity = 0;
            bird.rotation = 0;
            bird.shielded = false;
            pipes = [];
            powerups = [];
            particles = [];
            score = 0;
            combo = 0;
            maxCombo = 0;
            comboMultiplier = 1;
            activePowerup = null;
            powerupTimer = 0;
            difficultyMultiplier = 1;
            frameCount = 0;
            screenShake = 0;
            
            scoreEl.textContent = '0';
            scoreEl.style.display = 'block';
            comboEl.style.display = 'none';
            powerupEl.style.display = 'none';
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            shakeEl.style.animation = 'none';
            gameRunning = true;
        }

        function createParticle(x, y, type = 'normal') {
            const colors = {
                normal: ['#00ffff', '#ff00ff', '#ffff00'],
                explosion: ['#ff0000', '#ffff00', '#ff8800'],
                powerup: ['#ffff00', '#ff00ff', '#00ffff']
            };
            particles.push({
                x, y,
                vx: (Math.random() - 0.5) * 4,
                vy: (Math.random() - 0.5) * 4,
                life: 1,
                decay: 0.02 + Math.random() * 0.02,
                color: colors[type][Math.floor(Math.random() * 3)],
                size: 2 + Math.random() * 3
            });
        }

        function drawBird() {
            ctx.save();
            ctx.translate(bird.x + bird.width/2, bird.y + bird.height/2);
            bird.rotation = Math.min(Math.PI/4, Math.max(-Math.PI/4, bird.velocity * 0.08));
            ctx.rotate(bird.rotation);

            // Glow effect
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#00ffff';

            // Shield effect
            if (bird.shielded) {
                ctx.strokeStyle = '#ffff00';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(0, 0, bird.width/2 + 8, 0, Math.PI * 2);
                ctx.stroke();
                
                // Shield particles
                if (frameCount % 5 === 0) {
                    for (let i = 0; i < 3; i++) {
                        createParticle(bird.x + bird.width/2 + (Math.random()-0.5)*20,
                                       bird.y + bird.height/2 + (Math.random()-0.5)*15, 'powerup');
                    }
                }
            }

            // Body - neon cyan
            ctx.fillStyle = '#00ffff';
            ctx.beginPath();
            ctx.ellipse(0, 0, bird.width/2, bird.height/2, 0, 0, Math.PI * 2);
            ctx.fill();

            // Inner glow
            ctx.fillStyle = '#ffffff';
            ctx.globalAlpha = 0.3;
            ctx.beginPath();
            ctx.ellipse(-3, -3, bird.width/4, bird.height/4, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;

            // Eye
            ctx.fillStyle = '#fff';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ff00ff';
            ctx.beginPath();
            ctx.arc(8, -6, 7, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.arc(10, -6, 3, 0, Math.PI * 2);
            ctx.fill();

            // Wing with trail effect
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#00ffff';
            ctx.fillStyle = '#ff00ff';
            ctx.beginPath();
            ctx.ellipse(-6, 4, 10, 6, -0.3, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        function drawPipes() {
            pipes.forEach(pipe => {
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#00ff00';

                // Top pipe
                ctx.fillStyle = '#1a3a1a';
                ctx.strokeStyle = '#00ff00';
                ctx.lineWidth = 2;
                ctx.fillRect(pipe.x, 0, pipeWidth, pipe.top);
                ctx.strokeRect(pipe.x, 0, pipeWidth, pipe.top);

                // Pipe cap with glow
                ctx.fillStyle = '#2d5a2d';
                ctx.fillRect(pipe.x - 3, pipe.top - 25, pipeWidth + 6, 25);
                ctx.strokeRect(pipe.x - 3, pipe.top - 25, pipeWidth + 6, 25);

                // Bottom pipe
                const bottomY = pipe.top + pipeGap;
                ctx.fillRect(pipe.x, bottomY, pipeWidth, canvas.height - bottomY - groundHeight);
                ctx.strokeRect(pipe.x, bottomY, pipeWidth, canvas.height - bottomY - groundHeight);

                ctx.fillRect(pipe.x - 3, bottomY, pipeWidth + 6, 25);
                ctx.strokeRect(pipe.x - 3, bottomY, pipeWidth + 6, 25);

                ctx.shadowBlur = 0;
            });
        }

        function drawPowerups() {
            powerups.forEach(pu => {
                ctx.save();
                ctx.translate(pu.x + 20, pu.y + 15);
                
                // Pulsing effect
                const pulse = Math.sin(frameCount * 0.2) * 0.2 + 1;
                ctx.scale(pulse, pulse);

                ctx.shadowBlur = 25;
                ctx.shadowColor = pu.color;
                ctx.fillStyle = pu.color;

                // Icon based on type
                ctx.font = '24px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(pu.icon, 0, 0);

                ctx.restore();
            });
        }

        function drawParticles() {
            particles.forEach((p, i) => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;
        }

        function drawBackground() {
            // Grid background
            ctx.strokeStyle = 'rgba(0,255,255,0.1)';
            ctx.lineWidth = 1;
            
            // Vertical lines
            const gridOffset = (frameCount * 0.5) % 50;
            for (let x = -gridOffset; x < canvas.width; x += 50) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height - groundHeight);
                ctx.stroke();
            }

            // Horizontal perspective lines
            for (let y = 0; y < canvas.height - groundHeight; y += 40) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }

            // Ground with neon grid
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, canvas.height - groundHeight, canvas.width, groundHeight);
            
            ctx.strokeStyle = 'rgba(255,0,255,0.5)';
            const groundOffset = (frameCount * 2) % 40;
            for (let x = -groundOffset; x < canvas.width; x += 40) {
                ctx.beginPath();
                ctx.moveTo(x, canvas.height - groundHeight);
                ctx.lineTo(x - 20, canvas.height);
                ctx.stroke();
            }
        }

        function updateParticles() {
            particles.forEach((p, i) => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.1; // gravity
                p.life -= p.decay;
            });
            particles = particles.filter(p => p.life > 0);
        }

        function update() {
            // Difficulty scaling
            difficultyMultiplier = 1 + score * 0.02;

            // Bird physics
            bird.velocity += bird.gravity * difficultyMultiplier;
            bird.y += bird.velocity;

            // Active powerup timer
            if (activePowerup) {
                powerupTimer--;
                if (powerupTimer <= 0) {
                    activePowerup = null;
                    powerupEl.style.display = 'none';
                    if (bird.shielded) {
                        bird.shielded = false;
                        for (let i = 0; i < 20; i++) {
                            createParticle(bird.x + bird.width/2, bird.y + bird.height/2, 'explosion');
                        }
                    }
                } else {
                    powerupNameEl.textContent = activePowerup.toUpperCase();
                }
            }

            // Ground collision
            if (bird.y + bird.height >= canvas.height - groundHeight) {
                if (bird.shielded) {
                    bird.shielded = false;
                    bird.y = canvas.height - groundHeight - bird.height;
                    bird.velocity = 0;
                    activePowerup = null;
                    powerupTimer = 0;
                    powerupEl.style.display = 'none';
                } else {
                    triggerGameOver();
                    return;
                }
            }

            // Ceiling collision
            if (bird.y < 0) {
                bird.y = 0;
                bird.velocity = 0;
            }

            // Pipe generation
            if (frameCount % Math.floor(pipeSpacing / difficultyMultiplier) === 0) {
                const minTop = 60;
                const maxTop = canvas.height - groundHeight - pipeGap - 60;
                const topHeight = Math.random() * (maxTop - minTop) + minTop;
                pipes.push({
                    x: canvas.width,
                    top: topHeight,
                    passed: false
                });

                // Powerup chance (10%)
                if (Math.random() < 0.1) {
                    const types = [
                        { name: 'slow mo', icon: '⚡', color: '#ffff00', type: 'slow' },
                        { name: 'shield', icon: '🛡️', color: '#00ff00', type: 'shield' },
                        { name: 'score boost', icon: '✨', color: '#ff00ff', type: 'boost' }
                    ];
                    const type = types[Math.floor(Math.random() * types.length)];
                    powerups.push({
                        x: canvas.width,
                        y: topHeight + pipeGap / 2 - 15,
                        color: type.color,
                        icon: type.icon,
                        type: type.type,
                        collected: false
                    });
                }
            }

            // Move pipes
            const pipeSpeed = 3 * difficultyMultiplier;
            pipes.forEach(pipe => {
                pipe.x -= pipeSpeed;

                // Collision
                if (bird.x + bird.width > pipe.x && bird.x < pipe.x + pipeWidth) {
                    if (bird.y < pipe.top || bird.y + bird.height > pipe.top + pipeGap) {
                        if (bird.shielded) {
                            bird.shielded = false;
                            activePowerup = null;
                            powerupTimer = 0;
                            powerupEl.style.display = 'none';
                            screenShake = 10;
                            for (let i = 0; i < 30; i++) {
                                createParticle(bird.x + bird.width/2, bird.y + bird.height/2, 'explosion');
                            }
                        } else {
                            triggerGameOver();
                        }
                    }
                }

                // Score with combo
                if (!pipe.passed && bird.x > pipe.x + pipeWidth) {
                    pipe.passed = true;
                    combo++;
                    if (combo > maxCombo) maxCombo = combo;
                    
                    // Reset combo after 3 pipes
                    if (combo >= 3) {
                        comboMultiplier = 2;
                    }
                    if (combo >= 6) {
                        comboMultiplier = 3;
                    }
                    if (combo >= 10) {
                        comboMultiplier = 5;
                    }
                    if (combo > 10) {
                        combo = 0;
                        comboMultiplier = 1;
                    }

                    let points = comboMultiplier;
                    if (activePowerup === 'boost') points *= 2;
                    score += points;
                    
                    comboEl.style.display = 'block';
                    comboMultEl.textContent = comboMultiplier;
                    
                    // Score particles
                    for (let i = 0; i < 5; i++) {
                        createParticle(bird.x, bird.y, 'powerup');
                    }
                }
            });

            // Powerup collection
            powerups.forEach(pu => {
                pu.x -= pipeSpeed;
                
                // Collection
                if (!pu.collected && 
                    bird.x + bird.width > pu.x && 
                    bird.x < pu.x + 40 &&
                    bird.y + bird.height > pu.y &&
                    bird.y < pu.y + 30) {
                    
                    pu.collected = true;
                    
                    if (pu.type === 'shield') {
                        bird.shielded = true;
                        activePowerup = 'shield';
                        powerupTimer = 300;
                    } else if (pu.type === 'slow') {
                        activePowerup = 'slow mo';
                        powerupTimer = 200;
                    } else if (pu.type === 'boost') {
                        activePowerup = 'score boost';
                        powerupTimer = 300;
                    }
                    
                    powerupIconEl.textContent = pu.icon;
                    powerupEl.style.display = 'block';
                    
                    for (let i = 0; i < 20; i++) {
                        createParticle(pu.x + 20, pu.y + 15, 'powerup');
                    }
                }
            });

            // Clean up
            pipes = pipes.filter(p => p.x + pipeWidth > 0);
            powerups = powerups.filter(p => !p.collected && p.x + 40 > 0);

            // Combo decay
            if (frameCount % 60 === 0 && combo > 0) {
                combo = 0;
                comboMultiplier = 1;
                comboEl.style.display = 'none';
            }

            updateParticles();

            // Screen shake decay
            if (screenShake > 0) {
                screenShake *= 0.9;
                if (screenShake < 0.5) screenShake = 0;
            }

            frameCount++;
            scoreEl.textContent = score;
        }

        function draw() {
            // Screen shake transform
            ctx.save();
            if (screenShake > 0) {
                const dx = (Math.random() - 0.5) * screenShake;
                const dy = (Math.random() - 0.5) * screenShake;
                ctx.translate(dx, dy);
            }

            drawBackground();
            drawPipes();
            drawPowerups();
            drawParticles();
            drawBird();

            ctx.restore();

            // Speed adjustment for slow mo
            if (activePowerup === 'slow mo') {
                ctx.globalAlpha = 0.7;
                ctx.filter = 'hue-rotate(90deg)';
            }
        }

        function gameLoop() {
            if (!gameRunning) return;
            
            // Slow motion reduces update frequency
            if (activePowerup !== 'slow mo' || frameCount % 2 === 0) {
                update();
            }
            
            if (gameRunning) {
                draw();
                
                // Apply shake to DOM element
                if (screenShake > 0) {
                    shakeEl.style.animation = 'shake 0.5s';
                    shakeEl.addEventListener('animationend', () => {
                        shakeEl.style.animation = 'none';
                    }, { once: true });
                }
                
                requestAnimationFrame(gameLoop);
            }
        }

        function flap() {
            if (gameRunning) {
                bird.velocity = bird.flapStrength;
                for (let i = 0; i < 5; i++) {
                    createParticle(bird.x, bird.y + bird.height, 'normal');
                }
            }
        }

        function triggerGameOver() {
            gameRunning = false;
            screenShake = 20;
            
            // Explosion particles
            for (let i = 0; i < 50; i++) {
                createParticle(bird.x + bird.width/2, bird.y + bird.height/2, 'explosion');
            }

            // Final draw with explosion
            draw();

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('neonFlapHighScore', highScore);
            }
            
            finalScoreEl.textContent = score;
            highScoreEl.textContent = highScore;
            totalCombosEl.textContent = maxCombo;
            
            setTimeout(() => {
                gameOverScreen.style.display = 'block';
            }, 500);
        }

        function gameOver() {
            triggerGameOver();
        }

        // Event listeners
        startBtn.addEventListener('click', () => {
            init();
            gameLoop();
        });

        restartBtn.addEventListener('click', () => {
            init();
            gameLoop();
        });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (gameRunning) {
                    flap();
                } else if (startScreen.style.display !== 'none') {
                    init();
                    gameLoop();
                } else if (gameOverScreen.style.display !== 'none') {
                    init();
                    gameLoop();
                }
            }
        });

        canvas.addEventListener('click', () => {
            if (gameRunning) flap();
        });

        // Initial draw
        drawBackground();
        ctx.save();
        ctx.translate(150 + 18, 270 + 13);
        ctx.shadowBlur = 20;
        ctx.shadowColor = '#00ffff';
        ctx.fillStyle = '#00ffff';
        ctx.beginPath();
        ctx.ellipse(0, 0, 18, 13, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    </script>
</body>
</html>
