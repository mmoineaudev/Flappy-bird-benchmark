<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird Clone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #game-container {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.3);
        }
        #game-canvas {
            display: block;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 100%);
        }
        #score-display {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 48px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 10;
        }
        #start-screen, #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            z-index: 20;
        }
        #game-over-screen {
            display: none;
        }
        h1 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        p {
            font-size: 24px;
            margin-bottom: 30px;
        }
        button {
            padding: 15px 40px;
            font-size: 24px;
            background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%);
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }
        button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 30px rgba(0, 212, 255, 0.6);
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas" width="800" height="450"></canvas>
        <div id="score-display">0</div>
        <div id="start-screen">
            <h1>☤ Flappy Bird</h1>
            <p>Press SPACE or Click to Jump</p>
            <button id="start-btn">Play</button>
        </div>
        <div id="game-over-screen">
            <h1>Game Over</h1>
            <p>Score: <span id="final-score">0</span></p>
            <p>Best: <span id="best-score">0</span></p>
            <button id="restart-btn">Try Again</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score-display');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const finalScoreSpan = document.getElementById('final-score');
        const bestScoreSpan = document.getElementById('best-score');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');

        let gameRunning = false;
        let score = 0;
        let bestScore = localStorage.getItem('flappyBestScore') || 0;
        let animationId;

        // Bird properties
        const bird = {
            x: 100,
            y: canvas.height / 2,
            width: 30,
            height: 25,
            velocity: 0,
            gravity: 0.5,
            jumpStrength: -8,
            rotation: 0
        };

        // Pipe properties
        const pipes = [];
        const pipeWidth = 60;
        const pipeGap = 150;
        const pipeSpeed = 3;
        const pipeSpawnInterval = 1500;
        let lastPipeSpawn = 0;

        // Game objects
        let clouds = [];
        let groundOffset = 0;

        // Initialize clouds
        function initClouds() {
            clouds = [];
            for (let i = 0; i < 5; i++) {
                clouds.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * 150,
                    width: 60 + Math.random() * 40,
                    speed: 0.5 + Math.random() * 0.5
                });
            }
        }

        // Draw bird
        function drawBird() {
            ctx.save();
            ctx.translate(bird.x + bird.width / 2, bird.y + bird.height / 2);
            bird.rotation = Math.min(Math.max(bird.velocity * 3, -30), 90);
            ctx.rotate(bird.rotation * Math.PI / 180);

            // Body
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.ellipse(0, 0, bird.width / 2, bird.height / 2, 0, 0, Math.PI * 2);
            ctx.fill();

            // Eye
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(8, -5, 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = 'black';
            ctx.beginPath();
            ctx.arc(10, -5, 3, 0, Math.PI * 2);
            ctx.fill();

            // Wing
            ctx.fillStyle = '#FFA500';
            ctx.beginPath();
            ctx.ellipse(-5, 5, 10, 6, 0, 0, Math.PI * 2);
            ctx.fill();

            // Beak
            ctx.fillStyle = '#FF6347';
            ctx.beginPath();
            ctx.moveTo(12, 2);
            ctx.lineTo(22, 5);
            ctx.lineTo(12, 8);
            ctx.fill();

            ctx.restore();
        }

        // Draw pipes
        function drawPipes() {
            pipes.forEach(pipe => {
                // Top pipe
                ctx.fillStyle = '#228B22';
                ctx.fillRect(pipe.x, 0, pipeWidth, pipe.topHeight);
                ctx.fillStyle = '#32CD32';
                ctx.fillRect(pipe.x + 5, 0, pipeWidth - 10, pipe.topHeight - 10);

                // Bottom pipe
                ctx.fillStyle = '#228B22';
                ctx.fillRect(pipe.x, canvas.height - pipe.bottomHeight, pipeWidth, pipe.bottomHeight);
                ctx.fillStyle = '#32CD32';
                ctx.fillRect(pipe.x + 5, canvas.height - pipe.bottomHeight + 10, pipeWidth - 10, pipe.bottomHeight - 10);

                // Pipe caps
                ctx.fillStyle = '#006400';
                ctx.fillRect(pipe.x - 5, pipe.topHeight - 20, pipeWidth + 10, 20);
                ctx.fillRect(pipe.x - 5, canvas.height - pipe.bottomHeight, pipeWidth + 10, 20);
            });
        }

        // Draw clouds
        function drawClouds() {
            clouds.forEach(cloud => {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.beginPath();
                ctx.arc(cloud.x, cloud.y, cloud.width * 0.3, 0, Math.PI * 2);
                ctx.arc(cloud.x + cloud.width * 0.2, cloud.y - cloud.width * 0.1, cloud.width * 0.25, 0, Math.PI * 2);
                ctx.arc(cloud.x + cloud.width * 0.4, cloud.y, cloud.width * 0.3, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        // Draw ground
        function drawGround() {
            const groundHeight = 50;
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(0, canvas.height - groundHeight, canvas.width, groundHeight);
            ctx.fillStyle = '#228B22';
            ctx.fillRect(0, canvas.height - groundHeight, canvas.width, 10);

            // Ground pattern
            ctx.fillStyle = '#A0522D';
            for (let i = -groundOffset; i < canvas.width; i += 30) {
                ctx.beginPath();
                ctx.arc(i, canvas.height - groundHeight + 25, 5, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Update bird
        function updateBird() {
            bird.velocity += bird.gravity;
            bird.y += bird.velocity;

            // Floor collision
            if (bird.y + bird.height >= canvas.height - 50) {
                gameOver();
            }

            // Ceiling collision
            if (bird.y < 0) {
                bird.y = 0;
                bird.velocity = 0;
            }
        }

        // Update pipes
        function updatePipes(timestamp) {
            if (timestamp - lastPipeSpawn > pipeSpawnInterval) {
                const minHeight = 50;
                const maxHeight = canvas.height - pipeGap - minHeight - 50;
                const topHeight = Math.random() * (maxHeight - minHeight) + minHeight;
                pipes.push({
                    x: canvas.width,
                    topHeight: topHeight,
                    bottomHeight: canvas.height - topHeight - pipeGap - 50,
                    passed: false
                });
                lastPipeSpawn = timestamp;
            }

            pipes.forEach(pipe => {
                pipe.x -= pipeSpeed;
            });

            // Remove off-screen pipes
            for (let i = pipes.length - 1; i >= 0; i--) {
                if (pipes[i].x + pipeWidth < 0) {
                    pipes.splice(i, 1);
                }
            }
        }

        // Update clouds
        function updateClouds() {
            clouds.forEach(cloud => {
                cloud.x -= cloud.speed;
                if (cloud.x + cloud.width < 0) {
                    cloud.x = canvas.width + cloud.width;
                    cloud.y = Math.random() * 150;
                }
            });
        }

        // Check collisions
        function checkCollisions() {
            pipes.forEach(pipe => {
                // Check top pipe
                if (bird.x + bird.width > pipe.x && bird.x < pipe.x + pipeWidth) {
                    if (bird.y < pipe.topHeight || bird.y + bird.height > canvas.height - pipe.bottomHeight - 50) {
                        gameOver();
                    }
                }

                // Score
                if (!pipe.passed && bird.x > pipe.x + pipeWidth) {
                    pipe.passed = true;
                    score++;
                    scoreDisplay.textContent = score;
                }
            });
        }

        // Update ground offset
        function updateGround() {
            groundOffset = (groundOffset + pipeSpeed) % 30;
        }

        // Game loop
        function gameLoop(timestamp) {
            if (!gameRunning) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawClouds();
            updateClouds();

            drawPipes();
            updatePipes(timestamp);

            drawBird();
            updateBird();

            drawGround();
            updateGround();

            checkCollisions();

            animationId = requestAnimationFrame(gameLoop);
        }

        // Start game
        function startGame() {
            gameRunning = true;
            score = 0;
            scoreDisplay.textContent = '0';
            pipes.length = 0;
            bird.y = canvas.height / 2;
            bird.velocity = 0;
            lastPipeSpawn = performance.now();
            initClouds();

            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';

            gameLoop(performance.now());
        }

        // Game over
        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(animationId);

            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('flappyBestScore', bestScore);
            }

            finalScoreSpan.textContent = score;
            bestScoreSpan.textContent = bestScore;
            gameOverScreen.style.display = 'flex';
        }

        // Jump
        function jump() {
            if (gameRunning) {
                bird.velocity = bird.jumpStrength;
            }
        }

        // Event listeners
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (!gameRunning && startScreen.style.display !== 'none') {
                    startGame();
                } else if (!gameRunning && gameOverScreen.style.display !== 'none') {
                    startGame();
                } else {
                    jump();
                }
            }
        });

        canvas.addEventListener('click', jump);

        // Initial render
        initClouds();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawClouds();
        drawBird();
        drawGround();
    </script>
</body>
</html>
