<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird - First Version</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        
        .game-container {
            position: relative;
            width: 1280px;
            height: 720px;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 50%, #98D8AA 100%);
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }
        
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        .ui-overlay {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 32px;
            font-weight: bold;
            color: #333;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        
        .start-screen, .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 60px 80px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        
        .start-screen h1, .game-over h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #2c3e50;
        }
        
        .start-screen p, .game-over p {
            font-size: 18px;
            color: #666;
            margin-bottom: 30px;
        }
        
        .start-btn, .restart-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 18px 50px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .start-btn:hover, .restart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        
        .start-btn:active, .restart-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas" width="1280" height="720"></canvas>
        
        <div class="ui-overlay" id="scoreDisplay">0</div>
        
        <div class="start-screen" id="startScreen">
            <h1>🐦 Flappy Bird</h1>
            <p>Press SPACE or Click to Flap</p>
            <button class="start-btn" onclick="startGame()">Start Game</button>
        </div>
        
        <div class="game-over" id="gameOver" style="display: none;">
            <h1>Game Over!</h1>
            <p>Score: <span id="finalScore">0</span></p>
            <button class="restart-btn" onclick="startGame()">Try Again</button>
        </div>
    </div>
    
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const startScreen = document.getElementById('startScreen');
        const gameOver = document.getElementById('gameOver');
        const finalScore = document.getElementById('finalScore');
        
        // Game state
        let gameRunning = false;
        let score = 0;
        let highScore = 0;
        
        // Bird properties
        const bird = {
            x: 200,
            y: 360,
            width: 40,
            height: 30,
            velocity: 0,
            gravity: 0.5,
            jump: -8,
            radius: 15
        };
        
        // Pipe properties
        const pipes = {
            width: 80,
            gap: 180,
            dx: 4,
            timer: 0,
            frequency: 120
        };
        
        // Background elements
        let clouds = [];
        let groundOffset = 0;
        
        // Initialize clouds
        function initClouds() {
            clouds = [];
            for (let i = 0; i < 8; i++) {
                clouds.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * 300,
                    size: 30 + Math.random() * 50,
                    speed: 0.5 + Math.random() * 1,
                    opacity: 0.3 + Math.random() * 0.3
                });
            }
        }
        
        // Initialize game
        function initGame() {
            bird.y = 360;
            bird.velocity = 0;
            pipes.list = [];
            pipes.timer = 0;
            score = 0;
            scoreDisplay.textContent = score;
            initClouds();
            gameRunning = false;
            startScreen.style.display = 'block';
            gameOver.style.display = 'none';
        }
        
        // Start game
        function startGame() {
            initGame();
            startScreen.style.display = 'none';
            gameOver.style.display = 'none';
            gameRunning = true;
            gameLoop();
        }
        
        // Create pipe
        function createPipe() {
            const minHeight = 80;
            const maxHeight = canvas.height - pipes.gap - minHeight;
            const height = Math.random() * (maxHeight - minHeight) + minHeight;
            
            pipes.list.push({
                x: canvas.width,
                topHeight: height,
                bottomY: height + pipes.gap,
                passed: false
            });
        }
        
        // Flap
        function flap() {
            if (gameRunning) {
                bird.velocity = bird.jump;
            }
        }
        
        // Collision detection
        function checkCollision() {
            // Ground and ceiling
            if (bird.y + bird.height/2 > canvas.height - 50 || bird.y - bird.height/2 < 0) {
                return true;
            }
            
            // Pipes
            for (let pipe of pipes.list) {
                if (bird.x + bird.radius > pipe.x && bird.x - bird.radius < pipe.x + pipes.width) {
                    if (bird.y - bird.radius < pipe.topHeight || bird.y + bird.radius > pipe.bottomY) {
                        return true;
                    }
                }
            }
            
            return false;
        }
        
        // Update game
        function update() {
            // Update bird
            bird.velocity += bird.gravity;
            bird.y += bird.velocity;
            
            // Update pipes
            pipes.timer++;
            if (pipes.timer >= pipes.frequency) {
                createPipe();
                pipes.timer = 0;
            }
            
            for (let i = pipes.list.length - 1; i >= 0; i--) {
                pipes.list[i].x -= pipes.dx;
                
                // Score
                if (!pipes.list[i].passed && pipes.list[i].x + pipes.width < bird.x) {
                    score++;
                    scoreDisplay.textContent = score;
                    pipes.list[i].passed = true;
                }
                
                // Remove off-screen pipes
                if (pipes.list[i].x + pipes.width < 0) {
                    pipes.list.splice(i, 1);
                }
            }
            
            // Update clouds
            for (let cloud of clouds) {
                cloud.x -= cloud.speed;
                if (cloud.x < -cloud.size) {
                    cloud.x = canvas.width + Math.random() * 100;
                }
            }
            
            // Ground animation
            groundOffset = (groundOffset + pipes.dx) % 50;
            
            // Check collision
            if (checkCollision()) {
                gameRunning = false;
                finalScore.textContent = score;
                gameOver.style.display = 'block';
            }
        }
        
        // Draw bird
        function drawBird() {
            ctx.save();
            ctx.translate(bird.x, bird.y);
            
            // Body
            const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, bird.radius);
            gradient.addColorStop(0, '#FFE66D');
            gradient.addColorStop(1, '#F4D03F');
            ctx.beginPath();
            ctx.arc(0, 0, bird.radius, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();
            
            // Wing
            ctx.beginPath();
            ctx.ellipse(-5, 5, 8, 12, bird.velocity * 0.1, 0, Math.PI * 2);
            ctx.fillStyle = '#E74C3C';
            ctx.fill();
            
            // Eye
            ctx.beginPath();
            ctx.arc(8, -3, 6, 0, Math.PI * 2);
            ctx.fillStyle = 'white';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(10, -3, 3, 0, Math.PI * 2);
            ctx.fillStyle = '#333';
            ctx.fill();
            
            // Beak
            ctx.beginPath();
            ctx.moveTo(15, 0);
            ctx.lineTo(25, 3);
            ctx.lineTo(15, 6);
            ctx.closePath();
            ctx.fillStyle = '#E67E22';
            ctx.fill();
            
            // Tail
            ctx.beginPath();
            ctx.moveTo(-15, 0);
            ctx.lineTo(-25, -5);
            ctx.lineTo(-25, 5);
            ctx.closePath();
            ctx.fillStyle = '#C0392B';
            ctx.fill();
            
            ctx.restore();
        }
        
        // Draw pipe
        function drawPipe(pipe) {
            const pipeGradient = ctx.createLinearGradient(pipe.x, 0, pipe.x + pipes.width, 0);
            pipeGradient.addColorStop(0, '#27AE60');
            pipeGradient.addColorStop(0.5, '#58D68D');
            pipeGradient.addColorStop(1, '#27AE60');
            
            // Top pipe
            ctx.fillStyle = pipeGradient;
            ctx.fillRect(pipe.x, 0, pipes.width, pipe.topHeight);
            
            // Top pipe cap
            ctx.fillStyle = '#229954';
            ctx.fillRect(pipe.x - 5, pipe.topHeight - 30, pipes.width + 10, 30);
            
            // Bottom pipe
            ctx.fillStyle = pipeGradient;
            ctx.fillRect(pipe.x, pipe.bottomY, pipes.width, canvas.height - pipe.bottomY - 50);
            
            // Bottom pipe cap
            ctx.fillStyle = '#229954';
            ctx.fillRect(pipe.x - 5, pipe.bottomY, pipes.width + 10, 30);
            
            // Highlights
            ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.fillRect(pipe.x + 10, 0, 15, pipe.topHeight - 30);
            ctx.fillRect(pipe.x + 10, pipe.bottomY + 30, 15, canvas.height - pipe.bottomY - 80);
        }
        
        // Draw background
        function drawBackground() {
            // Sky gradient
            const skyGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            skyGradient.addColorStop(0, '#87CEEB');
            skyGradient.addColorStop(0.5, '#E0F6FF');
            skyGradient.addColorStop(1, '#98D8AA');
            ctx.fillStyle = skyGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Clouds
            for (let cloud of clouds) {
                ctx.beginPath();
                ctx.arc(cloud.x, cloud.y, cloud.size, 0, Math.PI * 2);
                ctx.arc(cloud.x + cloud.size * 0.7, cloud.y + 10, cloud.size * 0.6, 0, Math.PI * 2);
                ctx.arc(cloud.x + cloud.size * 1.3, cloud.y, cloud.size * 0.5, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${cloud.opacity})`;
                ctx.fill();
            }
            
            // Ground
            const groundGradient = ctx.createLinearGradient(0, canvas.height - 50, 0, canvas.height);
            groundGradient.addColorStop(0, '#27AE60');
            groundGradient.addColorStop(1, '#1E8449');
            ctx.fillStyle = groundGradient;
            ctx.fillRect(0, canvas.height - 50, canvas.width, 50);
            
            // Ground pattern
            ctx.fillStyle = '#1E8449';
            for (let i = -groundOffset; i < canvas.width; i += 50) {
                ctx.beginPath();
                ctx.moveTo(i, canvas.height - 40);
                ctx.lineTo(i + 20, canvas.height - 50);
                ctx.lineTo(i + 25, canvas.height - 50);
                ctx.lineTo(i + 5, canvas.height - 40);
                ctx.closePath();
                ctx.fill();
            }
        }
        
        // Draw score
        function drawScore() {
            ctx.font = 'bold 48px Arial';
            ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
            ctx.textAlign = 'center';
            ctx.fillText(score, canvas.width / 2, 60);
        }
        
        // Draw game
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            drawBackground();
            drawScore();
            
            for (let pipe of pipes.list) {
                drawPipe(pipe);
            }
            
            drawBird();
        }
        
        // Game loop
        function gameLoop() {
            if (gameRunning) {
                update();
                draw();
                requestAnimationFrame(gameLoop);
            }
        }
        
        // Event listeners
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (!gameRunning && startScreen.style.display === 'none') {
                    startGame();
                } else if (gameRunning) {
                    flap();
                }
            }
        });
        
        canvas.addEventListener('click', () => {
            if (gameRunning) {
                flap();
            }
        });
        
        // Start
        initGame();
    </script>
</body>
</html>
