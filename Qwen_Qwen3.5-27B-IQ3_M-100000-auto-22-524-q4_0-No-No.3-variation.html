<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Flappy Bird - Arcade Ultimate</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{margin:0;background:#0d0d0d;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;font-family:'Press Start 2P',monospace}
#game{width:1280px;height:720px;background:linear-gradient(to bottom,#2a1828 0%,#1a0a1e 50%,#0a0a0a 100%);overflow:hidden;position:relative;border:8px solid #ff0055;box-shadow:0 0 60px #ff0055,inset 0 0 60px rgba(255,0,85,0.2);border-radius:15px}
#game::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,transparent 0px,transparent 2px,rgba(0,0,0,0.1) 2px,rgba(0,0,0,0.1) 4px);pointer-events:none;z-index:50}
.bird{position:absolute;width:40px;height:40px;background:#ffcc00;border-radius:50%;border:4px solid #ff6600;box-shadow:0 0 40px #ffcc00,inset 0 0 20px #ffff00;transition:transform 0.1s}
.bird.wing{position:absolute;top:8px;left:-10px;width:25px;height:15px;background:#ff6600;border-radius:50% 50% 0 0;border:3px solid #cc4400;border-bottom:none;transform-origin:top right;animation:flap 0.15s ease-in-out infinite}
@keyframes flap{0%,100%{transform:rotate(0)}50%{transform:rotate(-30deg)}}
.bird.eye{position:absolute;right:5px;top:8px;width:12px;height:18px;background:#fff;border-radius:50%;border:3px solid #cc4400}
.bird.eye::after{content:'';position:absolute;right:2px;top:4px;width:6px;height:10px;background:#000;border-radius:50%}
.bird.beak{position:absolute;right:-8px;top:15px;width:0;height:0;border-top:6px solid transparent;border-bottom:6px solid transparent;border-left:12px solid #ff4400}
.bird.shield{position:absolute;top:-8px;left:-8px;width:56px;height:56px;border:3px solid #00ffff;border-radius:50%;box-shadow:0 0 30px #00ffff,inset 0 0 20px #00ffff;opacity:0;transition:opacity 0.3s}
.bird.shielded .shield{opacity:1}
.powerup{position:absolute;width:50px;height:50px;border-radius:50%;border:3px solid #fff;font-size:24px;text-align:center;line-height:50px;box-shadow:0 0 30px #fff,inset 0 0 20px #fff;animation:pulse 0.5s ease-in-out infinite alternate}
@keyframes pulse{0%{transform:scale(1)}100%{transform:scale(1.2)}}
.powerup.speed{background:radial-gradient(circle,#00ff00,#00aa00);box-shadow:0 0 30px #00ff00,inset 0 0 20px #00ff00}
.powerup.slow{background:radial-gradient(circle,#00ffff,#0099ff);box-shadow:0 0 30px #00ffff,inset 0 0 20px #00ffff}
.powerup.shield{background:radial-gradient(circle,#ff00ff,#aa00aa);box-shadow:0 0 30px #ff00ff,inset 0 0 20px #ff00ff}
.pipe{position:absolute;width:80px;background:linear-gradient(90deg,#2d1828 0px,#ff0055 2px,#ff0055 10px,#ff0055 50px,#ff0055 60px,#ff0055 68px,#2d1828 68px);border:3px solid #ff66aa;box-shadow:0 0 30px #ff0055,inset 0 0 20px rgba(255,0,85,0.3)}
.pipe-left{border-radius:10px 0 0 10px}
.pipe::before{content:'';position:absolute;top:0;left:5px;width:70px;height:100%;background:repeating-linear-gradient(0deg,#ff0055 0px,#ff0055 5px,#ff0055 10px,#2d1828 10px,#2d1828 18px)}
.ground{position:absolute;bottom:0;left:0;width:100%;height:90px;background:linear-gradient(to bottom,#1a0a0a 0%,#0a0000 100%);border-top:4px solid #ff0055;box-shadow:0 0 40px #ff0055}
.ground::before{content:'';position:absolute;top:0;left:0;width:100%;height:35px;background:repeating-linear-gradient(90deg,#ff0055 0px,#ff0055 3px,#2d1828 3px,#2d1828 15px)}
.score{position:absolute;top:25px;left:50%;transform:translateX(-50%);text-align:center;z-index:100}
.score-main{font-size:56px;font-weight:bold;color:#ffcc00;text-shadow:0 0 30px #ffcc00,0 0 60px #ff6600;letter-spacing:10px;display:block}
.score-label{font-size:14px;color:#ff66aa;text-shadow:0 0 10px #ff0055;letter-spacing:5px;display:block;margin-top:5px}
.combo{position:absolute;top:80px;left:50%;transform:translateX(-50%);font-size:24px;color:#00ff00;text-shadow:0 0 20px #00ff00;display:none;z-index:99}
.combo.active{display:block;animation:comboAnim 0.3s ease-out}@keyframes comboAnim{0%{transform:translateX(-50%)scale(0)}100%{transform:translateX(-50%)scale(1)}}
.multiplier{font-size:48px;color:#ffff00;text-shadow:0 0 30px #ffff00}
.game-over{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:linear-gradient(135deg,#1a0a1e 0%,#0a0000 100%);color:#fff;padding:60px 90px;border-radius:20px;text-align:center;display:none;z-index:200;border:4px solid #ff0055;box-shadow:0 0 60px #ff0055,inset 0 0 60px rgba(255,0,85,0.3)}
.game-over h2{font-size:48px;margin-bottom:30px;color:#ffcc00;text-shadow:0 0 30px #ffcc00;animation:glow 1s ease-in-out infinite alternate}
@keyframes glow{0%{text-shadow:0 0 30px #ffcc00}100%{text-shadow:0 0 50px #ffcc00,0 0 80px #ff6600}}
.game-over p{font-size:24px;margin:15px 0;color:#fff;text-shadow:0 0 15px #ff66aa}
.game-over .highlight{color:#ffff00;text-shadow:0 0 20px #ffff00}
.btn{display:inline-block;margin-top:35px;padding:25px 70px;background:linear-gradient(135deg,#ff0055 0%,#aa0033 100%);color:#fff;font-size:22px;font-weight:bold;border:3px solid #ff66aa;border-radius:15px;cursor:pointer;text-decoration:none;transition:all 0.2s;box-shadow:0 0 40px #ff0055}.btn:hover{transform:scale(1.15);box-shadow:0 0 60px #ff0055,0 0 100px #ff0055}
.shake{animation:shake 0.5s ease-in-out}@keyframes shake{0%,100%{transform:translateX(0)}10%,30%,50%,70%,90%{transform:translateX(-10px)}20%,40%,60%,80%{transform:translateX(10px)}}
.speed-mode .pipe{filter:hue-rotate(90deg)}
.slow-mode{animation:slowMo 2s linear}@keyframes slowMo{0%,100%{filter:grayscale(0)}50%{filter:grayscale(0.5)}}
</style></head><body>
<div id="game"><div class="score"><span class="score-main" id="score">0</span><span class="score-label">PASSES</span></div><div class="combo" id="combo">COMBO x<span class="multiplier" id="comboMult">1</span></div><div class="game-over" id="gameOver"><h2>GAME OVER</h2><p>Score: <span class="highlight" id="finalScore">0</span></p><p>Best: <span class="highlight" id="bestScore">0</span></p><p>Combo: <span id="bestCombo">0</span></p><button class="btn" onclick="resetGame()">INSERT COIN</button></div></div>
<script>
const game=document.getElementById('game'),bird=document.createElement('div'),scoreEl=document.getElementById('score'),comboEl=document.getElementById('combo'),comboMultEl=document.getElementById('comboMult'),gameOverEl=document.getElementById('gameOver');
bird.className='bird';bird.style.left='100px';bird.style.top='300px';game.appendChild(bird);
let wing=document.createElement('div');wing.className='bird wing';bird.appendChild(wing);
let eye=document.createElement('div');eye.className='bird eye';bird.appendChild(eye);
let beak=document.createElement('div');beak.className='bird beak';bird.appendChild(beak);
let shield=document.createElement('div');shield.className='bird shield';bird.appendChild(shield);
let gravity=0.7,velocity=0,jumpStrength=-11.5,pipeSpeed=4.5,pipeGap=240,pipeTimer=0,score=0,best=localStorage.getItem('flappyArcadeBest')||0,running=true,interval;
let combo=0,comboTimer=0,hasShield=false,speedBoost=false,slowMo=false,boostTimer=0;
let doubleJump=true,jumpCount=0;
function createPipe(){const pipeH=Math.random()*(game.clientHeight-180-pipeGap-60)+40;const top=document.createElement('div');top.className='pipe pipe-left';top.style.height=pipeH+'px';top.style.top='0';top.style.left='1000px';game.appendChild(top);const bot=document.createElement('div');bot.className='pipe pipe-left';bot.style.height=(game.clientHeight-180-pipeGap-pipeH)+'px';bot.style.top=(pipeH+pipeGap)+'px';bot.style.left='1000px';game.appendChild(bot);return{top,bot,h:pipeH,x:1000};}
function createPowerup(){const types=[{cls:'speed',icon:'⚡'},{cls:'slow',icon:'❄️'},{cls:'shield',icon:'🛡️'}];const t=types[Math.floor(Math.random()*types.length)];const p=document.createElement('div');p.className='powerup '+t.cls;p.textContent=t.icon;p.style.left='1000px';p.style.top=(Math.random()*(game.clientHeight-200)+50)+'px';game.appendChild(p);powerups.push({el:p,type:t.cls,x:1000});}
function update(){if(!running)return;if(slowMo)velocity*=0.9,bird.style.top=(parseFloat(bird.style.top)+velocity*0.5)+'px';else bird.style.top=(parseFloat(bird.style.top)+velocity)+'px';velocity+=gravity*(slowMo?0.5:1);
const rot=Math.max(-30,Math.min(velocity*6,90));bird.style.transform='rotate('+rot+'deg)';
pipeTimer++;const currentPipeGap=Math.max(35,110-Math.floor(score/5));if(pipeTimer%currentPipeGap==0){pipes.push(createPipe());if(Math.random()<0.15)createPowerup()}
comboTimer--;if(comboTimer<=0){combo=0;comboEl.classList.remove('active')}
pipes.forEach((p,i)=>{const px=slowMo?p.x-1:p.x-2.5;p.top.style.left=px+'px';p.bot.style.left=px+'px';p.x=px;if(p.x<bird.getBoundingClientRect().left+40&&p.x>bird.getBoundingClientRect().left+10&&score<30){score++;scoreEl.textContent=score;combo++;comboTimer=40;comboMultEl.textContent=combo;comboEl.classList.add('active')}
if(p.top.getBoundingClientRect().right>bird.getBoundingClientRect().left+10&&p.top.getBoundingClientRect().left<bird.getBoundingClientRect().right-10&&p.top.getBoundingClientRect().bottom>bird.getBoundingClientRect().top+15&&p.top.getBoundingClientRect().top<bird.getBoundingClientRect().bottom-15){if(hasShield){hasShield=false;bird.classList.remove('shielded');score+=10;scoreEl.textContent=score;return}endGame()}
if(p.bot.getBoundingClientRect().top>bird.getBoundingClientRect().top+15&&p.bot.getBoundingClientRect().bottom<bird.getBoundingClientRect().bottom-10&&p.bot.getBoundingClientRect().right>bird.getBoundingClientRect().left+10&&p.bot.getBoundingClientRect().left<bird.getBoundingClientRect().right-10){if(hasShield){hasShield=false;bird.classList.remove('shielded');score+=10;scoreEl.textContent=score;return}endGame()}})
if(parseInt(bird.style.top)>game.clientHeight-125||parseInt(bird.style.top)<-40){endGame()}
powerups.forEach((p,i)=>{p.x=slowMo?p.x-0.5:p.x-1.25;p.el.style.left=p.x+'px';if(p.x>bird.getBoundingClientRect().left-10&&p.x<bird.getBoundingClientRect().left+40&&p.el.getBoundingClientRect().top<bird.getBoundingClientRect().bottom&&p.el.getBoundingClientRect().bottom>bird.getBoundingClientRect().top){activatePowerup(p.type);game.removeChild(p.el);powerups.splice(i,1)}else if(p.x<-60){game.removeChild(p.el);powerups.splice(i,1)}})
if(boostTimer>0){boostTimer--;if(boostTimer<=0){speedBoost=false;slowMo=false;game.classList.remove('speed-mode','slow-mode')}}}
function activatePowerup(type){switch(type){case'speed':speedBoost=true;slowMo=false;game.classList.add('speed-mode');break;case'slow':speedBoost=false;slowMo=true;game.classList.add('slow-mode');break;case'shield':hasShield=true;bird.classList.add('shielded');break}boostTimer=600}
function jump(){if(!running)return;if(jumpCount===0||!doubleJump||jumpCount<2){velocity=jumpStrength;jumpCount++;if(jumpCount===1&&doubleJump){bird.style.background='#ffdd44';bird.style.boxShadow='0 0 50px #ffdd44,inset 0 0 30px #ffff44'}}}
function endGame(){running=false;clearInterval(interval);game.classList.add('shake');gameOverEl.style.display='block';document.getElementById('finalScore').textContent=score;document.getElementById('bestCombo').textContent=combo;const b=Math.max(score,best);localStorage.setItem('flappyArcadeBest',b);document.getElementById('bestScore').textContent=b;setTimeout(()=>game.classList.remove('shake'),500)}
function resetGame(){gameOverEl.style.display='none';bird.style.top='300px';bird.style.transform='rotate(0deg)';bird.style.background='#ffcc00';bird.style.boxShadow='0 0 40px #ffcc00,inset 0 0 20px #ffff00';velocity=0;score=0;scoreEl.textContent='0';combo=0;comboEl.classList.remove('active');doubleJump=true;jumpCount=0;hasShield=false;speedBoost=false;slowMo=false;pipes.forEach(p=>{game.removeChild(p.top);game.removeChild(p.bot)});pipes=[];powerups.forEach(p=>game.removeChild(p.el));powerups=[];running=true;pipeTimer=0;boostTimer=0;interval=setInterval(update,1000/60)}
let pipes=[],powerups=[];
game.addEventListener('keydown',e=>{if(e.code=='Space'||e.key===' '){e.preventDefault();jump()}});
game.addEventListener('mousedown',()=>jump());
game.addEventListener('touchstart',e=>{e.preventDefault();jump()});
window.addEventListener('keydown',e=>{if(e.code==='Shift'&&!e.repeat){hasShield=true;bird.classList.add('shielded');setTimeout(()=>{hasShield=false;bird.classList.remove('shielded')},1000)}});
resetGame();
</script></body></html>
