<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird - Power Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .game-container {
            width: 1280px;
            height: 720px;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 100%);
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .score {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 48px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .combo {
            font-size: 28px;
            color: #FFD700;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 40px 60px;
            border-radius: 16px;
            text-align: center;
            display: none;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            z-index: 20;
        }

        .game-over h2 {
            font-size: 36px;
            color: #333;
            margin-bottom: 20px;
        }

        .game-over p {
            font-size: 24px;
            color: #666;
            margin-bottom: 30px;
        }

        .restart-btn {
            padding: 15px 40px;
            font-size: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .start-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 50px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            z-index: 20;
        }

        .start-screen h1 {
            font-size: 48px;
            color: #333;
            margin-bottom: 20px;
        }

        .start-screen p {
            font-size: 20px;
            color: #666;
            margin-bottom: 30px;
        }

        .start-btn {
            padding: 15px 50px;
            font-size: 22px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 16px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 20px;
            border-radius: 20px;
        }

        .power-up-indicator {
            position: absolute;
            top: 100px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 10;
        }

        .power-up {
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
            animation: powerUpPulse 1s ease-in-out infinite;
        }

        @keyframes powerUpPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas"></canvas>
        <div class="score" id="score">
            <span id="scoreValue">0</span>
            <span class="combo" id="combo">x0</span>
        </div>
        <div class="power-up-indicator" id="powerUpIndicator"></div>
        <div class="game-over" id="gameOver">
            <h2>Game Over!</h2>
            <p>Score: <span id="finalScore">0</span></p>
            <p>High Score: <span id="finalHighScore">0</span></p>
            <button class="restart-btn" id="restartBtn">Play Again</button>
        </div>
        <div class="start-screen" id="startScreen">
            <h1>Flappy Bird - Power Edition</h1>
            <p>Press SPACE or Click to flap</p>
            <p>Collect power-ups for special abilities!</p>
            <button class="start-btn" id="startBtn">Start Game</button>
        </div>
        <div class="instructions">Press SPACE or Click to flap</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = 1280;
        canvas.height = 720;

        let gameState = 'start';
        let score = 0;
        let highScore = localStorage.getItem('flappyHighScore') || 0;
        let combo = 0;
        let comboTimer = 0;

        const gravity = 0.5;
        const flapStrength = -9;
        const pipeWidth = 80;
        const pipeGap = 200;
        const pipeSpeed = 5;
        const pipeFrequency = 100;

        let bird = {
            x: 200,
            y: 360,
            width: 50,
            height: 40,
            velocity: 0,
            rotation: 0,
            shield: false,
            shieldTimer: 0,
            speedBoost: false,
            speedBoostTimer: 0
        };

        let pipes = [];
        let frameCount = 0;
        let particles = [];
        let clouds = [];
        let powerUps = [];
        let screenShake = 0;
        let stars = [];

        // Initialize clouds
        for (let i = 0; i < 5; i++) {
            clouds.push({
                x: Math.random() * canvas.width,
                y: Math.random() * 200 + 50,
                size: Math.random() * 40 + 30,
                speed: Math.random() * 0.5 + 0.2
            });
        }

        // Initialize stars
        for (let i = 0; i < 100; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2 + 1,
                twinkle: Math.random() * Math.PI * 2
            });
        }

        function resetGame() {
            bird = {
                x: 200,
                y: 360,
                width: 50,
                height: 40,
                velocity: 0,
                rotation: 0,
                shield: false,
                shieldTimer: 0,
                speedBoost: false,
                speedBoostTimer: 0
            };
            pipes = [];
            particles = [];
            powerUps = [];
            score = 0;
            combo = 0;
            comboTimer = 0;
            frameCount = 0;
            screenShake = 0;
            document.getElementById('scoreValue').textContent = '0';
            document.getElementById('combo').textContent = 'x0';
            document.getElementById('powerUpIndicator').innerHTML = '';
        }

        function flap() {
            if (gameState === 'start') {
                gameState = 'playing';
                document.getElementById('startScreen').style.display = 'none';
            } else if (gameState === 'playing') {
                bird.velocity = flapStrength;
                createFlapParticles();
            } else if (gameState === 'gameOver') {
                resetGame();
                gameState = 'playing';
                document.getElementById('gameOver').style.display = 'none';
            }
        }

        function createFlapParticles() {
            for (let i = 0; i < 8; i++) {
                particles.push({
                    x: bird.x - bird.width / 2,
                    y: bird.y + bird.height / 2,
                    vx: (Math.random() - 0.5) * 4,
                    vy: Math.random() * 3 + 2,
                    size: Math.random() * 8 + 4,
                    color: `hsl(${Math.random() * 60 + 30}, 100%, 70%)`,
                    life: 1
                });
            }
        }

        function createScoreParticles(x, y) {
            for (let i = 0; i < 15; i++) {
                const angle = (Math.PI * 2 / 15) * i;
                const speed = Math.random() * 5 + 3;
                particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    size: Math.random() * 10 + 6,
                    color: `hsl(${Math.random() * 60 + 40}, 100%, 65%)`,
                    life: 1
                });
            }
        }

        function createShieldParticles() {
            for (let i = 0; i < 20; i++) {
                particles.push({
                    x: bird.x,
                    y: bird.y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6,
                    size: Math.random() * 10 + 5,
                    color: '#00BFFF',
                    life: 1
                });
            }
        }

        function spawnPowerUp() {
            const types = ['shield', 'speedBoost', 'doublePoints'];
            const type = types[Math.floor(Math.random() * types.length)];
            const powerUp = {
                x: canvas.width,
                y: Math.random() * (canvas.height - pipeGap - 150) + 75,
                size: 25,
                type: type,
                rotation: 0
            };
            powerUps.push(powerUp);
        }

        function drawPowerUpIndicator() {
            const indicator = document.getElementById('powerUpIndicator');
            let html = '';

            if (bird.shield) {
                html += '<div class="power-up" style="background: linear-gradient(135deg, #00BFFF, #1E90FF);">🛡️ Shield</div>';
            }
            if (bird.speedBoost) {
                html += '<div class="power-up" style="background: linear-gradient(135deg, #FFD700, #FFA500);">⚡ Speed</div>';
            }

            indicator.innerHTML = html;
        }

        function update() {
            if (gameState !== 'playing') return;

            bird.velocity += gravity;
            bird.y += bird.velocity;
            bird.rotation = Math.min(Math.max(bird.velocity * 3, -30), 90);

            frameCount++;

            if (frameCount % pipeFrequency === 0) {
                pipes.push({
                    x: canvas.width,
                    topHeight: Math.random() * (canvas.height - pipeGap - 150) + 75,
                    bottomY: Math.random() * (canvas.height - pipeGap - 75) + 75 + pipeGap,
                    passed: false
                });
            }

            if (frameCount % 150 === 0) {
                spawnPowerUp();
            }

            if (bird.speedBoost) {
                bird.speedBoostTimer--;
                if (bird.speedBoostTimer <= 0) {
                    bird.speedBoost = false;
                }
            }

            if (bird.shield) {
                bird.shieldTimer--;
                if (bird.shieldTimer <= 0) {
                    bird.shield = false;
                }
            }

            if (comboTimer > 0) {
                comboTimer--;
                if (comboTimer <= 0) {
                    combo = 0;
                    document.getElementById('combo').textContent = 'x0';
                }
            }

            for (let i = 0; i < pipes.length; i++) {
                const speed = bird.speedBoost ? pipeSpeed * 1.5 : pipeSpeed;
                pipes[i].x -= speed;

                if (!pipes[i].passed && pipes[i].x + pipeWidth < bird.x) {
                    pipes[i].passed = true;
                    combo++;
                    comboTimer = 120;
                    const points = bird.speedBoost ? 3 : 1;
                    score += points * (1 + combo * 0.1);
                    document.getElementById('scoreValue').textContent = Math.floor(score);

                    if (combo > 1) {
                        document.getElementById('combo').textContent = `x${combo}`;
                    }

                    createScoreParticles(bird.x, bird.y);
                }

                if (checkCollision(pipes[i])) {
                    if (bird.shield) {
                        bird.shield = false;
                        screenShake = 10;
                        createShieldParticles();
                    } else {
                        gameOver();
                    }
                }
            }

            for (let i = 0; i < powerUps.length; i++) {
                powerUps[i].x -= pipeSpeed;
                powerUps[i].rotation += 0.05;

                if (checkPowerUpCollision(powerUps[i])) {
                    applyPowerUp(powerUps[i]);
                    powerUps.splice(i, 1);
                    i--;
                }
            }

            powerUps = powerUps.filter(p => p.x > -50);

            if (bird.y + bird.height > canvas.height || bird.y < 0) {
                if (bird.shield) {
                    bird.shield = false;
                    bird.y = 0;
                    bird.velocity = 0;
                    screenShake = 5;
                } else {
                    gameOver();
                }
            }

            updateParticles();
            updateClouds();
            updateStars();
            if (screenShake > 0) screenShake *= 0.9;
        }

        function updateParticles() {
            for (let i = 0; i < particles.length; i++) {
                particles[i].x += particles[i].vx;
                particles[i].y += particles[i].vy;
                particles[i].vy += 0.2;
                particles[i].life -= 0.02;
                particles[i].size *= 0.98;
            }
            particles = particles.filter(p => p.life > 0);
        }

        function updateClouds() {
            clouds.forEach(cloud => {
                cloud.x -= cloud.speed;
                if (cloud.x + cloud.size * 2 < 0) {
                    cloud.x = canvas.width + cloud.size;
                    cloud.y = Math.random() * 200 + 50;
                }
            });
        }

        function updateStars() {
            stars.forEach(star => {
                star.twinkle += 0.05;
            });
        }

        function checkCollision(pipe) {
            const birdBox = {
                x: bird.x - bird.width / 2 + 10,
                y: bird.y - bird.height / 2 + 10,
                width: bird.width - 20,
                height: bird.height - 20
            };

            const topPipe = {
                x: pipe.x,
                y: 0,
                width: pipeWidth,
                height: pipe.topHeight
            };

            const bottomPipe = {
                x: pipe.x,
                y: pipe.bottomY,
                width: pipeWidth,
                height: canvas.height - pipe.bottomY
            };

            return (
                birdBox.x < topPipe.x + topPipe.width &&
                birdBox.x + birdBox.width > topPipe.x &&
                birdBox.y < topPipe.y + topPipe.height &&
                birdBox.y + birdBox.height > topPipe.y ||
                birdBox.x < bottomPipe.x + bottomPipe.width &&
                birdBox.x + birdBox.width > bottomPipe.x &&
                birdBox.y < bottomPipe.y + bottomPipe.height &&
                birdBox.y + birdBox.height > bottomPipe.y
            );
        }

        function checkPowerUpCollision(powerUp) {
            const dx = bird.x - powerUp.x;
            const dy = bird.y - powerUp.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            return distance < bird.width / 2 + powerUp.size;
        }

        function applyPowerUp(powerUp) {
            switch (powerUp.type) {
                case 'shield':
                    bird.shield = true;
                    bird.shieldTimer = 300;
                    createShieldParticles();
                    break;
                case 'speedBoost':
                    bird.speedBoost = true;
                    bird.speedBoostTimer = 300;
                    break;
                case 'doublePoints':
                    score *= 2;
                    document.getElementById('scoreValue').textContent = Math.floor(score);
                    createScoreParticles(bird.x, bird.y);
                    break;
            }
            drawPowerUpIndicator();
        }

        function gameOver() {
            gameState = 'gameOver';
            screenShake = 20;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('flappyHighScore', highScore);
            }
            document.getElementById('finalScore').textContent = Math.floor(score);
            document.getElementById('finalHighScore').textContent = Math.floor(highScore);
            document.getElementById('gameOver').style.display = 'block';
        }

        function draw() {
            ctx.save();

            if (screenShake > 0.5) {
                ctx.translate(
                    (Math.random() - 0.5) * screenShake,
                    (Math.random() - 0.5) * screenShake
                );
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawBackground();
            drawParticles();
            drawPipes();
            drawPowerUps();
            drawBird();

            ctx.restore();
        }

        function drawBackground() {
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#87CEEB');
            gradient.addColorStop(1, '#E0F6FF');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Stars
            stars.forEach(star => {
                const brightness = Math.sin(star.twinkle) * 0.5 + 0.5;
                ctx.fillStyle = `rgba(255, 255, 255, ${brightness})`;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            });

            // Clouds
            clouds.forEach(cloud => {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                drawCloud(cloud.x, cloud.y, cloud.size);
            });

            // Ground with gradient
            const groundGradient = ctx.createLinearGradient(0, canvas.height - 50, 0, canvas.height);
            groundGradient.addColorStop(0, '#8B4513');
            groundGradient.addColorStop(1, '#654321');
            ctx.fillStyle = groundGradient;
            ctx.fillRect(0, canvas.height - 50, canvas.width, 50);

            // Grass
            ctx.fillStyle = '#228B22';
            ctx.fillRect(0, canvas.height - 55, canvas.width, 10);

            // Grass detail
            ctx.fillStyle = '#32CD32';
            for (let i = 0; i < canvas.width; i += 20) {
                ctx.beginPath();
                ctx.moveTo(i, canvas.height - 50);
                ctx.lineTo(i + 10, canvas.height - 60);
                ctx.lineTo(i + 20, canvas.height - 50);
                ctx.fill();
            }
        }

        function drawCloud(x, y, size) {
            ctx.beginPath();
            ctx.arc(x, y, size * 0.5, 0, Math.PI * 2);
            ctx.arc(x + size * 0.4, y - size * 0.2, size * 0.4, 0, Math.PI * 2);
            ctx.arc(x + size * 0.8, y, size * 0.5, 0, Math.PI * 2);
            ctx.arc(x + size * 0.4, y + size * 0.1, size * 0.35, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawParticles() {
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
        }

        function drawPipes() {
            pipes.forEach(pipe => {
                const speedMultiplier = bird.speedBoost ? 1.5 : 1;
                const pipeGradient = ctx.createLinearGradient(pipe.x, 0, pipe.x + pipeWidth, 0);
                pipeGradient.addColorStop(0, '#228B22');
                pipeGradient.addColorStop(0.5, '#32CD32');
                pipeGradient.addColorStop(1, '#228B22');

                ctx.fillStyle = pipeGradient;

                const topPipeHeight = pipe.topHeight;
                const bottomY = pipe.bottomY;

                ctx.fillRect(pipe.x, 0, pipeWidth, topPipeHeight);

                ctx.fillStyle = '#8B4513';
                ctx.fillRect(pipe.x - 5, topPipeHeight - 30, pipeWidth + 10, 30);

                ctx.fillStyle = '#32CD32';
                ctx.fillRect(pipe.x, bottomY, pipeWidth, canvas.height - bottomY);

                ctx.fillStyle = '#8B4513';
                ctx.fillRect(pipe.x - 5, bottomY, pipeWidth + 10, 30);

                // Pipe highlights
                ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.fillRect(pipe.x + 5, 0, 10, topPipeHeight - 30);
                ctx.fillRect(pipe.x + 5, bottomY + 30, 10, canvas.height - bottomY - 30);
            });
        }

        function drawPowerUps() {
            powerUps.forEach(p => {
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rotation);

                let color, emoji;
                switch (p.type) {
                    case 'shield':
                        color = '#00BFFF';
                        emoji = '🛡️';
                        break;
                    case 'speedBoost':
                        color = '#FFD700';
                        emoji = '⚡';
                        break;
                    case 'doublePoints':
                        color = '#FF6347';
                        emoji = '✦';
                        break;
                }

                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(0, 0, p.size, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.beginPath();
                ctx.arc(-p.size * 0.3, -p.size * 0.3, p.size * 0.3, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = 'white';
                ctx.font = `${p.size * 1.5}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(emoji, 0, 0);

                ctx.restore();
            });
        }

        function drawBird() {
            ctx.save();
            ctx.translate(bird.x, bird.y);
            ctx.rotate(bird.rotation * Math.PI / 180);

            // Shield effect
            if (bird.shield) {
                ctx.beginPath();
                ctx.arc(0, 0, bird.width / 2 + 10, 0, Math.PI * 2);
                const shieldGradient = ctx.createRadialGradient(0, 0, 0, 0, 0, bird.width / 2 + 15);
                shieldGradient.addColorStop(0, 'rgba(0, 191, 255, 0.8)');
                shieldGradient.addColorStop(1, 'rgba(0, 191, 255, 0.2)');
                ctx.fillStyle = shieldGradient;
                ctx.fill();
                ctx.strokeStyle = '#00BFFF';
                ctx.lineWidth = 3;
                ctx.stroke();
            }

            // Body
            const bodyGradient = ctx.createRadialGradient(0, 0, 0, 0, 0, bird.width / 2);
            bodyGradient.addColorStop(0, '#FFD700');
            bodyGradient.addColorStop(1, '#FFA500');
            ctx.fillStyle = bodyGradient;
            ctx.beginPath();
            ctx.ellipse(0, 0, bird.width / 2, bird.height / 2, 0, 0, Math.PI * 2);
            ctx.fill();

            // Speed boost effect
            if (bird.speedBoost) {
                for (let i = 0; i < 5; i++) {
                    const angle = (Math.PI * 2 / 5) * i;
                    const speed = 20 + i * 5;
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.lineTo(Math.cos(angle) * speed, Math.sin(angle) * speed);
                    ctx.strokeStyle = `rgba(255, 215, 0, ${0.3 - i * 0.05})`;
                    ctx.lineWidth = 5 - i;
                    ctx.stroke();
                }
            }

            // Wing
            ctx.fillStyle = '#FFA500';
            const wingOffset = Math.sin(Date.now() / 50) * 5;
            ctx.beginPath();
            ctx.ellipse(-5, wingOffset, 15, 10, -0.3, 0, Math.PI * 2);
            ctx.fill();

            // Eye
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(12, -8, 10, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = 'black';
            ctx.beginPath();
            ctx.arc(14, -8, 5, 0, Math.PI * 2);
            ctx.fill();

            // Beak
            ctx.fillStyle = '#FF6347';
            ctx.beginPath();
            ctx.moveTo(20, 0);
            ctx.lineTo(35, 5);
            ctx.lineTo(20, 10);
            ctx.closePath();
            ctx.fill();

            ctx.restore();
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                flap();
            }
        });

        canvas.addEventListener('click', flap);

        document.getElementById('startBtn').addEventListener('click', flap);
        document.getElementById('restartBtn').addEventListener('click', flap);

        gameLoop();
    </script>
</body>
</html>
