<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Flap - Cyberpunk Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a15 0%, #1a0a1f 50%, #0a1520 100%);
            font-family: 'Courier New', monospace;
        }
        #gameContainer {
            position: relative;
            width: 960px;
            height: 540px;
            border: 3px solid #00ffff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.3), inset 0 0 50px rgba(0, 255, 255, 0.1);
        }
        canvas {
            display: block;
        }
        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(10, 10, 21, 0.9);
            color: #00ffff;
            z-index: 100;
        }
        #startScreen h1, #gameOverScreen h1 {
            font-size: 56px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { text-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff; }
            50% { text-shadow: 0 0 30px #ff00ff, 0 0 60px #ff00ff; }
        }
        #startScreen p, #gameOverScreen p {
            font-size: 18px;
            margin-bottom: 20px;
            color: #ff00ff;
            text-shadow: 0 0 10px #ff00ff;
        }
        .btn {
            padding: 15px 50px;
            font-size: 24px;
            font-family: 'Courier New', monospace;
            background: transparent;
            color: #00ffff;
            border: 2px solid #00ffff;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            text-shadow: 0 0 10px #00ffff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }
        .btn:hover {
            background: #00ffff;
            color: #0a0a15;
            box-shadow: 0 0 40px #00ffff;
        }
        #score {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 48px;
            color: #00ffff;
            text-shadow: 0 0 20px #00ffff;
            z-index: 10;
        }
        #highScore {
            position: absolute;
            top: 75px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 16px;
            color: #ff00ff;
            text-shadow: 0 0 10px #ff00ff;
            z-index: 10;
        }
        #comboDisplay {
            position: absolute;
            top: 110px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            color: #ffff00;
            text-shadow: 0 0 20px #ffff00;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .combo-active {
            opacity: 1 !important;
            animation: comboPulse 0.3s ease-in-out infinite;
        }
        @keyframes comboPulse {
            0%, 100% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.1); }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="960" height="540"></canvas>
        <div id="score">0</div>
        <div id="highScore">BEST: 0</div>
        <div id="comboDisplay">COMBO x1 +100</div>
        <div id="startScreen">
            <h1>NEON FLAP</h1>
            <p>=== CYBERPUNK EDITION ===</p>
            <p>SPACE or CLICK to Jump</p>
            <button class="btn" onclick="startGame()">INITIATE</button>
        </div>
        <div id="gameOverScreen" style="display: none;">
            <h1>SYSTEM FAILURE</h1>
            <p>FINAL SCORE: <span id="finalScore">0</span></p>
            <p>COMBO BONUS: <span id="comboBonus">0</span></p>
            <button class="btn" onclick="restartGame()">REBOOT</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');
        const highScoreDisplay = document.getElementById('highScore');
        const comboDisplay = document.getElementById('comboDisplay');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreDisplay = document.getElementById('finalScore');
        const comboBonusDisplay = document.getElementById('comboBonus');

        let gameRunning = false;
        let score = 0;
        let highScore = localStorage.getItem('neonFlapHighScore') || 0;
        let combo = 0;
        let comboBonus = 0;
        let screenShake = 0;
        let particles = [];
        let speedParticles = [];
        let clouds = [];
        let stars = [];
        highScoreDisplay.textContent = `BEST: ${highScore}`;

        const bird = {
            x: 150,
            y: 270,
            width: 35,
            height: 25,
            velocity: 0,
            gravity: 0.45,
            jumpStrength: -9,
            rotation: 0,
            color: '#00ffff'
        };

        const pipes = [];
        let pipeWidth = 60;
        let pipeGap = 170;
        let pipeSpeed = 3.5;
        let basePipeSpeed = 3.5;
        const pipeSpawnRate = 140;
        let frameCount = 0;

        // Initialize stars for background
        for (let i = 0; i < 100; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * (canvas.height - 60),
                size: Math.random() * 2 + 0.5,
                twinkle: Math.random() * Math.PI * 2
            });
        }

        // Initialize clouds
        for (let i = 0; i < 5; i++) {
            clouds.push({
                x: Math.random() * canvas.width,
                y: Math.random() * (canvas.height - 150),
                width: 80 + Math.random() * 60,
                height: 20 + Math.random() * 15,
                speed: 0.5 + Math.random() * 0.5
            });
        }

        function drawBackground() {
            // Deep space gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height - 60);
            gradient.addColorStop(0, '#0a0a15');
            gradient.addColorStop(0.5, '#1a0a20');
            gradient.addColorStop(1, '#0a1520');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height - 60);

            // Draw stars
            stars.forEach(star => {
                star.twinkle += 0.05;
                const brightness = 0.5 + Math.sin(star.twinkle) * 0.5;
                ctx.fillStyle = `rgba(255, 255, 255, ${brightness})`;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            });

            // Draw clouds
            ctx.fillStyle = 'rgba(0, 255, 255, 0.1)';
            clouds.forEach(cloud => {
                ctx.fillRect(cloud.x, cloud.y, cloud.width, cloud.height);
                cloud.x -= cloud.speed;
                if (cloud.x + cloud.width < 0) {
                    cloud.x = canvas.width;
                    cloud.y = Math.random() * (canvas.height - 150);
                }
            });

            drawGround();
        }

        function drawGround() {
            // Neon grid ground
            ctx.fillStyle = '#0a0a15';
            ctx.fillRect(0, canvas.height - 60, canvas.width, 60);

            ctx.strokeStyle = '#ff00ff';
            ctx.lineWidth = 2;
            ctx.shadowColor = '#ff00ff';
            ctx.shadowBlur = 10;

            // Horizontal neon line
            ctx.beginPath();
            ctx.moveTo(0, canvas.height - 40);
            ctx.lineTo(canvas.width, canvas.height - 40);
            ctx.stroke();

            // Vertical grid lines
            const gridSize = 40;
            const offset = (frameCount * pipeSpeed) % gridSize;
            for (let x = -offset; x < canvas.width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, canvas.height - 40);
                ctx.lineTo(x - 20, canvas.height);
                ctx.stroke();
            }

            ctx.shadowBlur = 0;
        }

        function drawBird() {
            ctx.save();
            ctx.translate(bird.x + bird.width / 2, bird.y + bird.height / 2);
            bird.rotation = Math.min(Math.max(bird.velocity * 4, -45), 90) * Math.PI / 180;
            ctx.rotate(bird.rotation);

            // Glow effect
            ctx.shadowColor = bird.color;
            ctx.shadowBlur = 20;

            // Main body - cyberpunk triangle
            ctx.fillStyle = bird.color;
            ctx.beginPath();
            ctx.moveTo(bird.width / 2, 0);
            ctx.lineTo(-bird.width / 3, -bird.height / 2);
            ctx.lineTo(-bird.width / 3, bird.height / 2);
            ctx.closePath();
            ctx.fill();

            // Inner core
            ctx.fillStyle = '#ffffff';
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.moveTo(bird.width / 4, 0);
            ctx.lineTo(-bird.width / 6, -bird.height / 4);
            ctx.lineTo(-bird.width / 6, bird.height / 4);
            ctx.closePath();
            ctx.fill();

            // Trail particles
            if (frameCount % 3 === 0) {
                particles.push({
                    x: bird.x,
                    y: bird.y + bird.height / 2,
                    vx: -2 - Math.random() * 2,
                    vy: (Math.random() - 0.5) * 2,
                    life: 30,
                    maxLife: 30,
                    color: bird.color,
                    size: 4 + Math.random() * 3
                });
            }

            ctx.shadowBlur = 0;
            ctx.restore();
        }

        function drawPipes() {
            pipes.forEach(pipe => {
                ctx.shadowColor = '#ff00ff';
                ctx.shadowBlur = 15;

                // Top pipe
                ctx.fillStyle = '#1a0a1f';
                ctx.strokeStyle = '#ff00ff';
                ctx.lineWidth = 3;
                ctx.fillRect(pipe.x, 0, pipeWidth, pipe.top);
                ctx.strokeRect(pipe.x, 0, pipeWidth, pipe.top);

                // Bottom pipe
                ctx.fillRect(pipe.x, pipe.bottom, pipeWidth, canvas.height - pipe.bottom - 40);
                ctx.strokeRect(pipe.x, pipe.bottom, pipeWidth, canvas.height - pipe.bottom - 40);

                // Neon accents
                ctx.fillStyle = '#ff00ff';
                ctx.fillRect(pipe.x + 5, pipe.top - 10, pipeWidth - 10, 10);
                ctx.fillRect(pipe.x + 5, pipe.bottom, pipeWidth - 10, 10);

                ctx.shadowBlur = 0;
            });
        }

        function spawnPipe() {
            const minHeight = 60;
            const maxHeight = canvas.height - pipeGap - minHeight - 40;
            const topHeight = Math.random() * (maxHeight - minHeight) + minHeight;
            pipes.push({
                x: canvas.width,
                top: topHeight,
                bottom: topHeight + pipeGap,
                passed: false
            });
        }

        function createExplosion(x, y, color) {
            for (let i = 0; i < 30; i++) {
                const angle = (Math.PI * 2 / 30) * i;
                const speed = 2 + Math.random() * 4;
                particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 40,
                    maxLife: 40,
                    color: color,
                    size: 3 + Math.random() * 4
                });
            }
        }

        function createScoreParticles() {
            for (let i = 0; i < 20; i++) {
                particles.push({
                    x: canvas.width / 2,
                    y: canvas.height / 2,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 30,
                    maxLife: 30,
                    color: '#ffff00',
                    size: 2 + Math.random() * 3
                });
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life--;

                ctx.globalAlpha = p.life / p.maxLife;
                ctx.fillStyle = p.color;
                ctx.shadowColor = p.color;
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * (p.life / p.maxLife), 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1;

                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }
        }

        function update() {
            bird.velocity += bird.gravity;
            bird.y += bird.velocity;

            if (bird.y + bird.height > canvas.height - 40) {
                bird.y = canvas.height - 40 - bird.height;
                gameOver();
            }
            if (bird.y < 0) {
                bird.y = 0;
                bird.velocity = 0;
            }

            frameCount++;

            // Progressive difficulty
            pipeSpeed = basePipeSpeed + Math.min(score * 0.05, 2);

            if (frameCount % Math.max(90, pipeSpawnRate - score * 2) === 0) {
                spawnPipe();
            }

            for (let i = pipes.length - 1; i >= 0; i--) {
                pipes[i].x -= pipeSpeed;

                if (bird.x + bird.width > pipes[i].x && bird.x < pipes[i].x + pipeWidth) {
                    if (bird.y < pipes[i].top || bird.y + bird.height > pipes[i].bottom) {
                        createExplosion(bird.x + bird.width / 2, bird.y + bird.height / 2, '#ff0000');
                        screenShake = 20;
                        gameOver();
                        return;
                    }
                }

                if (!pipes[i].passed && bird.x > pipes[i].x + pipeWidth) {
                    pipes[i].passed = true;
                    score++;
                    combo++;
                    comboBonus = (combo - 1) * 100;
                    scoreDisplay.textContent = score;

                    // Combo display
                    if (combo > 1) {
                        comboDisplay.textContent = `COMBO x${combo} +${comboBonus}`;
                        comboDisplay.classList.add('combo-active');
                    }

                    createScoreParticles();
                    screenShake = 5;
                }

                if (pipes[i].x + pipeWidth < 0) {
                    pipes.splice(i, 1);
                }
            }
        }

        function draw() {
            // Screen shake effect
            ctx.save();
            if (screenShake > 0) {
                const dx = (Math.random() - 0.5) * screenShake;
                const dy = (Math.random() - 0.5) * screenShake;
                ctx.translate(dx, dy);
                screenShake *= 0.9;
                if (screenShake < 0.5) screenShake = 0;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBackground();
            drawPipes();
            drawBird();
            updateParticles();
            ctx.restore();
        }

        function gameLoop() {
            if (!gameRunning) return;
            update();
            if (gameRunning) {
                draw();
                requestAnimationFrame(gameLoop);
            }
        }

        function startGame() {
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            comboDisplay.classList.remove('combo-active');
            resetGame();
            gameRunning = true;
            gameLoop();
        }

        function restartGame() {
            startGame();
        }

        function resetGame() {
            bird.y = 270;
            bird.velocity = 0;
            bird.rotation = 0;
            pipes.length = 0;
            particles.length = 0;
            score = 0;
            combo = 0;
            comboBonus = 0;
            frameCount = 0;
            pipeSpeed = basePipeSpeed;
            scoreDisplay.textContent = '0';
            comboDisplay.classList.remove('combo-active');
        }

        function gameOver() {
            gameRunning = false;
            const totalScore = score * 100 + comboBonus;
            if (totalScore > highScore) {
                highScore = totalScore;
                localStorage.setItem('neonFlapHighScore', highScore);
                highScoreDisplay.textContent = `BEST: ${highScore}`;
            }
            finalScoreDisplay.textContent = score * 100;
            comboBonusDisplay.textContent = comboBonus;
            gameOverScreen.style.display = 'flex';
        }

        function jump() {
            if (gameRunning) {
                bird.velocity = bird.jumpStrength;
                // Jump particles
                for (let i = 0; i < 5; i++) {
                    particles.push({
                        x: bird.x + bird.width / 2,
                        y: bird.y + bird.height,
                        vx: (Math.random() - 0.5) * 3,
                        vy: Math.random() * 3,
                        life: 20,
                        maxLife: 20,
                        color: '#00ffff',
                        size: 3 + Math.random() * 2
                    });
                }
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (!gameRunning && startScreen.style.display !== 'none') {
                    startGame();
                } else if (!gameRunning && gameOverScreen.style.display !== 'none') {
                    restartGame();
                } else {
                    jump();
                }
            }
        });

        canvas.addEventListener('click', () => {
            if (gameRunning) {
                jump();
            }
        });

        drawBackground();
        drawBird();
    </script>
</body>
</html>
