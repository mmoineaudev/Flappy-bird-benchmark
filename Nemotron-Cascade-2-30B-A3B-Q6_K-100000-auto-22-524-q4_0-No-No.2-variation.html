<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flappy Bird - Variation 2</title>
<style>
  body,html{margin:0;height:100%;overflow:hidden;background:#87CEEB;font-family:sans-serif;}
  canvas{display:block;margin:auto;background:#87CEEB;}
  #overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#000;font-size:24px;background:rgba(255,255,255,0.7);}
</style>
</head>
<body>
<canvas id="game" width="640" height="360"></canvas>
<div id="overlay">Press Space to start</div>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const W=640,H=360;
let bird={x:80,y:H/2,vy:0, radius:12};
let gravity=0.5,lift=-8,friction=0.99;
let pipes=[], pipeWidth=52, pipeGap=130, pipeSpeed=2, score=0;
let state='menu'; // menu, play, gameover
let groundY=H-30;
function reset(){bird.y=H/2;bird.vy=0;pipes=[];score=0;state='play';}
function spawnPipe(){const topHeight=Math.random()* (H-100-40)+20; pipes.push({x:W, topHeight, bottomHeight:H-topHeight-pipeGap});}
function update(){if(state==='play'){
bird.vy+=gravity;bird.vy*=friction;bird.y+=bird.vy;
if(bird.y<bird.radius){bird.y=bird.radius;bird.vy=0;}
if(bird.y>H-bird.radius-30){bird.y=H-bird.radius-30;bird.vy=0;}
if(pipes.length && bird.x+bird.radius>pipes[0].x-pipes[0].topHeight && bird.x-bird.radius<pipes[0].x+pipes[0].topHeight){
if(bird.y-bird.radius<pipes[0].topHeight || bird.y+bird.radius>pipes[0].topHeight+pipeGap) state='gameover';
}
if(pipes.length && bird.x>pipes[0].x+pipeWidth){
pipes.shift();score++;
if(Math.random()<0.02) spawnPipe();
}
if(!pipes.length) spawnPipe();
pipes.forEach(p=>p.x-=pipeSpeed);
}
}
function draw(){ctx.clearRect(0,0,W,H);
// sky gradient
const grad=ctx.createLinearGradient(0,0,0,H);
grad.addColorStop(0,'#87CEEB');
grad.addColorStop(1,'#5c94fc');
ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
// ground
ctx.fillStyle='#654321';
ctx.fillRect(0,groundY,W,H-groundY);
// pipes
for(let p of pipes){
ctx.fillStyle='#0f0';
ctx.fillRect(p.x,p.topHeight,pipeWidth,p.topHeight);
ctx.fillRect(p.x,p.topHeight+pipeGap,pipeWidth,H-(p.topHeight+pipeGap));
}
// bird
ctx.fillStyle='#ff0';
ctx.beginPath();ctx.arc(bird.x,bird.y,bird.radius,0,2*Math.PI);ctx.fill();
// eyes
ctx.fillStyle='#000';
ctx.beginPath();ctx.arc(bird.x-5,bird.y-5,2,0,2*Math.PI);ctx.fill();ctx.beginPath();ctx.arc(bird.x-5,bird.y+5,2,0,2*Math.PI);ctx.fill();
ctx.fillStyle='#000';
ctx.font='12px sans-serif';
ctx.fillText('Score: '+score,20,30);
if(state==='menu' || state==='gameover'){
const overlay=document.getElementById('overlay');
if(state==='menu'){
overlay.textContent='Press Space to start';
}else{
overlay.textContent='Game Over - Press Space to restart';
}
}
}
function loop(){update();draw();if(state==='play') requestAnimationFrame(loop);}
function onKey(e){if(e.code==='Space'){
if(state==='menu' || state==='gameover') reset();
else if(state==='play') bird.vy=lift;
}
}
window.addEventListener('keydown',onKey);
reset();
loop();
</script>
</body>
</html>
