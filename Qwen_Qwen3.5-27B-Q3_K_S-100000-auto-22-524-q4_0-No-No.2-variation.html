<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird - Enhanced</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #game-container {
            position: relative;
            border: 4px solid #5a5a8a;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
        }
        canvas {
            display: block;
        }
        #score {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 48px;
            font-weight: bold;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            pointer-events: none;
        }
        #score-pop {
            position: absolute;
            font-size: 24px;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
        }
        #overlay h1 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        #overlay p {
            font-size: 20px;
            margin-bottom: 20px;
        }
        #start-btn, #restart-btn {
            padding: 15px 40px;
            font-size: 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba8 100%);
            border: none;
            border-radius: 25px;
            color: #fff;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        #start-btn:hover, #restart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        #high-score {
            margin-top: 20px;
            font-size: 18px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game" width="800" height="450"></canvas>
        <div id="score">0</div>
        <div id="score-pop">+1</div>
        <div id="overlay">
            <h1>Flappy Bird</h1>
            <p>Press Space or Click to Jump</p>
            <button id="start-btn">Start Game</button>
            <p id="high-score">Best: 0</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const scorePopEl = document.getElementById('score-pop');
        const overlay = document.getElementById('overlay');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');
        const highScoreEl = document.getElementById('high-score');

        // Game constants
        const GRAVITY = 0.5;
        const JUMP = -8;
        const PIPE_SPEED = 3;
        const PIPE_GAP = 120;
        const PIPE_WIDTH = 60;
        const PIPE_MIN_HEIGHT = 50;
        const PIPE_MAX_HEIGHT = 250;

        // Game state
        let bird = {
            x: 150,
            y: 225,
            radius: 18,
            velocity: 0,
            rotation: 0
        };

        let pipes = [];
        let particles = [];
        let clouds = [];
        let score = 0;
        let highScore = localStorage.getItem('flappyHighScore') || 0;
        let gameRunning = false;
        let animationId;
        let frameCount = 0;
        let dayPhase = 0; // 0-1 for day/night cycle

        highScoreEl.textContent = `Best: ${highScore}`;

        function initGame() {
            bird.y = 225;
            bird.velocity = 0;
            bird.rotation = 0;
            pipes = [];
            particles = [];
            clouds = [];
            score = 0;
            frameCount = 0;
            dayPhase = 0;
            scoreEl.textContent = '0';
            
            // Initial clouds
            for (let i = 0; i < 5; i++) {
                clouds.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * 150 + 20,
                    size: Math.random() * 30 + 30,
                    speed: Math.random() * 0.5 + 0.3
                });
            }

            // Initial pipes
            spawnPipe(100);
            spawnPipe(350);
            spawnPipe(600);
        }

        function spawnPipe(x) {
            const gapY = Math.random() * (canvas.height - PIPE_GAP - PIPE_MIN_HEIGHT * 2) + PIPE_MIN_HEIGHT;
            pipes.push({
                x: x,
                gapY: gapY,
                passed: false
            });
        }

        function createJumpParticles() {
            for (let i = 0; i < 8; i++) {
                particles.push({
                    x: bird.x - 10,
                    y: bird.y + 10,
                    vx: (Math.random() - 0.5) * 3,
                    vy: (Math.random() - 0.5) * 3 - 2,
                    life: 1,
                    size: Math.random() * 4 + 2
                });
            }
        }

        function jump() {
            if (!gameRunning) return;
            bird.velocity = JUMP;
            createJumpParticles();
        }

        function update() {
            // Day/night cycle
            dayPhase = (frameCount % 600) / 600;

            // Bird physics
            bird.velocity += GRAVITY;
            bird.y += bird.velocity;

            // Bird rotation based on velocity
            bird.rotation = Math.min(Math.PI / 4, Math.max(-Math.PI / 4, bird.velocity * 0.1));

            // Floor/ceiling collision
            if (bird.y + bird.radius > canvas.height - 20 || bird.y - bird.radius < 0) {
                gameOver();
                return;
            }

            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.1; // gravity
                p.life -= 0.02;
                if (p.life <= 0) particles.splice(i, 1);
            }

            // Update clouds
            for (const cloud of clouds) {
                cloud.x -= cloud.speed;
                if (cloud.x + cloud.size * 2 < -50) {
                    cloud.x = canvas.width + 50;
                    cloud.y = Math.random() * 150 + 20;
                }
            }

            // Pipe movement
            frameCount++;
            if (frameCount % 90 === 0) {
                const lastPipe = pipes[pipes.length - 1];
                spawnPipe(lastPipe.x + 250);
            }

            for (let i = pipes.length - 1; i >= 0; i--) {
                pipes[i].x -= PIPE_SPEED;

                // Collision detection
                const pipe = pipes[i];
                const topPipeBottom = pipe.gapY;
                const bottomPipeTop = pipe.gapY + PIPE_GAP;

                if (bird.x + bird.radius > pipe.x && 
                    bird.x - bird.radius < pipe.x + PIPE_WIDTH) {
                    
                    if (bird.y - bird.radius < topPipeBottom ||
                        bird.y + bird.radius > bottomPipeTop) {
                        gameOver();
                        return;
                    }
                }

                // Score update
                if (!pipe.passed && bird.x > pipe.x + PIPE_WIDTH) {
                    pipe.passed = true;
                    score++;
                    scoreEl.textContent = score;
                    showScorePop();
                }

                // Remove off-screen pipes
                if (pipe.x + PIPE_WIDTH < -100) {
                    pipes.splice(i, 1);
                }
            }
        }

        function showScorePop() {
            scorePopEl.textContent = `+${score}`;
            scorePopEl.style.left = (bird.x - 20) + 'px';
            scorePopEl.style.top = (bird.y - 40) + 'px';
            scorePopEl.style.opacity = '1';
            scorePopEl.style.transform = 'scale(1.2) translateY(-10px)';
            
            setTimeout(() => {
                scorePopEl.style.opacity = '0';
                scorePopEl.style.transform = 'scale(1) translateY(0)';
            }, 500);
        }

        function drawBackground() {
            // Day/night sky gradient
            const skyColors = [
                { day: '#87CEEB', night: '#0a0a20' },
                { day: '#E0F6FF', night: '#1a1a40' }
            ];

            const t = Math.sin(dayPhase * Math.PI);
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            
            for (const [i, colors] of skyColors.entries()) {
                const stop = i === 0 ? 0 : 1;
                const alpha = (t + 1) / 2;
                const r1 = parseInt(colors.day.slice(1, 3), 16);
                const g1 = parseInt(colors.day.slice(3, 5), 16);
                const b1 = parseInt(colors.day.slice(5, 7), 16);
                const r2 = parseInt(colors.night.slice(1, 3), 16);
                const g2 = parseInt(colors.night.slice(3, 5), 16);
                const b2 = parseInt(colors.night.slice(5, 7), 16);
                
                const r = Math.round(r1 * alpha + r2 * (1 - alpha));
                const g = Math.round(g1 * alpha + g2 * (1 - alpha));
                const b = Math.round(b1 * alpha + b2 * (1 - alpha));
                
                gradient.addColorStop(stop, `rgb(${r}, ${g}, ${b})`);
            }
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Sun/Moon
            const celestialY = 50 + Math.sin(dayPhase * Math.PI) * 50;
            const celestialX = 650 + Math.sin(dayPhase * Math.PI) * 50;
            
            ctx.beginPath();
            ctx.arc(celestialX, celestialY, 30, 0, Math.PI * 2);
            const celestialAlpha = (Math.sin(dayPhase * Math.PI) + 1) / 2;
            ctx.fillStyle = celestialAlpha > 0.5 
                ? `rgba(255, 200, 50, ${celestialAlpha})` 
                : `rgba(200, 200, 255, ${1 - celestialAlpha + 0.2})`;
            ctx.fill();

            // Clouds
            ctx.fillStyle = `rgba(255, 255, 255, ${0.6 + 0.4 * ((Math.sin(dayPhase * Math.PI) + 1) / 2)})`;
            for (const cloud of clouds) {
                ctx.beginPath();
                ctx.arc(cloud.x, cloud.y, cloud.size, 0, Math.PI * 2);
                ctx.arc(cloud.x + cloud.size * 0.6, cloud.y - cloud.size * 0.3, cloud.size * 0.7, 0, Math.PI * 2);
                ctx.arc(cloud.x + cloud.size * 0.4, cloud.y + cloud.size * 0.2, cloud.size * 0.6, 0, Math.PI * 2);
                ctx.fill();
            }

            // Ground
            ctx.fillStyle = '#5a3a2a';
            ctx.fillRect(0, canvas.height - 20, canvas.width, 20);
            ctx.fillStyle = '#3a7a3a';
            ctx.fillRect(0, canvas.height - 25, canvas.width, 5);
        }

        function draw() {
            drawBackground();

            // Pipes with gradient
            for (const pipe of pipes) {
                const pipeGradient = ctx.createLinearGradient(pipe.x, 0, pipe.x + PIPE_WIDTH, 0);
                pipeGradient.addColorStop(0, '#2d5a2d');
                pipeGradient.addColorStop(0.5, '#4CAF50');
                pipeGradient.addColorStop(1, '#2d5a2d');

                ctx.fillStyle = pipeGradient;
                
                // Top pipe
                const topPipeHeight = pipe.gapY;
                ctx.fillRect(pipe.x, 0, PIPE_WIDTH, topPipeHeight);
                
                // Top pipe cap
                ctx.fillRect(pipe.x - 5, topPipeHeight - 20, PIPE_WIDTH + 10, 20);
                
                // Bottom pipe
                const bottomPipeY = pipe.gapY + PIPE_GAP;
                const bottomPipeHeight = canvas.height - bottomPipeY - 20;
                ctx.fillRect(pipe.x, bottomPipeY, PIPE_WIDTH, bottomPipeHeight);

                // Bottom pipe cap
                ctx.fillRect(pipe.x - 5, bottomPipeY, PIPE_WIDTH + 10, 20);

                // Pipe highlights
                ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.fillRect(pipe.x + 5, 0, 10, topPipeHeight - 20);
                ctx.fillRect(pipe.x + 5, bottomPipeY + 20, 10, bottomPipeHeight - 20);
            }

            // Particles
            for (const p of particles) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 200, 100, ${p.life})`;
                ctx.fill();
            }

            // Bird with rotation
            ctx.save();
            ctx.translate(bird.x, bird.y);
            ctx.rotate(bird.rotation);

            // Bird body
            ctx.beginPath();
            ctx.arc(0, 0, bird.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#FFD700';
            ctx.fill();
            ctx.strokeStyle = '#FFA500';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Bird eye
            ctx.beginPath();
            ctx.arc(8, -6, 5, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(10, -6, 2, 0, Math.PI * 2);
            ctx.fillStyle = '#000';
            ctx.fill();

            // Bird beak
            ctx.beginPath();
            ctx.moveTo(12, 2);
            ctx.lineTo(22, 6);
            ctx.lineTo(12, 10);
            ctx.fillStyle = '#FF6347';
            ctx.fill();

            // Bird wing
            ctx.beginPath();
            ctx.ellipse(-5, 5, 8, 5, Math.PI / 6, 0, Math.PI * 2);
            ctx.fillStyle = '#FFA500';
            ctx.fill();

            ctx.restore();
        }

        function gameLoop() {
            if (!gameRunning) return;
            update();
            if (gameRunning) {
                draw();
                animationId = requestAnimationFrame(gameLoop);
            }
        }

        function startGame() {
            gameRunning = true;
            overlay.style.display = 'none';
            initGame();
            draw();
            gameLoop();
        }

        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(animationId);

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('flappyHighScore', highScore);
            }

            overlay.innerHTML = `
                <h1>Game Over!</h1>
                <p>Score: ${score}</p>
                <button id="restart-btn">Play Again</button>
                <p id="high-score">Best: ${highScore}</p>
            `;
            overlay.style.display = 'flex';

            // Rebind restart button
            document.getElementById('restart-btn').addEventListener('click', startGame);
        }

        // Event listeners
        startBtn.addEventListener('click', startGame);
        
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                if (gameRunning) {
                    jump();
                } else if (overlay.style.display !== 'none' && document.getElementById('restart-btn')) {
                    startGame();
                } else if (overlay.style.display !== 'none' && document.getElementById('start-btn')) {
                    startGame();
                }
            }
        });

        canvas.addEventListener('click', jump);

        // Initial draw
        drawBackground();
    </script>
</body>
</html>
