<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #game-container {
            position: relative;
            border: 4px solid #00d9ff;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 217, 255, 0.5);
        }
        canvas {
            display: block;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="450"></canvas>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game constants
        const GRAVITY = 0.5;
        const FLAP_STRENGTH = -8;
        const PIPE_SPEED = 3;
        const PIPE_SPAWN_RATE = 90;
        const PIPE_GAP = 150;

        // Game state
        let frames = 0;
        let score = 0;
        let highScore = localStorage.getItem('flappyHighScore') || 0;
        let gameOver = false;

        // Bird
        const bird = {
            x: 100,
            y: canvas.height / 2,
            width: 34,
            height: 24,
            velocity: 0,
            color: '#ffd93d',
            
            draw() {
                // Body
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.ellipse(this.x + this.width/2, this.y + this.height/2, this.width/2, this.height/2, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // Eye
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(this.x + this.width - 8, this.y + 8, 6, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(this.x + this.width - 6, this.y + 8, 3, 0, Math.PI * 2);
                ctx.fill();
                
                // Wing
                ctx.fillStyle = '#f4c430';
                ctx.beginPath();
                ctx.ellipse(this.x + 10, this.y + 16, 8, 5, -0.3, 0, Math.PI * 2);
                ctx.fill();
                
                // Beak
                ctx.fillStyle = '#ff6b6b';
                ctx.beginPath();
                ctx.moveTo(this.x + this.width - 2, this.y + 12);
                ctx.lineTo(this.x + this.width + 8, this.y + 14);
                ctx.lineTo(this.x + this.width - 2, this.y + 18);
                ctx.fill();
            },
            
            update() {
                this.velocity += GRAVITY;
                this.y += this.velocity;
                
                // Floor collision
                if (this.y + this.height >= canvas.height - 20) {
                    this.y = canvas.height - 20 - this.height;
                    gameOver = true;
                }
                
                // Ceiling collision
                if (this.y < 0) {
                    this.y = 0;
                    this.velocity = 0;
                }
            },
            
            flap() {
                this.velocity = FLAP_STRENGTH;
            }
        };

        // Pipes
        const pipes = [];
        
        class Pipe {
            constructor() {
                this.x = canvas.width;
                this.width = 60;
                this.gapY = Math.random() * (canvas.height - PIPE_GAP - 100) + 50;
                this.passed = false;
            }
            
            draw() {
                ctx.fillStyle = '#2ecc71';
                ctx.strokeStyle = '#27ae60';
                ctx.lineWidth = 3;
                
                // Top pipe
                ctx.fillRect(this.x, 0, this.width, this.gapY);
                ctx.strokeRect(this.x, 0, this.width, this.gapY);
                
                // Bottom pipe
                const bottomPipeY = this.gapY + PIPE_GAP;
                const bottomPipeHeight = canvas.height - bottomPipeY - 20;
                ctx.fillRect(this.x, bottomPipeY, this.width, bottomPipeHeight);
                ctx.strokeRect(this.x, bottomPipeY, this.width, bottomPipeHeight);
            }
            
            update() {
                this.x -= PIPE_SPEED;
            }
        }

        // Background
        function drawBackground() {
            // Sky gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#87CEEB');
            gradient.addColorStop(1, '#E0F6FF');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Clouds
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            for (let i = 0; i < 5; i++) {
                const x = ((frames * 0.5 + i * 200) % (canvas.width + 100)) - 50;
                const y = 30 + i * 15;
                ctx.beginPath();
                ctx.arc(x, y, 20, 0, Math.PI * 2);
                ctx.arc(x + 15, y - 10, 25, 0, Math.PI * 2);
                ctx.arc(x + 35, y, 20, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Ground
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(0, canvas.height - 20, canvas.width, 20);
            ctx.fillStyle = '#228B22';
            ctx.fillRect(0, canvas.height - 25, canvas.width, 5);
        }

        // Score display
        function drawScore() {
            ctx.fillStyle = '#fff';
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 3;
            ctx.font = 'bold 48px Arial';
            ctx.textAlign = 'center';
            ctx.strokeText(score, canvas.width / 2, 60);
            ctx.fillText(score, canvas.width / 2, 60);
            
            // High score
            ctx.font = '16px Arial';
            ctx.strokeText(`High: ${highScore}`, canvas.width / 2 + 90, 60);
            ctx.fillText(`High: ${highScore}`, canvas.width / 2 + 90, 60);
        }

        // Game over screen
        function drawGameOver() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#fff';
            ctx.textAlign = 'center';
            
            ctx.font = 'bold 48px Arial';
            ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 40);
            
            ctx.font = '28px Arial';
            ctx.fillText(`Score: ${score}`, canvas.width / 2, canvas.height / 2 + 10);
            ctx.fillText(`High Score: ${highScore}`, canvas.width / 2, canvas.height / 2 + 50);
            
            ctx.font = '20px Arial';
            ctx.fillText('Press SPACE to restart', canvas.width / 2, canvas.height / 2 + 100);
        }

        // Collision detection
        function checkCollision(pipe) {
            // Check if bird passed the pipe horizontally
            if (bird.x + bird.width > pipe.x && bird.x < pipe.x + pipe.width) {
                // Check vertical collision (hit top or bottom pipe)
                if (bird.y < pipe.gapY || bird.y + bird.height > pipe.gapY + PIPE_GAP) {
                    return true;
                }
            }
            return false;
        }

        // Main game loop
        function gameLoop() {
            if (!gameOver) {
                // Spawn pipes
                if (frames % PIPE_SPAWN_RATE === 0) {
                    pipes.push(new Pipe());
                }
                
                // Update pipes
                for (let i = pipes.length - 1; i >= 0; i--) {
                    pipes[i].update();
                    
                    // Check collision
                    if (checkCollision(pipes[i])) {
                        gameOver = true;
                    }
                    
                    // Score
                    if (!pipes[i].passed && bird.x > pipes[i].x + pipes[i].width) {
                        pipes[i].passed = true;
                        score++;
                    }
                    
                    // Remove off-screen pipes
                    if (pipes[i].x + pipes[i].width < 0) {
                        pipes.splice(i, 1);
                    }
                }
                
                bird.update();
                frames++;
            }
            
            // Draw everything
            drawBackground();
            pipes.forEach(pipe => pipe.draw());
            bird.draw();
            drawScore();
            
            if (gameOver) {
                drawGameOver();
            }
            
            requestAnimationFrame(gameLoop);
        }

        // Input handling
        function handleInput(e) {
            if (e.code === 'Space' || e.type === 'keydown' && e.key === ' ') {
                e.preventDefault();
                if (gameOver) {
                    // Reset game
                    bird.y = canvas.height / 2;
                    bird.velocity = 0;
                    pipes.length = 0;
                    score = 0;
                    frames = 0;
                    gameOver = false;
                } else {
                    bird.flap();
                }
            }
        }

        document.addEventListener('keydown', handleInput);
        document.addEventListener('click', () => {
            if (gameOver) {
                bird.y = canvas.height / 2;
                bird.velocity = 0;
                pipes.length = 0;
                score = 0;
                frames = 0;
                gameOver = false;
            } else {
                bird.flap();
            }
        });

        // Start game
        gameLoop();
    </script>
</body>
</html>
