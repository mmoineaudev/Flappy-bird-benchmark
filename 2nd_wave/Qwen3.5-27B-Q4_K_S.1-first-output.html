<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird Clone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #gameContainer {
            position: relative;
        }
        #gameCanvas {
            border: 4px solid #4a4a6a;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(74, 74, 106, 0.5);
        }
        #score {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 36px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 10;
        }
        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 24px;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 10;
        }
        #message.hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="score">0</div>
        <div id="message">Press SPACE or Click to Start</div>
        <canvas id="gameCanvas" width="800" height="450"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const messageEl = document.getElementById('message');

        // Game constants
        const GRAVITY = 0.5;
        const JUMP_STRENGTH = -8;
        const PIPE_SPEED = 3;
        const PIPE_SPAWN_RATE = 90;
        const PIPE_GAP = 150;

        // Game state
        let bird = {
            x: 100,
            y: canvas.height / 2,
            width: 30,
            height: 30,
            velocity: 0,
            color: '#ff6b6b'
        };
        let pipes = [];
        let score = 0;
        let frameCount = 0;
        let gameRunning = false;
        let gameOver = false;

        // Bird drawing
        function drawBird() {
            // Body
            ctx.fillStyle = bird.color;
            ctx.beginPath();
            ctx.arc(bird.x + bird.width/2, bird.y + bird.height/2, bird.width/2, 0, Math.PI * 2);
            ctx.fill();

            // Eye
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(bird.x + bird.width/2 + 8, bird.y + bird.height/2 - 8, 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(bird.x + bird.width/2 + 10, bird.y + bird.height/2 - 8, 4, 0, Math.PI * 2);
            ctx.fill();

            // Beak
            ctx.fillStyle = '#ffa500';
            ctx.beginPath();
            ctx.moveTo(bird.x + bird.width/2 + 12, bird.y + bird.height/2 + 2);
            ctx.lineTo(bird.x + bird.width/2 + 22, bird.y + bird.height/2 + 6);
            ctx.lineTo(bird.x + bird.width/2 + 12, bird.y + bird.height/2 + 10);
            ctx.fill();

            // Wing
            ctx.fillStyle = '#ff8e8e';
            ctx.beginPath();
            ctx.ellipse(bird.x + bird.width/2 - 5, bird.y + bird.height/2 + 5, 10, 6, -0.3, 0, Math.PI * 2);
            ctx.fill();
        }

        // Pipe drawing
        function drawPipe(pipe) {
            const gradient = ctx.createLinearGradient(pipe.x, 0, pipe.x + pipe.width, 0);
            gradient.addColorStop(0, '#2ecc71');
            gradient.addColorStop(0.5, '#27ae60');
            gradient.addColorStop(1, '#229954');

            ctx.fillStyle = gradient;

            // Top pipe
            ctx.fillRect(pipe.x, 0, pipe.width, pipe.topHeight);
            ctx.fillRect(pipe.x - 5, pipe.topHeight - 20, pipe.width + 10, 20);

            // Bottom pipe
            ctx.fillRect(pipe.x, pipe.bottomY, pipe.width, canvas.height - pipe.bottomY);
            ctx.fillRect(pipe.x - 5, pipe.bottomY, pipe.width + 10, 20);
        }

        // Background
        function drawBackground() {
            // Sky gradient
            const skyGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            skyGradient.addColorStop(0, '#87CEEB');
            skyGradient.addColorStop(1, '#E0F6FF');
            ctx.fillStyle = skyGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Clouds
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            for (let i = 0; i < 5; i++) {
                const x = ((frameCount * 0.5 + i * 200) % (canvas.width + 100)) - 50;
                const y = 50 + Math.sin(frameCount * 0.01 + i) * 20;
                ctx.beginPath();
                ctx.arc(x, y, 30, 0, Math.PI * 2);
                ctx.arc(x + 25, y - 10, 35, 0, Math.PI * 2);
                ctx.arc(x + 50, y, 30, 0, Math.PI * 2);
                ctx.fill();
            }

            // Ground
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(0, canvas.height - 20, canvas.width, 20);
            ctx.fillStyle = '#228B22';
            ctx.fillRect(0, canvas.height - 25, canvas.width, 5);
        }

        // Update game
        function update() {
            if (!gameRunning) return;

            // Bird physics
            bird.velocity += GRAVITY;
            bird.y += bird.velocity;

            // Spawn pipes
            if (frameCount % PIPE_SPAWN_RATE === 0) {
                const topHeight = Math.random() * (canvas.height - PIPE_GAP - 100) + 50;
                pipes.push({
                    x: canvas.width,
                    width: 60,
                    topHeight: topHeight,
                    bottomY: topHeight + PIPE_GAP,
                    passed: false
                });
            }

            // Update pipes
            pipes.forEach(pipe => {
                pipe.x -= PIPE_SPEED;
            });
            pipes = pipes.filter(pipe => pipe.x + pipe.width > 0);

            // Collision detection
            pipes.forEach(pipe => {
                // Check horizontal overlap
                if (bird.x + bird.width > pipe.x && bird.x < pipe.x + pipe.width) {
                    // Check vertical collision (hit top or bottom pipe)
                    if (bird.y < pipe.topHeight || bird.y + bird.height > pipe.bottomY) {
                        endGame();
                    }
                }

                // Score
                if (!pipe.passed && bird.x > pipe.x + pipe.width) {
                    pipe.passed = true;
                    score++;
                    scoreEl.textContent = score;
                }
            });

            // Floor/Ceiling collision
            if (bird.y + bird.height > canvas.height - 20 || bird.y < 0) {
                endGame();
            }

            frameCount++;
        }

        // Draw game
        function draw() {
            drawBackground();
            pipes.forEach(drawPipe);
            drawBird();
        }

        // Game loop
        function gameLoop() {
            update();
            draw();
            if (gameRunning) {
                requestAnimationFrame(gameLoop);
            }
        }

        // Start game
        function startGame() {
            bird = {
                x: 100,
                y: canvas.height / 2,
                width: 30,
                height: 30,
                velocity: 0,
                color: '#ff6b6b'
            };
            pipes = [];
            score = 0;
            frameCount = 0;
            gameRunning = true;
            gameOver = false;
            scoreEl.textContent = '0';
            messageEl.classList.add('hidden');
            gameLoop();
        }

        // End game
        function endGame() {
            gameRunning = false;
            gameOver = true;
            messageEl.textContent = 'Game Over! Score: ' + score + '\nPress SPACE to restart';
            messageEl.classList.remove('hidden');
        }

        // Jump
        function jump() {
            if (!gameRunning && !gameOver) {
                startGame();
            } else if (gameOver) {
                startGame();
            } else {
                bird.velocity = JUMP_STRENGTH;
            }
        }

        // Event listeners
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                jump();
            }
        });

        canvas.addEventListener('click', jump);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            jump();
        });

        // Initial draw
        drawBackground();
        drawBird();
    </script>
</body>
</html>
