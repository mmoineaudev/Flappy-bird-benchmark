<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #game-container {
            position: relative;
            border: 4px solid #4a4a6a;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        canvas {
            display: block;
        }
        #score {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 48px;
            font-weight: bold;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            pointer-events: none;
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
        }
        #overlay h1 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        #overlay p {
            font-size: 20px;
            margin-bottom: 30px;
        }
        #start-btn, #restart-btn {
            padding: 15px 40px;
            font-size: 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba8 100%);
            border: none;
            border-radius: 25px;
            color: #fff;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        #start-btn:hover, #restart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        #high-score {
            margin-top: 20px;
            font-size: 18px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game" width="800" height="450"></canvas>
        <div id="score">0</div>
        <div id="overlay">
            <h1>Flappy Bird</h1>
            <p>Press Space or Click to Jump</p>
            <button id="start-btn">Start Game</button>
            <p id="high-score">Best: 0</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const overlay = document.getElementById('overlay');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');
        const highScoreEl = document.getElementById('high-score');

        // Game constants
        const GRAVITY = 0.5;
        const JUMP = -8;
        const PIPE_SPEED = 3;
        const PIPE_GAP = 120;
        const PIPE_WIDTH = 60;
        const PIPE_MIN_HEIGHT = 50;
        const PIPE_MAX_HEIGHT = 250;

        // Game state
        let bird = {
            x: 150,
            y: 225,
            radius: 18,
            velocity: 0
        };

        let pipes = [];
        let score = 0;
        let highScore = localStorage.getItem('flappyHighScore') || 0;
        let gameRunning = false;
        let animationId;
        let frameCount = 0;

        highScoreEl.textContent = `Best: ${highScore}`;

        function initGame() {
            bird.y = 225;
            bird.velocity = 0;
            pipes = [];
            score = 0;
            frameCount = 0;
            scoreEl.textContent = '0';
            
            // Initial pipes
            spawnPipe(100);
            spawnPipe(350);
            spawnPipe(600);
        }

        function spawnPipe(x) {
            const gapY = Math.random() * (canvas.height - PIPE_GAP - PIPE_MIN_HEIGHT * 2) + PIPE_MIN_HEIGHT;
            pipes.push({
                x: x,
                gapY: gapY,
                passed: false
            });
        }

        function jump() {
            if (!gameRunning) return;
            bird.velocity = JUMP;
        }

        function update() {
            // Bird physics
            bird.velocity += GRAVITY;
            bird.y += bird.velocity;

            // Floor/ceiling collision
            if (bird.y + bird.radius > canvas.height || bird.y - bird.radius < 0) {
                gameOver();
                return;
            }

            // Pipe movement
            frameCount++;
            if (frameCount % 90 === 0) {
                const lastPipe = pipes[pipes.length - 1];
                spawnPipe(lastPipe.x + 250);
            }

            for (let i = pipes.length - 1; i >= 0; i--) {
                pipes[i].x -= PIPE_SPEED;

                // Collision detection
                const pipe = pipes[i];
                const topPipeBottom = pipe.gapY;
                const bottomPipeTop = pipe.gapY + PIPE_GAP;

                if (bird.x + bird.radius > pipe.x && 
                    bird.x - bird.radius < pipe.x + PIPE_WIDTH) {
                    
                    if (bird.y - bird.radius < topPipeBottom ||
                        bird.y + bird.radius > bottomPipeTop) {
                        gameOver();
                        return;
                    }
                }

                // Score update
                if (!pipe.passed && bird.x > pipe.x + PIPE_WIDTH) {
                    pipe.passed = true;
                    score++;
                    scoreEl.textContent = score;
                }

                // Remove off-screen pipes
                if (pipe.x + PIPE_WIDTH < 0) {
                    pipes.splice(i, 1);
                }
            }
        }

        function draw() {
            // Sky background
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#87CEEB');
            gradient.addColorStop(1, '#E0F6FF');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Ground
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(0, canvas.height - 20, canvas.width, 20);
            ctx.fillStyle = '#228B22';
            ctx.fillRect(0, canvas.height - 25, canvas.width, 5);

            // Pipes
            ctx.fillStyle = '#4CAF50';
            ctx.strokeStyle = '#2E7D32';
            ctx.lineWidth = 3;

            for (const pipe of pipes) {
                // Top pipe
                const topPipeHeight = pipe.gapY;
                ctx.fillRect(pipe.x, 0, PIPE_WIDTH, topPipeHeight);
                ctx.strokeRect(pipe.x, 0, PIPE_WIDTH, topPipeHeight);
                
                // Top pipe cap
                ctx.fillRect(pipe.x - 5, topPipeHeight - 20, PIPE_WIDTH + 10, 20);
                ctx.strokeRect(pipe.x - 5, topPipeHeight - 20, PIPE_WIDTH + 10, 20);

                // Bottom pipe
                const bottomPipeY = pipe.gapY + PIPE_GAP;
                const bottomPipeHeight = canvas.height - bottomPipeY - 20;
                ctx.fillRect(pipe.x, bottomPipeY, PIPE_WIDTH, bottomPipeHeight);
                ctx.strokeRect(pipe.x, bottomPipeY, PIPE_WIDTH, bottomPipeHeight);

                // Bottom pipe cap
                ctx.fillRect(pipe.x - 5, bottomPipeY, PIPE_WIDTH + 10, 20);
                ctx.strokeRect(pipe.x - 5, bottomPipeY, PIPE_WIDTH + 10, 20);
            }

            // Bird
            ctx.beginPath();
            ctx.arc(bird.x, bird.y, bird.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#FFD700';
            ctx.fill();
            ctx.strokeStyle = '#FFA500';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Bird eye
            ctx.beginPath();
            ctx.arc(bird.x + 8, bird.y - 6, 5, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(bird.x + 10, bird.y - 6, 2, 0, Math.PI * 2);
            ctx.fillStyle = '#000';
            ctx.fill();

            // Bird beak
            ctx.beginPath();
            ctx.moveTo(bird.x + 12, bird.y + 2);
            ctx.lineTo(bird.x + 22, bird.y + 6);
            ctx.lineTo(bird.x + 12, bird.y + 10);
            ctx.fillStyle = '#FF6347';
            ctx.fill();
        }

        function gameLoop() {
            if (!gameRunning) return;
            update();
            if (gameRunning) {
                draw();
                animationId = requestAnimationFrame(gameLoop);
            }
        }

        function startGame() {
            gameRunning = true;
            overlay.style.display = 'none';
            initGame();
            draw();
            gameLoop();
        }

        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(animationId);

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('flappyHighScore', highScore);
            }

            overlay.innerHTML = `
                <h1>Game Over!</h1>
                <p>Score: ${score}</p>
                <button id="restart-btn">Play Again</button>
                <p id="high-score">Best: ${highScore}</p>
            `;
            overlay.style.display = 'flex';

            // Rebind restart button
            document.getElementById('restart-btn').addEventListener('click', startGame);
        }

        // Event listeners
        startBtn.addEventListener('click', startGame);
        
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                if (gameRunning) {
                    jump();
                } else if (overlay.style.display !== 'none' && document.getElementById('restart-btn')) {
                    startGame();
                } else if (overlay.style.display !== 'none' && document.getElementById('start-btn')) {
                    startGame();
                }
            }
        });

        canvas.addEventListener('click', jump);

        // Initial draw
        draw();
    </script>
</body>
</html>
