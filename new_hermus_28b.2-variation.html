<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280, height=720">
    <title>Flappy Bird - new_hermus_28b</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #2d2d5c 50%, #1a1a2e 100%);
            font-family: Arial, sans-serif;
        }
        #gameContainer {
            box-shadow: 0 0 30px rgba(100, 100, 255, 0.5), 0 0 50px rgba(150, 50, 255, 0.3);
            border-radius: 10px;
        }
        canvas {
            display: block;
            background: linear-gradient(180deg, #0a0a1a 0%, #1a1a3a 50%, #2a1a3a 100%);
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="1280" height="720"></canvas>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game constants
        const GRAVITY = 0.4;
        const FLAP_STRENGTH = -9;
        const PIPE_SPEED = 5;
        const PIPE_SPAWN_RATE = 120;
        const PIPE_GAP = 180;
        const BIRD_RADIUS = 22;

        // Enhanced game state
        let birdY = canvas.height / 2;
        let birdVelocity = 0;
        let score = 0;
        let highScore = 0;
        let pipes = [];
        let powerUps = [];
        let frameCount = 0;
        let gameRunning = true;
        let gameOver = false;
        let comboMultiplier = 1;
        let comboCount = 0;
        let timeBonus = 0;
        let slowMotion = false;
        let slowMotionTimer = 0;

        // Bird with gradient
        let birdRotation = 0;

        function drawBird() {
            ctx.save();
            ctx.translate(200, birdY);
            birdRotation = Math.min(Math.max(birdVelocity * 3, -0.5), 1.5);
            ctx.rotate(birdRotation);

            // Glow effect
            const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, BIRD_RADIUS);
            gradient.addColorStop(0, '#FFD700');
            gradient.addColorStop(0.5, '#FFA500');
            gradient.addColorStop(1, '#FF7B00');

            ctx.shadowColor = '#FFD700';
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.arc(0, 0, BIRD_RADIUS, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();
            ctx.shadowBlur = 0;

            // Eye
            ctx.shadowColor = '#333';
            ctx.shadowBlur = 2;
            ctx.beginPath();
            ctx.arc(8, -6, 10, 0, Math.PI * 2);
            ctx.fillStyle = 'white';
            ctx.fill();
            ctx.shadowBlur = 0;

            ctx.beginPath();
            ctx.arc(11, -6, 4, 0, Math.PI * 2);
            ctx.fillStyle = '#333';
            ctx.fill();

            // Wing
            const wingY = Math.sin(frameCount * 0.3) * 5;
            ctx.beginPath();
            ctx.ellipse(-5, 8 + wingY, 12, 8, -0.3, 0, Math.PI * 2);
            ctx.fillStyle = '#FFC700';
            ctx.fill();
            ctx.strokeStyle = '#CC8400';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Beak
            ctx.beginPath();
            ctx.moveTo(15, -3);
            ctx.lineTo(28, 3);
            ctx.lineTo(15, 8);
            ctx.fillStyle = '#FF5700';
            ctx.fill();

            ctx.restore();
        }

        function drawPipes() {
            pipes.forEach(pipe => {
                const pipeGradient = ctx.createLinearGradient(pipe.x, 0, pipe.x + pipe.width, 0);
                pipeGradient.addColorStop(0, '#2E7B2E');
                pipeGradient.addColorStop(0.3, '#4CAF50');
                pipeGradient.addColorStop(0.7, '#66BB66');
                pipeGradient.addColorStop(1, '#2E7B2E');

                const capGradient = ctx.createLinearGradient(pipe.x - 5, 0, pipe.x - 5, 30);
                capGradient.addColorStop(0, '#1B591E');
                capGradient.addColorStop(0.5, '#2E7B2E');
                capGradient.addColorStop(1, '#3D963D');

                // Top pipe
                ctx.fillStyle = pipeGradient;
                ctx.fillRect(pipe.x, 0, pipe.width, pipe.topHeight);
                ctx.strokeStyle = '#1B591E';
                ctx.lineWidth = 3;
                ctx.strokeRect(pipe.x, 0, pipe.width, pipe.topHeight);

                // Top pipe cap
                ctx.fillStyle = capGradient;
                ctx.fillRect(pipe.x - 8, pipe.topHeight - 35, pipe.width + 16, 35);
                ctx.strokeRect(pipe.x - 8, pipe.topHeight - 35, pipe.width + 16, 35);

                // Highlight
                ctx.fillStyle = 'rgba(255,255,255,0.2)';
                ctx.fillRect(pipe.x + 10, 0, 8, pipe.topHeight - 35);
                ctx.fillRect(pipe.x + 10, pipe.topHeight - 35, 8, 35);

                // Bottom pipe
                ctx.fillStyle = pipeGradient;
                ctx.fillRect(pipe.x, canvas.height - pipe.bottomHeight, pipe.width, pipe.bottomHeight);
                ctx.strokeRect(pipe.x, canvas.height - pipe.bottomHeight, pipe.width, pipe.bottomHeight);

                // Bottom pipe cap
                ctx.fillStyle = capGradient;
                ctx.fillRect(pipe.x - 8, canvas.height - pipe.bottomHeight, pipe.width + 16, 35);
                ctx.strokeRect(pipe.x - 8, canvas.height - pipe.bottomHeight, pipe.width + 16, 35);

                // Highlight
                ctx.fillStyle = 'rgba(255,255,255,0.2)';
                ctx.fillRect(pipe.x + 10, canvas.height - pipe.bottomHeight + 35, 8, pipe.bottomHeight - 35);
                ctx.fillRect(pipe.x + 10, canvas.height - pipe.bottomHeight, 8, 35);
            });
        }

        function drawPowerUps() {
            powerUps.forEach((powerup, index) => {
                const pulse = Math.sin(frameCount * 0.2 + index) * 5;
                const radius = BIRD_RADIUS + 5 + pulse;

                ctx.shadowColor = powerup.color;
                ctx.shadowBlur = 20;
                ctx.beginPath();
                ctx.arc(400, powerup.y, radius, 0, Math.PI * 2);
                ctx.fillStyle = powerup.color;
                ctx.globalAlpha = 0.8;
                ctx.fill();
                ctx.globalAlpha = 1;

                ctx.fillStyle = 'white';
                ctx.font = 'bold 20px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowBlur = 0;

                switch(powerup.type) {
                    case 'bonus': ctx.fillText('💰', 400, powerup.y); break;
                    case 'slow': ctx.fillText('⏱', 400, powerup.y); break;
                    case 'multi': ctx.fillText('x3', 400, powerup.y); break;
                }
            });
        }

        function drawScore() {
            // Combo indicator
            if (comboCount >= 3) {
                ctx.shadowColor = '#FFD700';
                ctx.shadowBlur = 10;
                ctx.fillStyle = `rgba(255, 215, 0, ${0.3 + (comboCount % 3) * 0.2})`;
                ctx.font = 'bold 30px Arial';
                ctx.textAlign = 'right';
                ctx.fillText(`COMBO x${comboMultiplier}!`, canvas.width - 100, 70);
                ctx.shadowBlur = 0;
            }

            // Time bonus
            if (timeBonus > 0) {
                ctx.shadowColor = '#00FF88';
                ctx.shadowBlur = 10;
                ctx.fillStyle = 'rgba(0, 255, 136, 0.5)';
                ctx.font = 'bold 30px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(`+${timeBonus} bonus!`, canvas.width / 2, 70);
                ctx.shadowBlur = 0;
            }

            // Main score with glow
            const scoreGradient = ctx.createRadialGradient(canvas.width / 2, 80, 0, canvas.width / 2, 80, 100);
            scoreGradient.addColorStop(0, '#FFD700');
            scoreGradient.addColorStop(1, '#FF7B00');

            ctx.shadowColor = '#FFD700';
            ctx.shadowBlur = 10;
            ctx.fillStyle = scoreGradient;
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 4;
            ctx.font = 'bold 70px Arial';
            ctx.textAlign = 'center';
            ctx.strokeText(score, canvas.width / 2, 100);
            ctx.fillText(score, canvas.width / 2, 100);
            ctx.shadowBlur = 0;

            // High score
            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            ctx.font = '20px Arial';
            ctx.textAlign = 'left';
            ctx.fillText(`High Score: ${highScore}`, 20, 30);
        }

        function drawBackground() {
            // Stars
            ctx.fillStyle = 'white';
            for (let i = 0; i < 50; i++) {
                const x = (i * 137) % canvas.width;
                const y = (i * 89) % (canvas.height - 200);
                const size = Math.sin(frameCount * 0.05 + i) * 2 + 3;
                ctx.globalAlpha = Math.abs(Math.sin(frameCount * 0.02 + i));
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;

            // Mountains
            const mountainGradient = ctx.createLinearGradient(0, canvas.height - 200, 0, canvas.height);
            mountainGradient.addColorStop(0, '#4A4A6A');
            mountainGradient.addColorStop(1, '#2A2A4A');

            ctx.fillStyle = mountainGradient;
            ctx.beginPath();
            ctx.moveTo(0, canvas.height - 150);
            ctx.lineTo(200, canvas.height - 250);
            ctx.lineTo(400, canvas.height - 180);
            ctx.lineTo(600, canvas.height - 280);
            ctx.lineTo(800, canvas.height - 200);
            ctx.lineTo(1000, canvas.height - 260);
            ctx.lineTo(1280, canvas.height - 170);
            ctx.lineTo(1280, canvas.height);
            ctx.lineTo(0, canvas.height);
            ctx.fill();

            // Ground with gradient
            const groundGradient = ctx.createLinearGradient(0, canvas.height - 50, 0, canvas.height);
            groundGradient.addColorStop(0, '#8B451F');
            groundGradient.addColorStop(0.3, '#A05215');
            groundGradient.addColorStop(1, '#8B451F');

            ctx.fillStyle = groundGradient;
            ctx.fillRect(0, canvas.height - 50, canvas.width, 50);

            // Grass top
            const grassGradient = ctx.createLinearGradient(0, canvas.height - 50, 0, canvas.height - 70);
            grassGradient.addColorStop(0, '#2ECC68');
            grassGradient.addColorStop(1, '#1E8A44');

            ctx.fillStyle = grassGradient;
            ctx.fillRect(0, canvas.height - 70, canvas.width, 20);

            // Grass blades
            ctx.fillStyle = '#2ECC68';
            for (let i = 0; i < canvas.width; i += 20) {
                const height = Math.sin(frameCount * 0.1 + i) * 3 + 8;
                ctx.beginPath();
                ctx.moveTo(i, canvas.height - 70);
                ctx.lineTo(i + 8, canvas.height - 70 - height);
                ctx.lineTo(i + 16, canvas.height - 70);
                ctx.fill();
            }
        }

        function drawStartScreen() {
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Title glow
            ctx.shadowColor = '#FFD700';
            ctx.shadowBlur = 30;
            ctx.fillStyle = '#FFD700';
            ctx.font = 'bold 80px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('FLAPPY BIRD', canvas.width / 2, 180);
            ctx.shadowBlur = 10;
            ctx.fillStyle = 'white';
            ctx.font = '40px Arial';
            ctx.fillText('Astral Edition', canvas.width / 2, 220);
            ctx.shadowBlur = 0;

            ctx.font = '30px Arial';
            ctx.fillStyle = 'rgba(255,255,255,0.9)';
            ctx.fillText('Press SPACE or click to start!', canvas.width / 2, 300);
            ctx.fillText('Collect power-ups for bonuses!', canvas.width / 2, 340);
            ctx.fillText('💰=Bonus | ⏱=Slow | x3=Multiplier', canvas.width / 2, 380);
        }

        function drawGameOver() {
            ctx.fillStyle = 'rgba(50,0,0,0.8)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.shadowColor = '#FF4444';
            ctx.shadowBlur = 20;
            ctx.fillStyle = '#FF4444';
            ctx.font = 'bold 80px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('GAME OVER', canvas.width / 2, 200);
            ctx.shadowBlur = 0;

            ctx.fillStyle = 'white';
            ctx.font = '40px Arial';
            ctx.fillText('Final Score: ' + score, canvas.width / 2, 270);
            ctx.fillText('High Score: ' + highScore, canvas.width / 2, 310);

            if (score > highScore) {
                ctx.fillStyle = '#FFD700';
                ctx.font = 'bold 35px Arial';
                ctx.fillText('NEW HIGH SCORE!', canvas.width / 2, 350);
            }

            ctx.fillStyle = 'rgba(255,255,255,0.9)';
            ctx.font = '30px Arial';
            ctx.fillText('Press SPACE or click to restart!', canvas.width / 2, 410);
        }

        function spawnPowerUp(pipeX) {
            const types = ['bonus', 'slow', 'multi'];
            const colors = ['#FFD700', '#00FF88', '#FF6B6B'];
            const typeIndex = Math.floor(Math.random() * 3);

            powerUps.push({
                x: pipeX + 60,
                y: canvas.height / 2 + (Math.random() - 0.5) * 100,
                type: types[typeIndex],
                color: colors[typeIndex],
                width: 40,
                height: 40
            });
        }

        function update() {
            if (!gameRunning || gameOver) return;

            if (slowMotion) {
                slowMotionTimer--;
                if (slowMotionTimer <= 0) {
                    slowMotion = false;
                }
            }

            const currentSpeed = slowMotion ? PIPE_SPEED * 0.5 : PIPE_SPEED;

            birdVelocity += GRAVITY;
            birdY += birdVelocity;

            // Spawn pipes
            if (frameCount % PIPE_SPAWN_RATE === 0) {
                const minHeight = 50;
                const maxHeight = canvas.height - PIPE_GAP - minHeight - 100;
                const topHeight = Math.floor(Math.random() * (maxHeight - minHeight + 1)) + minHeight;

                pipes.push({
                    x: canvas.width,
                    width: 100,
                    topHeight: topHeight,
                    bottomHeight: canvas.height - PIPE_GAP - topHeight,
                    passed: false
                });

                // Chance to spawn power-up
                if (Math.random() < 0.3) {
                    spawnPowerUp(canvas.width);
                }
            }

            // Update power-ups
            for (let i = powerUps.length - 1; i >= 0; i--) {
                const p = powerUps[i];
                p.x -= currentSpeed;

                // Collision with bird
                const dx = 200 - p.x;
                const dy = birdY - p.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < BIRD_RADIUS + 25) {
                    switch(p.type) {
                        case 'bonus': score += 10; break;
                        case 'slow': slowMotion = true; slowMotionTimer = 120; break;
                        case 'multi': comboMultiplier = Math.min(comboMultiplier + 1, 5); break;
                    }
                    powerUps.splice(i, 1);
                    continue;
                }

                if (p.x < 0) {
                    powerUps.splice(i, 1);
                }
            }

            // Update pipes
            for (let i = pipes.length - 1; i >= 0; i--) {
                pipes[i].x -= currentSpeed;

                // Check collision with bird
                if (200 + BIRD_RADIUS > pipes[i].x && 200 - BIRD_RADIUS < pipes[i].x + pipes[i].width) {
                    if (birdY - BIRD_RADIUS < pipes[i].topHeight || birdY + BIRD_RADIUS > canvas.height - pipes[i].bottomHeight) {
                        gameOver = true;
                    }
                }

                // Score
                if (pipes[i].x + pipes[i].width < 200 - BIRD_RADIUS && !pipes[i].passed) {
                    pipes[i].passed = true;
                    comboCount++;
                    comboMultiplier = 1 + Math.floor(comboCount / 5);
                    timeBonus = comboMultiplier * 5;
                }

                // Reset combo after 2 seconds without scoring
                if (frameCount % 120 === 0 && pipes[i].passed) {
                    comboCount = 0;
                    comboMultiplier = 1;
                    timeBonus = 0;
                }

                // Remove off-screen pipes
                if (pipes[i].x + pipes[i].width < 0) {
                    pipes.splice(i, 1);
                }
            }

            // Check bird collision with ground or ceiling
            if (birdY + BIRD_RADIUS > canvas.height - 50 || birdY - BIRD_RADIUS < 0) {
                gameOver = true;
            }

            frameCount++;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawBackground();
            drawPipes();
            drawPowerUps();
            drawBird();
            drawScore();

            if (!gameRunning) {
                drawStartScreen();
            } else if (gameOver) {
                drawGameOver();
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function flap() {
            birdVelocity = FLAP_STRENGTH;
        }

        function startGame() {
            gameRunning = true;
            gameOver = false;
            birdY = canvas.height / 2;
            birdVelocity = 0;
            score = 0;
            pipes = [];
            powerUps = [];
            frameCount = 0;
            comboMultiplier = 1;
            comboCount = 0;
            timeBonus = 0;
        }

        function restartGame() {
            startGame();
        }

        // Event listeners
        canvas.addEventListener('click', () => {
            if (gameOver) {
                restartGame();
            } else if (!gameRunning) {
                startGame();
            }
            flap();
        });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (gameOver) {
                    restartGame();
                } else if (!gameRunning) {
                    startGame();
                }
                flap();
            }
        });

        // Start the game loop
        gameLoop();
    </script>
</body>
</html>
