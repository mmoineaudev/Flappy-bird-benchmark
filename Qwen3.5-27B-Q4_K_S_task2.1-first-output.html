<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird Clone</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #gameContainer {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0,255,255,0.3);
        }
        canvas { display: block; }
        #ui {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            pointer-events: none;
        }
        #score { font-size: 48px; font-weight: bold; }
        #message { font-size: 24px; margin-top: 10px; }
        #powerupText {
            position: absolute;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffd700;
            font-size: 20px;
            text-shadow: 0 0 10px #ffd700;
            opacity: 0;
            transition: opacity 0.3s;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="450"></canvas>
        <div id="ui">
            <div id="score">0</div>
            <div id="message">Press SPACE or Click to Start</div>
        </div>
        <div id="powerupText"></div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const messageEl = document.getElementById('message');
        const powerupTextEl = document.getElementById('powerupText');

        // Game state
        let gameState = 'start'; // start, playing, gameover
        let score = 0;
        let frames = 0;

        // Bird
        const bird = {
            x: 100,
            y: 200,
            width: 34,
            height: 24,
            velocity: 0,
            gravity: 0.5,
            jumpStrength: -8,
            color: '#ffcc00'
        };

        // Pipes
        const pipes = [];
        const pipeWidth = 60;
        const pipeGap = 140;
        const pipeSpeed = 3;
        let pipeSpawnTimer = 0;

        // Bonuses
        const bonuses = [];
        const bonusTypes = [
            { type: 'speed', color: '#ff6b6b', multiplier: 1.5, duration: 500, text: 'SPEED BOOST!' },
            { type: 'feather', color: '#4ecdc4', multiplier: 0.7, duration: 400, text: 'FEATHER LIGHT!' },
            { type: 'score', color: '#ffd700', points: 3, text: '+3 POINTS!' }
        ];

        // Powerup effects
        let activePowerups = {};
        let speedMultiplier = 1;
        let gravityMultiplier = 1;

        // Background particles
        const stars = [];
        for (let i = 0; i < 50; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2 + 1,
                speed: Math.random() * 0.5 + 0.2
            });
        }

        function init() {
            resetGame();
            draw();
        }

        function resetGame() {
            bird.y = canvas.height / 2;
            bird.velocity = 0;
            pipes.length = 0;
            bonuses.length = 0;
            score = 0;
            frames = 0;
            pipeSpawnTimer = 0;
            activePowerups = {};
            speedMultiplier = 1;
            gravityMultiplier = 1;
            updateScore();
        }

        function startGame() {
            gameState = 'playing';
            messageEl.textContent = '';
            powerupTextEl.style.opacity = '0';
        }

        function jump() {
            if (gameState === 'start' || gameState === 'gameover') {
                resetGame();
                startGame();
            } else if (gameState === 'playing') {
                bird.velocity = bird.jumpStrength * gravityMultiplier;
            }
        }

        function spawnPipe() {
            const minHeight = 50;
            const maxHeight = canvas.height - pipeGap - minHeight;
            const topHeight = Math.random() * (maxHeight - minHeight) + minHeight;
            
            pipes.push({
                x: canvas.width,
                topHeight: topHeight,
                bottomY: topHeight + pipeGap,
                passed: false
            });
        }

        function spawnBonus() {
            const bonusType = bonusTypes[Math.floor(Math.random() * bonusTypes.length)];
            bonuses.push({
                x: canvas.width,
                y: Math.random() * (canvas.height - 100) + 50,
                width: 30,
                height: 30,
                ...bonusType
            });
        }

        function updatePowerupText(text) {
            if (text) {
                powerupTextEl.textContent = text;
                powerupTextEl.style.opacity = '1';
                setTimeout(() => {
                    powerupTextEl.style.opacity = '0';
                }, 1500);
            }
        }

        function update() {
            if (gameState !== 'playing') return;

            frames++;

            // Bird physics
            bird.velocity += bird.gravity * gravityMultiplier;
            bird.y += bird.velocity;

            // Spawn pipes
            pipeSpawnTimer++;
            if (pipeSpawnTimer >= 100 / speedMultiplier) {
                spawnPipe();
                pipeSpawnTimer = 0;
            }

            // Spawn bonuses occasionally
            if (frames % 300 === 0 && Math.random() < 0.5) {
                spawnBonus();
            }

            // Update pipes
            for (let i = pipes.length - 1; i >= 0; i--) {
                const pipe = pipes[i];
                pipe.x -= pipeSpeed * speedMultiplier;

                // Score when passing pipe
                if (!pipe.passed && pipe.x + pipeWidth < bird.x) {
                    score++;
                    pipe.passed = true;
                    updateScore();
                }

                // Collision detection
                if (bird.x < pipe.x + pipeWidth &&
                    bird.x + bird.width > pipe.x &&
                    (bird.y < pipe.topHeight || bird.y + bird.height > pipe.bottomY)) {
                    gameOver();
                }

                // Remove off-screen pipes
                if (pipe.x + pipeWidth < 0) {
                    pipes.splice(i, 1);
                }
            }

            // Update bonuses
            for (let i = bonuses.length - 1; i >= 0; i--) {
                const bonus = bonuses[i];
                bonus.x -= pipeSpeed * speedMultiplier;

                // Collect bonus
                if (bird.x < bonus.x + bonus.width &&
                    bird.x + bird.width > bonus.x &&
                    bird.y < bonus.y + bonus.height &&
                    bird.y + bird.height > bonus.y) {
                    
                    activateBonus(bonus);
                    bonuses.splice(i, 1);
                    continue;
                }

                if (bonus.x + bonus.width < 0) {
                    bonuses.splice(i, 1);
                }
            }

            // Update powerup timers
            for (const [type, endTime] of Object.entries(activePowerups)) {
                if (frames >= endTime) {
                    delete activePowerups[type];
                    if (type === 'speed') speedMultiplier = 1;
                    if (type === 'feather') gravityMultiplier = 1;
                }
            }

            // Boundary collision
            if (bird.y + bird.height > canvas.height || bird.y < 0) {
                gameOver();
            }
        }

        function activateBonus(bonus) {
            updatePowerupText(bonus.text);
            
            if (bonus.type === 'speed') {
                speedMultiplier = bonus.multiplier;
                activePowerups['speed'] = frames + bonus.duration;
            } else if (bonus.type === 'feather') {
                gravityMultiplier = bonus.multiplier;
                activePowerups['feather'] = frames + bonus.duration;
            } else if (bonus.type === 'score') {
                score += bonus.points;
                updateScore();
            }
        }

        function updateScore() {
            scoreEl.textContent = score;
        }

        function gameOver() {
            gameState = 'gameover';
            messageEl.textContent = `Game Over! Score: ${score} - Press SPACE to Restart`;
        }

        function drawBackground() {
            // Sky gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#1a1a3e');
            gradient.addColorStop(1, '#2d1b4e');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Stars
            ctx.fillStyle = 'white';
            stars.forEach(star => {
                ctx.globalAlpha = Math.random() * 0.5 + 0.5;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
                star.x -= star.speed;
                if (star.x < 0) star.x = canvas.width;
            });
            ctx.globalAlpha = 1;

            // Ground
            ctx.fillStyle = '#2d5a27';
            ctx.fillRect(0, canvas.height - 20, canvas.width, 20);
        }

        function drawBird() {
            ctx.save();
            
            // Body with gradient
            const gradient = ctx.createRadialGradient(
                bird.x + 10, bird.y + 10, 0,
                bird.x + 17, bird.y + 12, 20
            );
            gradient.addColorStop(0, '#fff9a6');
            gradient.addColorStop(1, '#ffcc00');
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.roundRect(bird.x, bird.y, bird.width, bird.height, 8);
            ctx.fill();

            // Wing
            ctx.fillStyle = '#ffb347';
            ctx.beginPath();
            ctx.ellipse(bird.x + 15, bird.y + 16, 10, 6, 0, 0, Math.PI * 2);
            ctx.fill();

            // Eye
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(bird.x + 24, bird.y + 8, 6, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = 'black';
            ctx.beginPath();
            ctx.arc(bird.x + 26, bird.y + 8, 3, 0, Math.PI * 2);
            ctx.fill();

            // Beak
            ctx.fillStyle = '#ff6b6b';
            ctx.beginPath();
            ctx.moveTo(bird.x + 30, bird.y + 14);
            ctx.lineTo(bird.x + 40, bird.y + 18);
            ctx.lineTo(bird.x + 30, bird.y + 22);
            ctx.fill();

            // Glow effect when powered up
            if (activePowerups['speed']) {
                ctx.strokeStyle = '#ff6b6b';
                ctx.lineWidth = 3;
                ctx.strokeRect(bird.x - 5, bird.y - 5, bird.width + 10, bird.height + 10);
            }

            ctx.restore();
        }

        function drawPipes() {
            pipes.forEach(pipe => {
                // Pipe gradient
                const gradient = ctx.createLinearGradient(pipe.x, 0, pipe.x + pipeWidth, 0);
                gradient.addColorStop(0, '#2d5a27');
                gradient.addColorStop(0.5, '#4a8f38');
                gradient.addColorStop(1, '#2d5a27');

                ctx.fillStyle = gradient;
                
                // Top pipe
                ctx.fillRect(pipe.x, 0, pipeWidth, pipe.topHeight);
                ctx.fillStyle = '#3d7a28';
                ctx.fillRect(pipe.x - 5, pipe.topHeight - 20, pipeWidth + 10, 20);

                // Bottom pipe
                ctx.fillStyle = gradient;
                ctx.fillRect(pipe.x, pipe.bottomY, pipeWidth, canvas.height - pipe.bottomY - 20);
                ctx.fillStyle = '#3d7a28';
                ctx.fillRect(pipe.x - 5, pipe.bottomY, pipeWidth + 10, 20);
            });
        }

        function drawBonuses() {
            bonuses.forEach(bonus => {
                ctx.save();
                
                // Pulsing glow effect
                const pulse = Math.sin(frames * 0.1) * 5 + 10;
                
                ctx.shadowColor = bonus.color;
                ctx.shadowBlur = pulse;
                
                // Bonus body
                ctx.fillStyle = bonus.color;
                ctx.beginPath();
                if (bonus.type === 'speed') {
                    // Lightning bolt shape
                    ctx.moveTo(bonus.x + 15, bonus.y);
                    ctx.lineTo(bonus.x + 25, bonus.y + 15);
                    ctx.lineTo(bonus.x + 10, bonus.y + 15);
                    ctx.lineTo(bonus.x + 20, bonus.y + 30);
                    ctx.lineTo(bonus.x + 5, bonus.y + 15);
                    ctx.lineTo(bonus.x + 20, bonus.y + 15);
                } else if (bonus.type === 'feather') {
                    // Feather shape
                    ctx.ellipse(bonus.x + 15, bonus.y + 15, 12, 8, Math.PI / 4, 0, Math.PI * 2);
                } else {
                    // Star for score
                    drawStar(bonus.x + 15, bonus.y + 15, 5, 12, 6);
                }
                ctx.fill();

                // Icon in center
                ctx.fillStyle = 'white';
                ctx.font = 'bold 14px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                const icon = bonus.type === 'speed' ? '⚡' : bonus.type === 'feather' ? '🪶' : '⭐';
                ctx.fillText(icon, bonus.x + 15, bonus.y + 15);

                ctx.restore();
            });
        }

        function drawStar(cx, cy, spikes, outerRadius, innerRadius) {
            let rot = Math.PI / 2 * 3;
            let x = cx;
            let y = cy;
            const step = Math.PI / spikes;

            ctx.beginPath();
            ctx.moveTo(cx, cy - outerRadius);
            for (let i = 0; i < spikes; i++) {
                x = cx + Math.cos(rot) * outerRadius;
                y = cy + Math.sin(rot) * outerRadius;
                ctx.lineTo(x, y);
                rot += step;

                x = cx + Math.cos(rot) * innerRadius;
                y = cy + Math.sin(rot) * innerRadius;
                ctx.lineTo(x, y);
                rot += step;
            }
            ctx.lineTo(cx, cy - outerRadius);
            ctx.closePath();
        }

        function draw() {
            drawBackground();
            drawPipes();
            drawBonuses();
            drawBird();

            if (gameState === 'start') {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Input handling
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                jump();
            }
        });

        canvas.addEventListener('click', jump);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            jump();
        });

        // Initialize
        init();
        gameLoop();
    </script>
</body>
</html>
