<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Drift - WebGL Edition</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(ellipse at center, #1a0a2e 0%, #0a0a1a 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        
        #gameWrapper {
            position: relative;
        }
        
        canvas {
            display: block;
            border-radius: 15px;
            box-shadow: 0 0 60px rgba(138, 43, 226, 0.5), 
                        0 0 100px rgba(75, 0, 130, 0.3);
        }
        
        #uiLayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            border-radius: 15px;
            overflow: hidden;
        }
        
        #hud {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }
        
        #scoreDisplay {
            font-size: 56px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 20px #8a2be2, 0 0 40px #4b0082;
        }
        
        #subScore {
            font-size: 18px;
            color: #d8bfd8;
            margin-top: 5px;
        }
        
        #messageBox {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #fff;
        }
        
        #mainMessage {
            font-size: 32px;
            margin-bottom: 15px;
            animation: float 2s ease-in-out infinite;
        }
        
        #subMessage {
            font-size: 18px;
            color: #d8bfd8;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        #notification {
            position: absolute;
            top: 120px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            font-weight: bold;
            opacity: 0;
            transition: all 0.3s;
        }
        
        #barContainer {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
        }
        
        .bar {
            height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 8px;
        }
        
        .barFill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s;
        }
        
        #energyBar .barFill { background: linear-gradient(90deg, #ff6b6b, #feca57); }
        #magnetBar .barFill { background: linear-gradient(90deg, #48dbfb, #ff9ff3); width: 0%; }
        
        #customizationPanel {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }
        
        .customBtn {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 8px;
            background: rgba(0,0,0,0.5);
            color: #fff;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s;
        }
        
        .customBtn:hover {
            border-color: #8a2be2;
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.5);
        }
        
        .customBtn.active {
            background: #8a2be2;
            border-color: #d8bfd8;
        }
    </style>
</head>
<body>
    <div id="gameWrapper">
        <canvas id="gameCanvas" width="800" height="450"></canvas>
        <div id="uiLayer">
            <div id="hud">
                <div id="scoreDisplay">0</div>
                <div id="subScore">Best: 0 | Multiplier: x1.0</div>
            </div>
            <div id="messageBox">
                <div id="mainMessage">🚀 COSMIC DRIFT 🚀</div>
                <div id="subMessage">Press SPACE or Click to Launch</div>
            </div>
            <div id="notification"></div>
            <div id="barContainer">
                <div class="bar" id="energyBar"><div class="barFill" style="width: 100%"></div></div>
                <div class="bar" id="magnetBar"><div class="barFill"></div></div>
            </div>
            <div id="customizationPanel">
                <button class="customBtn" id="themeBtn" title="Change Theme">🎨</button>
                <button class="customBtn" id="shipBtn" title="Change Ship">🚀</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // UI Elements
        const scoreDisplay = document.getElementById('scoreDisplay');
        const subScore = document.getElementById('subScore');
        const messageBox = document.getElementById('messageBox');
        const mainMessage = document.getElementById('mainMessage');
        const subMessage = document.getElementById('subMessage');
        const notification = document.getElementById('notification');
        const energyBarFill = document.querySelector('#energyBar .barFill');
        const magnetBarFill = document.querySelector('#magnetBar .barFill');
        const themeBtn = document.getElementById('themeBtn');
        const shipBtn = document.getElementById('shipBtn');

        // Game configuration
        const THEMES = [
            { name: 'cosmic', bg: ['#1a0a2e', '#0a0a1a'], accent: '#8a2be2', glow: '#4b0082' },
            { name: 'ocean', bg: ['#0a1628', '#0a2e4e'], accent: '#00d4ff', glow: '#008ba3' },
            { name: 'forest', bg: ['#0a1a0a', '#1a2e1a'], accent: '#50c878', glow: '#2e8b57' },
            { name: 'sunset', bg: ['#2a0a1a', '#4e1a0a'], accent: '#ff6b9d', glow: '#c94c4c' }
        ];
        
        const SHIPS = [
            { name: 'scout', color: '#fff', shape: 'triangle' },
            { name: 'fighter', color: '#f0f', shape: 'angular' },
            { name: 'explorer', color: '#0ff', shape: 'rounded' }
        ];

        // Game state
        let gameState = 'start';
        let score = 0;
        let bestScore = localStorage.getItem('cosmicDrift_best') || 0;
        let frames = 0;
        let combo = 0;
        let multiplier = 1.0;

        // Player ship
        const player = {
            x: 80,
            y: canvas.height / 2,
            width: 45,
            height: 30,
            velocity: 0,
            baseGravity: 0.35,
            jumpStrength: -6.5,
            themeIndex: 0,
            shipIndex: 0,
            energy: 100,
            magnetLevel: 0
        };

        // Game objects
        const obstacles = [];
        const collectibles = [];
        const particles = [];
        const stars = [];
        let obstacleTimer = 0;

        // Active abilities
        let abilities = {
            turbo: false,
            shield: false,
            magnet: false,
            slowMotion: false,
            doublePoints: false
        };
        
        let abilityTimers = {};
        const BASE_SPEED = 3.5;

        // Initialize starfield
        for (let i = 0; i < 100; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2 + 0.5,
                speed: Math.random() * 0.8 + 0.1,
                twinkle: Math.random() * Math.PI * 2
            });
        }

        function init() {
            updateSubScore();
            draw();
        }

        function resetGame() {
            player.y = canvas.height / 2;
            player.velocity = 0;
            obstacles.length = 0;
            collectibles.length = 0;
            particles.length = 0;
            score = 0;
            combo = 0;
            multiplier = 1.0;
            frames = 0;
            obstacleTimer = 0;
            player.energy = 100;
            player.magnetLevel = 0;
            
            Object.keys(abilities).forEach(k => abilities[k] = false);
            Object.keys(abilityTimers).forEach(k => delete abilityTimers[k]);
            
            updateScore();
        }

        function startGame() {
            gameState = 'playing';
            messageBox.style.display = 'none';
            notification.style.opacity = '0';
        }

        function jump() {
            if (gameState === 'start' || gameState === 'gameover') {
                resetGame();
                startGame();
            } else if (gameState === 'playing') {
                const strength = abilities.turbo ? player.jumpStrength * 0.85 : player.jumpStrength;
                player.velocity = strength;
                createJumpEffect();
            }
        }

        function createJumpEffect() {
            const theme = THEMES[player.themeIndex];
            for (let i = 0; i < 12; i++) {
                particles.push({
                    x: player.x + player.width / 2,
                    y: player.y + player.height,
                    vx: (Math.random() - 0.5) * 5,
                    vy: Math.random() * 4 + 1,
                    life: 25,
                    maxLife: 25,
                    color: theme.accent,
                    size: Math.random() * 4 + 2,
                    type: 'trail'
                });
            }
        }

        function spawnObstacle() {
            const gap = Math.max(120, 150 - score);
            const minH = 70;
            const maxH = canvas.height - gap - minH;
            const topH = Math.random() * (maxH - minH) + minH;

            let type = 'normal';
            const patternNum = Math.floor(frames / 120);
            
            if (patternNum % 6 === 0) type = 'moving';
            if (patternNum % 9 === 0) type = 'narrow';
            if (patternNum % 12 === 0) type = 'twin';

            obstacles.push({
                x: canvas.width,
                topHeight: topH,
                gapSize: type === 'narrow' ? gap + 30 : gap,
                passed: false,
                type: type,
                movePhase: 0,
                twinOffset: type === 'twin' ? 150 : 0
            });
        }

        function spawnCollectible() {
            const types = [
                { type: 'energy', color: '#ff6b6b', icon: '⚡', value: 20 },
                { type: 'magnet', color: '#48dbfb', icon: '◎', value: 15 },
                { type: 'score', color: '#ffd93d', icon: '⭐', value: 5 },
                { type: 'shield', color: '#6ab04c', icon: '🛡️', value: 25 },
                { type: 'turbo', color: '#ff6b9d', icon: '🚀', value: 30 }
            ];

            const selected = types[Math.floor(Math.random() * types.length)];
            collectibles.push({
                x: canvas.width,
                y: Math.random() * (canvas.height - 100) + 50,
                width: 32,
                height: 32,
                ...selected,
                floatOffset: Math.random() * Math.PI * 2
            });
        }

        function showNotification(text, color) {
            notification.textContent = text;
            notification.style.color = color;
            notification.style.textShadow = `0 0 20px ${color}, 0 0 40px ${color}`;
            notification.style.opacity = '1';
            notification.style.transform = 'translateX(-50%) translateY(-20px)';
            
            setTimeout(() => {
                notification.style.opacity = '0';
                notification.style.transform = 'translateX(-50%) translateY(0)';
            }, 1800);
        }

        function update() {
            if (gameState !== 'playing') return;
            
            frames++;
            const timeScale = abilities.slowMotion ? 0.6 : 1;
            const currentSpeed = BASE_SPEED * (abilities.turbo ? 1.3 : 1) * timeScale;

            // Player physics
            player.velocity += player.baseGravity * timeScale;
            player.y += player.velocity * timeScale;

            // Boundaries
            if (player.y < 0) { player.y = 0; player.velocity = 0; }
            if (player.y + player.height > canvas.height) {
                player.y = canvas.height - player.height;
                gameOver();
            }

            // Spawn obstacles
            obstacleTimer++;
            const spawnInterval = abilities.slowMotion ? 150 : 90;
            if (obstacleTimer >= spawnInterval / (abilities.turbo ? 1.2 : 1)) {
                spawnObstacle();
                obstacleTimer = 0;
            }

            // Spawn collectibles
            if (frames % 180 === 0 && Math.random() < 0.7) {
                spawnCollectible();
            }

            // Update obstacles
            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obs = obstacles[i];
                
                let moveX = -currentSpeed;
                if (obs.type === 'moving') {
                    obs.movePhase += 0.05;
                    const swing = Math.sin(obs.movePhase) * 25;
                    obs.topHeight += Math.cos(obs.movePhase) * 1.5;
                    moveX -= Math.cos(obs.movePhase) * 2;
                }

                obs.x += moveX;

                // Twin obstacles have two gaps
                if (obs.type === 'twin') {
                    const secondGap = obs.x + obs.twinOffset;
                    checkObstacleCollision(obs, false);
                    checkObstacleCollision(obs, true, obs.twinOffset);
                } else {
                    checkObstacleCollision(obs);
                }

                // Scoring
                if (!obs.passed && obs.x + 50 < player.x) {
                    combo++;
                    multiplier = Math.min(3.0, 1 + combo * 0.2);
                    const points = Math.floor((abilities.doublePoints ? 2 : 1) * multiplier);
                    score += points;
                    obs.passed = true;
                    
                    updateScore();
                    createScoreEffect(points);
                }

                if (obs.x < -80) obstacles.splice(i, 1);
            }

            // Update collectibles
            for (let i = collectibles.length - 1; i >= 0; i--) {
                const c = collectibles[i];
                
                // Magnet effect
                if (player.magnetLevel > 0 && c.x > player.x) {
                    c.x -= 4 * (player.magnetLevel / 100);
                }

                c.y += Math.sin(frames * 0.1 + c.floatOffset) * 0.5;
                c.x -= currentSpeed * timeScale;

                // Collection
                if (checkCollision(player, c)) {
                    collectCollectible(c);
                    collectibles.splice(i, 1);
                    continue;
                }

                if (c.x < -50) collectibles.splice(i, 1);
            }

            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx * timeScale;
                p.y += p.vy * timeScale;
                p.life--;
                
                if (p.type === 'sparkle') {
                    p.size *= 0.95;
                }
                
                if (p.life <= 0) particles.splice(i, 1);
            }

            // Update stars
            stars.forEach(star => {
                star.x -= star.speed * timeScale;
                if (star.x < 0) {
                    star.x = canvas.width;
                    star.y = Math.random() * canvas.height;
                }
                star.twinkle += 0.05;
            });

            // Update abilities
            for (const [name, endTime] of Object.entries(abilityTimers)) {
                if (frames >= endTime) {
                    delete abilityTimers[name];
                    abilities[name] = false;
                    
                    if (name === 'turbo') showNotification('Turbo Ended', '#ff6b9d');
                    if (name === 'shield') showNotification('Shield Down', '#6ab04c');
                    if (name === 'magnet') { player.magnetLevel = 0; showNotification('Magnet Off', '#48dbfb'); }
                    if (name === 'slowMotion') showNotification('Normal Time', '#00d4ff');
                    if (name === 'doublePoints') showNotification('Double Points End', '#ffd93d');
                }
            }

            // Update magnet decay
            if (player.magnetLevel > 0) {
                player.magnetLevel = Math.max(0, player.magnetLevel - 0.5);
            }

            updateBars();
        }

        function checkObstacleCollision(obs, isTwin = false, offset = 0) {
            const ox = obs.x + offset;
            const width = 60;
            const topEnd = obs.topHeight;
            const bottomStart = obs.topHeight + obs.gapSize;

            if (!abilities.shield && 
                player.x + player.width > ox && 
                player.x < ox + width) {
                
                if (player.y < topEnd || player.y + player.height > bottomStart) {
                    createExplosion();
                    gameOver();
                }
            }
        }

        function checkCollision(a, b) {
            return a.x < b.x + b.width &&
                   a.x + a.width > b.x &&
                   a.y < b.y + b.height &&
                   a.y + a.height > b.y;
        }

        function collectCollectible(c) {
            const theme = THEMES[player.themeIndex];
            
            // Create collection effect
            for (let i = 0; i < 8; i++) {
                particles.push({
                    x: c.x + c.width / 2,
                    y: c.y + c.height / 2,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    life: 20,
                    maxLife: 20,
                    color: c.color,
                    size: Math.random() * 3 + 2,
                    type: 'sparkle'
                });
            }

            switch(c.type) {
                case 'energy':
                    player.energy = Math.min(100, player.energy + c.value);
                    showNotification(`+${c.value}% Energy!`, c.color);
                    break;
                    
                case 'magnet':
                    player.magnetLevel = Math.min(100, player.magnetLevel + c.value);
                    abilityTimers.magnet = frames + 400;
                    abilities.magnet = true;
                    showNotification('Magnet Active!', c.color);
                    break;
                    
                case 'score':
                    score += Math.floor(c.value * multiplier);
                    updateScore();
                    showNotification(`+${c.value} Points!`, c.color);
                    break;
                    
                case 'shield':
                    abilityTimers.shield = frames + 500;
                    abilities.shield = true;
                    showNotification('Shield Active!', c.color);
                    break;
                    
                case 'turbo':
                    abilityTimers.turbo = frames + 400;
                    abilities.turbo = true;
                    showNotification('Turbo Boost!', c.color);
                    break;
            }

            updateScore();
        }

        function createScoreEffect(points) {
            for (let i = 0; i < 6; i++) {
                particles.push({
                    x: player.x + player.width / 2,
                    y: player.y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: Math.random() * 4 - 1,
                    life: 30,
                    maxLife: 30,
                    color: '#ffd93d',
                    size: Math.random() * 5 + 3,
                    type: 'sparkle'
                });
            }

            // Multiplier display
            if (multiplier > 1) {
                particles.push({
                    x: player.x - 20,
                    y: player.y,
                    vx: -1,
                    vy: 0,
                    life: 40,
                    maxLife: 40,
                    color: '#fff',
                    size: 16,
                    type: 'text',
                    text: `x${multiplier.toFixed(1)}`
                });
            }
        }

        function createExplosion() {
            const theme = THEMES[player.themeIndex];
            for (let i = 0; i < 30; i++) {
                const angle = (Math.PI * 2 / 30) * i;
                particles.push({
                    x: player.x + player.width / 2,
                    y: player.y + player.height / 2,
                    vx: Math.cos(angle) * 6,
                    vy: Math.sin(angle) * 6,
                    life: 40,
                    maxLife: 40,
                    color: theme.accent,
                    size: Math.random() * 6 + 3,
                    type: 'explosion'
                });
            }
        }

        function updateScore() {
            scoreDisplay.textContent = score;
            updateSubScore();
        }

        function updateSubScore() {
            subScore.textContent = `Best: ${Math.max(bestScore, score)} | Multiplier: x${multiplier.toFixed(1)}`;
        }

        function updateBars() {
            energyBarFill.style.width = `${player.energy}%`;
            magnetBarFill.style.width = `${player.magnetLevel}%`;
            
            // Color changes based on level
            if (player.energy < 30) {
                energyBarFill.style.background = 'linear-gradient(90deg, #ff4757, #ff6b81)';
            } else {
                energyBarFill.style.background = 'linear-gradient(90deg, #ff6b6b, #feca57)';
            }
        }

        function gameOver() {
            gameState = 'gameover';
            
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('cosmicDrift_best', bestScore);
                mainMessage.textContent = '🎉 NEW RECORD! 🎉';
            } else {
                mainMessage.textContent = '💫 GAME OVER 💫';
            }
            
            subMessage.innerHTML = `Final Score: ${score}<br>Best: ${bestScore}<br><span style="font-size:14px">Press SPACE to Restart</span>`;
            messageBox.style.display = 'block';
        }

        // Drawing functions
        function drawBackground() {
            const theme = THEMES[player.themeIndex];
            
            // Dynamic gradient background
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, theme.bg[0]);
            gradient.addColorStop(1, theme.bg[1]);
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Animated stars with twinkling
            stars.forEach(star => {
                const brightness = (Math.sin(star.twinkle) + 1) / 2;
                ctx.globalAlpha = 0.3 + brightness * 0.7;
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;

            // Nebula effects
            const nebulaGradient = ctx.createRadialGradient(
                canvas.width * 0.3, canvas.height * 0.3, 0,
                canvas.width * 0.3, canvas.height * 0.3, 200
            );
            nebulaGradient.addColorStop(0, `${theme.accent}15`);
            nebulaGradient.addColorStop(1, 'transparent');
            ctx.fillStyle = nebulaGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const nebulaGradient2 = ctx.createRadialGradient(
                canvas.width * 0.7, canvas.height * 0.7, 0,
                canvas.width * 0.7, canvas.height * 0.7, 180
            );
            nebulaGradient2.addColorStop(0, `${theme.glow}15`);
            nebulaGradient2.addColorStop(1, 'transparent');
            ctx.fillStyle = nebulaGradient2;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawPlayer() {
            const theme = THEMES[player.themeIndex];
            const ship = SHIPS[player.shipIndex];
            
            ctx.save();
            
            // Shield effect
            if (abilities.shield) {
                ctx.strokeStyle = '#6ab04c';
                ctx.lineWidth = 3;
                ctx.shadowColor = '#6ab04c';
                ctx.shadowBlur = 25;
                ctx.beginPath();
                ctx.arc(player.x + player.width/2, player.y + player.height/2, 45, 0, Math.PI * 2);
                ctx.stroke();
                
                // Rotating shield ring
                const rotation = frames * 0.05;
                ctx.save();
                ctx.translate(player.x + player.width/2, player.y + player.height/2);
                ctx.rotate(rotation);
                ctx.strokeStyle = '#fff';
                ctx.beginPath();
                for (let i = 0; i < 4; i++) {
                    ctx.rotate(Math.PI / 2);
                    ctx.moveTo(35, 0);
                    ctx.lineTo(42, 0);
                }
                ctx.stroke();
                ctx.restore();
            }

            // Turbo trail
            if (abilities.turbo) {
                for (let i = 0; i < 5; i++) {
                    const offset = frames * 8 + i * 15;
                    const alpha = 1 - i / 5;
                    ctx.globalAlpha = alpha * 0.6;
                    ctx.fillStyle = theme.accent;
                    ctx.fillRect(
                        player.x - offset, 
                        player.y + Math.sin(frames * 0.2) * 5, 
                        player.width, 
                        player.height
                    );
                }
                ctx.globalAlpha = 1;
            }

            // Ship glow
            ctx.shadowColor = theme.accent;
            ctx.shadowBlur = abilities.turbo ? 30 : 20;

            const shipColor = SHIPS[player.shipIndex].color;
            ctx.fillStyle = shipColor;

            // Different ship shapes
            if (ship.shape === 'triangle') {
                ctx.beginPath();
                ctx.moveTo(player.x, player.y + player.height / 2);
                ctx.lineTo(player.x + player.width, player.y);
                ctx.lineTo(player.x + player.width - 10, player.y + player.height / 2);
                ctx.lineTo(player.x + player.width, player.y + player.height);
                ctx.closePath();
                ctx.fill();
            } else if (ship.shape === 'angular') {
                ctx.beginPath();
                ctx.moveTo(player.x, player.y + player.height / 2);
                ctx.lineTo(player.x + player.width * 0.4, player.y);
                ctx.lineTo(player.x + player.width, player.y + player.height * 0.3);
                ctx.lineTo(player.x + player.width, player.y + player.height * 0.7);
                ctx.lineTo(player.x + player.width * 0.4, player.y + player.height);
                ctx.closePath();
                ctx.fill();
            } else {
                // Rounded
                ctx.beginPath();
                ctx.ellipse(
                    player.x + player.width / 2, 
                    player.y + player.height / 2,
                    player.width / 2, 
                    player.height / 2,
                    0, 0, Math.PI * 2
                );
                ctx.fill();
            }

            // Cockpit/window
            ctx.fillStyle = '#fff';
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.ellipse(
                player.x + player.width * 0.75, 
                player.y + player.height / 2,
                8, 5, 0, 0, Math.PI * 2
            );
            ctx.fill();

            // Engine glow
            const engineSize = 15 + Math.sin(frames * 0.3) * 8;
            ctx.fillStyle = theme.accent;
            ctx.shadowColor = theme.accent;
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.moveTo(player.x, player.y + player.height / 2 - 6);
            ctx.lineTo(player.x - engineSize, player.y + player.height / 2);
            ctx.lineTo(player.x, player.y + player.height / 2 + 6);
            ctx.fill();

            ctx.restore();
        }

        function drawObstacles() {
            const theme = THEMES[player.themeIndex];
            
            obstacles.forEach(obs => {
                // Main obstacle
                drawSingleObstacle(obs, theme);
                
                // Twin obstacle
                if (obs.type === 'twin') {
                    drawSingleObstacle(obs, theme, obs.twinOffset);
                }
            });
        }

        function drawSingleObstacle(obs, theme, offset = 0) {
            const x = obs.x + offset;
            
            ctx.save();
            
            // Neon glow
            ctx.shadowColor = theme.accent;
            ctx.shadowBlur = 15;

            // Top obstacle with gradient
            const topGrad = ctx.createLinearGradient(x, 0, x + 60, 0);
            topGrad.addColorStop(0, 'transparent');
            topGrad.addColorStop(0.2, theme.accent);
            topGrad.addColorStop(0.5, theme.glow);
            topGrad.addColorStop(0.8, theme.accent);
            topGrad.addColorStop(1, 'transparent');

            ctx.fillStyle = topGrad;
            ctx.fillRect(x, 0, 60, obs.topHeight);

            // Bottom obstacle
            const bottomY = obs.topHeight + obs.gapSize;
            const bottomGrad = ctx.createLinearGradient(x, bottomY, x + 60, canvas.height);
            bottomGrad.addColorStop(0, theme.accent);
            bottomGrad.addColorStop(0.2, theme.glow);
            bottomGrad.addColorStop(0.5, theme.accent);
            bottomGrad.addColorStop(1, 'transparent');

            ctx.fillStyle = bottomGrad;
            ctx.fillRect(x, bottomY, 60, canvas.height - bottomY);

            // Animated edge lines
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            const pulse = Math.sin(frames * 0.1) * 0.5 + 0.5;
            ctx.globalAlpha = pulse;
            
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, obs.topHeight);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(x + 60, 0);
            ctx.lineTo(x + 60, obs.topHeight);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(x, bottomY);
            ctx.lineTo(x, canvas.height);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(x + 60, bottomY);
            ctx.lineTo(x + 60, canvas.height);
            ctx.stroke();

            ctx.restore();
        }

        function drawCollectibles() {
            collectibles.forEach(c => {
                ctx.save();
                
                const floatY = c.y + Math.sin(frames * 0.15 + c.floatOffset) * 8;
                
                // Pulsing glow
                const pulse = Math.sin(frames * 0.2) * 10 + 15;
                ctx.shadowColor = c.color;
                ctx.shadowBlur = pulse;

                // Outer ring
                ctx.strokeStyle = c.color;
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(c.x + c.width/2, floatY + c.height/2, c.width/2 + 5, 0, Math.PI * 2);
                ctx.stroke();

                // Inner circle
                const grad = ctx.createRadialGradient(
                    c.x + c.width/2, floatY + c.height/2, 0,
                    c.x + c.width/2, floatY + c.height/2, c.width/2
                );
                grad.addColorStop(0, '#fff');
                grad.addColorStop(1, c.color);
                
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(c.x + c.width/2, floatY + c.height/2, c.width/2, 0, Math.PI * 2);
                ctx.fill();

                // Icon
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 16px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(c.icon, c.x + c.width/2, floatY + c.height/2);

                ctx.restore();
            });
        }

        function drawParticles() {
            particles.forEach(p => {
                const alpha = p.life / p.maxLife;
                ctx.save();
                ctx.globalAlpha = alpha;
                
                if (p.type === 'text') {
                    ctx.fillStyle = p.color;
                    ctx.font = 'bold 14px Arial';
                    ctx.fillText(p.text, p.x, p.y);
                } else if (p.type === 'explosion') {
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    ctx.fillStyle = p.color;
                    ctx.shadowColor = p.color;
                    ctx.shadowBlur = 8;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                ctx.restore();
            });
        }

        function draw() {
            drawBackground();
            drawObstacles();
            drawCollectibles();
            drawParticles();
            drawPlayer();

            // Vignette
            const vignette = ctx.createRadialGradient(
                canvas.width/2, canvas.height/2, 150,
                canvas.width/2, canvas.height/2, 450
            );
            vignette.addColorStop(0, 'transparent');
            vignette.addColorStop(1, 'rgba(0, 0, 0, 0.4)');
            ctx.fillStyle = vignette;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (gameState === 'start') {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Customization
        themeBtn.addEventListener('click', () => {
            player.themeIndex = (player.themeIndex + 1) % THEMES.length;
            themeBtn.classList.toggle('active');
        });

        shipBtn.addEventListener('click', () => {
            player.shipIndex = (player.shipIndex + 1) % SHIPS.length;
            shipBtn.classList.toggle('active');
        });

        // Input handling
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                jump();
            }
        });

        canvas.addEventListener('click', jump);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            jump();
        });

        // Start
        init();
        gameLoop();
    </script>
</body>
</html>
