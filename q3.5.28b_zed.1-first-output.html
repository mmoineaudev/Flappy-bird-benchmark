<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=720, user-scalable=no">
    <title>Flappy Bird - q3.5.28b_zed</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #2d1a3e 100%);
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        #gameContainer {
            position: relative;
            box-shadow: 0 0 50px rgba(138, 92, 206, 0.5);
            border-radius: 10px;
            overflow: hidden;
        }

        canvas {
            display: block;
            border-radius: 10px;
        }

        #uiLayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 1080px;
            height: 720px;
            pointer-events: none;
        }

        #scoreDisplay {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 48px;
            font-weight: bold;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        #activeEffects {
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .effect-badge {
            padding: 10px 20px;
            border-radius: 20px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        #gameOverScreen, #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 1080px;
            height: 720px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            pointer-events: auto;
        }

        #gameOverScreen h2 {
            font-size: 72px;
            color: #ff6b6b;
            margin-bottom: 30px;
        }

        #finalScore {
            font-size: 48px;
            margin-bottom: 50px;
        }

        button {
            padding: 20px 60px;
            font-size: 32px;
            background: linear-gradient(135deg, #8e7bde, #6c4fa8);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="1080" height="720"></canvas>
        <div id="uiLayer">
            <div id="scoreDisplay">0</div>
            <div id="activeEffects"></div>
        </div>
        <div id="startScreen">
            <h1 style="font-size: 72px; margin-bottom: 30px;">🐦 Flappy Bird 🐦</h1>
            <p style="font-size: 36px; margin-bottom: 50px;">Click or press SPACE to flap!</p>
            <button id="startBtn">Start Game</button>
        </div>
        <div id="gameOverScreen" style="display: none;">
            <h2>Game Over!</h2>
            <div id="finalScore">Score: 0</div>
            <button id="restartBtn">Play Again</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const activeEffects = document.getElementById('activeEffects');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScore = document.getElementById('finalScore');

        // Game state
        let gameState = 'start';
        let score = 0;
        let gameSpeed = 5;
        let lastTime = 0;
        let pipes = [];
        let bonuses = [];
        let particles = [];
        let activeEffectsList = [];

        // Bird properties
        const bird = {
            x: 200,
            y: 360,
            radius: 25,
            velocity: 0,
            gravity: 0.5,
            flapStrength: -12,
            rotation: 0
        };

        // Effect definitions
        const effects = {
            speedBoost: {
                name: '⚡ Speed Boost',
                multiplier: 1.5,
                duration: 10000,
                color: '#ffcc00'
            },
            slowMotion: {
                name: '🐌 Slow Motion',
                multiplier: 0.7,
                duration: 10000,
                color: '#4ec8dc'
            },
            scoreMultiplier: {
                name: '⭐ Score x2',
                pointsMultiplier: 2,
                duration: 10000,
                color: '#ff6b6b'
            }
        };

        // Bonus types
        const bonusTypes = [
            { type: 'speedBoost', symbol: '⚡', scoreBonus: 5 },
            { type: 'slowMotion', symbol: '🐌', scoreBonus: 10 },
            { type: 'scoreMultiplier', symbol: '⭐', scoreBonus: 3 }
        ];

        // Background elements
        const clouds = [];
        for (let i = 0; i < 5; i++) {
            clouds.push({
                x: Math.random() * 1080,
                y: Math.random() * 300,
                size: 50 + Math.random() * 50,
                speed: 0.5 + Math.random() * 0.5
            });
        }

        // Particle system for visual effects
        function createParticles(x, y, color, count = 20) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 1,
                    color: color,
                    size: 5 + Math.random() * 10
                });
            }
        }

        // Draw background with gradient sky and clouds
        function drawBackground(time) {
            // Sky gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, 720);
            gradient.addColorStop(0, '#1a1a5e');
            gradient.addColorStop(0.5, '#4a3d8c');
            gradient.addColorStop(1, '#6b4fa8');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 1080, 720);

            // Stars
            ctx.fillStyle = 'white';
            for (let i = 0; i < 50; i++) {
                const x = ((i * 137) % 1080);
                const y = ((i * 97) % 400);
                ctx.beginPath();
                ctx.arc(x, y, Math.random() * 2, 0, Math.PI * 2);
                ctx.fill();
            }

            // Clouds
            clouds.forEach(cloud => {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                for (let i = -1; i <= 1; i++) {
                    const cx = cloud.x + i * 60;
                    const cy = cloud.y;
                    ctx.beginPath();
                    ctx.arc(cx, cy, cloud.size, 0, Math.PI * 2);
                    ctx.arc(cx + 40, cy - 20, cloud.size * 0.8, 0, Math.PI * 2);
                    ctx.arc(cx + 80, cy, cloud.size, 0, Math.PI * 2);
                    ctx.fill();
                }
                cloud.x -= cloud.speed;
                if (cloud.x < -200) cloud.x = 1080 + 100;
            });

            // Mountains
            ctx.fillStyle = '#2d1a3e';
            ctx.beginPath();
            ctx.moveTo(0, 720);
            for (let i = 0; i <= 10; i++) {
                const x = (i * 108) - 50;
                const y = 600 - Math.sin(i * 3) * 100;
                ctx.lineTo(x, y);
            }
            ctx.lineTo(1080, 720);
            ctx.fill();

            // Ground
            const groundGradient = ctx.createLinearGradient(0, 650, 0, 720);
            groundGradient.addColorStop(0, '#4a3d2a');
            groundGradient.addColorStop(1, '#3a2d1a');
            ctx.fillStyle = groundGradient;
            ctx.fillRect(0, 650, 1080, 70);

            // Ground detail
            ctx.strokeStyle = '#6b4fa8';
            ctx.lineWidth = 3;
            for (let i = 0; i < 1080; i += 60) {
                const offset = ((time * gameSpeed) % 60);
                ctx.beginPath();
                ctx.moveTo(i - offset, 650);
                ctx.lineTo(i - offset + 30, 720);
                ctx.stroke();
            }
        }

        // Draw bird with gradient and details
        function drawBird() {
            ctx.save();
            ctx.translate(bird.x, bird.y);
            ctx.rotate(bird.rotation);

            // Glow effect
            const glowGradient = ctx.createRadialGradient(0, 0, bird.radius * 1.5, 0, 0, bird.radius * 2);
            glowGradient.addColorStop(0, 'rgba(255, 200, 50, 0.5)');
            glowGradient.addColorStop(1, 'rgba(255, 200, 50, 0)');
            ctx.fillStyle = glowGradient;
            ctx.beginPath();
            ctx.arc(0, 0, bird.radius * 2, 0, Math.PI * 2);
            ctx.fill();

            // Body gradient
            const bodyGradient = ctx.createRadialGradient(-5, -5, 10, 0, 0, bird.radius);
            bodyGradient.addColorStop(0, '#ffcc00');
            bodyGradient.addColorStop(0.5, '#ff9900');
            bodyGradient.addColorStop(1, '#ff6600');

            ctx.fillStyle = bodyGradient;
            ctx.beginPath();
            ctx.arc(0, 0, bird.radius, 0, Math.PI * 2);
            ctx.fill();

            // Wing
            ctx.fillStyle = '#ffaa00';
            ctx.beginPath();
            ctx.ellipse(-5, 5, 15, 10, -0.3, 0, Math.PI * 2);
            ctx.fill();

            // Eye
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(8, -5, 8, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = 'black';
            ctx.beginPath();
            ctx.arc(10, -5, 4, 0, Math.PI * 2);
            ctx.fill();

            // Beak
            ctx.fillStyle = '#ff6600';
            ctx.beginPath();
            ctx.moveTo(15, 0);
            ctx.lineTo(30, 5);
            ctx.lineTo(15, 10);
            ctx.closePath();
            ctx.fill();

            ctx.restore();
        }

        // Draw pipe with gradient and details
        function drawPipe(pipe) {
            const gradient = ctx.createLinearGradient(pipe.x, pipe.topHeight, pipe.x + 60, pipe.topHeight);
            gradient.addColorStop(0, '#4a8c4a');
            gradient.addColorStop(0.5, '#6ac86a');
            gradient.addColorStop(1, '#3a7a3a');

            // Top pipe
            ctx.fillStyle = gradient;
            ctx.fillRect(pipe.x, 0, 60, pipe.topHeight);

            // Pipe cap
            ctx.fillStyle = '#2d5a2d';
            ctx.fillRect(pipe.x - 5, pipe.topHeight - 30, 70, 30);

            // Bottom pipe
            const bottomY = pipe.bottomY;
            const bottomHeight = 720 - bottomY;
            ctx.fillStyle = gradient;
            ctx.fillRect(pipe.x, bottomY, 60, bottomHeight);

            // Pipe cap
            ctx.fillStyle = '#2d5a2d';
            ctx.fillRect(pipe.x - 5, bottomY, 70, 30);

            // Highlights
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.fillRect(pipe.x + 5, 0, 10, pipe.topHeight - 30);
            ctx.fillRect(pipe.x + 5, bottomY + 30, 10, bottomHeight - 30);
        }

        // Draw bonus item
        function drawBonus(bonus) {
            const pulse = Math.sin(Date.now() / 200) * 5;

            // Glow effect
            ctx.save();
            ctx.globalAlpha = 0.6;
            const glowGradient = ctx.createRadialGradient(bonus.x, bonus.y, bonus.radius + 20, 0, 0, bonus.radius + 30);
            glowGradient.addColorStop(0, bonus.color);
            glowGradient.addColorStop(1, 'transparent');
            ctx.fillStyle = glowGradient;
            ctx.beginPath();
            ctx.arc(bonus.x, bonus.y, bonus.radius + 30, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            // Main body
            const gradient = ctx.createRadialGradient(bonus.x - 5, bonus.y - 5, 10, bonus.x, bonus.y, bonus.radius);
            gradient.addColorStop(0, bonus.color);
            gradient.addColorStop(1, bonus.shade);

            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(bonus.x, bonus.y, bonus.radius + pulse, 0, Math.PI * 2);
            ctx.fill();

            // Symbol
            ctx.font = 'bold 30px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = 'white';
            ctx.fillText(bonus.symbol, bonus.x, bonus.y);

            // Border
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 3;
            ctx.stroke();
        }

        // Draw particles
        function drawParticles() {
            particles.forEach((particle, index) => {
                particle.x += particle.vx;
                particle.y += particle.vy;
                particle.life -= 0.02;
                particle.vy += 0.2;

                ctx.globalAlpha = particle.life;
                ctx.fillStyle = particle.color;
                ctx.beginPath();
                ctx.arc(particle.x, particle.y, particle.size * particle.life, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;

                if (particle.life <= 0) {
                    particles.splice(index, 1);
                }
            });
        }

        // Update bird physics
        function updateBird() {
            bird.velocity += bird.gravity;
            bird.y += bird.velocity;
            bird.rotation = Math.min(Math.max(bird.velocity * 0.03, -0.5), 1);

            // Floor collision
            if (bird.y + bird.radius >= 650) {
                bird.y = 650 - bird.radius;
                bird.velocity = 0;
                gameOver();
            }

            // Ceiling collision
            if (bird.y - bird.radius <= 0) {
                bird.y = bird.radius;
                bird.velocity = 0;
            }
        }

        // Create new pipe
        function createPipe() {
            const gapSize = 180 + Math.random() * 60;
            const minHeight = 100;
            const maxHeight = 720 - gapSize - minHeight - 150;
            const topHeight = minHeight + Math.random() * (maxHeight - minHeight);

            pipes.push({
                x: 1080,
                topHeight: topHeight,
                bottomY: topHeight + gapSize,
                width: 60,
                passed: false
            });
        }

        // Create bonus item
        function createBonus(pipeX) {
            const bonusType = bonusTypes[Math.floor(Math.random() * bonusTypes.length)];
            const effectInfo = effects[bonusType.type];

            bonuses.push({
                x: pipeX + 30,
                y: (pipe.topHeight + pipe.bottomY) / 2,
                radius: 30,
                type: bonusType.type,
                symbol: bonusType.symbol,
                scoreBonus: bonusType.scoreBonus,
                color: effectInfo.color,
                shade: adjustColor(effectInfo.color, -30),
                collected: false
            });
        }

        // Helper function to darken/lighten colors
        function adjustColor(color, amount) {
            const hex = color.replace('#', '');
            const r = Math.max(0, Math.min(255, parseInt(hex.substr(0, 2), 16) + amount));
            const g = Math.max(0, Math.min(255, parseInt(hex.substr(2, 2), 16) + amount));
            const b = Math.max(0, Math.min(255, parseInt(hex.substr(4, 2), 16) + amount));
            return `#${r.toString(16).padStart(2, '0')}${g.toString(16).padStart(2, '0')}${b.toString(16).padStart(2, '0')}`;
        }

        // Apply effect
        function applyEffect(effectType) {
            if (activeEffectsList.find(e => e.type === effectType)) return;

            const effect = effects[effectType];
            activeEffectsList.push({
                type: effectType,
                name: effect.name,
                color: effect.color,
                endTime: Date.now() + effect.duration
            });

            createParticles(bonus.x, bonus.y, effect.color, 30);

            if (effect.multiplier) {
                gameSpeed *= effect.multiplier;
            }

            updateEffectDisplay();
        }

        // Update effect display
        function updateEffectDisplay() {
            activeEffects.innerHTML = '';
            activeEffectsList.forEach(effect => {
                const badge = document.createElement('div');
                badge.className = 'effect-badge';
                badge.style.background = `linear-gradient(135deg, ${effect.color}, ${adjustColor(effect.color, -40)})`;
                badge.textContent = `${effect.name} (${Math.ceil((effect.endTime - Date.now()) / 1000)}s)`;
                activeEffects.appendChild(badge);
            });
        }

        // Check for collected effects
        function checkCollectedEffects() {
            const now = Date.now();
            activeEffectsList = activeEffectsList.filter(effect => {
                if (now >= effect.endTime) {
                    if (effects[effect.type].multiplier) {
                        gameSpeed /= effects[effect.type].multiplier;
                    }
                    return false;
                }
                return true;
            });
            updateEffectDisplay();
        }

        // Collision detection
        function checkCollisions() {
            // Pipe collision
            pipes.forEach(pipe => {
                if (bird.x + bird.radius > pipe.x &&
                    bird.x - bird.radius < pipe.x + pipe.width) {
                    if (bird.y - bird.radius < pipe.topHeight ||
                        bird.y + bird.radius > pipe.bottomY) {
                        gameOver();
                    }
                }

                // Score tracking
                if (!pipe.passed && bird.x > pipe.x + pipe.width) {
                    pipe.passed = true;
                    score++;
                    scoreDisplay.textContent = score;
                }
            });

            // Bonus collision
            bonuses.forEach(bonus => {
                if (!bonus.collected) {
                    const dx = bird.x - bonus.x;
                    const dy = bird.y - bonus.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < bird.radius + bonus.radius) {
                        bonus.collected = true;
                        applyEffect(bonus.type);
                        score += bonus.scoreBonus;
                        scoreDisplay.textContent = score;
                        createParticles(bonus.x, bonus.y, bonus.color, 30);
                    }
                }
            });

            // Remove collected bonuses
            bonuses = bonuses.filter(bonus => !bonus.collected);
        }

        // Game loop
        function gameLoop(timestamp) {
            if (gameState !== 'playing') return;

            const deltaTime = timestamp - lastTime;
            lastTime = timestamp;

            ctx.clearRect(0, 0, 1080, 720);

            drawBackground(timestamp);

            // Spawn pipes and bonuses
            if (pipes.length === 0 || pipes[pipes.length - 1].x < 900) {
                createPipe();
                if (Math.random() < 0.4) {
                    const lastPipe = pipes[pipes.length - 1];
                    createBonus(lastPipe.x);
                }
            }

            // Update and draw pipes
            pipes.forEach((pipe, index) => {
                pipe.x -= gameSpeed;
                drawPipe(pipe);
                if (pipe.x < -60) {
                    pipes.splice(index, 1);
                }
            });

            // Update and draw bonuses
            bonuses.forEach(bonus => {
                bonus.x -= gameSpeed;
                drawBonus(bonus);
            });

            updateBird();
            drawBird();
            drawParticles();
            checkCollisions();
            checkCollectedEffects();

            requestAnimationFrame(gameLoop);
        }

        // Flap action
        function flap() {
            if (gameState === 'playing') {
                bird.velocity = bird.flapStrength;
                createParticles(bird.x, bird.y, '#ffcc00', 10);
            }
        }

        // Start game
        function startGame() {
            gameState = 'playing';
            score = 0;
            gameSpeed = 5;
            bird.y = 360;
            bird.velocity = 0;
            pipes = [];
            bonuses = [];
            particles = [];
            activeEffectsList = [];
            scoreDisplay.textContent = '0';
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            updateEffectDisplay();
            requestAnimationFrame(gameLoop);
        }

        // Game over
        function gameOver() {
            gameState = 'gameover';
            finalScore.textContent = `Score: ${score}`;
            gameOverScreen.style.display = 'flex';
            createParticles(bird.x, bird.y, '#ff6b6b', 50);
        }

        // Event listeners
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);

        canvas.addEventListener('mousedown', flap);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); flap(); });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (gameState === 'playing') {
                    flap();
                } else if (gameState !== 'playing' && startScreen.style.display !== 'none') {
                    startGame();
                } else if (gameState === 'gameover') {
                    startGame();
                }
            }
        });

        // Initial render
        drawBackground(0);
        drawBird();
    </script>
</body>
</html>
