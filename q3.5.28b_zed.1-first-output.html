<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird - First Version</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            width: 1080px;
            height: 720px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 200, 255, 0.3);
        }

        #gameCanvas {
            display: block;
            width: 1080px;
            height: 720px;
        }

        #scoreDisplay {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 48px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.7);
            z-index: 20;
        }

        #gameOverScreen {
            display: none;
        }

        .title {
            font-size: 72px;
            color: #4ecdc4;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.5);
            margin-bottom: 30px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .subtitle {
            font-size: 28px;
            color: #eee;
            margin-bottom: 40px;
        }

        .instructions {
            font-size: 20px;
            color: #aaa;
            margin-bottom: 50px;
            line-height: 1.8;
            text-align: center;
            padding: 0 50px;
        }

        #restartBtn {
            padding: 15px 50px;
            font-size: 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #restartBtn:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.5);
        }

        .bonus-indicator {
            position: absolute;
            bottom: 20px;
            left: 20px;
            padding: 15px 25px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 10px;
            color: white;
            font-size: 18px;
            display: none;
        }

        .bonus-indicator.active {
            display: block;
            animation: glow 1s infinite alternate;
        }

        @keyframes glow {
            from { box-shadow: 0 0 10px #ffd700; }
            to { box-shadow: 0 0 20px #ffd700; }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="1080" height="720"></canvas>

        <div id="scoreDisplay">0</div>

        <div class="bonus-indicator" id="bonusIndicator">
            ⚡ Speed Boost: <span id="bonusTimer">10.0</span>s
        </div>

        <div id="startScreen">
            <div class="title">FLAPPY BIRD</div>
            <div class="subtitle">First Version</div>
            <div class="instructions">
                Click or Press Space to flap your wings<br><br>
                Avoid the pipes!<br>
                Collect floating bonuses for special effects!<br>
                Speed Boost: Multiply your speed by 1.5x for 10 seconds
            </div>
            <button id="startBtn">START GAME</button>
        </div>

        <div id="gameOverScreen">
            <div class="title">GAME OVER</div>
            <div class="subtitle">Score: <span id="finalScore">0</span></div>
            <button id="restartBtn">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game constants
        const GRAVITY = 0.5;
        const BASE_SPEED = 3;
        const JUMP_FORCE = -8;
        const PIPE_WIDTH = 80;
        const PIPE_GAP = 200;
        const BONUS_SIZE = 25;
        const PIPE_SPAWN_RATE = 120;

        // Game state
        let gameState = 'start'; // start, playing, gameOver
        let score = 0;
        let gameSpeed = BASE_SPEED;
        let lastPipeSpawn = 0;
        let bonusEffects = [];

        // Bird object
        const bird = {
            x: 200,
            y: 360,
            width: 50,
            height: 40,
            velocity: 0,
            rotation: 0,
            flapCooldown: false
        };

        // Game objects arrays
        let pipes = [];
        let bonuses = [];
        let particles = [];

        // Colors and effects
        const BONUS_TYPES = {
            SPEED_BOOST: { color: '#ffd700', symbol: '⚡', name: 'Speed Boost', effect: () => {
                gameSpeed = BASE_SPEED * 1.5;
                bonusEffects.push({
                    type: 'speedBoost',
                    endTime: Date.now() + 10000
                });
            }},
            EXTRA_POINTS: { color: '#ff6b6b', symbol: '★', name: 'Bonus Points', effect: () => {
                score += 50;
                updateScore();
            }},
            SHIELD: { color: '#4ecdc4', symbol: '🛡️', name: 'Shield', effect: () => {
                bonusEffects.push({
                    type: 'shield',
                    endTime: Date.now() + 15000
                });
            }}
        };

        // Initialize game
        function init() {
            bird.x = 200;
            bird.y = 360;
            bird.velocity = 0;
            bird.rotation = 0;
            score = 0;
            gameSpeed = BASE_SPEED;
            bonusEffects = [];
            pipes = [];
            bonuses = [];
            particles = [];
            lastPipeSpawn = 0;
            updateScore();
            hideBonusIndicator();
        }

        // Flap
        function flap() {
            if (gameState === 'playing') {
                bird.velocity = JUMP_FORCE;
                createFlapParticles();
            }
        }

        // Create flap particles
        function createFlapParticles() {
            for (let i = 0; i < 5; i++) {
                particles.push({
                    x: bird.x,
                    y: bird.y + bird.height / 2,
                    vx: -Math.random() * 3 - 1,
                    vy: Math.random() * 4 - 2,
                    size: Math.random() * 8 + 4,
                    color: `hsl(${40 + Math.random() * 20}, 100%, ${70 + Math.random() * 20}%)`,
                    life: 1
                });
            }
        }

        // Create death particles
        function createDeathParticles() {
            for (let i = 0; i < 30; i++) {
                particles.push({
                    x: bird.x + bird.width / 2,
                    y: bird.y + bird.height / 2,
                    vx: Math.random() * 10 - 5,
                    vy: Math.random() * 10 - 5,
                    size: Math.random() * 12 + 6,
                    color: `hsl(${Math.random() * 60}, 100%, 60%)`,
                    life: 1
                });
            }
        }

        // Spawn pipe
        function spawnPipe() {
            const minY = 150;
            const maxY = canvas.height - PIPE_GAP - 150;
            const gapY = Math.random() * (maxY - minY) + minY;

            pipes.push({
                x: canvas.width,
                gapY: gapY,
                passed: false
            });
        }

        // Spawn bonus
        function spawnBonus() {
            const typeKeys = Object.keys(BONUS_TYPES);
            const randomType = typeKeys[Math.floor(Math.random() * typeKeys.length)];

            bonuses.push({
                x: canvas.width,
                y: Math.random() * (canvas.height - 100) + 50,
                type: BONUS_TYPES[randomType],
                floatOffset: 0
            });
        }

        // Update game
        function update(timestamp) {
            if (gameState !== 'playing') return;

            // Spawn pipes and bonuses
            if (timestamp - lastPipeSpawn > PIPE_SPAWN_RATE / gameSpeed) {
                spawnPipe();
                if (Math.random() < 0.4) {
                    spawnBonus();
                }
                lastPipeSpawn = timestamp;
            }

            // Update bird
            bird.velocity += GRAVITY;
            bird.y += bird.velocity;
            bird.rotation = Math.min(Math.max(bird.velocity * 3, -30), 90);

            // Boundary check
            if (bird.y < 0 || bird.y + bird.height > canvas.height) {
                gameOver();
                return;
            }

            // Update pipes
            for (let i = pipes.length - 1; i >= 0; i--) {
                const pipe = pipes[i];
                pipe.x -= gameSpeed;

                // Score check
                if (!pipe.passed && pipe.x + PIPE_WIDTH < bird.x) {
                    pipe.passed = true;
                    score++;
                    updateScore();
                }

                // Remove off-screen pipes
                if (pipe.x + PIPE_WIDTH < 0) {
                    pipes.splice(i, 1);
                }
            }

            // Update bonuses
            for (let i = bonuses.length - 1; i >= 0; i--) {
                const bonus = bonuses[i];
                bonus.x -= gameSpeed;
                bonus.floatOffset = Math.sin(Date.now() / 200) * 10;

                // Collision check
                const bonusX = bonus.x + BONUS_SIZE / 2;
                const bonusY = bonus.y + BONUS_SIZE / 2 + bonus.floatOffset;

                if (checkCollision(bonusX, bonusY, BONUS_SIZE / 2)) {
                    bonus.type.effect();
                    bonuses.splice(i, 1);
                    continue;
                }

                // Remove off-screen bonuses
                if (bonus.x + BONUS_SIZE < 0) {
                    bonuses.splice(i, 1);
                }
            }

            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const particle = particles[i];
                particle.x += particle.vx;
                particle.y += particle.vy;
                particle.vy += 0.2;
                particle.life -= 0.02;

                if (particle.life <= 0) {
                    particles.splice(i, 1);
                }
            }

            // Check pipe collisions
            for (const pipe of pipes) {
                const birdCenterX = bird.x + bird.width / 2;
                const birdCenterY = bird.y + bird.height / 2;
                const birdRadius = bird.width / 2.5;

                // Top pipe
                if (checkCircleRectCollision(birdCenterX, birdCenterY, birdRadius,
                    pipe.x, 0, PIPE_WIDTH, pipe.gapY)) {
                    gameOver();
                    return;
                }

                // Bottom pipe
                if (checkCircleRectCollision(birdCenterX, birdCenterY, birdRadius,
                    pipe.x, pipe.gapY + PIPE_GAP, PIPE_WIDTH, canvas.height - (pipe.gapY + PIPE_GAP))) {
                    gameOver();
                    return;
                }
            }

            // Check bonus collisions with particles
            for (const bonus of bonuses) {
                const bonusX = bonus.x + BONUS_SIZE / 2;
                const bonusY = bonus.y + BONUS_SIZE / 2 + bonus.floatOffset;

                if (checkCollision(bonusX, bonusY, BONUS_SIZE / 2)) {
                    bonus.type.effect();
                    // Bonus removal handled above
                }
            }

            // Update bonus effects timer
            const now = Date.now();
            for (let i = bonusEffects.length - 1; i >= 0; i--) {
                if (bonusEffects[i].endTime < now) {
                    if (bonusEffects[i].type === 'speedBoost') {
                        gameSpeed = BASE_SPEED;
                    }
                    bonusEffects.splice(i, 1);
                }
            }

            // Update bonus indicator
            updateBonusIndicator();
        }

        // Check collision between circle and rectangle
        function checkCircleRectCollision(cx, cy, radius, rx, ry, rw, rh) {
            const closestX = Math.max(rx, Math.min(cx, rx + rw));
            const closestY = Math.max(ry, Math.min(cy, ry + rh));
            const dx = cx - closestX;
            const dy = cy - closestY;
            return (dx * dx + dy * dy) < (radius * radius);
        }

        // Check collision between two circles
        function checkCollision(cx1, cy1, r1, cx2, cy2, r2) {
            const dx = cx1 - cx2;
            const dy = cy1 - cy2;
            return (dx * dx + dy * dy) < (r1 + r2) * (r1 + r2);
        }

        // Draw game
        function draw() {
            // Clear canvas
            ctx.fillStyle = '#87CEEB';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw sky gradient
            const skyGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            skyGradient.addColorStop(0, '#87CEEB');
            skyGradient.addColorStop(0.5, '#98D8E8');
            skyGradient.addColorStop(1, '#B0E0E6');
            ctx.fillStyle = skyGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw clouds
            drawClouds();

            // Draw ground
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(0, canvas.height - 100, canvas.width, 100);

            // Draw grass
            ctx.fillStyle = '#228B22';
            ctx.fillRect(0, canvas.height - 100, canvas.width, 30);

            // Draw pipe glow
            ctx.shadowBlur = 10;
            ctx.shadowColor = 'rgba(100, 200, 255, 0.5)';

            // Draw pipes
            for (const pipe of pipes) {
                drawPipe(pipe.x, 0, PIPE_WIDTH, pipe.gapY);
                drawPipe(pipe.x, pipe.gapY + PIPE_GAP, PIPE_WIDTH, canvas.height - (pipe.gapY + PIPE_GAP));
            }

            ctx.shadowBlur = 0;

            // Draw bonuses
            for (const bonus of bonuses) {
                drawBonus(bonus);
            }

            // Draw particles
            for (const particle of particles) {
                ctx.globalAlpha = particle.life;
                ctx.fillStyle = particle.color;
                ctx.beginPath();
                ctx.arc(particle.x, particle.y, particle.size * particle.life, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;

            // Draw bird
            drawBird();
        }

        // Draw clouds
        function drawClouds() {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';

            const cloudPositions = [
                { x: 100, y: 80, size: 60 },
                { x: 350, y: 120, size: 45 },
                { x: 600, y: 70, size: 55 },
                { x: 850, y: 110, size: 50 },
                { x: 200, y: 180, size: 40 }
            ];

            for (const cloud of cloudPositions) {
                // Draw cloud puffs
                ctx.beginPath();
                ctx.arc(cloud.x, cloud.y, cloud.size * 0.5, 0, Math.PI * 2);
                ctx.arc(cloud.x + cloud.size * 0.4, cloud.y - cloud.size * 0.1, cloud.size * 0.4, 0, Math.PI * 2);
                ctx.arc(cloud.x + cloud.size * 0.8, cloud.y, cloud.size * 0.45, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Draw pipe
        function drawPipe(x, y, width, height) {
            const pipeGradient = ctx.createLinearGradient(x, 0, x + width, 0);
            pipeGradient.addColorStop(0, '#228B22');
            pipeGradient.addColorStop(0.3, '#32CD32');
            pipeGradient.addColorStop(0.7, '#32CD32');
            pipeGradient.addColorStop(1, '#006400');

            ctx.fillStyle = pipeGradient;
            ctx.fillRect(x, y, width, height);

            // Pipe border
            ctx.strokeStyle = '#006400';
            ctx.lineWidth = 3;
            ctx.strokeRect(x, y, width, height);

            // Pipe highlights
            ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.fillRect(x + 5, y + 5, 10, height - 10);
        }

        // Draw bird
        function drawBird() {
            ctx.save();
            ctx.translate(bird.x + bird.width / 2, bird.y + bird.height / 2);
            ctx.rotate(bird.rotation * Math.PI / 180);

            // Bird body
            const bodyGradient = ctx.createRadialGradient(0, 0, 5, 0, 0, 25);
            bodyGradient.addColorStop(0, '#FFD700');
            bodyGradient.addColorStop(1, '#FFA500');

            ctx.fillStyle = bodyGradient;
            ctx.beginPath();
            ctx.ellipse(0, 0, bird.width / 2, bird.height / 2, 0, 0, Math.PI * 2);
            ctx.fill();

            // Bird border
            ctx.strokeStyle = '#B8860B';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Eye
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(12, -8, 10, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = 'black';
            ctx.beginPath();
            ctx.arc(15, -8, 5, 0, Math.PI * 2);
            ctx.fill();

            // Beak
            ctx.fillStyle = '#FF6347';
            ctx.beginPath();
            ctx.moveTo(18, 2);
            ctx.lineTo(28, 5);
            ctx.lineTo(18, 10);
            ctx.closePath();
            ctx.fill();

            // Wing
            ctx.fillStyle = '#FFA500';
            ctx.beginPath();
            ctx.ellipse(-5, 5, 12, 8, -0.3, 0, Math.PI * 2);
            ctx.fill();

            // Tail feathers
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.moveTo(-20, -5);
            ctx.lineTo(-32, -12);
            ctx.lineTo(-32, 5);
            ctx.lineTo(-20, 0);
            ctx.closePath();
            ctx.fill();

            ctx.restore();
        }

        // Draw bonus
        function drawBonus(bonus) {
            const floatY = bonus.y + bonus.floatOffset;

            // Bonus glow
            ctx.shadowBlur = 15;
            ctx.shadowColor = bonus.type.color;

            // Background circle
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.beginPath();
            ctx.arc(bonus.x + BONUS_SIZE / 2, floatY + BONUS_SIZE / 2, BONUS_SIZE, 0, Math.PI * 2);
            ctx.fill();

            // Main bonus circle
            const bonusGradient = ctx.createRadialGradient(
                bonus.x + BONUS_SIZE / 2, floatY + BONUS_SIZE / 2, 0,
                bonus.x + BONUS_SIZE / 2, floatY + BONUS_SIZE / 2, BONUS_SIZE / 2
            );
            bonusGradient.addColorStop(0, bonus.type.color);
            bonusGradient.addColorStop(1, shadeColor(bonus.type.color, -30));

            ctx.fillStyle = bonusGradient;
            ctx.beginPath();
            ctx.arc(bonus.x + BONUS_SIZE / 2, floatY + BONUS_SIZE / 2, BONUS_SIZE / 2, 0, Math.PI * 2);
            ctx.fill();

            ctx.shadowBlur = 0;

            // Symbol
            ctx.fillStyle = 'white';
            ctx.font = 'bold 18px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(bonus.type.symbol, bonus.x + BONUS_SIZE / 2, floatY + BONUS_SIZE / 2);
        }

        // Helper function to shade color
        function shadeColor(color, percent) {
            const num = parseInt(color.replace('#', ''), 16);
            const amt = Math.round(2.55 * percent);
            const R = (num >> 16) + amt;
            const G = (num >> 8 & 0x00FF) + amt;
            const B = (num & 0x0000FF) + amt;
            return '#' + (0x1000000 +
                (R < 255 ? R < 1 ? 0 : R : 255) * 0x10000 +
                (G < 255 ? G < 1 ? 0 : G : 255) * 0x100 +
                (B < 255 ? B < 1 ? 0 : B : 255)
            ).toString(16).slice(1);
        }

        // Update score display
        function updateScore() {
            document.getElementById('scoreDisplay').textContent = score;
        }

        // Show/hide start screen
        function showStartScreen() {
            document.getElementById('startScreen').style.display = 'flex';
            document.getElementById('gameOverScreen').style.display = 'none';
        }

        // Show game over screen
        function showGameOverScreen() {
            document.getElementById('gameOverScreen').style.display = 'flex';
            document.getElementById('finalScore').textContent = score;
            createDeathParticles();
        }

        // Update bonus indicator
        function updateBonusIndicator() {
            const speedBoostEffect = bonusEffects.find(e => e.type === 'speedBoost');
            if (speedBoostEffect) {
                const remainingTime = Math.max(0, (speedBoostEffect.endTime - Date.now()) / 1000);
                document.getElementById('bonusTimer').textContent = remainingTime.toFixed(1);
                document.getElementById('bonusIndicator').classList.add('active');
            } else {
                hideBonusIndicator();
            }
        }

        // Hide bonus indicator
        function hideBonusIndicator() {
            document.getElementById('bonusIndicator').classList.remove('active');
        }

        // Game over
        function gameOver() {
            gameState = 'gameOver';
            showGameOverScreen();
        }

        // Start game
        function startGame() {
            init();
            gameState = 'playing';
            showStartScreen();
            document.getElementById('startScreen').style.display = 'none';
        }

        // Main game loop
        function gameLoop(timestamp) {
            update(timestamp);
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Event listeners
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (gameState === 'start') {
                    startGame();
                } else if (gameState === 'playing') {
                    flap();
                } else if (gameState === 'gameOver') {
                    startGame();
                }
            }
        });

        document.getElementById('gameCanvas').addEventListener('click', () => {
            if (gameState === 'playing') {
                flap();
            }
        });

        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);

        // Start the game loop
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
